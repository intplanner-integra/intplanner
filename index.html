            <div><p style={{fontSize:11,color:'#64748b',margin:0}}>Total tareas</p><p style={{fontSize:20,fontWeight:800,color:'#fff',margin:0}}>{kpis.total}</p></div>
            <div><p style={{fontSize:11,color:'#64748b',margin:0}}>Completadas</p><p style={{fontSize:20,fontWeight:800,color:'#4ade80',margin:0}}>{kpis.comp}</p></div>
            <div><p style={{fontSize:11,color:'#64748b',margin:0}}>Cumplimiento</p><p style={{fontSize:20,fontWeight:800,color:'#C9A84C',margin:0}}>{kpis.pct}%</p></div>
          </div>
        </div>
      </div>

      {/* Distribución tareas por estado + resumen general */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div className="card-p">
          <div className="gline"/>
          <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:14}}>Distribución por Estado</h3>
          {/* FIX INC-2: Módulo Proyectos eliminado — este card ahora muestra resumen de equipo */}
          {equipo.length===0
            ? <p style={{color:'#475569',fontSize:12}}>Sin integrantes registrados</p>
            : equipo.slice(0,5).map(e=>{
                const nt = tareas.filter(t=>t.responsableId===e.id).length;
                const nc = tareas.filter(t=>t.responsableId===e.id&&t.estado==='completada').length;
                const pct = nt>0?Math.round(nc/nt*100):0;
                return <div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <span style={{fontSize:12,color:'#94a3b8',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.nombre}</span>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{width:80,background:'#0f1923',borderRadius:99,height:6}}>
                      <div style={{height:'100%',borderRadius:99,background:'#C9A84C',width:pct+'%'}}/>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color:'#fff',width:28,textAlign:'right'}}>{pct}%</span>
                  </div>
                </div>;
              })
          }
        </div>

        <div className="card-p">
          <div className="gline"/>
          <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:14}}>Top Clientes por Facturación</h3>
          {clientes.length===0
            ? <p style={{color:'#475569',fontSize:12}}>Sin clientes registrados</p>
            : clientes.map(c=>{
              const tot = facturas.filter(f=>f.clienteId===c.id).reduce((a,f)=>a+(Number(f.valor)||0),0);
              return {c,tot};
            }).filter(x=>x.tot>0).sort((a,b)=>b.tot-a.tot).slice(0,5).map(({c,tot})=>(
              <div key={c.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:12,color:'#cbd5e1',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.nombre}</span>
                <span style={{fontSize:12,fontWeight:700,color:'#C9A84C',marginLeft:8}}>{fmt.cop(tot)}</span>
              </div>
            ))}
        </div>
      </div>
    </div>}

    {/* ── VISTA CONSULTORES ── */}
    {vista==='consultores'&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
      {consultores.length===0
        ? <div className="card-p" style={{textAlign:'center',color:'#475569',padding:40}}>Sin equipo registrado</div>
        : <>
          {/* Ranking visual */}
          <div className="card-p">
            <div className="gline"/>
            <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:16}}>Ranking de Productividad</h3>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {consultores.map((c,i)=>(
                <div key={c.id} style={{
                  display:'flex',alignItems:'center',gap:12,padding:'10px 14px',
                  borderRadius:10,background:i===0?'rgba(201,168,76,.08)':'#0f1923',
                  border:'1px solid',borderColor:i===0?'rgba(201,168,76,.3)':'#243447'
                }}>
                  <div style={{
                    width:28,height:28,borderRadius:'50%',flexShrink:0,
                    background:i===0?'linear-gradient(135deg,#C9A84C,#b8943e)':i===1?'linear-gradient(135deg,#94a3b8,#64748b)':i===2?'linear-gradient(135deg,#b45309,#92400e)':'#1e293b',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:11,fontWeight:800,color:i<3?'#fff':'#475569'
                  }}>
                    {i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:13,fontWeight:600,color:'#fff'}}>{c.nombre}</span>
                      <span style={{fontSize:13,fontWeight:700,color:c.pct>=70?'#4ade80':c.pct>=40?'#C9A84C':'#f87171'}}>{c.pct}%</span>
                    </div>
                    <div style={{background:'#162030',borderRadius:99,height:6,overflow:'hidden'}}>
                      <div style={{height:'100%',borderRadius:99,background:c.pct>=70?'#4ade80':c.pct>=40?'#C9A84C':'#f87171',width:c.pct+'%',transition:'width .5s'}}/>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:12,fontSize:11,color:'#64748b'}}>
                    <div style={{textAlign:'center'}}>
                      <p style={{margin:0,fontWeight:700,color:'#fff',fontSize:13}}>{c.total}</p>
                      <p style={{margin:0}}>Total</p>
                    </div>
                    <div style={{textAlign:'center'}}>
                      <p style={{margin:0,fontWeight:700,color:'#4ade80',fontSize:13}}>{c.comp}</p>
                      <p style={{margin:0}}>Comp.</p>
                    </div>
                    <div style={{textAlign:'center'}}>
                      <p style={{margin:0,fontWeight:700,color:c.venc>0?'#f87171':'#475569',fontSize:13}}>{c.venc}</p>
                      <p style={{margin:0}}>Venc.</p>
                    </div>
                    <div style={{textAlign:'center'}}>
                      <p style={{margin:0,fontWeight:700,color:'#60a5fa',fontSize:13}}>{c.avgDias??'—'}</p>
                      <p style={{margin:0}}>Días</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Tabla detallada */}
          <div className="card" style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr>
                {['Consultor','Cargo','Total','Completadas','En Curso','Vencidas','Cumplimiento','Tiempo Prom.','Últimas 4 sem.'].map(h=><th key={h}>{h}</th>)}
              </tr></thead>
              <tbody>
                {consultores.map(c=>(
                  <tr key={c.id}>
                    <td style={{fontWeight:600,color:'#fff'}}>{c.nombre}</td>
                    <td style={{color:'#64748b',fontSize:11}}>{c.cargo||'—'}</td>
                    <td style={{textAlign:'center',fontWeight:600,color:'#fff'}}>{c.total}</td>
                    <td style={{textAlign:'center',color:'#4ade80',fontWeight:600}}>{c.comp}</td>
                    <td style={{textAlign:'center',color:'#C9A84C',fontWeight:600}}>{c.enCurso}</td>
                    <td style={{textAlign:'center',color:c.venc>0?'#f87171':'#475569',fontWeight:600}}>{c.venc}</td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <div style={{flex:1,background:'#0f1923',borderRadius:99,height:6}}>
                          <div style={{height:'100%',borderRadius:99,background:c.pct>=70?'#4ade80':c.pct>=40?'#C9A84C':'#f87171',width:c.pct+'%'}}/>
                        </div>
                        <span style={{fontSize:11,fontWeight:700,color:'#fff',width:30}}>{c.pct}%</span>
                      </div>
                    </td>
                    <td style={{textAlign:'center',color:'#94a3b8',fontSize:12}}>{c.avgDias!=null?`${c.avgDias}d`:'—'}</td>
                    <td style={{textAlign:'center',color:'#60a5fa',fontWeight:600}}>{c.recientes}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>}
    </div>}

    {/* ── VISTA FINANCIERO ── */}
    {vista==='financiero'&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {[
          {label:'Total Facturado', val:fmt.cop(kpis.totalFact), color:'#C9A84C', sub:'Histórico acumulado'},
          {label:'Total Cobrado',   val:fmt.cop(kpis.cobradas),  color:'#4ade80', sub:'Facturas pagadas'},
          {label:'Por Cobrar',      val:fmt.cop(kpis.pendFact),  color:'#f87171', sub:'Facturas pendientes'},
        ].map(({label,val,color,sub})=>(
          <div key={label} className="card-p" style={{border:'1px solid',borderColor:color+'33'}}>
            <p style={{fontSize:11,color:'#64748b',margin:'0 0 4px',fontWeight:600,textTransform:'uppercase',letterSpacing:'.4px'}}>{label}</p>
            <p style={{fontSize:28,fontWeight:800,color,margin:'0 0 4px'}} className="sy">{val}</p>
            <p style={{fontSize:11,color:'#475569',margin:0}}>{sub}</p>
          </div>
        ))}
      </div>

      {/* Gráfico mensual detallado */}
      <div className="card-p">
        <div className="gline"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,margin:0}}>Facturación vs Cobro Mensual</h3>
          <select className="inp" style={{width:'auto',fontSize:11,padding:'3px 8px'}}
            value={periodoMeses} onChange={e=>setPeriodoMeses(Number(e.target.value))}>
            {[3,6,12].map(n=><option key={n} value={n}>{n} meses</option>)}
          </select>
        </div>
        <div className="card" style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr>
              {['Mes','Facturado','Cobrado','% Cobro','Tareas Completadas'].map(h=><th key={h}>{h}</th>)}
            </tr></thead>
            <tbody>
              {mesesData.map(m=>{
                const pctCobro = m.facturado>0?Math.round(m.cobrado/m.facturado*100):0;
                return <tr key={m.k}>
                  <td style={{fontWeight:600,color:'#fff'}}>{m.label}</td>
                  <td style={{color:'#C9A84C',fontWeight:600}}>{fmt.cop(m.facturado)}</td>
                  <td style={{color:'#4ade80',fontWeight:600}}>{fmt.cop(m.cobrado)}</td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <div style={{flex:1,background:'#0f1923',borderRadius:99,height:6}}>
                        <div style={{height:'100%',borderRadius:99,background:pctCobro>=80?'#4ade80':pctCobro>=50?'#C9A84C':'#f87171',width:pctCobro+'%'}}/>
                      </div>
                      <span style={{fontSize:11,fontWeight:700,color:'#fff',width:30}}>{pctCobro}%</span>
                    </div>
                  </td>
                  <td style={{textAlign:'center',color:'#60a5fa',fontWeight:600}}>{m.tComp}</td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>}
  </div>;
};


// ── ALERTAS ──────────────────────────────────────────────────
const Alertas = () => {
  const {tareas,setTareas,clientes,equipo,toast} = useApp();
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState({});
  const [del,setDel]=useState(null);
  const [filtroTipo,setFiltroTipo]=useState(''); // '' | 'auto' | 'manual'
  const hoy=new Date().toISOString().split('T')[0];
  const TIPOS=['Recordatorio','Vencimiento','Seguimiento','Urgente','Reunión','Consultoría','Entrega'];

  // FILTROS v3 — fecha, cliente, equipo, estado, prioridad
  const [filFechaIni, setFilFechaIni] = useState('');
  const [filFechaFin, setFilFechaFin] = useState('');
  const [filCliente,  setFilCliente]  = useState('');
  const [filEquipoA,  setFilEquipoA]  = useState('');
  const [filtroPrio,  setFiltroPrio]  = useState('todas');
  const [filtroEstado,setFiltroEstado]= useState('activas'); // 'activas' | 'completadas' | 'todas'

  const alertasTodas = tareas.filter(t=>t.esAlerta);

  // Orden de prioridad: Alta=0, Media=1, Baja=2
  const PRIO_ORD = {Alta:0,Media:1,Baja:2};
  // Peso de estado dentro de activas: en_curso=0, reprogramada=1, vencidas=2, pendiente=3
  const pesoEstadoAlerta = (a) => {
    if(a.estado==='completada') return 10; // siempre al final
    if(a.estado==='en_curso')   return 0;
    if(a.estado==='reprogramada') return 1;
    if(a.fechaVen && a.fechaVen < hoy) return 2; // vencida activa
    return 3; // pendiente
  };

  // Pipeline de filtros + sort inteligente
  const alertas = useMemo(()=>{
    let r = alertasTodas;
    if(filtroTipo==='auto')    r = r.filter(a=>a.auto);
    if(filtroTipo==='manual')  r = r.filter(a=>!a.auto);
    if(filtroPrio!=='todas')   r = r.filter(a=>(a.prioridad||'Media')===filtroPrio);
    if(filFechaIni)            r = r.filter(a=>a.fechaVen>=filFechaIni);
    if(filFechaFin)            r = r.filter(a=>a.fechaVen<=filFechaFin);
    if(filCliente)             r = r.filter(a=>a.clienteId===filCliente);
    if(filEquipoA)             r = r.filter(a=>a.responsableId===filEquipoA);
    // Filtro por estado (activas = todo menos completadas)
    if(filtroEstado==='activas')     r = r.filter(a=>a.estado!=='completada');
    if(filtroEstado==='completadas') r = r.filter(a=>a.estado==='completada');
    // Orden: activas primero (por peso estado + prioridad + fecha), completadas al final
    return [...r].sort((a,b)=>{
      const pa = pesoEstadoAlerta(a), pb = pesoEstadoAlerta(b);
      if(pa!==pb) return pa-pb;
      // Dentro del mismo grupo: prioridad (Alta→Baja) luego fecha vencimiento
      const pria = PRIO_ORD[a.prioridad||'Media']??1;
      const prib = PRIO_ORD[b.prioridad||'Media']??1;
      if(pria!==prib) return pria-prib;
      const fa = a.fechaVen||'9999', fb = b.fechaVen||'9999';
      return fa<fb?-1:fa>fb?1:0;
    });
  },[alertasTodas,filtroTipo,filtroPrio,filFechaIni,filFechaFin,filCliente,filEquipoA,filtroEstado]);

  const autoCount      = alertasTodas.filter(a=>a.auto).length;
  const manualCount    = alertasTodas.filter(a=>!a.auto).length;
  const activasCount   = alertasTodas.filter(a=>a.estado!=='completada').length;
  const completadasCnt = alertasTodas.filter(a=>a.estado==='completada').length;

  const upd=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const openNew=()=>{setForm({titulo:'',tipo:'Recordatorio',clienteId:'',responsableId:'',fechaVen:'',desc:'',estado:'pendiente',prioridad:'Media',esAlerta:true});setOpen(true);};
  const openEdit=a=>{setForm({...a});setOpen(true);};

  const save=()=>{
    if(!form.titulo?.trim()) return toast('Título requerido','error');
    // FIX: usar 'alerta' en lugar de 'r' (referencia correcta)
    const alerta={...form,id:form.id||uid(),esAlerta:true,_ts:Date.now()};
    DB.set('tareas',alerta);
    setTareas(prev=>form.id?prev.map(x=>x.id===alerta.id?alerta:x):[alerta,...prev]);
    // Programar notificación automática si tiene fecha
    if(alerta.fechaVen && window.PushSvc?.isEnabled()) {
      const icon = alerta.tipo==='Urgente'?'🔴':alerta.tipo==='Reunión'?'📅':alerta.tipo==='Consultoría'?'💼':'🔔';
      window.PushSvc.schedule('alerta_'+alerta.id, icon+' '+alerta.tipo, alerta.titulo, alerta.fechaVen+'T08:00:00', 'ip-alerta');
      toast('Alerta guardada y notificación programada ✓','success');
    } else {
      toast('Alerta guardada','success');
    }
    // Despachar evento de calendario para reflejar inmediatamente
    window.dispatchEvent(new CustomEvent('ip-calendario-updated', {detail:{tareaId:alerta.id,fechaVen:alerta.fechaVen,ts:Date.now()}}));
    setOpen(false);
  };

  // ENVÍO POR WHATSAPP v3 — Solo disponible para integrantes del Equipo
  // El destinatario predeterminado es el responsable asignado.
  // Usa el número registrado del integrante seleccionado.
  const enviarAlertaWhatsApp = (a) => {
    const cfg = JSON.parse(localStorage.getItem('ip_config')||'{}');
    // Destinatario predeterminado: responsable asignado (integrante de equipo)
    const resp = equipo.find(e=>e.id===a.responsableId);
    if(!resp) {
      toast('WhatsApp solo disponible para alertas con responsable del Equipo asignado','error');
      return;
    }
    // Usar el número registrado del integrante
    const numRaw = resp.telefono || cfg.whatsappAdmin || '';
    const num = numRaw.replace(/\D/g,'');
    if(!num) {
      toast(`${resp.nombre} no tiene número de teléfono registrado. Actualice en Equipo.`,'error');
      return;
    }
    const cli = clientes.find(c=>c.id===a.clienteId);
    const empresa = cfg.empresa || 'INTPLANNER';
    const prioEmoji = a.prioridad==='Alta'?'🔴':a.prioridad==='Media'?'🟡':'🟢';
    // Obtener plantilla configurable desde ip_waplant
    const custPlants = JSON.parse(localStorage.getItem('ip_waplant')||'[]');
    const plantAlerta = custPlants.find(p=>p.id==='alerta_default');
    let msg;
    if(plantAlerta?.txt) {
      msg = plantAlerta.txt
        .replace(/\{nombre\}/g, resp.nombre)
        .replace(/\{tarea\}/g, a.titulo)
        .replace(/\{fecha\}/g, a.fechaVen ? fmt.date(a.fechaVen) : 'Sin fecha')
        .replace(/\{empresa\}/g, empresa);
    } else {
      msg = `${prioEmoji} *Alerta — ${empresa}*\n\n` +
            `Hola ${resp.nombre},\n\n` +
            `Le notificamos sobre la siguiente alerta asignada:\n\n` +
            `📋 *${a.titulo}*\n` +
            `🔖 Tipo: ${a.tipo||'Recordatorio'}\n` +
            `📅 Vencimiento: ${a.fechaVen ? fmt.date(a.fechaVen) : 'Sin fecha'}\n` +
            `📊 Estado: ${a.estado||'pendiente'}\n` +
            (cli?`🏢 Cliente: ${cli.nombre}\n`:'') +
            (a.desc?`\n📝 ${a.desc}\n`:'') +
            `\nPor favor tome las acciones necesarias.`;
    }
    window.open('https://wa.me/' + num + '?text=' + encodeURIComponent(msg), '_blank');
    toast(`WhatsApp preparado para ${resp.nombre} (${resp.telefono||num})`, 'success');
  };

  // ENVÍO POR EMAIL — función restaurada (declaración+cuerpo)
  const enviarAlertaEmail = (a) => {
    const cfg = JSON.parse(localStorage.getItem('ip_config')||'{}');
    const cli = clientes.find(c=>c.id===a.clienteId);
    const resp = equipo.find(e=>e.id===a.responsableId);
    // Determinar destinatario: email del responsable, si no del cliente
    const emailDest = resp?.email || cli?.email || cfg.adminEmail || '';
    if(!emailDest) { toast('No hay email destinatario (responsable o cliente sin email)','error'); return; }
    const empresa = cfg.empresa||'INTPLANNER';
    const prioEmoji = a.prioridad==='Alta'?'🔴':a.prioridad==='Media'?'🟡':'🟢';
    const asunto = encodeURIComponent(`${prioEmoji} Alerta: ${a.titulo} — ${empresa}`);
    const cuerpo = encodeURIComponent(
      `Estimado/a ${resp?.nombre||cli?.nombre||'equipo'},\n\n` +
      `Le informamos sobre la siguiente alerta registrada en el sistema:\n\n` +
      `  📋 Título:       ${a.titulo}\n` +
      `  🔖 Tipo:         ${a.tipo||'Sin tipo'}\n` +
      `  ⚡ Prioridad:    ${a.prioridad||'Media'}\n` +
      `  📅 Vencimiento:  ${a.fechaVen||'Sin fecha'}\n` +
      `  📊 Estado:       ${a.estado||'pendiente'}\n` +
      (cli?`  🏢 Cliente:      ${cli.nombre}\n`:'') +
      (a.desc?`\n📝 Descripción: ${a.desc}\n`:'\n') +
      `\nEste es un mensaje automático de ${empresa}.\n` +
      `Por favor tome las acciones necesarias.`
    );
    window.open(`mailto:${emailDest}?subject=${asunto}&body=${cuerpo}`, '_blank');
    toast(`Email preparado para ${resp?.nombre||cli?.nombre||emailDest}`, 'success');
  };

  const limpiarFiltros = () => {
    setFiltroTipo(''); setFiltroPrio('todas'); setFiltroEstado('activas');
    setFilFechaIni(''); setFilFechaFin('');
    setFilCliente(''); setFilEquipoA('');
  };

  const remove=id=>{
    DB.del('tareas',id);
    setTareas(prev=>prev.filter(x=>x.id!==id));
    setDel(null);
    toast('Alerta eliminada','info');
  };

  const tipoColor={Urgente:'rgba(153,27,27,.4)',Vencimiento:'rgba(120,60,0,.4)',Reunión:'rgba(30,58,95,.4)'};

  return <div className="fade">
    {/* ── Barra superior ── */}
    <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:10}}>
      <button className="btn btn-p btn-sm" onClick={openNew}><Ico n="plus" s={14}/>Nueva Alerta</button>

      {/* Filtro Tipo */}
      <div style={{display:'flex',background:'#0f1923',borderRadius:8,border:'1px solid #243447',overflow:'hidden'}}>
        {[
          {v:'',     l:`Todas (${alertasTodas.length})`},
          {v:'auto', l:`↔ Auto (${autoCount})`},
          {v:'manual',l:`✍ Manual (${manualCount})`},
        ].map(({v,l})=>(
          <button key={v} onClick={()=>setFiltroTipo(v)}
            style={{padding:'5px 12px',fontSize:11,fontWeight:filtroTipo===v?700:400,border:'none',cursor:'pointer',
              background:filtroTipo===v?'linear-gradient(135deg,#1E3A5F,#2a5298)':'transparent',
              color:filtroTipo===v?'#fff':'#64748b',transition:'all .15s'}}>
            {l}
          </button>
        ))}
      </div>

      {/* Filtro Estado — Activas / Completadas / Todas */}
      <div style={{display:'flex',background:'#0f1923',borderRadius:8,border:'1px solid #243447',overflow:'hidden'}}>
        {[
          {v:'activas',    l:`🟡 Activas (${activasCount})`,   c:'#C9A84C'},

      </div>}

        const venc=a.fechaVen&&a.fechaVen<hoy&&a.estado!=='completada';
        const tareaOrigen = a.tareaVinculadaId ? tareas.find(t=>t.id===a.tareaVinculadaId) : null;
        const respMiembro = equipo.find(e=>e.id===a.responsableId);

          display:'flex',gap:12,alignItems:'flex-start',
          background: a.estado==='completada'?'rgba(30,41,59,.4)':venc?'rgba(153,27,27,.08)':'',
          borderColor: a.estado==='completada'?'rgba(100,116,139,.2)':venc?'rgba(248,113,113,.2)':a.auto?'rgba(201,168,76,.2)':'#243447',
          borderLeft: a.estado==='completada'?'3px solid #334155':a.auto?'3px solid #C9A84C':undefined,
          opacity: a.estado==='completada'?0.75:1,
        }}>
          <div style={{width:40,height:40,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',

          </div>
          <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0,paddingTop:2}}>

                  style={{color:'#25D366',borderColor:'rgba(37,211,102,.3)'}}>

            {/* Alertas automáticas: solo editar si manual */}
            {a.auto
              ? <span style={{fontSize:10,color:'#475569',fontStyle:'italic'}}>Editar desde Tareas</span>
              : <ActBtns onEdit={()=>openEdit(a)} onDel={()=>setDel(a.id)}/>

      })}
    </div>

    <Modal open={open} onClose={()=>setOpen(false)} title={form.id?'Editar Alerta':'Nueva Alerta Manual'}>
      <div className="grid-2">
        <F label="Título *" col2><input className="inp" value={form.titulo||''} onChange={upd('titulo')}/></F>
        <F label="Tipo"><select className="inp" value={form.tipo||'Recordatorio'} onChange={upd('tipo')}>

        <F label="Estado"><select className="inp" value={form.estado||'pendiente'} onChange={upd('estado')}>
          {['pendiente','en_curso','completada'].map(s=><option key={s} value={s}>{s}</option>)}
        </select></F>
        <F label="Prioridad"><select className="inp" value={form.prioridad||'Media'} onChange={upd('prioridad')}
          style={{color:form.prioridad==='Alta'?'#f87171':form.prioridad==='Baja'?'#4ade80':'#C9A84C',fontWeight:700}}>
          <option value="Alta">🔴 Alta</option>

          <option value="Baja">🟢 Baja</option>
        </select></F>
        <F label="Cliente"><select className="inp" value={form.clienteId||''} onChange={upd('clienteId')}>
          <option value="">Sin cliente</option>{(DB.get('clientes')).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
        </select></F>
        <F label="Responsable"><select className="inp" value={form.responsableId||''} onChange={upd('responsableId')}>
          <option value="">Sin asignar</option>{(DB.get('equipo')).map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
        </select></F>
        <F label="Fecha Vencimiento" col2><input type="date" className="inp" value={form.fechaVen||''} onChange={upd('fechaVen')}/></F>
        <F label="Fecha Asignación"><input type="date" className="inp" value={form.fechaAsignada||''} onChange={upd('fechaAsignada')}/></F>
        <F label="Nota / Descripción" col2><textarea className="inp" value={form.desc||''} onChange={upd('desc')} style={{minHeight:64}}/></F>
      </div>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setOpen(false)}>Cancelar</button>
        <button className="btn btn-g btn-sm" onClick={save}><Ico n="check" s={14}/>Guardar</button>
      </div>
    </Modal>
    {del&&<Confirm msg="¿Eliminar esta alerta?" onOk={()=>remove(del)} onCancel={()=>setDel(null)}/>}
  </div>;
};

// ── CHAT INTERNO ─────────────────────────────────────────────
// ── CHAT EN TIEMPO REAL ──────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
// NOTIFICACIONES GLOBALES — Intervención Chat FASE 2
// ══════════════════════════════════════════════════════════════════════════════
const NotificationSvc = {
  _audio: null,
  _audioCtx: null,
  
  // Inicializar audio una sola vez
  init: () => {
    if(!NotificationSvc._audio) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      try {
        NotificationSvc._audioCtx = new AudioContext();
      } catch(e) {
        console.warn('⚠️ Audio Context no disponible:', e.message);
      }
    }
  },
  
  // Notificación visual (toast)
  show: (title, options = {}) => {
    const {
      message = '',
      duration = 4000,
      type = 'info',     // 'info', 'success', 'warning', 'error'
      autoClose = true
    } = options;
    
    const id = 'notif_' + Date.now();
    const colors = {
      info: '#4ade80',
      success: '#10b981',
      warning: '#f59e0b',
      error: '#ef4444'
    };
    
    const div = document.createElement('div');
    div.id = id;
    div.style.cssText = `
      position: fixed;
      top: 20px;
      right: 20px;
      background: #0f1923;
      border: 1px solid ${colors[type]};
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 13px;
      z-index: 9999;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      animation: slideIn 0.3s ease;
      max-width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    `;
    div.innerHTML = `
      <div style="display: flex; gap: 8px; align-items: flex-start;">
        <div style="color: ${colors[type]}; font-weight: bold; font-size: 16px; line-height: 1;">•</div>
        <div>
          <div style="font-weight: 600; margin-bottom: 4px; line-height: 1.3;">${title}</div>
          ${message ? `<div style="opacity: 0.8; font-size: 12px; line-height: 1.3;">${message.substring(0, 80)}</div>` : ''}
        </div>
      </div>
    `;
    
    document.body.appendChild(div);
    
    // Agregar estilos de animación si no existen
    if(!document.getElementById('notif-styles')) {
      const style = document.createElement('style');
      style.id = 'notif-styles';
      style.textContent = `
        @keyframes slideIn {
          from { transform: translateX(400px); opacity: 0; }
          to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
          from { transform: translateX(0); opacity: 1; }
          to { transform: translateX(400px); opacity: 0; }
        }
      `;
      document.head.appendChild(style);
    }
    
    if(autoClose) {
      setTimeout(() => {
        div.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => div.remove(), 300);
      }, duration);
    }
    
    return id;
  },
  
  // Sonido para nuevos mensajes
  playSound: () => {
    NotificationSvc.init();
    
    try {
      // Crear sonido simple con Web Audio API
      const ctx = NotificationSvc._audioCtx;
      if(!ctx) {
        console.warn('⚠️ Audio Context no disponible');
        return;
      }
      
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      
      osc.frequency.value = 800; // Hz
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      
      osc.connect(gain);
      gain.connect(ctx.destination);
      
      osc.start(t);
      osc.stop(t + 0.15);
    } catch(e) {
      console.warn('⚠️ Error generando sonido:', e.message);
    }
  },
  
  // Solicitar permisos de notificación
  requestPermission: async () => {
    if(!('Notification' in window)) {
      console.warn('⚠️ Notifications no soportadas en este navegador');
      return false;
    }
    
    if(Notification.permission === 'granted') {
      return true;
    }
    
    if(Notification.permission !== 'denied') {
      const perm = await Notification.requestPermission();
      return perm === 'granted';
    }
    
    return false;
  }
};

window.NotificationSvc = NotificationSvc;

// ------------------------------------------------------------------------------
// ─────────────────────────────────────────────────────────────────────────────
// PRESENCIA SVC v2 — Servicio autonomo de presencia. Independiente del Chat.
// Se activa desde App al iniciar sesion. Resuelve 5 causas raiz identificadas.
// ─────────────────────────────────────────────────────────────────────────────
const PresenciaSvc = {
  PATH: 'chat/presencia',
  _hbInterval:   null,
  _tickInterval: null,
  _retryTimer:   null,
  _rtdbRef:      null,
  _activo:       false,
  _perfil:       null,

  // Lee RTDB desde window en tiempo de ejecucion (no closure de modulo)
  _ok: () => !!(window.RTDB_OK && window._rtdb),

  // Emitir evento global + persistir en localStorage
  _emit: (data) => {
    const p = data || { online: 0, users: [] };
    try { localStorage.setItem('ip_chat_presencia', JSON.stringify(p)); } catch(_){}
    window.dispatchEvent(new CustomEvent('chat-presencia-updated', { detail: p }));
  },

  // Iniciar con retry automatico hasta 10s (20 x 500ms)
  iniciar: (perfil) => {
    if(!perfil || !perfil.id) return;
    PresenciaSvc.detener();
    PresenciaSvc._perfil = perfil;
    let intentos = 0;
    const intentar = () => {
      if(!PresenciaSvc._ok()) {
        intentos++;
        if(intentos >= 20) {
          console.warn('[PresenciaSvc] RTDB no disponible tras 10s');
          PresenciaSvc._emit({ online: 0, users: [] });
          return;
        }
        PresenciaSvc._retryTimer = setTimeout(intentar, 500);
        return;
      }
      PresenciaSvc._arrancar(perfil);
    };
    intentar();
  },

  // Arrancar conexion RTDB + heartbeat + suscripcion conteo global
  _arrancar: (perfil) => {
    const rtdb = window._rtdb;
    const horaConexion = Date.now();
    const refUser = rtdb.ref(PresenciaSvc.PATH + '/' + perfil.id);
    const datos = {
      nombre:       perfil.nombre || 'Usuario',
      email:        perfil.email  || '',
      cargo:        perfil.cargo  || '',
      rol:          perfil.rol    || '',
      horaConexion: horaConexion,
      online:       true,
      ts:           firebase.database.ServerValue.TIMESTAMP,
    };
    const heartbeat = () => refUser.set(datos).catch(function(){});
    heartbeat();
    refUser.onDisconnect().update({ online: false, ts: firebase.database.ServerValue.TIMESTAMP });
    PresenciaSvc._hbInterval = setInterval(heartbeat, 25000); // 25s heartbeat, TTL 120s

    let lastSnap = {};
    const computar = () => {
      const now = Date.now();
      const users = Object.entries(lastSnap)
        .filter(function(e){ return e[1] && e[1].online === true; })
        .filter(function(e){ return !e[1].ts || (now - e[1].ts) < 120000; })
        .map(function(e){
          var id = e[0]; var v = e[1];
          return {
            id: id,
            nombre:       v.nombre       || 'Usuario',
            email:        v.email        || '',
            cargo:        v.cargo        || '',
            rol:          v.rol          || '',
            horaConexion: v.horaConexion || v.ts || now,
            estado:       'Activo',
          };
        });
      PresenciaSvc._emit({ online: users.length, users: users });
    };

    PresenciaSvc._rtdbRef = rtdb.ref(PresenciaSvc.PATH);
    PresenciaSvc._rtdbRef.on('value', function(snap){
      lastSnap = snap.val() || {};
      computar();
    });
    PresenciaSvc._tickInterval = setInterval(computar, 20000);
    PresenciaSvc._activo = true;
    console.log('[PresenciaSvc] activo:', perfil.nombre, '|', perfil.rol);
  },

  // Actualizar datos en RTDB cuando cambia cargo o rol
  actualizar: (perfil) => {
    if(!perfil || !perfil.id || !PresenciaSvc._ok()) return;
    PresenciaSvc._perfil = perfil;
    window._rtdb.ref(PresenciaSvc.PATH + '/' + perfil.id)
      .update({
        nombre: perfil.nombre || 'Usuario',
        email:  perfil.email  || '',
        cargo:  perfil.cargo  || '',
        rol:    perfil.rol    || '',
      }).catch(function(){});
  },

  // Detener: marcar offline + limpiar intervalos y refs
  detener: () => {
    if(PresenciaSvc._retryTimer)   { clearTimeout(PresenciaSvc._retryTimer);    PresenciaSvc._retryTimer   = null; }
    if(PresenciaSvc._hbInterval)   { clearInterval(PresenciaSvc._hbInterval);   PresenciaSvc._hbInterval   = null; }
    if(PresenciaSvc._tickInterval) { clearInterval(PresenciaSvc._tickInterval); PresenciaSvc._tickInterval = null; }
    if(PresenciaSvc._rtdbRef)      { PresenciaSvc._rtdbRef.off(); PresenciaSvc._rtdbRef = null; }
    if(PresenciaSvc._activo && PresenciaSvc._perfil && PresenciaSvc._perfil.id && PresenciaSvc._ok()) {
      window._rtdb.ref(PresenciaSvc.PATH + '/' + PresenciaSvc._perfil.id)
        .update({ online: false, ts: firebase.database.ServerValue.TIMESTAMP })
        .catch(function(){});
    }
    PresenciaSvc._activo = false;
    PresenciaSvc._perfil = null;
  },
};
window.PresenciaSvc = PresenciaSvc;


const ChatSvc = {
  PATH_MSGS:    'chat/mensajes',
  PATH_TYPING:  'chat/escribiendo',
  PATH_PRESENCIA:'chat/presencia',
  _listeners:   [],

  // Escuchar mensajes en tiempo real
  onMessages: (cb) => {
    if(RTDB_OK) {
      const ref = _rtdb.ref(ChatSvc.PATH_MSGS).limitToLast(200);
      let initialized = false;  // Para saber si es carga inicial
      
      const handler = ref.on('value', snap => {
        const data = snap.val() || {};
        const msgs = Object.entries(data)
          .map(([k,v])=>({...v, _key:k}))
          .sort((a,b)=>a.ts-b.ts);
        
        // Sincronizar con localStorage como caché
        const oldMsgs = JSON.parse(localStorage.getItem('ip_chat')||'[]');
        localStorage.setItem('ip_chat', JSON.stringify(msgs));
        
        // FASE 2: NOTIFICACIONES — Detectar mensajes nuevos (después de inicialización)
        if(initialized) {
          const newMsgs = msgs.filter(m => 
            !oldMsgs.find(om => (om.id || om._key) === (m.id || m._key))
          );
          
          if(newMsgs.length > 0) {
            // Crear evento para que Chat y otros módulos lo escuchen
            window.dispatchEvent(new CustomEvent('ip-chat-new-messages', {
              detail: { msgs: newMsgs, total: msgs.length }
            }));
            console.log('💬 Nuevos mensajes detectados:', newMsgs.length);
          }
        } else {
          initialized = true; // Marcar que carga inicial completó
          console.log('💬 Chat: carga inicial completada');
        }
        
        cb(msgs);
      });
      ChatSvc._listeners.push({ref, handler, event:'value'});
      return () => ref.off('value', handler);
    }
    // Fallback localStorage: polling con pausa en pestaña oculta (FIX v12.1)
    const list = JSON.parse(localStorage.getItem('ip_chat')||'[]');
    cb(list);
    let tc = null;
    let lastList = list;
    const startC = () => { 
      if(tc) return; 
      tc = setInterval(()=>{ 
        if(!document.hidden) {
          const newList = JSON.parse(localStorage.getItem('ip_chat')||'[]');
          
          // Detectar mensajes nuevos
          const newMsgs = newList.filter(m => 
            !lastList.find(om => (om.id || om._key) === (m.id || m._key))
          );
          
          if(newMsgs.length > 0) {
            window.dispatchEvent(new CustomEvent('ip-chat-new-messages', {
              detail: { msgs: newMsgs, total: newList.length }
            }));
            console.log('💬 Nuevos mensajes (localStorage):', newMsgs.length);
          }
          
          lastList = newList;
          cb(newList);
        }
      }, 5000); 
    };
    const stopC  = () => { if(tc){ clearInterval(tc); tc=null; } };
    const onVis  = () => document.hidden ? stopC() : startC();
    document.addEventListener('visibilitychange', onVis);
    startC();
    return () => { stopC(); document.removeEventListener('visibilitychange', onVis); };
  },

  // Enviar mensaje
  send: async (texto, autor) => {
    const msg = {
      id:          uid(),
      texto:       texto.trim(),
      autorId:     autor.id || 'me',
      autorNombre: autor.nombre || 'Usuario',
      autorColor:  autor.color || '#1E3A5F',
      ts:          Date.now(),
      leido:       false,
    };
    if(RTDB_OK) {
      try {
        await _rtdb.ref(ChatSvc.PATH_MSGS).push(msg);
        return msg;
      } catch(e) { console.warn('RTDB send error:', e.message); }
    }
    // Fallback localStorage
    const list = [...JSON.parse(localStorage.getItem('ip_chat')||'[]'), msg].slice(-200);
    localStorage.setItem('ip_chat', JSON.stringify(list));
    return msg;
  },

  // Borrar mensaje (solo el autor)
  delete: async (key, autorId, userId) => {
    if(autorId !== userId) return false;
    if(RTDB_OK && key) {
      try { await _rtdb.ref(ChatSvc.PATH_MSGS+'/'+key).remove(); return true; } catch(e){}
    }
    // Fallback localStorage
    const list = JSON.parse(localStorage.getItem('ip_chat')||'[]').filter(m=>m.id!==key);
    localStorage.setItem('ip_chat', JSON.stringify(list));
    return true;
  },

  // Indicador "está escribiendo..." (RTDB only)
  // V20-FIX: timestamp como ServerValue para sincronización entre clientes con relojes desfasados
  setTyping: (userId, nombre, active) => {
    if(!RTDB_OK || !userId) return;
    const ref = _rtdb.ref(ChatSvc.PATH_TYPING+'/'+userId);
    if(active) {
      ref.set({nombre, ts: firebase.database.ServerValue.TIMESTAMP});
      ref.onDisconnect().remove();
    } else {
      ref.remove();
    }
  },

  // V20-FIX: auto-refresh interno cada 2s para invalidar "escribiendo" expirados
  // sin depender de que llegue otro evento RTDB. Crítico cuando un cliente se desconecta
  // abruptamente y nunca emite el remove().
  onTyping: (myId, cb) => {
    if(!RTDB_OK) {
      cb([]);
      return ()=>{};
    }
    const ref = _rtdb.ref(ChatSvc.PATH_TYPING);
    let lastData = {};
    const compute = () => {
      const others = Object.entries(lastData)
        .filter(([k])=>k!==myId)
        .filter(([,v])=>v && v.ts && (Date.now() - v.ts) < 6000) // expirar 6s
        .map(([,v])=>v.nombre || 'Alguien');
      cb(others);
    };
    const handler = ref.on('value', snap => { lastData = snap.val()||{}; compute(); });
    const tickInterval = setInterval(compute, 2000); // refresh cada 2s para expirar entradas
    return () => { ref.off('value', handler); clearInterval(tickInterval); };
  },

  // Presencia online — FASE 7: Enriquecida con email, cargo, rol, horaConexion
  setOnline: (userId, nombre, extraData) => {
    if(!RTDB_OK || !userId) return null;
    const ref = _rtdb.ref(ChatSvc.PATH_PRESENCIA+'/'+userId);
    const horaConexion = Date.now();
    const heartbeat = () => ref.set({
      nombre:        nombre || 'Usuario',
      email:         extraData?.email || '',
      cargo:         extraData?.cargo || '',
      rol:           extraData?.rol   || '',
      horaConexion:  horaConexion,
      online:        true,
      ts:            firebase.database.ServerValue.TIMESTAMP
    });
    heartbeat();
    ref.onDisconnect().update({online:false, ts: firebase.database.ServerValue.TIMESTAMP});
    const hbInterval = setInterval(heartbeat, 30000);
    return () => {
      clearInterval(hbInterval);
      try { ref.update({online:false, ts: firebase.database.ServerValue.TIMESTAMP}); } catch(_){}
    };
  },

  // onPresencia: callback recibe { online: number, users: [{id, nombre, email, cargo, rol, horaConexion}] }
  onPresencia: (cb) => {
    if(!RTDB_OK) {
      cb({ online: 0, users: [] });
      return ()=>{};
    }
    const ref = _rtdb.ref(ChatSvc.PATH_PRESENCIA);
    let lastData = {};
    const compute = () => {
      const now = Date.now();
      const users = Object.entries(lastData)
        .filter(([,v])=>v && v.online === true)
        .filter(([,v])=>!v.ts || (now - v.ts) < 90000)
        .map(([id,v])=>({
          id,
          nombre:       v.nombre       || 'Usuario',
          email:        v.email        || '',
          cargo:        v.cargo        || '',
          rol:          v.rol          || '',
          horaConexion: v.horaConexion || v.ts || now,
          estado:       'Activo',
        }));
      cb({ online: users.length, users });
    };
    const handler = ref.on('value', snap => { lastData = snap.val()||{}; compute(); });
    const tickInterval = setInterval(compute, 15000);
    return () => { ref.off('value', handler); clearInterval(tickInterval); };
  },

  // ═══════════════════════════════════════════════════════════════════════════
  // FASE 3: MENSAJES NO LEÍDOS
  // ═══════════════════════════════════════════════════════════════════════════
  
  // Marcar un mensaje específico como leído
  markAsRead: (msgId, userId) => {
    if(!userId || !msgId) return;
    const key = `ip_chat_unread_${userId}`;
    const unread = JSON.parse(localStorage.getItem(key) || '{"leidos":[]}');
    if(!unread.leidos) unread.leidos = [];
    if(!unread.leidos.includes(msgId)) {
      unread.leidos.push(msgId);
      localStorage.setItem(key, JSON.stringify(unread));
      window.dispatchEvent(new CustomEvent('chat-unread-changed', {detail: unread}));
    }
  },
  
  // Marcar TODOS los mensajes como leídos
  markAllAsRead: (userId) => {
    if(!userId) return;
    const key = `ip_chat_unread_${userId}`;
    const msgs = JSON.parse(localStorage.getItem('ip_chat') || '[]');
    const msgIds = msgs.map(m => m.id || m._key);
    localStorage.setItem(key, JSON.stringify({leidos: msgIds}));
    window.dispatchEvent(new CustomEvent('chat-unread-changed', {detail: {leidos: msgIds}}));
  },
  
  // Obtener conteo de mensajes no leídos
  getUnreadCount: (userId) => {
    if(!userId) return 0;
    const key = `ip_chat_unread_${userId}`;
    const unread = JSON.parse(localStorage.getItem(key) || '{"leidos":[]}');
    const msgs = JSON.parse(localStorage.getItem('ip_chat') || '[]');
    
    // No leídos = mensajes que no están en lista "leidos" EXCEPTO los míos propios
    const myMsgs = new Set();
    msgs.forEach(m => {
      if(m.autorId === userId) myMsgs.add(m.id || m._key);
    });
    
    const unreadCount = msgs.filter(m => {
      const mid = m.id || m._key;
      return !unread.leidos.includes(mid) && !myMsgs.has(mid);
    }).length;
    
    return unreadCount;
  },
  
  // Escuchar cambios en mensajes no leídos
  onUnreadChange: (userId, cb) => {
    if(!userId) return ()=>{};
    
    const key = `ip_chat_unread_${userId}`;
    
    const handler = (e) => {
      const count = ChatSvc.getUnreadCount(userId);
      cb(count);
    };
    
    window.addEventListener('chat-unread-changed', handler);
    window.addEventListener('ip-chat-updated', handler);
    
    // Llamar inmediatamente con valor actual
    setTimeout(() => {
      const count = ChatSvc.getUnreadCount(userId);
      cb(count);
    }, 100);
    
    return () => {
      window.removeEventListener('chat-unread-changed', handler);
      window.removeEventListener('ip-chat-updated', handler);
    };
  }

};

window.ChatSvc = ChatSvc;

const Chat = () => {
  const {user, equipo} = useApp();
  const [msgs,      setMsgs]      = useState(()=>JSON.parse(localStorage.getItem('ip_chat')||'[]'));
  const [txt,       setTxt]       = useState('');
  const [typing,    setTyping]    = useState([]);   // nombres escribiendo
  const [presencia, setPresencia] = useState({online:0, users:[]});
  const [showOnline, setShowOnline] = useState(false);
  const [delId,     setDelId]     = useState(null);
  const [rtdb,      setRtdb]      = useState(RTDB_OK);
  const [unreadCount, setUnreadCount] = useState(0);  // FASE 3: Badge de no leídos
  const endRef    = useRef();
  const typingTimer = useRef(null);

  // Colores avatar consistentes por usuario
  const avatarColor = (id) => {
    const cols = ['#1E3A5F','#C9A84C','#1A6B3A','#7C3AED','#0F766E','#BE185D','#B45309','#1D4ED8'];
    if(!id) return cols[0];
    let h = 0; for(let i=0;i<id.length;i++) h = (h*31+id.charCodeAt(i))%cols.length;
    return cols[h];
  };

  // Suscripciones — V20-FIX: setOnline ahora devuelve función de cleanup
  // que detiene el heartbeat y marca offline. Esto antes no se hacía y dejaba
  // sesiones colgadas como online.
  useEffect(()=>{
    if(!user?.id) return; // No registrar presencia hasta tener usuario
    const unsubMsgs    = ChatSvc.onMessages(setMsgs);
    const unsubTyping  = ChatSvc.onTyping(user.id, setTyping);
    const unsubPresencia = ChatSvc.onPresencia(setPresencia);
    const unsubOnline  = ChatSvc.setOnline(user.id, user.nombre, {
      email: user.email || '',
      cargo: user.cargo || '',
      rol:   user.rol   || '',
    });
    return ()=>{
      unsubMsgs?.(); unsubTyping?.(); unsubPresencia?.();
      if(typeof unsubOnline === 'function') unsubOnline();
      // V20-FIX: limpiar timer de typing al desmontar y notificar que dejé de escribir
      if(typingTimer.current) clearTimeout(typingTimer.current);
      ChatSvc.setTyping(user.id, user.nombre, false);
    };
  },[user?.id, user?.nombre]);

  // Scroll al último mensaje
  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  // NEW: Disparar evento global de presencia para Header y otros módulos
  useEffect(()=>{
    // Guardar en localStorage para que esté disponible en todos los módulos
    localStorage.setItem('ip_chat_presencia', JSON.stringify(presencia));
    
    // Disparar evento global
    window.dispatchEvent(new CustomEvent('chat-presencia-updated', {
      detail: presencia
    }));
    console.log('👥 Presencia actualizada (global):', presencia.online, 'usuarios');
  },[presencia]);

  // ═══════════════════════════════════════════════════════════════════════════
  // Marcar todos como leídos cuando el módulo Chat se abre
  useEffect(()=>{
    ChatSvc.markAllAsRead(user?.id);
  },[]);

  // Enviar mensaje
  const send = async () => {
    if(!txt.trim()) return;
    const texto = txt.trim();
    setTxt('');
    ChatSvc.setTyping(user?.id, user?.nombre, false);
    clearTimeout(typingTimer.current);
    await ChatSvc.send(texto, user||{id:'me',nombre:'Usuario'});
  };

  // Indicador escritura con throttle (envía "true" máx 1 vez cada 2s) + debounce final 2s
  // V20-FIX: antes enviaba a RTDB en CADA pulsación de tecla. Ahora solo cuando es necesario.
  const lastTypingSent = useRef(0);
  const handleTyping = (e) => {
    setTxt(e.target.value);
    const now = Date.now();
    if(now - lastTypingSent.current > 2000) {
      ChatSvc.setTyping(user?.id, user?.nombre, true);
      lastTypingSent.current = now;
    }
    clearTimeout(typingTimer.current);
    typingTimer.current = setTimeout(()=>{
      ChatSvc.setTyping(user?.id, user?.nombre, false);
      lastTypingSent.current = 0;
    }, 2000);
  };

  const handleKey = (e) => {
    if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  // Agrupar mensajes por día
  const grouped = useMemo(()=>{
    const days = {};
    msgs.forEach(m=>{
      const d = new Date(m.ts).toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});
      if(!days[d]) days[d]=[];
      days[d].push(m);
    });
    return Object.entries(days);
  },[msgs]);

  // Mensajes consecutivos del mismo autor (para agrupar visualmente)
  const sameAuthor = (msgs, i) =>
    i>0 && msgs[i].autorId===msgs[i-1].autorId && (msgs[i].ts-msgs[i-1].ts)<120000;

  const REACCIONES = ['👍','❤️','😄','🎉','✅','⚠️'];

  const [showReacc, setShowReacc] = useState(null);
  const [reacciones, setReacciones] = useState(()=>JSON.parse(localStorage.getItem('ip_chat_reac')||'{}'));

  const addReacc = (msgId, emoji) => {
    const key = msgId+'_'+emoji;
    const cur  = reacciones[msgId]||{};
    const cnt  = (cur[emoji]||0)+1;
    const newR = {...reacciones, [msgId]:{...cur,[emoji]:cnt}};
    setReacciones(newR);
    localStorage.setItem('ip_chat_reac', JSON.stringify(newR));
    setShowReacc(null);
  };

  return <div className="fade" style={{height:'calc(100vh - 120px)',display:'flex',flexDirection:'column'}}>
    <div className="card" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

      {/* Header — V20-FIX: badge de online ahora es clicable y muestra lista */}
      <div style={{padding:'10px 16px',borderBottom:'1px solid #243447',display:'flex',alignItems:'center',gap:10,flexShrink:0,position:'relative'}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:rtdb?'#4ade80':'#C9A84C',flexShrink:0}}/>
        <span style={{fontSize:13,fontWeight:700,color:'#fff'}}>Chat — Equipo</span>
        <div style={{flex:1}}/>
        {rtdb
          ? <button
              onClick={()=>setShowOnline(s=>!s)}
              style={{fontSize:11,color:'#4ade80',background:'rgba(74,222,128,.08)',border:'1px solid rgba(74,222,128,.2)',borderRadius:99,padding:'2px 8px',cursor:'pointer',display:'flex',alignItems:'center',gap:6}}
              title="Click para ver quién está conectado">
              <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#4ade80',animation:'pulse 1.6s infinite'}}/>
              {presencia.online > 0
                ? `${presencia.online} en línea`
                : `${equipo.length} miembros`}
              <span style={{fontSize:9,opacity:.7}}>{showOnline?'▲':'▼'}</span>
            </button>
          : <span style={{fontSize:11,color:'#C9A84C',background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.2)',borderRadius:99,padding:'2px 8px'}}>
              ⚡ Local · {equipo.length} miembros
            </span>
        }
        {!rtdb&&<span style={{fontSize:10,color:'#475569',maxWidth:200,lineHeight:1.3}}>
          Activa Realtime DB en Firebase para chat en tiempo real
        </span>}
        {/* Dropdown lista de usuarios online — FASE 7: Datos enriquecidos */}
        {showOnline && rtdb && <div style={{
          position:'absolute',top:'calc(100% + 4px)',right:16,zIndex:10,
          background:'#162030',border:'1px solid #243447',borderRadius:10,
          padding:'8px 0',minWidth:260,maxHeight:340,overflowY:'auto',
          boxShadow:'0 4px 16px rgba(0,0,0,.4)'}}>
          <div style={{padding:'6px 14px 4px',fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:700,borderBottom:'1px solid #243447',marginBottom:4}}>
            Conectados ({presencia.online})
          </div>
          {presencia.users.length===0 && <div style={{padding:'12px',fontSize:12,color:'#475569',fontStyle:'italic',textAlign:'center'}}>
            Nadie más conectado
          </div>}
          {presencia.users.map(u=>(
            <div key={u.id} style={{padding:'8px 14px',borderBottom:'1px solid rgba(36,52,71,.5)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                <div style={{width:28,height:28,borderRadius:'50%',background:avatarColor(u.id),
                  display:'flex',alignItems:'center',justifyContent:'center',
                  color:'#fff',fontSize:12,fontWeight:700,flexShrink:0}}>
                  {(u.nombre||'?').charAt(0).toUpperCase()}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#e2e8f0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {u.nombre}{u.id===user?.id?' (tú)':''}
                  </div>
                  {u.email && <div style={{fontSize:10,color:'#64748b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {u.email}
                  </div>}
                </div>
                <span style={{width:7,height:7,borderRadius:'50%',background:'#4ade80',flexShrink:0,boxShadow:'0 0 4px #4ade80'}}/>
              </div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginLeft:36}}>
                {u.cargo && <span style={{fontSize:9,padding:'1px 6px',borderRadius:99,background:'rgba(30,58,95,.4)',color:'#93c5fd',border:'1px solid rgba(59,130,246,.2)'}}>
                  {u.cargo}
                </span>}
                {u.rol && <span style={{fontSize:9,padding:'1px 6px',borderRadius:99,background:'rgba(201,168,76,.1)',color:'#C9A84C',border:'1px solid rgba(201,168,76,.2)',textTransform:'capitalize'}}>
                  {u.rol}
                </span>}
                <span style={{fontSize:9,padding:'1px 6px',borderRadius:99,background:'rgba(74,222,128,.08)',color:'#4ade80',border:'1px solid rgba(74,222,128,.2)'}}>
                  Activo
                </span>
              </div>
              {u.horaConexion && <div style={{fontSize:9,color:'#475569',marginLeft:36,marginTop:2}}>
                Conectado: {new Date(u.horaConexion).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}
              </div>}
            </div>
          ))}
        </div>}
      </div>

      {/* Mensajes */}
      <div style={{flex:1,overflowY:'auto',padding:'12px 16px',display:'flex',flexDirection:'column',gap:2}}
        onClick={()=>setShowReacc(null)}>
        {msgs.length===0&&<div style={{textAlign:'center',paddingTop:60}}>
          <p style={{fontSize:32,margin:'0 0 8px'}}>💬</p>
          <p style={{color:'#475569',fontSize:13}}>Sin mensajes. ¡Sé el primero en escribir!</p>
        </div>}

        {grouped.map(([day, dayMsgs])=>(
          <div key={day}>
            {/* Separador de día */}
            <div style={{display:'flex',alignItems:'center',gap:10,margin:'16px 0 10px'}}>
              <div style={{flex:1,height:'1px',background:'#243447'}}/>
              <span style={{fontSize:11,color:'#334155',fontWeight:600,background:'#0f1923',padding:'2px 10px',borderRadius:99,border:'1px solid #243447',textTransform:'capitalize'}}>{day}</span>
              <div style={{flex:1,height:'1px',background:'#243447'}}/>
            </div>

            {dayMsgs.map((m,i)=>{
              const esYo    = m.autorId===user?.id;
              const mismo   = sameAuthor(dayMsgs,i);
              const hora    = new Date(m.ts).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
              const color   = avatarColor(m.autorId);
              const reacMsg = reacciones[m.id]||reacciones[m._key]||{};
              const msgId   = m.id||m._key;
              return (
                <div key={msgId}
                  style={{display:'flex',gap:8,justifyContent:esYo?'flex-end':'flex-start',marginTop:mismo?2:10,position:'relative'}}
                  onMouseEnter={()=>{}}
                >
                  {/* Avatar (solo primer msg del bloque) */}
                  {!esYo&&<div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${color},${color}99)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',flexShrink:0,alignSelf:'flex-end',opacity:mismo?0:1}}>
                    {(m.autorNombre||'?').charAt(0).toUpperCase()}
                  </div>}

                  <div style={{maxWidth:'72%',display:'flex',flexDirection:'column',alignItems:esYo?'flex-end':'flex-start'}}>
                    {/* Nombre (solo primer msg del bloque) */}
                    {!esYo&&!mismo&&<p style={{fontSize:11,color:color,fontWeight:700,margin:'0 0 3px 4px'}}>{m.autorNombre}</p>}

                    {/* Burbuja */}
                    <div style={{position:'relative',display:'inline-block'}}>
                      <div className={esYo?'cbme':'cboth'} style={{cursor:'default'}}>
                        <p style={{fontSize:13,color:'#fff',margin:0,whiteSpace:'pre-wrap',lineHeight:1.5}}>{m.texto}</p>
                        <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:6,marginTop:4}}>
                          <span style={{fontSize:10,color:'#475569'}}>{hora}</span>
                          {esYo&&<span style={{fontSize:10,color:'#475569'}}>✓</span>}
                        </div>
                      </div>

                      {/* Reacciones recibidas */}
                      {Object.keys(reacMsg).length>0&&<div style={{display:'flex',gap:3,flexWrap:'wrap',marginTop:3}}>
                        {Object.entries(reacMsg).map(([emoji,cnt])=>(
                          <span key={emoji} style={{fontSize:11,background:'#1e2d42',border:'1px solid #2f4460',borderRadius:99,padding:'1px 6px',cursor:'pointer'}} onClick={e=>{e.stopPropagation();addReacc(msgId,emoji);}}>
                            {emoji} {cnt>1?cnt:''}
                          </span>
                        ))}
                      </div>}
                    </div>

                    {/* Acciones hover (reaccionar, borrar) */}
                    <div style={{display:'flex',gap:4,marginTop:3,opacity:.6}}>
                      <button onClick={e=>{e.stopPropagation();setShowReacc(showReacc===msgId?null:msgId);}}
                        style={{background:'none',border:'none',cursor:'pointer',color:'#475569',fontSize:11,padding:'1px 5px',borderRadius:4}}>😊</button>
                      {esYo&&<button onClick={()=>setDelId(msgId)}
                        style={{background:'none',border:'none',cursor:'pointer',color:'#475569',fontSize:11,padding:'1px 5px',borderRadius:4}}>✕</button>}
                    </div>

                    {/* Picker reacciones */}
                    {showReacc===msgId&&<div onClick={e=>e.stopPropagation()}
                      style={{display:'flex',gap:6,padding:'6px 10px',background:'#162030',border:'1px solid #243447',borderRadius:20,position:'absolute',zIndex:10,bottom:40,[esYo?'right':'left']:0,boxShadow:'0 4px 12px rgba(0,0,0,.4)'}}>
                      {REACCIONES.map(e=>(
                        <span key={e} style={{fontSize:18,cursor:'pointer',transition:'transform .1s'}}
                          onMouseEnter={ev=>ev.target.style.transform='scale(1.3)'}
                          onMouseLeave={ev=>ev.target.style.transform='scale(1)'}
                          onClick={()=>addReacc(msgId,e)}>{e}</span>
                      ))}
                    </div>}
                  </div>
                </div>
              );
            })}
          </div>
        ))}

        {/* Indicador "está escribiendo..." */}
        {typing.length>0&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',marginLeft:40}}>
          <div style={{display:'flex',gap:3}}>
            {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'#475569',animation:`pulse 1.2s ${i*0.2}s infinite`}}/>)}
          </div>
          <span style={{fontSize:11,color:'#475569'}}>{typing.join(', ')} {typing.length===1?'está':'están'} escribiendo...</span>
        </div>}

        <div ref={endRef}/>
      </div>

      {/* Input */}
      <div style={{padding:'10px 12px',borderTop:'1px solid #243447',display:'flex',gap:8,alignItems:'flex-end',flexShrink:0}}>
        <textarea
          className="inp"
          style={{flex:1,minHeight:36,maxHeight:100,resize:'none',padding:'8px 12px',fontSize:13,lineHeight:1.5}}
          placeholder="Escribe un mensaje... (Enter para enviar, Shift+Enter para nueva línea)"
          value={txt}
          onChange={handleTyping}
          onKeyDown={handleKey}
          rows={1}
        />
        <button className="btn btn-p" onClick={send} disabled={!txt.trim()}
          style={{padding:'0 16px',height:36,flexShrink:0,alignSelf:'flex-end'}}>
          <Ico n="send" s={15}/>
        </button>
      </div>
    </div>

    {/* Confirm borrar */}
    {delId&&<Confirm msg="¿Eliminar este mensaje?" onOk={async()=>{
      const m = msgs.find(x=>(x.id||x._key)===delId);
      await ChatSvc.delete(delId, m?.autorId, user?.id);
      setMsgs(p=>p.filter(x=>(x.id||x._key)!==delId));
      setDelId(null);
    }} onCancel={()=>setDelId(null)}/>}
  </div>;
};


// ── COBROS / FACTURACIÓN ─────────────────────────────────────
const Cobros = () => {
  const {facturas,setFacturas,clientes,toast} = useApp();
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState({});
  const [del,setDel]=useState(null);
  const [filtEst,setFiltEst]=useState('');
  // D-item26: Filtros avanzados — año, meses múltiples, rango de fechas
  const [filtAnio,setFiltAnio]=useState('');
  const [filtMeses,setFiltMeses]=useState([]); // array de números de mes 1-12
  const [filtFIni,setFiltFIni]=useState('');
  const [filtFFin,setFiltFFin]=useState('');
  const upd=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const nextNum=()=>String(Math.max(0,...facturas.map(f=>Number(f.numero)||0))+1).padStart(4,'0');

  const openNew=()=>{setForm({numero:nextNum(),clienteId:'',tipoContrato:'',valor:'',iva:false,fechaEmision:new Date().toISOString().split('T')[0],fechaVen:'',estado:'Pendiente',concepto:'',notas:'',formaPago:'',fechaPago:'',tipoEmisor:'persona_juridica',nombreEmisor:'',nitEmisor:''});setOpen(true);};
  const openEdit=f=>{setForm({...f});setOpen(true);};

  // Cuando se selecciona un cliente en Cobros, auto-cargar valorContrato y motivoCobro del cliente
  const onClienteChange = e => {
    const cId = e.target.value;
    const cli = clientes.find(c=>c.id===cId);
    setForm(p=>({
      ...p,
      clienteId: cId,
      tipoContrato: cli?.tipoContrato || p.tipoContrato || '',
      valor: cli?.valorContrato ? String(cli.valorContrato) : p.valor,
      // V13-BLOQUE3: Cargar motivoCobro sugerido desde Clientes (puede sobrescribirse)
      concepto: cli?.motivoCobro || p.concepto || '',
    }));
  };

  // D-item26: Años disponibles para filtro
  const aniosDisponibles = useMemo(()=>{
    const s = new Set(facturas.map(f=>(f.fechaEmision||'').substring(0,4)).filter(Boolean));
    return [...s].sort().reverse();
  },[facturas]);

  const toggleMes = mes => setFiltMeses(prev => prev.includes(mes) ? prev.filter(m=>m!==mes) : [...prev,mes]);
  const MESES_LABELS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  const filtered=useMemo(()=>facturas.filter(f=>{
    if(filtEst&&f.estado!==filtEst) return false;
    const fe = f.fechaEmision||'';
    if(filtAnio&&!fe.startsWith(filtAnio)) return false;
    if(filtMeses.length>0){
      const mes = parseInt(fe.substring(5,7));
      if(!filtMeses.includes(mes)) return false;
    }
    if(filtFIni&&fe<filtFIni) return false;
    if(filtFFin&&fe>filtFFin) return false;
    return true;
  }).sort((a,b)=>b.numero-a.numero),[facturas,filtEst,filtAnio,filtMeses,filtFIni,filtFFin]);

  // INTERVENCIÓN QUIRÚRGICA v12.2 + V13-BLOQUE5: Listener para sincronizar cambios de valorContrato y motivoCobro desde módulo Clientes
  useEffect(() => {
    if(!window.SyncSvc) return;
    
    const unsubscribe = window.SyncSvc.onClienteUpdated((clienteData) => {
      // Si hay facturas de este cliente, actualizar automáticamente valor y/o motivoCobro si cambiaron
      setFacturas(prev => {
        let cambio = false;
        const updated = prev.map(f => {
          if(f.clienteId === clienteData.id) {
            // V13-BLOQUE5: Sincronizar valor SI cambió en el cliente
            const nuevoValor = clienteData.valorContrato ? String(clienteData.valorContrato) : f.valor;
            const valorCambio = f.valor !== nuevoValor && clienteData.valorContrato;
            
            // V13-BLOQUE5: Sincronizar motivoCobro (concepto) si no está personalizado en factura
            // Solo sincroniza si el concepto actual coincide con el motivo anterior o está vacío
            const esConceptoGenerico = !f.concepto || (clienteData.motivoCobro && f.concepto.includes(clienteData.motivoCobro));
            const nuevoConcepto = (esConceptoGenerico && clienteData.motivoCobro) ? clienteData.motivoCobro : f.concepto;
            const conceptoCambio = esConceptoGenerico && f.concepto !== nuevoConcepto && clienteData.motivoCobro;
            
            if(valorCambio || conceptoCambio) {
              cambio = true;
              return {
                ...f, 
                valor: nuevoValor,
                concepto: nuevoConcepto
              };
            }
          }
          return f;
        });
        
        if(cambio) {
          // Notificar al usuario del cambio automático
          const nFacturas = updated.filter(f=>f.clienteId===clienteData.id).length;
          toast(`✨ ${clienteData.nombre} actualizado en ${nFacturas} factura(s)`, 'info');
          // Guardar cambios en DB
          updated.forEach(f => {
            if(f.clienteId === clienteData.id) DB.set('facturas', f);
          });
        }
        
        return updated;
      });
    });
    
    return unsubscribe;
  }, [setFacturas, toast]);


  // ── Enviar factura por email — genera PDF y abre cliente de correo ─────
  // ARQUITECTURA: Las SPA sin backend no pueden enviar emails automáticamente
  // con archivos adjuntos (limitación del navegador). La solución profesional
  // es: 1) Generar y descargar el PDF, 2) Abrir el cliente de correo con el
  // mensaje precompuesto, 3) El usuario adjunta el PDF descargado.
  // Para envío 100% automático se requiere integración con EmailJS (ver Config).
  const enviarEmail = (f) => {
    const cli = clientes.find(c=>c.id===f.clienteId);
    if(!cli?.email) return toast('El cliente no tiene email registrado','error');
    const cfg = JSON.parse(localStorage.getItem('ip_config')||'{}');
    const empresa   = cfg.empresa || 'INTPLANNER';
    const tel       = cfg.telefono || '';
    const emailEmp  = cfg.adminEmail || '';
    const valor     = fmt.cop((Number(f.valor)||0)*(f.iva?1.19:1));
    const msgCfg    = cfg.mensajeFactura || '';  // Mensaje personalizable desde Config

    // Paso 1: Generar y descargar el PDF automáticamente
    if(window.jspdf?.jsPDF) {
      try { exportPDF(f); } catch(e) { console.warn('PDF gen error:', e.message); }
    }

    // Paso 2: Construir mensaje profesional (usa personalizado si está configurado)
    const cuerpoBase = msgCfg
      ? msgCfg
          .replace('{cliente}',   cli.nombre)
          .replace('{empresa}',   empresa)
          .replace('{numero}',    f.numero||'N/A')
          .replace('{concepto}',  f.concepto||'Servicios profesionales')
          .replace('{valor}',     valor)
          .replace('{vencimiento}',f.fechaVen||'Sin vencimiento')
      : (
          `Estimado/a ${cli.nombre},\n\n` +
          `Por medio del presente le remitimos la Cuenta de Cobro No. ${f.numero||'N/A'} ` +
          `por concepto de ${f.concepto||'Servicios profesionales'}.\n\n` +
          `DETALLE DE LA CUENTA:\n` +
          `  • Número:         ${f.numero||'N/A'}\n` +
          `  • Concepto:       ${f.concepto||'Servicios profesionales'}\n` +
          `  • Valor total:    ${valor}${f.iva?' (IVA incluido)':''}\n` +
          `  • Fecha emisión:  ${f.fechaEmision||''}\n` +
          `  • Vencimiento:    ${f.fechaVen||'Sin vencimiento'}\n` +
          `  • Forma de pago:  ${f.formaPago||'Por definir'}\n` +
          (f.notas ? `\nObservaciones: ${f.notas}\n` : '') +
          `\nAdjunto encontrará el documento en formato PDF.\n\n` +
          `Para cualquier inquietud no dude en contactarnos.\n\n` +
          `Cordialmente,\n${empresa}` +
          (tel ? `\nTel: ${tel}` : '') +
          (emailEmp ? `\nEmail: ${emailEmp}` : '')
        );

    const asunto = encodeURIComponent(`Cuenta de Cobro No. ${f.numero||''} — ${empresa}`);
    const cuerpo = encodeURIComponent(cuerpoBase);

    // Paso 3: Abrir cliente de correo con mensaje precompuesto
    setTimeout(() => {
      window.open(`mailto:${cli.email}?subject=${asunto}&body=${cuerpo}`, '_blank');
      toast(`📧 PDF descargado + email preparado para ${cli.nombre}. Adjunte el PDF en su cliente de correo.`, 'success');
    }, 800); // pequeño delay para que el PDF se descargue primero
  };

  // ── Envío masivo: email a todos los clientes con facturas pendientes ──
  const enviarEmailsMasivo = async () => {
    const pendientes = filtered.filter(f=>f.estado==='Pendiente'||f.estado==='Vencida');
    if(pendientes.length===0) { toast('No hay facturas pendientes o vencidas','info'); return; }
    toast(`Preparando ${pendientes.length} emails...`, 'info');
    for(let i=0; i<pendientes.length; i++) {
      const f = pendientes[i];
      const cli = clientes.find(c=>c.id===f.clienteId);
      if(!cli?.email) continue;
      // Delay entre aperturas para no saturar el cliente de correo
      await new Promise(r=>setTimeout(r,600));
      enviarEmail(f);
    }
  };

  const save=()=>{
    if(!form.clienteId) return toast('Seleccione un cliente','error');
    if(!form.valor) return toast('Ingrese el valor','error');
    // Estado: respetar siempre la selección explícita del usuario.
    const est = form.estado||'Pendiente';
    // F-item32: Numeración consecutiva automática para nuevas cuentas
    const numero = form.id ? (form.numero||nextNum()) : nextNum();
    const factura={...form,numero,estado:est,id:form.id||uid(),_ts:Date.now()};
    DB.set('facturas',factura); // persiste en localStorage+Firestore en segundo plano
    setFacturas(prev=>form.id?prev.map(x=>x.id===factura.id?factura:x):[factura,...prev]);
    // INTERVENCIÓN QUIRÚRGICA v12.2: Emitir evento de sincronización cuando se guarda factura
    if(window.SyncSvc) window.SyncSvc.emitFacturaChange(factura);
    setOpen(false); toast('Cuenta guardada','success');
  };

  const remove=id=>{DB.del('facturas',id);setFacturas(prev=>prev.filter(x=>x.id!==id));setDel(null);};

  const exportPDF=f=>{
    // FIX v12.1: Guardia de disponibilidad — scripts con defer pueden no estar listos
    if(!window.jspdf?.jsPDF) { toast('Librería PDF no disponible aún. Intente en 2 segundos.','warning'); return; }
    try {
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({unit:'mm',format:'a4'});
      const PW=210; const PH=297;
      const cfg=JSON.parse(localStorage.getItem('ip_config')||'{}');
      const cli=clientes.find(c=>c.id===f.clienteId);

      // F-items30-31: Usar emisor personalizado si está definido en la cuenta
      const empresa = f.nombreEmisor?.trim() || cfg.empresa||'INTEGRA CONSULTORES';
      const nit = f.nitEmisor?.trim() || cfg.nit||'';
      const tel=cfg.telefono||'';
      const email=cfg.adminEmail||'';
      const dir=cfg.direccion||'';

      // ── BORDE EXTERIOR ELEGANTE ──────────────────────────────────────────
      doc.setDrawColor(30,58,95); doc.setLineWidth(0.6);
      doc.rect(8,8,PW-16,PH-16,'S');

      doc.rect(10,10,PW-20,PH-20,'S');

      // ── HEADER: banda azul marino ────────────────────────────────────────
      doc.setFillColor(20,40,75); doc.rect(8,8,PW-16,44,'F');
