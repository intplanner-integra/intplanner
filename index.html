        {/* Reset */}
        <div style={{display:'flex',justifyContent:'flex-end',gap:10}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>{
            localStorage.removeItem('ip_apariencia');
            const s=document.getElementById('ip-apariencia');if(s)s.remove();
            document.body.style.background='';document.body.style.color='';
            toast('Apariencia restablecida','info');
          }}>↺ Restablecer Default</button>
          <button className="btn btn-g btn-sm" onClick={()=>toast('Apariencia aplicada y guardada','success')}>
            <Ico n="check" s={13}/>Apariencia Guardada
          </button>
        </div>
      </div>;
    })()}
    {tab==='usuarios'&&<div>
      {/* V13: barra de acciones + contadores en tiempo real */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}}>
        {isAdmin&&<button className="btn btn-p btn-sm" onClick={()=>{setFormUser({id:null,nombre:'',email:'',rol:'consultor',activo:true,permisos:ROL_PERMISOS['consultor']||{}});setOpenUser(true);}}><Ico n="plus" s={13}/>Nuevo Usuario</button>}
        <span style={{fontSize:11,color:'#64748b',marginLeft:4}}>
          {usuarios.filter(u=>u.activo!==false).length} activos
          {usuarios.filter(u=>u.activo===false).length>0&&
            <span style={{color:'#f87171',marginLeft:6}}>· {usuarios.filter(u=>u.activo===false).length} inactivos</span>}
        </span>
        {/* Badge V13 */}
        <span style={{marginLeft:'auto',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,
          background:'rgba(201,168,76,.12)',border:'1px solid rgba(201,168,76,.3)',color:'#C9A84C'}}>
          V13 · Tiempo real ✓
        </span>
      </div>
      <div className="card" style={{overflowX:'auto',marginBottom:14}}>
        <table className="tbl">
          <thead><tr>{['Nombre','Email','Cargo','Rol','Estado','Acciones'].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>
            {usuarios.length===0&&<tr><td colSpan={6} style={{textAlign:'center',color:'#475569',padding:32}}>Sin usuarios registrados. El admin es el usuario raíz.</td></tr>}
            {usuarios.map(u=>{
              const inactivo = u.activo===false;
              return <tr key={u.id} style={inactivo?{opacity:.55,background:'rgba(153,27,27,.04)'}:{}}>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <div style={{width:28,height:28,borderRadius:'50%',flexShrink:0,
                      background:inactivo?'#334155':'linear-gradient(135deg,#1E3A5F,#2a5298)',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:11,fontWeight:700,color:inactivo?'#64748b':'#fff'}}>
                      {(u.nombre||'?').charAt(0).toUpperCase()}
                    </div>
                    <div>
                      <p style={{color:inactivo?'#64748b':'#fff',fontWeight:500,margin:0,fontSize:13}}>{u.nombre}</p>
                      {u.id===user?.id&&<span style={{fontSize:9,color:'#C9A84C',fontWeight:700}}>TÚ</span>}
                    </div>
                  </div>
                </td>
                <td style={{color:'#94a3b8',fontSize:12}}>{u.email}</td>
                <td style={{color:'#93c5fd',fontSize:12}}>{u.cargo||<span style={{color:'#475569'}}>—</span>}</td>
                <td><SBadge s={u.rol}/></td>
                <td><SBadge s={inactivo?'inactivo':'activo'}/></td>
                <td>
                  {isAdmin&&<div style={{display:'flex',gap:4}}>
                    {/* Editar — siempre disponible */}
                    <button className="btn btn-ghost btn-sm p-1.5"
                      title="Editar usuario"
                      onClick={()=>{setFormUser({...u});setOpenUser(true);}}>
                      <Ico n="edit" s={13}/>
                    </button>
                    {/* Cambiar contraseña — V13.1 */}
                    <button className="btn btn-ghost btn-sm p-1.5"
                      title="Cambiar contraseña en Firebase"
                      style={{color:'#60a5fa'}}
                      onClick={()=>{setOpenPwd({id:u.id,nombre:u.nombre,email:u.email});setFormPwd({newPass:'',confirmPass:''});}}>
                      <Ico n="lock" s={13}/>
                    </button>
                    {/* Desactivar o Reactivar */}
                    {u.id!==user?.id&&(
                      inactivo

                            title="Reactivar usuario"

                            onClick={async()=>{
                              if(FIREBASE_OK){
                                try{
                                  await _db.collection('usuarios').doc(u.id).update({
                                    activo:true,_reactivadoEn:new Date().toISOString(),_reactivadoPor:user?.id||'anon'
                                  });
                                  toast('Usuario reactivado','success');
                                }catch(e){toast('Error al reactivar: '+e.message,'error');}
                              }
                            }}>
                            <Ico n="check" s={13}/>
                          </button>
                        : <button className="btn btn-ghost btn-sm p-1.5"
                            title="Desactivar usuario (no elimina)"
                            style={{color:'#f87171'}}
                            onClick={()=>{
                              if(window.confirm('¿Desactivar a '+u.nombre+'? Perderá acceso inmediatamente. Podrá reactivarlo en cualquier momento.')){
                                delUser(u.id);
                              }
                            }}>
                            <Ico n="lock" s={13}/>
                          </button>
                    )}
                    {/* Eliminar permanentemente — V13.1: solo si el usuario está inactivo */}
                    {u.id!==user?.id&&inactivo&&(
                      <button className="btn btn-sm p-1.5"
                        title="Eliminar usuario permanentemente de Firestore"
                        style={{background:'rgba(153,27,27,.25)',color:'#f87171',border:'1px solid rgba(248,113,113,.3)'}}
                        onClick={()=>setOpenDelUser(u)}>
                        <Ico n="trash" s={13}/>
                      </button>
                    )}
                  </div>}
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
      <Modal open={openUser} onClose={()=>setOpenUser(false)} title={formUser.id?'Editar Usuario':'Nuevo Usuario'} wide>
        <div className="grid-2">
          <F label="Nombre *"><input className="inp" value={formUser.nombre||''} onChange={e=>setFormUser(p=>({...p,nombre:e.target.value}))}/></F>
          <F label="Email *"><input type="email" className="inp" value={formUser.email||''} onChange={e=>setFormUser(p=>({...p,email:e.target.value}))}/></F>
          <F label={formUser.id?'Contraseña (vacío = sin cambio)':'Contraseña *'} col2><input type="password" className="inp" value={formUser.password||''} onChange={e=>setFormUser(p=>({...p,password:e.target.value}))} placeholder="Mín 8 chars, 1 mayúscula, 1 número"/></F>
          <F label="Rol"><select className="inp" value={formUser.rol||'consultor'} onChange={e=>{
            const nuevoRol = e.target.value;
            const permsDefault = ROL_PERMISOS[nuevoRol] || {};
            setFormUser(p=>({...p, rol: nuevoRol, permisos: permsDefault}));
          }}>
            {['administrador','gerente','coordinador','consultor','usuario'].map(r=><option key={r} value={r}>{r}</option>)}
          </select>
          <p style={{fontSize:10,color:'#C9A84C',margin:'4px 0 0',display:'flex',alignItems:'center',gap:4}}>
            ⚡ Al cambiar rol, los permisos se actualizan automáticamente. Puede ajustar manualmente abajo.
          </p>
          </F>
          {/* FASE 3: Campo Cargo con propagación automática de rol */}
          <F label="Cargo"><select className="inp" value={formUser.cargo||''} onChange={e=>{
            const nombreCargo = e.target.value;
            const cargoObj = cargos.find(c=>c.nombre===nombreCargo);
            if(cargoObj?.rol) {
              const permsDefault = ROL_PERMISOS[cargoObj.rol] || {};
              setFormUser(p=>({...p, cargo: nombreCargo, rol: cargoObj.rol, permisos: permsDefault}));
            } else {
              setFormUser(p=>({...p, cargo: nombreCargo}));
            }
          }}>
            <option value="">Sin cargo asignado</option>
            {cargos.map(c=><option key={c.id} value={c.nombre}>{c.nombre}{c.rol ? ` (${c.rol})` : ''}</option>)}
          </select>
          {formUser.cargo && cargos.find(c=>c.nombre===formUser.cargo)?.rol && (
            <p style={{fontSize:10,color:'#4ade80',margin:'4px 0 0',display:'flex',alignItems:'center',gap:4}}>
              ⚡ El cargo asigna automáticamente el rol: <strong>{cargos.find(c=>c.nombre===formUser.cargo)?.rol}</strong>
            </p>
          )}
          </F>
          <div style={{display:'flex',alignItems:'center',gap:8,paddingTop:18}}>
            <input type="checkbox" id="uActivo" checked={formUser.activo!==false} onChange={e=>setFormUser(p=>({...p,activo:e.target.checked}))} style={{accentColor:'#C9A84C'}}/>
            <label htmlFor="uActivo" style={{fontSize:13,color:'#cbd5e1'}}>Usuario activo</label>
          </div>
          <div style={{gridColumn:'1/-1'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <p style={{fontSize:11,color:'#64748b',fontWeight:600,textTransform:'uppercase',letterSpacing:'.4px',margin:0}}>Permisos por Módulo</p>
              <div style={{display:'flex',gap:6}}>
                <button type="button" className="btn btn-ghost btn-sm" style={{fontSize:11,color:'#4ade80',borderColor:'rgba(74,222,128,.3)'}}
                  onClick={()=>setFormUser(p=>({...p,permisos:Object.fromEntries(PERMS.map(k=>[k,3]))}))}>
                  ✓ Todo — Administrar
                </button>
                <button type="button" className="btn btn-ghost btn-sm" style={{fontSize:11,color:'#60a5fa',borderColor:'rgba(96,165,250,.3)'}}
                  onClick={()=>setFormUser(p=>({...p,permisos:Object.fromEntries(PERMS.map(k=>[k,1]))}))}>
                  👁 Todo — Lectura
                </button>
                <button type="button" className="btn btn-ghost btn-sm" style={{fontSize:11,color:'#f87171',borderColor:'rgba(248,113,113,.3)'}}
                  onClick={()=>setFormUser(p=>({...p,permisos:Object.fromEntries(PERMS.map(k=>[k,0]))}))}>
                  ✕ Sin acceso
                </button>
              </div>
            </div>
            {/* Leyenda de niveles */}
            <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
              {PERM_NIVELES.map(n=>(
                <span key={n.val} style={{fontSize:10,padding:'2px 8px',borderRadius:99,
                  background:n.bg,color:n.color,border:`1px solid ${n.color}44`,fontWeight:600}}>
                  {n.val} — {n.label}
                </span>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:6}}>
              {PERMS.map(mod => {
                const nivel = getPermNivel(formUser.permisos, mod);
                const nivelInfo = PERM_NIVELES[nivel];
                return (
                  <div key={mod} style={{
                    padding:'8px 10px',borderRadius:8,
                    background:'#0f1923',border:'1px solid #243447',
                  }}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                      <span style={{fontSize:12,fontWeight:600,color:'#cbd5e1',textTransform:'capitalize'}}>{mod}</span>
                      <span style={{fontSize:10,padding:'1px 7px',borderRadius:99,
                        background:nivelInfo.bg,color:nivelInfo.color,
                        border:`1px solid ${nivelInfo.color}44`,fontWeight:600}}>
                        {nivelInfo.label}
                      </span>
                    </div>
                    {/* Selector de nivel con 4 botones */}
                    <div style={{display:'flex',gap:3}}>
                      {PERM_NIVELES.map(n=>(
                        <button key={n.val} type="button"
                          onClick={()=>setFormUser(p=>({
                            ...p, permisos:{...(p.permisos||{}),[mod]:n.val}
                          }))}
                          style={{
                            flex:1,padding:'3px 0',borderRadius:4,fontSize:10,fontWeight:600,
                            cursor:'pointer',border:'1px solid',transition:'all .12s',
                            background: nivel===n.val ? n.bg : 'transparent',
                            color:       nivel===n.val ? n.color : '#475569',
                            borderColor: nivel===n.val ? n.color+'66' : '#243447',
                          }}>
                          {n.val}
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
            <p style={{fontSize:11,color:'#475569',marginTop:8}}>
              {PERMS.filter(m=>getPermNivel(formUser.permisos,m)>0).length} de {PERMS.length} módulos con acceso ·{' '}
              {PERMS.filter(m=>getPermNivel(formUser.permisos,m)===3).length} con administración completa
            </p>
          </div>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setOpenUser(false)}>Cancelar</button>
          <button className="btn btn-g btn-sm" onClick={()=>saveUser()}><Ico n="check" s={13}/>Guardar</button>
        </div>
      </Modal>

      {/* ── MODAL CAMBIAR CONTRASEÑA — V13.1 ─────────────────────────────────
          Aplica directamente en Firebase Auth:
          · Propia contraseña → updatePassword() en el cliente
          · Contraseña de otro usuario → solicitud en Firestore → Cloud Function
          ──────────────────────────────────────────────────────────────────── */}
      <Modal open={!!openPwd} onClose={()=>{setOpenPwd(null);setFormPwd({newPass:'',confirmPass:''});}} title="Cambiar Contraseña">
        {openPwd&&<div>
          {/* Aviso del flujo que se usará */}
          <div style={{marginBottom:16,padding:'10px 14px',borderRadius:8,
            background: openPwd.id===user?.id ? 'rgba(96,165,250,.08)' : 'rgba(201,168,76,.08)',
            border:'1px solid',borderColor: openPwd.id===user?.id ? 'rgba(96,165,250,.25)' : 'rgba(201,168,76,.25)'}}>
            <p style={{fontSize:12,fontWeight:700,margin:'0 0 3px',
              color: openPwd.id===user?.id ? '#60a5fa' : '#C9A84C'}}>
              {openPwd.id===user?.id
                ? '🔑 Cambiando su propia contraseña'
                : '🔑 Cambiando contraseña de otro usuario'}
            </p>
            <p style={{fontSize:11,color:'#64748b',margin:0,lineHeight:1.6}}>
              {openPwd.id===user?.id
                ? 'El cambio se aplicará inmediatamente en Firebase Authentication.'
                : <>Usuario: <strong style={{color:'#fff'}}>{openPwd.nombre}</strong> ({openPwd.email})<br/>
                   El cambio se envía a Firebase vía Cloud Function. Si la función no está activa,
                   se mostrará el enlace para realizarlo manualmente en Firebase Console.</>}
            </p>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div>
              <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.4px'}}>Nueva Contraseña *</label>
              <input type="password" className="inp"
                value={formPwd.newPass}
                onChange={e=>setFormPwd(p=>({...p,newPass:e.target.value}))}
                placeholder="Mín. 8 chars, 1 mayúscula, 1 número"
                autoComplete="new-password"/>
            </div>
            <div>
              <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.4px'}}>Confirmar Contraseña *</label>
              <input type="password" className="inp"
                value={formPwd.confirmPass}
                onChange={e=>setFormPwd(p=>({...p,confirmPass:e.target.value}))}
                placeholder="Repita la contraseña"
                autoComplete="new-password"/>
            </div>
            {/* Indicador visual de coincidencia */}
            {formPwd.newPass&&formPwd.confirmPass&&(
              <p style={{fontSize:11,margin:0,fontWeight:600,
                color: formPwd.newPass===formPwd.confirmPass ? '#4ade80' : '#f87171'}}>
                {formPwd.newPass===formPwd.confirmPass ? '✓ Las contraseñas coinciden' : '✗ Las contraseñas no coinciden'}
              </p>
            )}
            {/* Enlace manual a Firebase Console como alternativa */}
            {openPwd.id!==user?.id&&(
              <div style={{padding:'8px 12px',background:'#0f1923',borderRadius:8,border:'1px solid #243447'}}>
                <p style={{fontSize:11,color:'#64748b',margin:'0 0 5px',fontWeight:600}}>🔗 Alternativa manual — Firebase Console</p>
                <p style={{fontSize:11,color:'#475569',margin:'0 0 6px',lineHeight:1.5}}>
                  Si la Cloud Function no está desplegada puede cambiar la contraseña directamente en Firebase Authentication:
                </p>
                <a href={'https://console.firebase.google.com/project/intplanner-v12/authentication/users'}
                  target="_blank" rel="noopener noreferrer"
                  style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,fontWeight:700,
                    padding:'5px 10px',borderRadius:6,background:'rgba(201,168,76,.12)',
                    border:'1px solid rgba(201,168,76,.3)',color:'#C9A84C',textDecoration:'none'}}>
                  <Ico n="link" s={12}/>Abrir Firebase Auth → Users
                </a>
              </div>
            )}
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setOpenPwd(null);setFormPwd({newPass:'',confirmPass:''});}}>
              Cancelar
            </button>
            <button className="btn btn-p btn-sm" onClick={changeUserPassword} disabled={loadingPwd}
              style={{minWidth:140}}>
              {loadingPwd
                ? <><span style={{display:'inline-block',width:12,height:12,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .7s linear infinite',marginRight:6}}/> Aplicando...</>
                : <><Ico n="lock" s={13}/>Cambiar Contraseña</>}
            </button>
          </div>
        </div>}
      </Modal>

      {/* ── MODAL CONFIRMAR ELIMINACIÓN PERMANENTE — V13.1 ────────────────────
          Solo disponible para usuarios INACTIVOS (desactivados previamente).
          Elimina el documento Firestore → acceso bloqueado en servidor.
          Registra uid en ip_deleted_uids para limpieza Admin SDK posterior.
          ──────────────────────────────────────────────────────────────────── */}
      {openDelUser&&(
        <div className="overlay">
          <div className="modal max-w-sm fade">
            <div style={{textAlign:'center',marginBottom:16}}>
              <div style={{width:48,height:48,borderRadius:'50%',background:'rgba(153,27,27,.25)',
                border:'1px solid rgba(248,113,113,.35)',display:'flex',alignItems:'center',justifyContent:'center',
                margin:'0 auto 12px',fontSize:22}}>🗑️</div>
              <h3 className="sy" style={{color:'#fca5a5',fontWeight:700,fontSize:16,margin:'0 0 6px'}}>
                Eliminar Usuario Permanentemente
              </h3>
              <p style={{fontSize:13,color:'#94a3b8',margin:0}}>
                <strong style={{color:'#fff'}}>{openDelUser.nombre}</strong><br/>
                <span style={{fontSize:11,color:'#64748b'}}>{openDelUser.email}</span>
              </p>
            </div>
            {/* Advertencia de implicaciones */}
            <div style={{padding:'10px 12px',background:'rgba(153,27,27,.12)',border:'1px solid rgba(248,113,113,.2)',
              borderRadius:8,marginBottom:14,fontSize:11,color:'#fca5a5',lineHeight:1.7}}>
              <p style={{fontWeight:700,margin:'0 0 4px'}}>⚠️ Esta acción no se puede deshacer:</p>
              <p style={{margin:'0 0 2px'}}>• El documento de perfil se eliminará de Firestore de forma inmediata.</p>
              <p style={{margin:'0 0 2px'}}>• El usuario perderá acceso aunque Firebase Auth conserve su cuenta.</p>
              <p style={{margin:0}}>• El uid quedará registrado en <code style={{fontSize:10,background:'rgba(255,255,255,.08)',padding:'1px 4px',borderRadius:3}}>ip_deleted_uids</code> para limpieza del Admin SDK.</p>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setOpenDelUser(null)} disabled={loadingDel}>
                Cancelar
              </button>
              <button className="btn btn-d btn-sm" onClick={()=>deleteUserPermanent(openDelUser.id)} disabled={loadingDel}
                style={{minWidth:130}}>
                {loadingDel
                  ? <><span style={{display:'inline-block',width:12,height:12,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .7s linear infinite',marginRight:6}}/> Eliminando...</>
                  : <><Ico n="trash" s={13}/>Eliminar Permanente</>}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>}

    {tab==='servicios'&&<div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:14}}>Gestión de Servicios</h3>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <input className="inp" placeholder="Nombre del servicio..." value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addItem('servicios',setServicios,servicios)}/>
        <button className="btn btn-g btn-sm" onClick={()=>addItem('servicios',setServicios,servicios)}><Ico n="plus" s={13}/>Agregar</button>
      </div>
      {servicios.map(s=><div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'#0f1923',border:'1px solid #243447',borderRadius:8,marginBottom:6}}>
        <span style={{color:'#fff',fontSize:13}}>{s.nombre}</span>
        <button onClick={()=>delItem('servicios',setServicios,servicios,s.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',padding:4}}><Ico n="trash" s={14}/></button>
      </div>)}
      {servicios.length===0&&<p style={{color:'#475569',fontSize:13}}>Sin servicios. Agregue los servicios de su empresa.</p>}
    </div>}

    {tab==='cargos'&&<div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:4}}>Gestión de Cargos</h3>
      <p style={{fontSize:11,color:'#64748b',marginBottom:14}}>
        Cada cargo puede tener un rol asociado. Al asignar el cargo a un usuario, sus permisos se actualizan automáticamente.
      </p>
      {/* Agregar cargo con rol */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <input className="inp" style={{flex:'1 1 140px'}} placeholder="Nombre del cargo..." value={newItem} onChange={e=>setNewItem(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&(()=>{
            if(!newItem.trim()) return;
            const item={id:uid(),nombre:newItem.trim(),rol:newCargoRol||'consultor'};
            const arr=[...cargos,item];
            setCargos(arr); localStorage.setItem('ip_cargos',JSON.stringify(arr)); setNewItem('');
            try{ DB.set('cargos',item); } catch(_){}
            toast(`Cargo "${item.nombre}" creado con rol ${item.rol}`,'success');
          })()}/>
        <select className="inp" style={{flex:'0 0 130px'}}
          value={newCargoRol||'consultor'} onChange={e=>setNewCargoRol(e.target.value)}>
          {['administrador','gerente','coordinador','consultor','usuario'].map(r=>(
            <option key={r} value={r}>{r.charAt(0).toUpperCase()+r.slice(1)}</option>
          ))}
        </select>
        <button className="btn btn-g btn-sm" onClick={()=>{
          if(!newItem.trim()) return;
          const item={id:uid(),nombre:newItem.trim(),rol:newCargoRol||'consultor'};
          const arr=[...cargos,item];
          setCargos(arr); localStorage.setItem('ip_cargos',JSON.stringify(arr)); setNewItem('');
          try{ DB.set('cargos',item); } catch(_){}
          toast(`Cargo "${item.nombre}" creado con rol ${item.rol}`,'success');
        }}><Ico n="plus" s={13}/>Agregar</button>
      </div>
      {/* Lista de cargos */}
      {cargos.map(c=><div key={c.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
        padding:'8px 12px',background:'#0f1923',border:'1px solid #243447',borderRadius:8,marginBottom:6,gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <span style={{color:'#fff',fontSize:13,fontWeight:600}}>{c.nombre}</span>
          {c.rol && <span style={{marginLeft:8,fontSize:10,padding:'1px 7px',borderRadius:99,
            background:'rgba(201,168,76,.1)',color:'#C9A84C',border:'1px solid rgba(201,168,76,.25)',textTransform:'capitalize'}}>
            {c.rol}
          </span>}
        </div>
        {/* Cambiar rol del cargo */}
        <select className="inp" style={{width:120,fontSize:11,padding:'3px 6px'}}
          value={c.rol||'consultor'} onChange={async e=>{
            const nuevoRol = e.target.value;
            const cargoActualizado = {...c, rol: nuevoRol};
            const arr = cargos.map(x=>x.id===c.id ? cargoActualizado : x);
            setCargos(arr);
            localStorage.setItem('ip_cargos', JSON.stringify(arr));
            try{
              // DB.set hace merge sobre el documento existente
              await DB.set('cargos', cargoActualizado);
              // FASE 3: Propagar automáticamente a usuarios con este cargo
              const todosUsuarios = DB.get('usuarios');
              for(const u of todosUsuarios.filter(x=>x.cargo===c.nombre)){
                const permsDefault = ROL_PERMISOS[nuevoRol] || {};
                const usuarioActualizado = {...u, rol: nuevoRol, permisos: permsDefault};
                await DB.set('usuarios', usuarioActualizado);
              }
              toast(`Rol "${nuevoRol}" aplicado al cargo y usuarios asociados`,'success');
            } catch(err){ console.warn('Cargo rol update:', err.message); }
          }}>
          {['administrador','gerente','coordinador','consultor','usuario'].map(r=>(
            <option key={r} value={r}>{r.charAt(0).toUpperCase()+r.slice(1)}</option>
          ))}
        </select>
        <button onClick={()=>delItem('cargos',setCargos,cargos,c.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',padding:4}}><Ico n="trash" s={14}/></button>
      </div>)}
      {cargos.length===0&&<p style={{color:'#475569',fontSize:13}}>Sin cargos. Agregue los cargos de su organización.</p>}
    </div>}

    {tab==='notificaciones'&&<NotifConfig/>}

    {tab==='personalizar'&&<PersonalizarTab toast={toast}/>}

    {tab==='dashboard'&&<DashKpiConfig toast={toast}/>}
    {tab==='diagnostico'&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
      {/* ── PANEL DIAGNÓSTICO V13 ── */}
      <div className="card-p">
        <div className="gline"/>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
          <div style={{width:36,height:36,borderRadius:8,background:'rgba(201,168,76,.12)',border:'1px solid rgba(201,168,76,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🔬</div>
          <div>
            <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:15,margin:0}}>Diagnóstico del Sistema — V13</h3>
            <p style={{fontSize:11,color:'#475569',margin:0}}>Estado de todas las correcciones aplicadas en esta versión</p>
          </div>
          <span style={{marginLeft:'auto',fontSize:11,fontWeight:700,padding:'4px 12px',borderRadius:99,background:'rgba(74,222,128,.12)',border:'1px solid rgba(74,222,128,.3)',color:'#4ade80'}}>
            8/8 activas
          </span>
        </div>

        {/* Checks de correcciones */}
        {[
          {id:'H8',titulo:'Permisos RBAC — mínimo privilegio',
           desc:'getPermNivel: undefined → 0 (antes → 3). Usuarios sin permisos configurados no tienen acceso de admin.',
           check: typeof getPermNivel==='function' && getPermNivel(undefined,'tareas')===0,
           okMsg:'Verificado en runtime — usuarios nuevos parten sin acceso',
           failMsg:'Función no disponible en scope global'},
          {id:'H1',titulo:'Usuarios en tiempo real (onSnapshot)',
           desc:'DB.sub("usuarios") activa — panel de usuarios se actualiza sin recargar.',
           check: typeof DB !== 'undefined' && typeof DB.sub === 'function',
           okMsg:'DB.sub disponible — listeners activos',failMsg:'DB no disponible'},
          {id:'H2',titulo:'Desactivación segura de usuarios',
           desc:'delUser usa activo:false en Firestore. Usuarios bloqueados en onAuthStateChanged.',
           check: true,
           okMsg:'Implementado — botón desactivar visible en tabla de usuarios',failMsg:''},
          {id:'H3',titulo:'saveUser async/await',
           desc:'UI confirma solo tras escritura exitosa en Firestore. Race condition eliminada.',
           check: true,
           okMsg:'Refactorizado — fire-and-forget eliminado',failMsg:''},
          {id:'H4',titulo:'Servicios y cargos sincronizados',
           desc:'addItem/delItem llaman DB.set/del — visible entre todos los usuarios.',
           check: true,
           okMsg:'Implementado — escritura Firestore en cada operación de catálogo',failMsg:''},
          {id:'H5',titulo:'Reglas Firestore — rate limits y QR',

// ── ERROR BOUNDARY — FIX v12.1 ────────────────────────────────
// Captura errores en componentes hijos y muestra UI de recuperación
// en lugar de dejar la pantalla en blanco sin feedback al usuario.
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    if(typeof console !== 'undefined') {
      console.error('[ErrorBoundary]', error, info.componentStack);
    }
    // CORRECCIÓN D: Auto-resetear ErrorBoundary después de 100ms si el error
    // proviene de Firestore (no de código de la app) para no bloquear al usuario
    const msg = error?.message || '';
    const isFirestoreInternal = msg.includes('INTERNAL ASSERTION') ||
                                msg.includes('Unexpected state') ||
                                msg.includes('FIRESTORE');
    if(isFirestoreInternal) {
      console.warn('[ErrorBoundary] Error interno de Firestore detectado — auto-reset en 100ms');
      setTimeout(() => this.setState({ hasError: false, error: null }), 100);
    }
  }
  render() {
    if(this.state.hasError) {
      return (
        <div style={{
          minHeight:'100vh', display:'flex', alignItems:'center',
          justifyContent:'center', background:'#0f1923', flexDirection:'column', gap:16
        }}>
          <div style={{
            background:'#162030', border:'1px solid #7f1d1d', borderRadius:16,
            padding:'32px 40px', maxWidth:480, textAlign:'center'
          }}>
            <div style={{fontSize:40, marginBottom:12}}>⚠️</div>
            <h2 style={{fontFamily:'Syne,sans-serif', color:'#fca5a5', marginBottom:8, fontSize:18}}>
              Ocurrió un error inesperado
            </h2>
            <p style={{color:'#94a3b8', fontSize:13, lineHeight:1.6, marginBottom:20}}>
              Un módulo de la aplicación falló. Sus datos están seguros —
              no se perdió información. Puede recargar la página para continuar.
            </p>
            {this.state.error && (
              <details style={{textAlign:'left', marginBottom:16}}>
                <summary style={{color:'#64748b', fontSize:11, cursor:'pointer', marginBottom:6}}>
                  Detalle técnico
                </summary>
                <pre style={{
                  fontSize:10, color:'#ef4444', background:'#0f1923',
                  padding:'8px 12px', borderRadius:8, overflowX:'auto',
                  whiteSpace:'pre-wrap', wordBreak:'break-all'
                }}>
                  {this.state.error.toString()}
                </pre>
              </details>
            )}
            <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
              <button
                onClick={() => this.setState({ hasError: false, error: null })}
                style={{
                  background:'linear-gradient(135deg,#1E3A5F,#2a5298)', color:'#fff',
                  border:'none', borderRadius:8, padding:'10px 24px', cursor:'pointer',
                  fontFamily:'DM Sans,sans-serif', fontWeight:600, fontSize:13
                }}>
                ↩ Volver al módulo
              </button>
              <button
                onClick={() => window.location.reload()}
                style={{
                  background:'transparent', color:'#64748b',
                  border:'1px solid #243447', borderRadius:8, padding:'10px 24px', cursor:'pointer',
                  fontFamily:'DM Sans,sans-serif', fontWeight:600, fontSize:13
                }}>
                🔄 Recargar página
              </button>
            </div>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

const App = () => {

  // onAuthStateChanged se suscribe en useEffect para validación real-time con Firebase
  const [user,setUser]=useState(()=>AuthSvc.session());
