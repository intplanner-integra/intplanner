        return 'Del 01 al '+lastDay+' de '+MESES[mesAnt.getMonth()]+' de '+mesAnt.getFullYear();
      })();
      txt(periodoTxt, M+72, y+19);
      // C-item18: tipo de informe (etiqueta neutral)
      txt(cli?'Por Cliente':tipo==='ejecutivo'?'Ejecutivo':tipo==='operativo'?'Operativo':tipo==='integrante'?'Por Integrante':'Por Cliente', M+132, y+19);
      y += 32;

      // C-item12: Introducción personalizable
      // Texto de introducción: prioridad → textosSeccion → introInforme → cfg.introInforme
      const introText = pCfg.textosSeccion?.introduccion?.trim()
        || introInforme || cfg.introInforme || '';
      if(introText.trim() && pCfg.mostrarIntroduccion !== false) {
        chkPage(28);
        sectionHeader('INTRODUCCION');
        doc.setFont('helvetica','normal'); setColor(C.textR,true); doc.setFontSize(8.5);
        const introLines = doc.splitTextToSize(cleanTxt(introText), IW-6);
        introLines.forEach(ln => { chkPage(8); txt(ln, M+3, y); y += 5.5; });
        y += 6; hrLine(y); y += 8;
      }

      // ── KPIs resumen ─────────────────────────────────────────
      if(pCfg.mostrarKPIs !== false && secVisible('kpis')) {
      sectionHeader(secTitulo('kpis','RESUMEN EJECUTIVO'));
      const kW = (IW-6)/4;
      kpiBox('Tareas Totales',  tareasF.length,'', M,        y, kW, C.navyR);
      kpiBox('Completadas',     tComp+'  ('+pctComp+'%)','', M+kW+2,  y, kW, C.greenR);
      kpiBox('En Curso',        tCurso,'',                   M+(kW+2)*2,y, kW, C.amberR);
      kpiBox('Vencidas',        tVenc,'',                    M+(kW+2)*3,y, kW, C.redR);
      y += 30;
      hrLine(y); y += 6;
      } // fin mostrarKPIs

      // ── Clientes activos ─────────────────────────────────────
      // FIX EXP-2: Filtrar clientes según clienteId — en informe "Por Cliente"
      // solo se muestra el cliente seleccionado, no todos.
      const clientesF = clienteId ? clientes.filter(c=>c.id===clienteId) : clientes;
      // ITEM-2: Título sin contador numérico → solo "CLIENTE"
      sectionHeader('CLIENTE');
      // ITEM-3: Tabla con Dirigido a / NIT / Email / Contacto — sin Telefono ni Tareas
      const colWidthsCli = [55, 30, 55, 42];
      tableRow(['Dirigido a','NIT','Email','Contacto'], colWidthsCli, y, true);
      y += 8;
      clientesF.forEach((c,i)=>{
        chkPage(8);
        y += tableRow([
          cleanTxt(toTitleCase(c.nombre||'—')),
          c.nit||'—',
          c.email||'—',
          cleanTxt(c.contacto||'—'),
        ], colWidthsCli, y, false, i%2===0);
      });
      y += 8; hrLine(y); y += 8;

      // ── PÁGINA 2 — TAREAS ────────────────────────────────────
      if((tipo!=='ejecutivo' || tareasF.length>0) && pCfg.mostrarSeccionTareas !== false && secVisible('tareas')){
        chkPage(20);
        sectionHeader('TAREAS ('+tareasF.length+')');

        // ══════════════════════════════════════════════════════════════════════
        // SECCIÓN TAREAS POR ÁREA DE ESPECIALIDAD
        // FIX v3: La organización por área aplica a TODOS los tipos de informe.
        // El bloque anterior solo activaba áreas con clienteId (bug corregido).
        // Para tipo='integrante' (miembro) se usa la vista estándar por ser
        // un informe personal que no requiere separación por área institucional.
        // Columnas: Desc=74 · Resp=52 · Estado=24 · Fecha=32 → Total=182=IW ✓
        // ══════════════════════════════════════════════════════════════════════

        // Definición canónica de áreas — orden institucional requerido
        const AREAS_DEF_PDF = [
          { key: 'administracion_personal',
            label: 'ADMINISTRACION DE PERSONAL',
            responsable: 'Equipo Integra Consultores',
            colorR: [30, 64, 175] },
          { key: 'gestion_sst',
            label: 'GESTION SST',
            responsable: 'Equipo Integra Consultores',
            colorR: [220, 38, 38] },
          { key: 'consultoria_juridica',
            label: 'CONSULTORIA JURIDICA',
            responsable: 'Equipo Integra Consultores',
            colorR: [88, 28, 135] },
          { key: 'gestion_operativa',
            label: 'GESTION OPERATIVA',
            responsable: 'Equipo Integra Consultores',
            colorR: C.navyR },
          { key: 'gestion_calidad',
            label: 'GESTION DE CALIDAD',
            responsable: 'Equipo Integra Consultores',
            colorR: C.tealR },
          { key: 'ambiental',
            label: 'AMBIENTAL',
            responsable: 'Equipo Integra Consultores',
            colorR: [34, 197, 94] },
          { key: 'i_d',
            label: 'INVESTIGACION Y DESARROLLO (I+D)',
            responsable: 'Equipo Integra Consultores',
            colorR: [234, 88, 12] },
        ];

        // Columnas definitivas — suma exacta 182mm = IW
        const CW_AREA = [74, 52, 24, 32];
        const PAD_AREA = 3;

        // ── Helper: renderizar una fila de actividad ─────────────────────────
        // Opera con closure sobre (y, doc, M, IW, PW, C, CW_AREA, PAD_AREA)
        // Modifica y directamente por closure (mismo patrón que chkPage/tableRow).
        const renderFilaActividad = (t, rowIdx) => {
          // Resolver responsable(s) — soporta multi-responsable
          const rIds = Array.isArray(t.responsablesIds) && t.responsablesIds.length
            ? t.responsablesIds
            : (t.responsableId ? [t.responsableId] : []);
          const respTxt = rIds.map(rid => equipo.find(e => e.id === rid)?.nombre)
            .filter(Boolean).join(', ') || '—';
          const textoAct = t.reporteInforme || t.actividadesRealizadas || t.titulo || '—';

          // Fase 6: 3 columnas — Descripción · Responsable · Fecha Cumplimiento
          const CW3 = [CW_AREA[0], CW_AREA[1] + CW_AREA[2], CW_AREA[3]]; // 74, 76, 32
          doc.setFontSize(7.5);
          const descLines = doc.splitTextToSize(cleanTxt(textoAct), CW3[0] - PAD_AREA * 2);
          const respLine  = doc.splitTextToSize(cleanTxt(respTxt),  CW3[1] - PAD_AREA * 2)[0] || '—';
          const rowH      = Math.max(10, descLines.length * 5 + 4);
          chkPage(rowH + 4);

          // Fondo alternado
          doc.setFillColor(...(rowIdx % 2 === 0 ? [241, 245, 249] : [255, 255, 255]));
          doc.rect(M, y, IW, rowH, 'F');

          // Línea inferior de fila
          doc.setDrawColor(...C.lineR); doc.setLineWidth(.2);
          doc.line(M, y + rowH, PW - M, y + rowH);

          // Separadores verticales entre columnas
          let cx = M;
          CW3.forEach((w, ci) => {
            cx += w;
            if (ci < CW3.length - 1) {
              doc.setDrawColor(210, 218, 230); doc.setLineWidth(.15);
              doc.line(cx, y + 1, cx, y + rowH - 1);
            }
          });

          // Col 1: Descripción (multi-línea, centrada verticalmente)
          doc.setTextColor(...C.textR);
          doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5);
          const descBlockH = descLines.length * 5;
          const descTopY   = y + (rowH - descBlockH) / 2 + 4;
          descLines.forEach((ln, li) => txt(ln, M + PAD_AREA, descTopY + li * 5));

          // Col 2: Responsable (negrita)
          doc.setTextColor(...C.textR);
          doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5);
          txt(respLine, M + CW3[0] + PAD_AREA, y + rowH / 2 + 1.5);

          // Col 3: Fecha de Cumplimiento (centrada, color verde si existe)
          const fechaCump = t.fechaCumplimiento || t.fechaVen || '—';
          const fechaStr  = fmt.date(fechaCump);
          doc.setTextColor(...(t.fechaCumplimiento ? C.greenR : C.mutedR));
          doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5);
          const col3X = M + CW3[0] + CW3[1];
          txt(fechaStr, col3X + CW3[2] / 2, y + rowH / 2 + 1.5, { align: 'center' });

          y += rowH; // avanzar cursor
        };

        // ── Helper: banner de sección de área ────────────────────────────────
        const renderBannerArea = (label, responsable, colorR, count) => {
          chkPage(24);
          // Fondo de área con acento dorado izquierdo
          doc.setFillColor(...colorR); doc.rect(M, y, IW, 14, 'F');
          doc.setFillColor(...C.goldR); doc.rect(M, y, 3, 14, 'F');
          // Título del área (línea superior)
          doc.setTextColor(255, 255, 255);
          doc.setFont('helvetica', 'bold'); doc.setFontSize(8.5);
          txt(label, M + 7, y + 6);
          // Responsable + conteo (línea inferior)
          doc.setTextColor(...C.goldR);
          doc.setFont('helvetica', 'normal'); doc.setFontSize(7);
          txt('Responsable: ' + responsable + '   |   ' +
              count + ' actividad' + (count !== 1 ? 'es' : ''),
              M + 7, y + 11.5);
          y += 17;
        };

        // ── RUTA A: Informe por áreas — se activa en todos los tipos EXCEPTO integrante
        if (!miembro) {
          let hayActividadesEnAreas = false;

          AREAS_DEF_PDF.forEach(area => {
            const tareasDeArea = tareasF.filter(t => t.areaEspecialidad === area.key);
            if (tareasDeArea.length === 0) return; // área vacía → omitir
            hayActividadesEnAreas = true;

            renderBannerArea(area.label, area.responsable, area.colorR, tareasDeArea.length);

            // Encabezado de tabla — sin columna Estado, conservar Fecha Cumpl.
            tableRow(['Descripcion de la Actividad', 'Responsable', 'Fecha Cumpl.'],
                     [CW_AREA[0], CW_AREA[1]+CW_AREA[2], CW_AREA[3]], y, true);
            y += 8;

            // Filas de actividades (máx 30 por área para no saturar el PDF)
            const MAX_POR_AREA = 30;
            tareasDeArea.slice(0, MAX_POR_AREA).forEach((t, i) => renderFilaActividad(t, i));

            // Aviso de truncación
            if (tareasDeArea.length > MAX_POR_AREA) {
              chkPage(10);
              doc.setFillColor(241, 245, 249); doc.rect(M, y, IW, 8, 'F');
              doc.setTextColor(...C.amberR);
              doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5);
              txt('Se muestran ' + MAX_POR_AREA + ' de ' + tareasDeArea.length +
                  ' actividades. Use Exportar Excel para el listado completo.',
                  M + 4, y + 5.5);
              y += 10;
            }
            y += 6;
          });

          // ── Actividades sin área clasificada ────────────────────────────────
          const tareasNoClasif = tareasF.filter(
            t => !t.areaEspecialidad || t.areaEspecialidad.trim() === ''
          );

          if (tareasNoClasif.length > 0) {
            chkPage(24);
            // Banner gris para actividades sin clasificar
            doc.setFillColor(100, 116, 139); doc.rect(M, y, IW, 14, 'F');
            doc.setFillColor(...C.goldR); doc.rect(M, y, 3, 14, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFont('helvetica', 'bold'); doc.setFontSize(8.5);
            txt('ACTIVIDADES SIN AREA ASIGNADA (' + tareasNoClasif.length + ')', M + 7, y + 6);
            doc.setTextColor(...C.goldR);
            doc.setFont('helvetica', 'normal'); doc.setFontSize(7);
            txt('Estas actividades no tienen area de especialidad registrada', M + 7, y + 11.5);
            y += 17;

            tableRow(['Descripcion de la Actividad', 'Responsable', 'Fecha Cumpl.'],
                     [CW_AREA[0], CW_AREA[1]+CW_AREA[2], CW_AREA[3]], y, true);
            y += 8;
            tareasNoClasif.slice(0, 20).forEach((t, i) => renderFilaActividad(t, i));
            y += 6;
          }

          // ── Si no hay NINGUNA actividad clasificada ni sin clasificar ────────
          if (!hayActividadesEnAreas && tareasNoClasif.length === 0 && tareasF.length > 0) {
            // Fallback: mostrar tabla plana
            chkPage(12);
            tableRow(['Tarea', 'Responsable', 'Fecha Cumpl.', 'Prioridad'],
                     [78, 40, 32, 32], y, true);
            y += 8;
            tareasF.slice(0, 50).forEach((t, i) => {
              chkPage(9);
              const resp = equipo.find(e => e.id === t.responsableId)?.nombre || '—';
              y += tableRow([cleanTxt(t.titulo), cleanTxt(resp),
                             fmt.date(t.fechaCumplimiento||t.fechaVen), t.prioridad || '—'],
                            [78, 40, 32, 32], y, false, i % 2 === 0);
            });
          }

        } else {
          // ── RUTA B: Informe individual por integrante — vista estándar ───────
          // Para tipo='integrante', el detalle de tareas se renderiza en la sección
          // ACTIVIDADES/TAREAS ASIGNADAS que aparece más adelante en buildPDF.
          // Aquí mostramos una tabla resumen plana agrupada por mes si corresponde.
          const tareasStd = tareasF.slice(0, 50);
          const mesesDistintos = [...new Set(tareasStd.map(t => (t.fechaVen || '').substring(0, 7)))].filter(Boolean);
          const esMultiPeriodo = mesesDistintos.length > 1 && fIni && fFin;
          if (esMultiPeriodo) {
            const MESES_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                              'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            mesesDistintos.sort().forEach(mes => {
              const tareasDelMes = tareasStd
                .filter(t => (t.fechaVen || '').startsWith(mes))
                .sort((a, b) => (a.fechaVen || '') > (b.fechaVen || '') ? 1 : -1);
              if (!tareasDelMes.length) return;
              const [anio, numMes] = mes.split('-');
              chkPage(14);
              doc.setFillColor(...C.navyR); doc.rect(M, y, IW, 7, 'F');
              doc.setTextColor(...C.goldR);
              doc.setFont('helvetica', 'bold'); doc.setFontSize(8.5);
              txt(MESES_ES[parseInt(numMes) - 1] + ' ' + anio +
                  ' (' + tareasDelMes.length + ' tarea' + (tareasDelMes.length !== 1 ? 's' : '') + ')',
                  M + 4, y + 5);
              y += 10;
              tableRow(['Dia', 'Tarea', 'Responsable', 'Fecha Cumpl.'],
                       [14, 70, 48, 50], y, true);
              y += 8;
              tareasDelMes.forEach((t, i) => {
                chkPage(9);
                const resp = equipo.find(e => e.id === t.responsableId)?.nombre || '—';
                const dia  = (t.fechaVen || '').substring(8, 10) || '—';
                y += tableRow([dia, cleanTxt(t.titulo), cleanTxt(resp),
                               fmt.date(t.fechaCumplimiento||t.fechaVen)],
                              [14, 70, 48, 50], y, false, i % 2 === 0);
              });
              y += 6;
            });
          } else {
            chkPage(12);
            tableRow(['Tarea', 'Responsable', 'Fecha Cumpl.', 'Prioridad'],
                     [78, 40, 32, 32], y, true);
            y += 8;
            tareasStd.forEach((t, i) => {
              chkPage(9);
              const resp = equipo.find(e => e.id === t.responsableId)?.nombre || '—';
              y += tableRow([cleanTxt(t.titulo), cleanTxt(resp),
                             fmt.date(t.fechaCumplimiento||t.fechaVen), t.prioridad || '—'],
                            [78, 40, 32, 32], y, false, i % 2 === 0);
            });
          }
        }
        // Separador de sección — se renderiza siempre tras el bloque de tareas
        y += 8; hrLine(y); y += 8;
      }

      // ── PROYECTOS ────────────────────────────────────────────
      if(proyF.length>0){
        chkPage(20);
        sectionHeader('PROYECTOS ('+proyF.length+')');
        tableRow(['Proyecto','Estado','Inicio','Fin','% Avance'],[66,26,26,26,38],y,true);
        y += 8;
        proyF.forEach((p,i)=>{
          chkPage(9);
          y += tableRow([p.nombre,p.estado||'—',fmt.date(p.inicio),fmt.date(p.fin),(p.avance||0)+'%'],[66,26,26,26,38],y,false,i%2===0);
        });
        y += 8; hrLine(y); y += 8;
      }

      // ── FACTURACIÓN ──────────────────────────────────────────
      if(facF.length>0 && tipo!=='cliente' && pCfg.mostrarSeccionFacturas !== false && secVisible('facturas')){
        chkPage(20);
        sectionHeader('FACTURACION ('+facF.length+')');

        tableRow(['No.','Cliente','Valor','Estado','Emision','Venc.'],[16,56,34,22,24,30],y,true);
        y += 8;
        facF.slice(0,40).forEach((f,i)=>{
          chkPage(9);
          const vt = (Number(f.valor)||0)*(f.iva?1.19:1);
          const cliNom = clientes.find(c=>c.id===f.clienteId)?.nombre||'—';
          y += tableRow([f.numero||'—',cleanTxt(cliNom),fmt.cop(vt),f.estado,fmt.date(f.fechaEmision),fmt.date(f.fechaVen)],[16,56,34,22,24,30],y,false,i%2===0);
        });
        // FIX EXP-8: Aviso de truncación con cuenta exacta
        if(facF.length>40){
          chkPage(10);
          setColor([241,245,249]); doc.rect(M,y,IW,8,'F');
          setColor(C.amberR,true); doc.setFontSize(7.5); doc.setFont('helvetica','bold');
          txt('Se muestran 40 de '+facF.length+' facturas. Use Exportar Excel para el listado completo.', M+4, y+5.5);
          y += 10;
        }
        // C-item22: Eliminar fila de totales financieros del Informe de Gestión
        y += 8; hrLine(y); y += 8;
      }

      // ── ANTICIPOS / GASTOS ───────────────────────────────────
      if(antF.length>0 && tipo!=='ejecutivo' && pCfg.mostrarSeccionAnticipo !== false && secVisible('anticipos')){
        chkPage(20);
        sectionHeader('ANTICIPOS Y GASTOS ('+antF.length+')');
        tableRow(['Solicitante','Valor Sol.','Total Gastos','Saldo','Estado'],[46,34,34,34,34],y,true);
        y += 8;
        antF.slice(0,30).forEach((a,i)=>{
          chkPage(9);
          const sol  = equipo.find(e=>e.id===a.solicitanteId)?.nombre||'—';
          const tg   = (a.gastos||[]).reduce((s,g)=>s+Number(g.monto||0),0);
          const vs   = Number(a.valorSolicitado)||0;
          const saldo= vs - tg;
          y += tableRow([sol,fmt.cop(vs),fmt.cop(tg),fmt.cop(saldo),a.estado||'—'],[46,34,34,34,34],y,false,i%2===0);
        });
        if(antF.length>30){
          chkPage(10);
          setColor([241,245,249]); doc.rect(M,y,IW,8,'F');
          setColor(C.amberR,true); doc.setFontSize(7.5); doc.setFont('helvetica','bold');
          txt('⚠ Se muestran 30 de '+antF.length+' anticipos. Use Exportar Excel para el listado completo.', M+4, y+5.5);
          y += 10;
        }
        y += 8; hrLine(y); y += 8;
      }

      // ── EQUIPO ───────────────────────────────────────────────
      if(tipo==='operativo' && pCfg.mostrarSeccionEquipo !== false && secVisible('equipo')){
        chkPage(20);
        // FIX EXP-4: Calcular consultores con tareas en el scope del informe.
        // Si es informe por cliente, mostrar solo los consultores con tareas asignadas a ese cliente.
        // Si es informe global, mostrar todo el equipo (comportamiento original correcto).
        const equipoConTareas = clienteId
          ? equipo.filter(e => tareasF.some(t => t.responsableId === e.id))
          : equipo;
        const equipoMostrar = equipoConTareas.length > 0 ? equipoConTareas : equipo;
        sectionHeader('EQUIPO ('+equipoMostrar.length+(clienteId?' - asignados a este cliente':'')+')');

        // Mini ranking productividad (solo consultores relevantes al scope)
        // barChart de ranking eliminado — diseño sin barras de progreso

        // EQ-4 FIX: Tabla con datos de actividad real por integrante (no solo directorio)
        tableRow(['Nombre','Cargo','Total','Comp.','En Curso','Venc.','%'],[46,34,16,16,18,16,14],y,true);
        y += 8;
        equipoMostrar.forEach((e,i)=>{
          chkPage(9);
          const eTareas = tareasF.filter(t=>t.responsableId===e.id);
          const eComp   = eTareas.filter(t=>t.estado==='completada').length;
          const eCurso  = eTareas.filter(t=>t.estado==='en_curso').length;
          const eVenc   = eTareas.filter(t=>t.fechaVen&&t.fechaVen<hoy.toISOString().split('T')[0]&&t.estado!=='completada').length;
          const ePct    = eTareas.length>0?Math.round(eComp/eTareas.length*100):0;
          y += tableRow([e.nombre,e.cargo||'—',eTareas.length,eComp,eCurso,eVenc,ePct+'%'],[46,34,16,16,18,16,14],y,false,i%2===0);
        });
        y += 6;
      }

      // ── INFORME INDIVIDUAL POR INTEGRANTE ────────────────────
      // EQ-3/EQ-4/EQ-7 FIX: Sección completa para tipo='integrante'.
      // Se activa cuando responsableId está presente (informe de una persona).
      // Incluye: tarjeta de perfil, KPIs de productividad y detalle por tarea.
      if(miembro){
        chkPage(20);
        // Tarjeta de perfil del integrante
        setColor(C.navyR); doc.rect(M,y,IW,28,'F');
        setColor(C.goldR); doc.rect(M,y,3,28,'F');

        // Avatar inicial
        setColor(C.goldR,true); doc.setFont('helvetica','bold'); doc.setFontSize(18);
        txt((miembro.nombre||'?').charAt(0).toUpperCase(), M+15, y+18);

        // Datos del perfil
        setColor([255,255,255],true); doc.setFont('helvetica','bold'); doc.setFontSize(12);
        txt(miembro.nombre||'—', M+28, y+10);
        doc.setFont('helvetica','normal'); doc.setFontSize(9);
        txt(miembro.cargo||'Sin cargo', M+28, y+17);
        setColor(C.goldR,true); doc.setFontSize(8);
        txt((miembro.email||'')+(miembro.telefono?' | '+miembro.telefono:''), M+28, y+23);
        y += 34;

        // KPIs de productividad del integrante
        chkPage(28);
        const miTareas  = tareasF; // ya filtradas por responsableId
        const miComp    = miTareas.filter(t=>t.estado==='completada').length;
        const miCurso   = miTareas.filter(t=>t.estado==='en_curso').length;
        const miVenc    = miTareas.filter(t=>t.fechaVen&&t.fechaVen<hoy.toISOString().split('T')[0]&&t.estado!=='completada').length;
        const miPct     = miTareas.length>0?Math.round(miComp/miTareas.length*100):0;
        const miAntF    = antF; // ya filtrados por solicitanteId
        const miAntMonto= miAntF.reduce((s,a)=>(a.gastos||[]).reduce((ss,g)=>ss+Number(g.monto||0),0)+s,0);

        const kW2 = (IW-10)/5;
        kpiBox('Total Tareas',  miTareas.length, '',          M,           y, kW2, C.navyR);
        kpiBox('Completadas',   miComp,          '',          M+kW2+2,     y, kW2, C.greenR);
        kpiBox('En Curso',      miCurso,         '',          M+(kW2+2)*2, y, kW2, C.amberR);
        kpiBox('Vencidas',      miVenc,          '',          M+(kW2+2)*3, y, kW2, C.redR);
        kpiBox('Cumplimiento',  miPct+'%',       '',          M+(kW2+2)*4, y, kW2, C.tealR);
        y += 26;

        // KPI anticipos
        if(miAntF.length>0){
          chkPage(12);
          kpiBox('Anticipos Solicitados', miAntF.length,       '', M,      y, IW/2-1, C.navyR);
          kpiBox('Total Gastado (COP)',   fmt.cop(miAntMonto), '', M+IW/2+1,y, IW/2-1, C.amberR);
          y += 26;
        }

        hrLine(y); y += 6;

        // EQ-7 FIX: Detalle completo de actividades por tarea
        if(miTareas.length>0){
          chkPage(20);
          sectionHeader('ACTIVIDADES / TAREAS ASIGNADAS ('+miTareas.length+')');

          // Gráfico de distribución por estado
          // barChart de estado eliminado — diseño sin barras de progreso

          // Tabla detallada de actividades — sin columna Estado, conservar Fecha Cumpl.
          chkPage(12);
          tableRow(['Actividad / Tarea','Cliente','Prioridad','Fecha Cumpl.'],[82,40,22,38],y,true);
          y += 8;
          miTareas.slice(0,60).forEach((t,i)=>{
            chkPage(9);
            const cliNomT = clientes.find(c=>c.id===t.clienteId)?.nombre||'—';
            const fechaC  = t.fechaCumplimiento || t.fechaVen || '—';
            const isVencT = t.fechaVen&&t.fechaVen<hoy.toISOString().split('T')[0]&&t.estado!=='completada';
            if(isVencT){
              doc.setFillColor(153,27,27); doc.setFillOpacity(0.08);
              doc.rect(M,y,IW,8,'F'); doc.setFillOpacity(1);
            }
            y += tableRow([cleanTxt(t.titulo),cleanTxt(cliNomT),t.prioridad||'—',fmt.date(fechaC)],[82,40,22,38],y,false,!isVencT&&i%2===0);
            if(t.desc&&t.desc.trim()){
              chkPage(6);
              setColor(C.mutedR,true); doc.setFontSize(6.5); doc.setFont('helvetica','italic');
              const desc = doc.splitTextToSize(t.desc.trim().substring(0,120), IW-4)[0]||'';
              txt('   '+desc, M+2, y+1); y += 5;
              doc.setFont('helvetica','normal');
            }
          });
          if(miTareas.length>60){
            chkPage(10);
            setColor([241,245,249]); doc.rect(M,y,IW,8,'F');
            setColor(C.amberR,true); doc.setFontSize(7.5); doc.setFont('helvetica','bold');
            txt('⚠ Se muestran 60 de '+miTareas.length+' tareas. Use Exportar Excel para el listado completo.', M+4, y+5.5);
            y += 10;
          }
          y += 8; hrLine(y); y += 8;
        }

        // Detalle de anticipos del integrante
        if(miAntF.length>0){
          chkPage(20);
          sectionHeader('ANTICIPOS Y GASTOS DEL INTEGRANTE ('+miAntF.length+')');
          tableRow(['Descripción / Concepto','Solicitado','Gastado','Saldo','Estado'],[50,30,30,30,22],y,true);
          y += 8;
          miAntF.slice(0,20).forEach((a,i)=>{
            chkPage(9);
            const tg   = (a.gastos||[]).reduce((s,g)=>s+Number(g.monto||0),0);
            const vs   = Number(a.valorSolicitado)||0;
            y += tableRow([a.descripcion||'Anticipo',fmt.cop(vs),fmt.cop(tg),fmt.cop(vs-tg),a.estado||'—'],[50,30,30,30,22],y,false,i%2===0);
          });
          y += 8; hrLine(y); y += 8;
        }

        // Clientes con los que trabajó el integrante
        const clientesMiembro = clientes.filter(c=>tareasF.some(t=>t.clienteId===c.id));
        if(clientesMiembro.length>0){
          chkPage(18);
          sectionHeader('CLIENTES ATENDIDOS ('+clientesMiembro.length+')');
          tableRow(['Cliente','NIT','Tareas Asignadas','Completadas'],[60,30,46,46],y,true);
          y += 8;
          clientesMiembro.forEach((c,i)=>{
            chkPage(9);
            const ct    = tareasF.filter(t=>t.clienteId===c.id).length;
            const cc    = tareasF.filter(t=>t.clienteId===c.id&&t.estado==='completada').length;
            y += tableRow([c.nombre,c.nit||'—',ct,cc],[60,30,46,46],y,false,i%2===0);
          });
          y += 8; hrLine(y); y += 8;
        }
      }

      // ── COMPROMISOS ──────────────────────────────────────────
      const todosComps = tareasF.flatMap(t=>(Array.isArray(t.compromisos)?t.compromisos:[]).map(c=>({...c,tareaTitle:t.titulo,clienteNombre:clientes.find(cl=>cl.id===t.clienteId)?.nombre||'—',fechaVenTarea:t.fechaVen,responsableIncumplimiento:t.responsableIncumplimiento,justificacion:t.justificacionIncumplimiento})));
      if(todosComps.length>0 && pCfg.mostrarSeccionCompromisos !== false && secVisible('compromisos')){
        chkPage(20);
        sectionHeader('COMPROMISOS REGISTRADOS ('+todosComps.length+')');
        const compIntegraPDF = todosComps.filter(c=>c.responsabilidad==='integra');
        const compClientePDF = todosComps.filter(c=>c.responsabilidad==='cliente');

        if(compIntegraPDF.length>0){
          chkPage(14);
          // Subencabezado Navy — Integra Consultores
          setColor(C.navyR); doc.rect(M,y,IW,10,'F');
          setColor(C.goldR); doc.rect(M,y,3,10,'F');
          setColor(C.goldR,true); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
          txt('INTEGRA CONSULTORES  (' + compIntegraPDF.length + (compIntegraPDF.length===1?' actividad':' actividades') + ')', M+7, y+7);
          y += 13;
          // Tabla: Actividad Asignada | Responsable | Descripción del Compromiso | Fecha
          tableRow(['Actividad Asignada','Responsable','Descripcion del Compromiso','Fecha'],
                   [48, 38, 72, 24], y, true);
          y += 8;
          compIntegraPDF.forEach((c,ci)=>{
            chkPage(8);
            const resp  = equipo.find(e=>e.id===c.empleadoId)?.nombre||'—';
            const activ = cleanTxt(c.tareaTitle?.substring(0,28)||'—');
            const desc  = cleanTxt((c.descripcion||'').substring(0,50)+(c.descripcion?.length>50?'...':''));
            y += tableRow([activ, cleanTxt(resp), desc, c.fechaCompromiso||'—'],
                          [48, 38, 72, 24], y, false, ci%2===0);
          });
          y += 8;
        }

        if(compClientePDF.length>0){
          chkPage(14);
          // Subencabezado Verde — Cliente
          const verdeComp = [21,128,61];
          setColor(verdeComp); doc.rect(M,y,IW,10,'F');
          setColor(C.goldR); doc.rect(M,y,3,10,'F');
          setColor([255,255,255],true); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
          txt('CLIENTE  (' + compClientePDF.length + (compClientePDF.length===1?' actividad':' actividades') + ')', M+7, y+7);
          y += 13;
          tableRow(['Actividad Asignada','Responsable','Descripcion del Compromiso','Fecha'],
                   [48, 38, 72, 24], y, true);
          y += 8;
          compClientePDF.forEach((c,ci)=>{
            chkPage(8);
            const activ = cleanTxt(c.tareaTitle?.substring(0,28)||'—');
            const resp  = cleanTxt(c.clienteNombre||'—');
            const desc  = cleanTxt((c.descripcion||'').substring(0,50)+(c.descripcion?.length>50?'...':''));
            y += tableRow([activ, resp, desc, c.fechaCompromiso||'—'],
                          [48, 38, 72, 24], y, false, ci%2===0);
          });
          y += 8; hrLine(y); y += 8;
        }
      }

      // C-item9: Tareas vencidas con justificación
      const tareasVencJust = tareasF.filter(t=>t.justificacionIncumplimiento&&t.justificacionIncumplimiento.trim());
      if(tareasVencJust.length>0 && pCfg.mostrarJustificaciones !== false && secVisible('justificaciones')){
        chkPage(20);
        sectionHeader('JUSTIFICACION DE INCUMPLIMIENTOS');
        tareasVencJust.forEach((t,i)=>{
          chkPage(16);
          setColor(i%2===0?[248,250,252]:[241,245,249]); doc.rect(M,y,IW,14,'F');
          setColor(C.navyR,true); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
          txt(cleanTxt(t.titulo.substring(0,60)), M+3, y+6);
          setColor(C.mutedR,true); doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
          txt('Responsable del incumplimiento: '+(t.responsableIncumplimiento==='cliente'?'Cliente':'INTEGRA CONSULTORES'), M+3, y+11);
          const justLines = doc.splitTextToSize(cleanTxt(t.justificacionIncumplimiento||''), IW-8);
          setColor(C.textR,true); doc.setFontSize(7);
          if(justLines[0]) txt(justLines[0], M+3, y+15);
          y += 16;
        });
        y+=8; hrLine(y); y+=8;
      }

      // ── RESPONSABLES DEL INFORME (sin firma) ─────────────────
      // MEJORA-1+2+3: Sección reestructurada — Firma eliminada.
      // Responsables listados por área de especialidad, sin cargo "Director General".
      if(pCfg.mostrarResponsablesInforme !== false) {
        chkPage(42);
        y += 6;
        // Usar responsablesPDF desde pCfg (SST) — configurable desde Personalizar
        const RESP_AREAS = (pCfg.responsablesPDF && pCfg.responsablesPDF.length)
          ? pCfg.responsablesPDF.map(r=>({nombre:r.nombre||'—', area:(r.area||r.cargo||'—'), cargo:r.cargo||''}))
          : [
              { nombre: 'Sara Valencia Hincapie',       area: 'Seguridad y Salud en el Trabajo (SST)' },
              { nombre: 'Adolfo de Jesus Ibanez Berrio', area: 'Administracion de Personal' },
              { nombre: 'Yair Alonso Cardona Lopez',     area: 'Consultoria Juridica' },
            ];
        const RESP_BOX_H = 10 * RESP_AREAS.length + 14;
        setColor([248,250,252]); doc.rect(M,y,IW,RESP_BOX_H,'F');
        doc.setDrawColor(...C.lineR); doc.setLineWidth(.3); doc.rect(M,y,IW,RESP_BOX_H,'S');
        setColor(C.goldR); doc.rect(M,y,3,RESP_BOX_H,'F');
        setColor(C.navyR,true); doc.setFont('helvetica','bold'); doc.setFontSize(9);
        txt('Responsables del Informe', M+8, y+8);
        doc.setDrawColor(...C.lineR); doc.setLineWidth(.2);
        doc.line(M+3, y+10, PW-M, y+10);
        let ry = y + 18;
        RESP_AREAS.forEach((r) => {
          setColor(C.textR,true); doc.setFont(FF,'bold'); doc.setFontSize(FS(8));
          txt(cleanTxt(r.nombre), M+8, ry);
          setColor(C.mutedR,true); doc.setFont(FF,'normal'); doc.setFontSize(FS(6.5));
          const areaLab = r.cargo ? cleanTxt(r.cargo)+' · '+cleanTxt(r.area) : cleanTxt(r.area);
          txt(areaLab, M+8, ry+5);
          // Línea de firma si está habilitada
          if(pCfg.mostrarFirmas) {
            doc.setDrawColor(...C.lineR); doc.setLineWidth(.2);
            doc.line(M+8, ry+10, M+60, ry+10);
            doc.setFontSize(5.5); setColor(C.mutedR,true);
            txt('Firma', M+8, ry+13);
          }
          ry += pCfg.mostrarFirmas ? 16 : 10;
        });
        y += RESP_BOX_H + 6;
      } // fin mostrarResponsablesInforme

      // ── SECCIONES PERSONALIZADAS (custom_*) — FASE 5 ─────────
      // Iterar pCfg.secciones ordenadas para renderizar secciones custom
      // que el usuario creó en Personalizar → Estructura.
      const seccionesOrdenPDF = [...(pCfg.secciones||[])].sort((a,b)=>a.orden-b.orden);
      seccionesOrdenPDF.filter(s => s.custom && s.visible).forEach(sec => {
        chkPage(30);
        y += SEC_GAP;
        sectionHeader(sec.titulo || sec.label || 'SECCIÓN PERSONALIZADA');
        // Renderizar como bloque de texto informativo
        doc.setFont(FF,'normal'); setColor(C.textR,true); doc.setFontSize(FS(8.5));
        const infoLines = doc.splitTextToSize(
          `Sección personalizada: "${sec.titulo || sec.label}". Configure el contenido desde Personalizar → Estructura.`,
          IW-6
        );
        infoLines.forEach(ln => { chkPage(8); txt(ln, M+3, y); y += 5.5; });
        y += 6; hrLine(y); y += SEC_GAP;
      });

      // ── CONCLUSIÓN (si existe en textosSeccion) ─────────────
      if(pCfg.textosSeccion?.conclusion?.trim()) {
        chkPage(25);
        sectionHeader('CONCLUSION');
        doc.setFont(FF,'normal'); setColor(C.textR,true); doc.setFontSize(FS(8.5));
        const conclLines = doc.splitTextToSize(cleanTxt(pCfg.textosSeccion.conclusion), IW-6);
        conclLines.forEach(ln=>{ chkPage(8); txt(ln,M+3,y); y+=5.5; });
        y+=6; hrLine(y); y+=8;
      }
      // ── OBSERVACIONES (si existe en textosSeccion) ──────────
      if(pCfg.textosSeccion?.observaciones?.trim()) {
        chkPage(25);
        sectionHeader('OBSERVACIONES');
        doc.setFont(FF,'normal'); setColor(C.textR,true); doc.setFontSize(FS(8.5));
        const obsLines = doc.splitTextToSize(cleanTxt(pCfg.textosSeccion.observaciones), IW-6);
        obsLines.forEach(ln=>{ chkPage(8); txt(ln,M+3,y); y+=5.5; });
        y+=6; hrLine(y); y+=8;
      }

      // Pie de página personalizado
      if(pCfg.piePersonalizado && pCfg.piePersonalizado.trim()) {
        const totalPgsF = doc.getNumberOfPages();
        for(let pp=1; pp<=totalPgsF; pp++) {
          doc.setPage(pp);
          doc.setFont('helvetica','italic'); doc.setFontSize(7);
          doc.setTextColor(...C.mutedR);
          doc.text(cleanTxt(pCfg.piePersonalizado), PW/2, PH-5, {align:'center'});
        }
      }
      // Notas adicionales
      if(pCfg.notasAdicionales && pCfg.notasAdicionales.trim()) {
        chkPage(20);
        sectionHeader('NOTAS ADICIONALES');
        doc.setFont('helvetica','normal'); setColor(C.textR,true); doc.setFontSize(8);
        const notaLines = doc.splitTextToSize(cleanTxt(pCfg.notasAdicionales), IW-6);
        notaLines.forEach(ln => { chkPage(7); txt(ln, M+3, y); y += 5.5; });
        y += 6;
      }

      // Footer en todas las páginas
      drawFooter();

      // Guardar
      const fname = 'Informe_'+(miembro?.nombre||cli?.nombre||tipo)+'_'+hoy.toISOString().split('T')[0]+'.pdf';
      doc.save(fname);
      toast('PDF generado: '+fname,'success');
    } catch(e){ console.error(e); toast('Error generando PDF: '+e.message,'error'); }
  };

  // Vista previa en pantalla
  // EQ-8 FIX: calcPreview ahora calcula métricas según el tipo activo.
  // Para tipo='integrante' muestra KPIs del miembro seleccionado.
  // Para otros tipos mantiene el comportamiento original (scope cliente/global).
  const calcPreview = () => {
    if(tipo==='integrante'){
      // Scope: integrante
      const miembro  = filEquipo ? equipo.find(e=>e.id===filEquipo) : null;
      const mNombre  = miembro?.nombre || 'Todos los integrantes';
      const tareasM  = tareas.filter(t=>{
        if(t.esAlerta) return false;
        if(filEquipo){
          const rIds = Array.isArray(t.responsablesIds)&&t.responsablesIds.length ? t.responsablesIds : (t.responsableId?[t.responsableId]:[]);
          if(!rIds.includes(filEquipo)) return false;
        }
        if(fIni && t.fechaVen && t.fechaVen<fIni) return false;
        if(fFin && t.fechaVen && t.fechaVen>fFin) return false;
        return true;
      });
      const antM     = getAnticipo().filter(a=>!filEquipo||a.solicitanteId===filEquipo);
      const tComp    = tareasM.filter(t=>t.estado==='completada').length;
      const tVenc    = tareasM.filter(t=>t.fechaVen&&t.fechaVen<new Date().toISOString().split('T')[0]&&t.estado!=='completada').length;
      const pct      = tareasM.length>0?Math.round(tComp/tareasM.length*100):0;
      const antMonto = antM.reduce((s,a)=>(a.gastos||[]).reduce((ss,g)=>ss+Number(g.monto||0),0)+s,0);
      const cliAtend = new Set(tareasM.map(t=>t.clienteId).filter(Boolean)).size;
      setPreview({
        esIntegrante:true,
        mNombre, cargo:miembro?.cargo||'—',
        nTareas:tareasM.length, tComp, tVenc, pct,
        nAnt:antM.length, antMonto, cliAtend,
        cliNom:mNombre, totalFac:0, totalCob:0, nFacturas:0, nProyectos:0,
      });
    } else {
      // Scope: cliente/global (comportamiento original)
      const cliNom = filCli ? clientes.find(c=>c.id===filCli)?.nombre||'—' : 'General';
      const tareasF = tareas.filter(t=>(!filCli||t.clienteId===filCli)&&(!fIni||t.fechaVen>=fIni)&&(!fFin||t.fechaVen<=fFin));
      const facF    = facturas.filter(f=>(!filCli||f.clienteId===filCli)&&(!fIni||f.fechaEmision>=fIni)&&(!fFin||f.fechaEmision<=fFin));
      const ant     = getAnticipo().filter(a=>!filCli||a.cargaCliente===filCli);
      const totalFac= facF.reduce((a,f)=>a+Number(f.valor||0)*(f.iva?1.19:1),0);
      const totalCob= facF.filter(f=>['Pagada','pagada','Paz y Salvo'].includes(f.estado)).reduce((a,f)=>a+Number(f.valor||0)*(f.iva?1.19:1),0);
      const tComp   = tareasF.filter(t=>t.estado==='completada').length;
      const pct     = tareasF.length>0?Math.round(tComp/tareasF.length*100):0;
      setPreview({
        esIntegrante:false,
        cliNom,nTareas:tareasF.length,nFacturas:facF.length,nAnt:ant.length,
        totalFac,totalCob,pct,
        nProyectos:proyectos.filter(p=>!filCli||p.clienteId===filCli).length
      });
    }
  };

  const COL_TIPO = {
    ejecutivo:  {c:'#1E3A5F',l:'Resumen Ejecutivo', d:'KPIs, Clientes, Tareas, Facturación'},
    operativo:  {c:'#0F766E',l:'Operativo',          d:'Todo anterior + Equipo, Anticipos, Proyectos'},
    cliente:    {c:'#7C3AED',l:'Por Cliente',         d:'Informe individual por cliente seleccionado'},
    // EQ-3 FIX: Nuevo tipo para informe individual por integrante del equipo
    integrante: {c:'#B45309',l:'Por Integrante',      d:'Perfil, actividades y KPIs de un consultor'},
  };

  return <div className="fade" style={{display:'flex',flexDirection:'column',gap:14}}>

    {/* EXCEL */}
    <div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:14,display:'flex',alignItems:'center',gap:8}}><Ico n="excel" s={16} c="#1A6B3A"/>Exportar Excel</h3>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10,marginBottom:12}}>
        <div>
          <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6}}>Módulo</label>
          <select className="inp" value={mod} onChange={e=>setMod(e.target.value)}>
            {['Resumen','Tareas','Clientes','Equipo','Facturación'].map(m=><option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        <div><label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6}}>Fecha Inicio</label><input type="date" className="inp" value={xlsFIni} onChange={e=>setXlsFIni(e.target.value)}/></div>
        <div><label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6}}>Fecha Fin</label><input type="date" className="inp" value={xlsFFin} onChange={e=>setXlsFFin(e.target.value)}/></div>
        <div style={{display:'flex',alignItems:'flex-end'}}><button onClick={exportXLSX} className="btn btn-g btn-sm" style={{width:'100%'}}><Ico n="down" s={13}/>Descargar Excel</button></div>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {['Q1','Q2','Q3','Q4'].map(q=>['2025','2026'].map(y=><button key={q+y} onClick={()=>setQ(q,y,'xls')} className="btn btn-ghost btn-sm" style={{fontSize:11}}>{q} {y}</button>))}
        <button onClick={()=>{setXlsFIni('');setXlsFFin('');}} className="btn btn-ghost btn-sm" style={{fontSize:11}}>✕ Limpiar</button>
      </div>
    </div>

    {/* PDF PROFESIONAL */}
    <div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:14,display:'flex',alignItems:'center',gap:8}}><Ico n="pdf" s={16} c="#C9A84C"/>Informe PDF Profesional</h3>

      {/* C-item12: Introducción personalizable para Informes de Gestión */}
      <div style={{marginBottom:16,padding:'12px 14px',borderRadius:10,border:'1px solid rgba(201,168,76,.25)',background:'rgba(201,168,76,.05)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <p style={{fontSize:11,fontWeight:700,color:'#C9A84C',textTransform:'uppercase',letterSpacing:'.4px',margin:0}}>📝 Introducción del Informe (opcional)</p>
          <button type="button" onClick={()=>setEditingIntro(p=>!p)} style={{fontSize:11,color:'#64748b',background:'none',border:'1px solid #334155',borderRadius:6,padding:'2px 10px',cursor:'pointer'}}>{editingIntro?'Colapsar':'Editar'}</button>
        </div>
        {!editingIntro&&introInforme&&<p style={{fontSize:12,color:'#94a3b8',margin:0,lineHeight:1.5}}>{introInforme.substring(0,120)}{introInforme.length>120?'...':''}</p>}
        {!editingIntro&&!introInforme&&<p style={{fontSize:11,color:'#475569',margin:0,fontStyle:'italic'}}>Sin introducción configurada. Se omitirá en el PDF.</p>}
        {editingIntro&&<>
          <textarea className="inp" value={introInforme} onChange={e=>{setIntroInforme(e.target.value);localStorage.setItem('ip_intro_informe',e.target.value);}} rows={4} placeholder="Escriba el texto introductorio que aparecerá al inicio de cada Informe de Gestión. Puede editar antes de generar el PDF." style={{width:'100%',marginTop:6,fontSize:12}}/>
          <p style={{fontSize:10,color:'#475569',margin:'4px 0 0'}}>Se guarda automáticamente y puede modificarse antes de generar cada informe.</p>
        </>}
      </div>

      {/* Selector tipo informe — 4 tipos: ejecutivo, operativo, cliente, integrante */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
        {Object.entries(COL_TIPO).map(([k,v])=>(
          <div key={k} onClick={()=>{
            setTipo(k);
            // Al seleccionar 'integrante', limpiar filCli para evitar doble filtro confuso
            if(k==='integrante') setFilCli('');
            // Al seleccionar 'cliente', limpiar filEquipo
            if(k==='cliente') setFilEquipo('');
          }} style={{padding:'12px 14px',borderRadius:10,border:'2px solid',cursor:'pointer',transition:'all .15s',
            borderColor:tipo===k?v.c:'#243447',background:tipo===k?v.c+'18':'#0f1923'}}>
            <p style={{fontWeight:700,fontSize:13,color:tipo===k?v.c:'#94a3b8',margin:'0 0 3px'}}>{v.l}</p>
            <p style={{fontSize:11,color:'#475569',margin:0}}>{v.d}</p>
            {k==='cliente'&&tipo===k&&!filCli&&(
              <p style={{fontSize:10,color:'#f59e0b',margin:'5px 0 0',fontWeight:600}}>⚠ Seleccione un cliente abajo</p>
            )}
            {k==='integrante'&&tipo===k&&!filEquipo&&(
              <p style={{fontSize:10,color:'#f59e0b',margin:'5px 0 0',fontWeight:600}}>⚠ Seleccione un integrante abajo</p>
            )}
          </div>
        ))}
      </div>

      {/* Filtros — cliente y equipo en función del tipo seleccionado */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
        {/* EQ-1 FIX: Selector de integrante — visible cuando tipo='integrante' o como filtro secundario */}
        <div>
          {tipo==='integrante' ? (
            <>
              <label style={{fontSize:11,color:!filEquipo?'#f59e0b':'#64748b',fontWeight:600,display:'block',marginBottom:6}}>
                Integrante * (requerido)
              </label>
              <select className="inp" value={filEquipo} onChange={e=>setFilEquipo(e.target.value)}
                style={{borderColor:!filEquipo?'rgba(245,158,11,.5)':''}}>
                <option value="">— Seleccione un integrante —</option>
                {equipo.filter(e=>e.activo!==false).map(e=>(
                  <option key={e.id} value={e.id}>{e.nombre}{e.cargo?' — '+e.cargo:''}</option>
                ))}
              </select>
              {equipo.length===0&&(
                <p style={{fontSize:10,color:'#f87171',margin:'4px 0 0'}}>
                  No hay integrantes registrados. Vaya a Equipo para agregar.
                </p>
              )}
            </>
          ) : (
            <>
              <label style={{fontSize:11,color:tipo==='cliente'&&!filCli?'#f59e0b':'#64748b',fontWeight:600,display:'block',marginBottom:6}}>
                {tipo==='cliente' ? 'Cliente * (requerido)' : 'Cliente (opcional)'}
              </label>
              <select className="inp" value={filCli} onChange={e=>setFilCli(e.target.value)}
                style={{borderColor:tipo==='cliente'&&!filCli?'rgba(245,158,11,.5)':''}}>
                <option value="">{tipo==='cliente'?'— Seleccione un cliente —':'Todos los clientes'}</option>
                {[...clientes].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
              </select>
            </>
          )}
        </div>
        <div><label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6}}>Fecha Inicio</label><input type="date" className="inp" value={pdfFIni} onChange={e=>setPdfFIni(e.target.value)}/></div>
        <div><label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6}}>Fecha Fin</label><input type="date" className="inp" value={pdfFFin} onChange={e=>setPdfFFin(e.target.value)}/></div>
      </div>

      {/* Atajos de período */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
        {['Q1','Q2','Q3','Q4'].map(q=>['2025','2026'].map(y=><button key={q+y} onClick={()=>setQ(q,y,'pdf')} className="btn btn-ghost btn-sm" style={{fontSize:11}}>{q} {y}</button>))}
        <button onClick={()=>{setPdfFIni('');setPdfFFin('');}} className="btn btn-ghost btn-sm" style={{fontSize:11}}>✕ Limpiar</button>
      </div>

      {/* Vista previa — EQ-8: muestra métricas según el tipo activo */}
      {preview&&<div style={{padding:14,background:'#0f1923',borderRadius:10,border:'1px solid #243447',marginBottom:14}}>
        <p style={{fontSize:11,fontWeight:700,color:'#C9A84C',textTransform:'uppercase',letterSpacing:'.5px',margin:'0 0 10px'}}>
          Vista Previa — {preview.esIntegrante?'Informe de Integrante':'Informe de Gestión'}
        </p>
        {preview.esIntegrante ? (
          // Vista previa de integrante con sus KPIs específicos
          <div>
            <div style={{marginBottom:10,padding:'8px 12px',background:'#162030',borderRadius:8,border:'1px solid #243447'}}>
              <p style={{fontSize:11,color:'#64748b',margin:'0 0 2px'}}>Integrante</p>
              <p style={{fontSize:14,fontWeight:700,color:'#fff',margin:0}}>{preview.mNombre}</p>
              {preview.cargo&&preview.cargo!=='—'&&<p style={{fontSize:11,color:'#94a3b8',margin:'2px 0 0'}}>{preview.cargo}</p>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
              {[
                ['Total Tareas',  preview.nTareas],
                ['Completadas',   preview.tComp+' ('+preview.pct+'%)'],
                ['Vencidas',      preview.tVenc],
                ['Clientes Atendidos', preview.cliAtend],
                ['Anticipos',     preview.nAnt],
                ['Monto Gastado', fmt.cop(preview.antMonto)],
              ].map(([l,v])=>(
                <div key={l} style={{padding:'8px 10px',background:'#162030',borderRadius:8,border:'1px solid #243447'}}>
                  <p style={{fontSize:10,color:'#64748b',margin:'0 0 2px'}}>{l}</p>
                  <p style={{fontSize:12,fontWeight:700,color:'#fff',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v}</p>
                </div>
              ))}
            </div>
          </div>
        ) : (
          // Vista previa estándar (cliente/global)
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
            {[
              ['Cliente',      preview.cliNom],
              ['Tareas',       preview.nTareas+' ('+preview.pct+'% comp.)'],
              ['Facturas',     preview.nFacturas],
              ['Facturado',    fmt.cop(preview.totalFac)],
              ['Cobrado',      fmt.cop(preview.totalCob)],
              ['Por cobrar',   fmt.cop(preview.totalFac-preview.totalCob)],
              ['Anticipos',    preview.nAnt],
            ].map(([l,v])=>(
              <div key={l} style={{padding:'8px 10px',background:'#162030',borderRadius:8,border:'1px solid #243447'}}>
                <p style={{fontSize:10,color:'#64748b',margin:'0 0 2px'}}>{l}</p>
                <p style={{fontSize:12,fontWeight:700,color:'#fff',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v}</p>
              </div>
            ))}
          </div>
        )}
      </div>}

      {/* Botones */}
      <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
        <button onClick={calcPreview} className="btn btn-ghost btn-sm"><Ico n="eye" s={13}/>Vista Previa</button>

        {/* Generar PDF — valida tipo y selección requerida */}
        <button
          onClick={()=>{
            if(tipo==='cliente' && !filCli){
              toast('Seleccione un cliente para generar el informe "Por Cliente"','warning');
              return;
            }
            // EQ-1 FIX: Validar integrante requerido para tipo='integrante'
            if(tipo==='integrante' && !filEquipo){
              toast('Seleccione un integrante del equipo para generar el informe','warning');
              return;
            }
            // EQ-2 FIX: Pasar responsableId cuando tipo='integrante'
            const respId = tipo==='integrante' ? filEquipo : null;
            buildPDF(filCli||null, respId);
          }}
          className="btn btn-g btn-sm">
          <Ico n="pdf" s={14}/>Generar Informe PDF
        </button>

        {/* PDF por cada cliente (solo cuando tipo no es integrante y no hay cliente seleccionado) */}
        {tipo!=='integrante'&&!filCli&&(
          <button
            onClick={async ()=>{
              if(clientes.length===0){ toast('No hay clientes registrados','warning'); return; }
              toast(`Generando ${clientes.length} PDFs por cliente...`,'info');
              for(let i=0;i<clientes.length;i++){
                buildPDF(clientes[i].id, null);
                if(i<clientes.length-1) await new Promise(r=>setTimeout(r,700));
              }
              toast(`${clientes.length} PDFs generados correctamente`,'success');
            }}
            className="btn btn-ghost btn-sm">
            <Ico n="pdf" s={13}/>PDF por cada cliente
          </button>
        )}

        {/* EQ-1 FIX: PDF individual para cada integrante del equipo */}
        {tipo==='integrante'&&!filEquipo&&equipo.length>0&&(
          <button
            onClick={async ()=>{
              const activos = equipo.filter(e=>e.activo!==false);
              if(activos.length===0){ toast('No hay integrantes activos','warning'); return; }
              toast(`Generando ${activos.length} PDFs por integrante...`,'info');
              for(let i=0;i<activos.length;i++){
                buildPDF(null, activos[i].id);
                if(i<activos.length-1) await new Promise(r=>setTimeout(r,700));
              }
              toast(`${activos.length} PDFs de integrantes generados correctamente`,'success');
            }}
            className="btn btn-ghost btn-sm">
            <Ico n="pdf" s={13}/>PDF por cada integrante
          </button>
        )}
      </div>
    </div>

    {/* ── REPORTE EJECUTIVO ANALYTICS ─────────────────────────── */}
    <div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:4,display:'flex',alignItems:'center',gap:8}}>
        <Ico n="analytics" s={16} c="#C9A84C"/>Reporte Ejecutivo Analytics
      </h3>
      <p style={{fontSize:12,color:'#64748b',marginBottom:14}}>
        Resumen gerencial de KPIs, cumplimiento, facturación y equipo. Exportable en PDF y Excel.
      </p>
      {(()=>{
        // Calcular KPIs ejecutivos en línea (sin hooks — solo cálculo puro)
        const hoy = new Date().toISOString().split('T')[0];
        const PAGADOS_E=['pagada','Paz y Salvo','Pagada','Paz Y Salvo'];
        const tFilt = fIni||fFin ? filtDate(tareas,'fechaVen') : tareas;
        const fFilt  = fIni||fFin ? filtDate(facturas,'fechaEmision') : facturas;
        const comp    = tFilt.filter(t=>!t.esAlerta&&t.estado==='completada').length;
        const venc    = tFilt.filter(t=>!t.esAlerta&&t.fechaVen&&t.fechaVen<hoy&&t.estado!=='completada').length;
        const pct     = tFilt.filter(t=>!t.esAlerta).length ? Math.round(comp/tFilt.filter(t=>!t.esAlerta).length*100) : 0;
        const cobrado = fFilt.filter(f=>PAGADOS_E.includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
        const pendF   = fFilt.filter(f=>!PAGADOS_E.includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
        const totalF  = fFilt.reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
        const kpis    = [
          {l:'Cumplimiento',v:pct+'%',    c:'#60a5fa'},
          {l:'Tareas Vencidas',v:venc,     c:'#f87171'},
          {l:'Completadas',v:comp,         c:'#4ade80'},
          {l:'Total Facturado',v:fmt.cop(totalF), c:'#C9A84C'},
          {l:'Cobrado',v:fmt.cop(cobrado),  c:'#4ade80'},
          {l:'Por Cobrar',v:fmt.cop(pendF), c:'#f87171'},
        ];
        return <div style={{marginBottom:14}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
            {kpis.map(k=>(
              <div key={k.l} style={{padding:'10px 12px',borderRadius:8,background:'#0f1923',border:'1px solid #1e2d42',textAlign:'center'}}>
                <p style={{fontSize:11,color:'#64748b',margin:'0 0 4px'}}>{k.l}</p>
                <p style={{fontSize:15,fontWeight:700,color:k.c,margin:0}}>{k.v}</p>
              </div>
            ))}
          </div>
        </div>;
      })()}
      <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>

          // FIX EXP-7: Guardia de disponibilidad — scripts con defer pueden no estar listos

              doc.setFillColor(i%2===0?20:15,i%2===0?29:22,i%2===0?38:30);
              doc.rect(M,y,IW,7,'F');
              doc.setTextColor(200,210,220); doc.setFontSize(8); doc.setFont('helvetica','normal');
              doc.text(e.nombre||'',M+2,y+5);
              doc.text(e.rol||'',M+60,y+5);
              const peRgb=pe>=80?[34,197,94]:pe>=50?[201,168,76]:[239,68,68];
              doc.setTextColor(peRgb[0],peRgb[1],peRgb[2]);
              doc.text(pe+'%',PW-M-2,y+5,{align:'right'});
              y+=7;
            });
            // ── FOOTER CORPORATIVO ────────────────────────────────
            doc.setFillColor(30,58,95); doc.rect(0,PH-14,PW,14,'F');
            doc.setFillColor(201,168,76); doc.rect(0,PH-15,PW,1,'F');
            doc.setTextColor(201,168,76); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
            doc.text(cfg.empresa||'INTEGRA CONSULTORES', M, PH-7);
            const fpP5=[cfg.nit?'NIT: '+cfg.nit:null,cfg.telefono?'Tel: '+cfg.telefono:null,cfg.adminEmail||null,cfg.direccion||null].filter(Boolean);
            doc.setTextColor(255,255,255); doc.setFont('helvetica','normal'); doc.setFontSize(6.5);
            doc.text(fpP5.join('  ·  '), M, PH-3);
            doc.setTextColor(201,168,76); doc.setFont('helvetica','bold'); doc.setFontSize(7);
            doc.text('Página 1', PW-M, PH-7, {align:'right'});
            doc.setTextColor(255,255,255); doc.setFont('helvetica','normal'); doc.setFontSize(6);
            doc.text('INTPLANNER PRO', PW-M, PH-3, {align:'right'});
            doc.save(`Reporte_Ejecutivo_${hoy2.toISOString().split('T')[0]}.pdf`);
            toast('Reporte PDF generado','success');
          }catch(e){toast('Error al generar PDF: '+e.message,'error');}
        }}><Ico n="pdf" s={14}/>Descargar PDF Ejecutivo</button>
        <button className="btn btn-g btn-sm" style={{background:'linear-gradient(135deg,#1A6B3A,#166534)'}} onClick={()=>{
          try{
            const wb = XLSX.utils.book_new();
            const hoy3=new Date();
            const PAGADOS_E3=['pagada','Paz y Salvo','Pagada','Paz Y Salvo'];
            const tF3=fIni||fFin?filtDate(tareas,'fechaVen'):tareas;
            const fF3=fIni||fFin?filtDate(facturas,'fechaEmision'):facturas;
            // Hoja 1: KPIs
            const comp3=tF3.filter(t=>!t.esAlerta&&t.estado==='completada').length;
            const tot3=tF3.filter(t=>!t.esAlerta).length;
            const venc3=tF3.filter(t=>!t.esAlerta&&t.fechaVen&&t.fechaVen<hoy3.toISOString().split('T')[0]&&t.estado!=='completada').length;
            const cobr3=fF3.filter(f=>PAGADOS_E3.includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
            const pend3=fF3.filter(f=>!PAGADOS_E3.includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
            const totF3=fF3.reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
            XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet([
              {Indicador:'Cumplimiento Global',Valor:tot3?Math.round(comp3/tot3*100):0,Unidad:'%'},
              {Indicador:'Tareas Completadas',Valor:comp3,Unidad:'und'},
              {Indicador:'Tareas Vencidas',Valor:venc3,Unidad:'und'},
              {Indicador:'Total Facturado',Valor:totF3,Unidad:'COP'},
              {Indicador:'Total Cobrado',Valor:cobr3,Unidad:'COP'},
              {Indicador:'Por Cobrar',Valor:pend3,Unidad:'COP'},
              {Indicador:'Clientes Activos',Valor:clientes.filter(c=>c.estado==='activo').length,Unidad:'und'},
            ]),'KPIs Ejecutivos');
            // Hoja 2: Facturación por cliente
            XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(
              clientes.map(c=>({
                Cliente:c.nombre,NIT:c.nit,Estado:c.estado,
                'Total Facturado':fF3.filter(f=>f.clienteId===c.id).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0),
                'Cobrado':fF3.filter(f=>f.clienteId===c.id&&PAGADOS_E3.includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0),
                'Facturas':fF3.filter(f=>f.clienteId===c.id).length,
              })).sort((a,b)=>b['Total Facturado']-a['Total Facturado'])
            ),'Facturación por Cliente');
            // Hoja 3: Equipo
            XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(
              equipo.map(e=>{
                const te=tF3.filter(t=>t.responsableId===e.id&&!t.esAlerta);
                const ce=te.filter(t=>t.estado==='completada');
                return{Nombre:e.nombre,Rol:e.rol,Cargo:e.cargo,
                  'Tareas Asignadas':te.length,'Completadas':ce.length,
                  'Cumplimiento (%)':te.length?Math.round(ce.length/te.length*100):0};
              })
            ),'Equipo');
            XLSX.writeFile(wb,`Reporte_Ejecutivo_${hoy3.toISOString().split('T')[0]}.xlsx`);
            toast('Excel ejecutivo generado','success');
          }catch(e){toast('Error Excel: '+e.message,'error');}
        }}><Ico n="excel" s={14}/>Descargar Excel Ejecutivo</button>
      </div>
    </div>
  </div>;
};


// ── NOTIFICACIONES — Componente de configuración ─────────────
const NotifConfig = () => {
  const {tareas,clientes,equipo,toast} = useApp();
  const [perm,   setPerm]  = useState(()=> typeof Notification !== 'undefined' ? Notification.permission : 'unsupported');
  const [cfg,    setCfg]   = useState(()=> window.PushSvc?.getCfg() || {enabled:true,vencimiento:true,urgente:true,recordatorio:true,reunion:true,anticipo:false,minAntes:60,persistente:false});
  const [active, setActive]= useState(()=> window.PushSvc?.activeCount()||0);
  const [testing,setTesting]= useState(false);
  // FIX #3: logVersion se incrementa cada vez que PushSvc escribe al log,
  // forzando que logFiltrado recompute desde localStorage actualizado.
  const [logVersion, setLogVersion] = useState(0);

  // ESTADO DE NOTIFICACIONES — Historial y filtros
  const [histFecha,   setHistFecha]   = useState('');
  const [histCliente, setHistCliente] = useState('');
  const [histTarea,   setHistTarea]   = useState('');
  const [histEquipo,  setHistEquipo]  = useState('');
  const [showHist,    setShowHist]    = useState(false);

  // Log de notificaciones enviadas (persistido en localStorage por PushSvc.show)
  const getLog = () => {
    try { return JSON.parse(localStorage.getItem('ip_notif_log')||'[]'); } catch{ return []; }
  };
  // addLog ya no es necesario aquí — PushSvc.show escribe directamente a ip_notif_log
  // Se mantiene como helper de conveniencia para testNotif y enviarManual
  const addLog = (entrada) => {
    const log = getLog().slice(-200);
    log.push({...entrada, ts: Date.now(), fecha: new Date().toISOString().split('T')[0]});
    localStorage.setItem('ip_notif_log', JSON.stringify(log));
    setLogVersion(v => v + 1); // FIX #3: fuerza re-render del historial
  };

  // FIX #3: Escuchar evento ip-notif-show que PushSvc dispara al registrar en log
  React.useEffect(()=>{
    const handler = () => setLogVersion(v => v + 1);
    window.addEventListener('ip-notif-logged', handler);
    return () => window.removeEventListener('ip-notif-logged', handler);
  },[]);

  // Filtrar historial — FIX #3: logVersion en deps array garantiza recomputo
  const logFiltrado = useMemo(()=>{
    let r = getLog().sort((a,b)=>b.ts-a.ts);
    if(histFecha)   r = r.filter(e=>e.fecha===histFecha);
    if(histCliente) r = r.filter(e=>e.clienteId===histCliente);
    if(histTarea)   r = r.filter(e=>e.tareaId===histTarea);
    if(histEquipo)  r = r.filter(e=>e.responsableId===histEquipo);
    return r.slice(0,100);
  },[logVersion,showHist,histFecha,histCliente,histTarea,histEquipo]);

  // Actualizar conteo cada 5s
  React.useEffect(()=>{
    const t = setInterval(()=>setActive(window.PushSvc?.activeCount()||0),5000);
    return ()=>clearInterval(t);
  },[]);

  const guardar = (newCfg) => {
    const merged = {...cfg,...newCfg};
    setCfg(merged);
    window.PushSvc?.saveCfg(merged);
    if(merged.enabled && perm==='granted') { window.PushSvc?.start(); toast('Configuración guardada','success'); }
    else if(!merged.enabled) { window.PushSvc?.stop(); toast('Notificaciones desactivadas','info'); }
  };

  const toggle = k => guardar({[k]:!cfg[k]});

  const activar = async () => {
    const p = await window.PushSvc?.requestPermission();
    setPerm(p || Notification.permission);
    if(p==='granted') {
      guardar({enabled:true});
      window.PushSvc?.start();
      toast('Notificaciones activadas ✓','success');
    } else if(p==='denied') {
      toast('Permiso denegado — actívelo en la configuración del navegador','error');
    }
  };

  const testNotif = async () => {
    if(perm!=='granted') return toast('Primero active las notificaciones','error');
    setTesting(true);
    // Registrar en log
    addLog({ tipo:'prueba', titulo:'🔔 INTPLANNER', cuerpo:'Las notificaciones funcionan correctamente ✓', tag:'ip-test' });
    window.PushSvc?.show('🔔 INTPLANNER', 'Las notificaciones funcionan correctamente ✓', 'ip-test');
    toast('Notificación de prueba enviada','success');
    setTimeout(()=>setTesting(false),2000);
  };

  // Enviar notificación personalizada manual
  const [manualTitulo, setManualTitulo] = useState('');
  const [manualCuerpo, setManualCuerpo] = useState('');
  const enviarManual = () => {
    if(!manualTitulo.trim()) { toast('Escriba un título para la notificación','error'); return; }
    if(perm!=='granted') { toast('Primero active las notificaciones','error'); return; }
    addLog({ tipo:'manual', titulo:manualTitulo, cuerpo:manualCuerpo, tag:'ip-manual' });
    window.PushSvc?.show(manualTitulo, manualCuerpo, 'ip-manual-'+Date.now(),
      cfg.persistente ? { requireInteraction: true } : {});
    setManualTitulo(''); setManualCuerpo('');
    toast('Notificación enviada','success');
  };

  const ToggleRow = ({label, desc, k, icon}) => (
    <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid #162030'}}>
      <span style={{fontSize:18,flexShrink:0}}>{icon}</span>
      <div style={{flex:1}}>
        <p style={{fontSize:13,fontWeight:600,color:'#fff',margin:0}}>{label}</p>
        {desc&&<p style={{fontSize:11,color:'#475569',margin:0}}>{desc}</p>}
      </div>
      <div onClick={()=>toggle(k)} style={{width:42,height:24,borderRadius:12,background:cfg[k]?'#C9A84C':'#243447',cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}}>
        <div style={{width:18,height:18,borderRadius:'50%',background:'#fff',position:'absolute',top:3,left:cfg[k]?21:3,transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.3)'}}/>
      </div>
    </div>
  );

  const permColor = perm==='granted'?'#4ade80':perm==='denied'?'#f87171':'#C9A84C';
  const permLabel = perm==='granted'?'Permiso concedido ✓':perm==='denied'?'Permiso denegado ✗':perm==='unsupported'?'No compatible':'Permiso pendiente';

  return <div style={{display:'flex',flexDirection:'column',gap:14}}>

    {/* Estado del sistema */}
    <div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:14}}>Estado de Notificaciones</h3>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
        {[
          {l:'Permiso',    v:permLabel,             c:permColor},
          {l:'Motor',      v:cfg.enabled&&perm==='granted'?'Activo ✓':'Inactivo', c:cfg.enabled&&perm==='granted'?'#4ade80':'#64748b'},
          {l:'Alarmas',    v:active+' programadas',  c:active>0?'#C9A84C':'#64748b'},
        ].map(({l,v,c})=>(
          <div key={l} style={{padding:'10px 12px',background:'#0f1923',borderRadius:8,border:'1px solid #243447'}}>
            <p style={{fontSize:10,color:'#64748b',margin:'0 0 4px',textTransform:'uppercase',letterSpacing:'.4px'}}>{l}</p>
            <p style={{fontSize:12,fontWeight:700,color:c,margin:0}}>{v}</p>
          </div>
        ))}
      </div>

      <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
        {perm!=='granted'&&<button className="btn btn-g btn-sm" onClick={activar}>🔔 Activar Notificaciones</button>}
        {perm==='granted'&&<button className="btn btn-ghost btn-sm" onClick={()=>{
          if(cfg.enabled){window.PushSvc?.stop();guardar({enabled:false});}
          else{window.PushSvc?.start();guardar({enabled:true});}
        }}>{cfg.enabled?'⏸ Pausar':'▶ Reanudar'}</button>}
        <button className="btn btn-ghost btn-sm" onClick={testNotif} disabled={testing}>
          {testing?'Enviando...':'🧪 Probar notificación'}
        </button>
        {perm==='granted'&&<button className="btn btn-ghost btn-sm" onClick={()=>{
          const n=window.PushSvc?.scan()||0;
          setActive(window.PushSvc?.activeCount()||0);
          toast('Escaneo completado: '+n+' notificaciones programadas','success');
        }}>🔄 Escanear tareas</button>}
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowHist(p=>!p)} style={{marginLeft:'auto'}}>
          📋 {showHist?'Ocultar':'Ver'} historial ({getLog().length})
        </button>
      </div>

      {perm==='denied'&&<div style={{marginTop:12,padding:'10px 14px',background:'rgba(220,38,38,.08)',border:'1px solid rgba(220,38,38,.2)',borderRadius:8}}>
        <p style={{fontSize:12,color:'#f87171',margin:0}}>Para activar notificaciones: haga clic en el candado 🔒 en la barra de URL → Notificaciones → Permitir → Recargar la página.</p>
      </div>}
    </div>

    {/* HISTORIAL CON FILTROS — nuevo */}
    {showHist&&<div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:12}}>📋 Historial de Notificaciones</h3>

      {/* Filtros */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:12}}>
        <div>
          <label style={{fontSize:10,color:'#64748b',fontWeight:600,display:'block',marginBottom:3}}>📅 Fecha</label>
          <input type="date" className="inp" value={histFecha} onChange={e=>setHistFecha(e.target.value)} style={{fontSize:11,padding:'4px 8px'}}/>
        </div>
        <div>
          <label style={{fontSize:10,color:'#64748b',fontWeight:600,display:'block',marginBottom:3}}>🏢 Cliente</label>
          <select className="inp" value={histCliente} onChange={e=>setHistCliente(e.target.value)} style={{fontSize:11,padding:'4px 8px'}}>
            <option value="">Todos</option>
            {[...clientes].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:10,color:'#64748b',fontWeight:600,display:'block',marginBottom:3}}>📋 Tarea</label>
          <select className="inp" value={histTarea} onChange={e=>setHistTarea(e.target.value)} style={{fontSize:11,padding:'4px 8px'}}>
            <option value="">Todas</option>
            {tareas.filter(t=>!t.esAlerta).map(t=><option key={t.id} value={t.id}>{t.titulo}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:10,color:'#64748b',fontWeight:600,display:'block',marginBottom:3}}>👤 Responsable</label>
          <select className="inp" value={histEquipo} onChange={e=>setHistEquipo(e.target.value)} style={{fontSize:11,padding:'4px 8px'}}>
            <option value="">Todo el equipo</option>
            {equipo.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
          </select>
        </div>
      </div>
      {(histFecha||histCliente||histTarea||histEquipo)&&(
        <button className="btn btn-ghost btn-sm" onClick={()=>{setHistFecha('');setHistCliente('');setHistTarea('');setHistEquipo('');}}
          style={{fontSize:11,color:'#f87171',marginBottom:8}}>✕ Limpiar filtros</button>
      )}

      {/* Lista de notificaciones */}
      {logFiltrado.length===0
        ? <p style={{color:'#475569',fontSize:12,textAlign:'center',padding:16}}>Sin notificaciones en este período.</p>
        : <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:300,overflowY:'auto'}}>
            {logFiltrado.map((e,i)=>(
              <div key={i} style={{padding:'8px 12px',background:'#0f1923',borderRadius:8,border:'1px solid #243447',display:'flex',gap:10,alignItems:'flex-start'}}>
                <span style={{fontSize:16,flexShrink:0}}>{e.tipo==='prueba'?'🧪':e.tipo==='manual'?'✍️':e.tipo==='vencimiento'?'📅':'🔔'}</span>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:12,fontWeight:600,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.titulo}</p>
                  {e.cuerpo&&<p style={{margin:0,fontSize:11,color:'#64748b'}}>{e.cuerpo}</p>}
                </div>
                <span style={{fontSize:10,color:'#475569',flexShrink:0,whiteSpace:'nowrap'}}>
                  {e.fecha} {new Date(e.ts).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}
                </span>
              </div>
            ))}
          </div>
      }
      <div style={{display:'flex',justifyContent:'flex-end',marginTop:10}}>
        <button className="btn btn-ghost btn-sm" style={{fontSize:11,color:'#f87171'}}
          onClick={()=>{localStorage.removeItem('ip_notif_log');toast('Historial borrado','info');}}>
          🗑️ Borrar historial
        </button>
      </div>
    </div>}

    {/* Envío manual de notificación — nuevo */}
    {perm==='granted'&&<div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:12}}>✍️ Enviar Notificación Manual</h3>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <input className="inp" placeholder="Título de la notificación *"
          value={manualTitulo} onChange={e=>setManualTitulo(e.target.value)}/>
        <input className="inp" placeholder="Mensaje (opcional)"
          value={manualCuerpo} onChange={e=>setManualCuerpo(e.target.value)}/>
        <button className="btn btn-p btn-sm" onClick={enviarManual}><Ico n="bell" s={13}/>Enviar ahora</button>
      </div>
    </div>}

    {/* Tipos de notificación */}
    <div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:2}}>Tipos de Notificación</h3>
      <p style={{fontSize:12,color:'#475569',marginBottom:14}}>Seleccione qué eventos generan notificaciones automáticas.</p>

      <ToggleRow k="vencimiento"  icon="📅" label="Tareas que vencen hoy"       desc="Notificación a las 9:00 AM cuando una tarea vence ese día"/>
      <ToggleRow k="urgente"      icon="🔴" label="Tareas urgentes pendientes"  desc="Recordatorio para tareas con prioridad urgente sin completar"/>
      <ToggleRow k="recordatorio" icon="🔔" label="Alertas — Recordatorios"     desc="Alertas del módulo Alertas de tipo Recordatorio"/>
      <ToggleRow k="reunion"      icon="📅" label="Alertas — Reuniones"         desc="Alertas del módulo Alertas de tipo Reunión o Consultoría"/>
      <ToggleRow k="anticipo"     icon="💰" label="Anticipos pendientes"        desc="Recordatorio de anticipos en estado pendiente"/>
      {/* NUEVO: Notificaciones permanentes */}
      <ToggleRow k="persistente"  icon="📌" label="Notificaciones permanentes"  desc="Las notificaciones no desaparecen hasta que el usuario las cierre manualmente (requireInteraction)"/>

      <div style={{marginTop:16,display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'#0f1923',borderRadius:8,border:'1px solid #243447'}}>
        <p style={{fontSize:13,fontWeight:600,color:'#fff',margin:0,flex:1}}>⏰ Anticipación</p>
        <select className="inp" style={{width:'auto',padding:'4px 10px',fontSize:12}} value={cfg.minAntes}
          onChange={e=>guardar({minAntes:Number(e.target.value)})}>
          {[[0,'En el momento'],[15,'15 min antes'],[30,'30 min antes'],[60,'1 hora antes'],[120,'2 horas antes'],[1440,'1 día antes']].map(([v,l])=>(
            <option key={v} value={v}>{l}</option>
          ))}
        </select>
      </div>
    </div>

    {/* Info */}
    <div style={{padding:'12px 14px',background:'rgba(201,168,76,.06)',border:'1px solid rgba(201,168,76,.15)',borderRadius:10}}>
      <p style={{fontSize:12,color:'#C9A84C',fontWeight:600,margin:'0 0 4px'}}>ℹ️ Sobre las notificaciones</p>
      <p style={{fontSize:11,color:'#64748b',margin:0}}>Las notificaciones funcionan mientras la app esté abierta en el navegador. Para recibirlas en segundo plano instale INTPLANNER como aplicación (PWA): menú del navegador → "Instalar aplicación" o "Agregar a pantalla de inicio".</p>
    </div>
  </div>;
};

// ── PANEL DE DIAGNÓSTICO STORAGE (subcomponente) ─────────────
// Declarado fuera de Config para cumplir las Reglas de Hooks de React.
// ── CONFIGURADOR DE KPIs DEL DASHBOARD ───────────────────────
// Componente independiente (cumple Reglas de Hooks de React)
const DashKpiConfig = ({toast}) => {
  const COLORES = {blue:'#60a5fa',gold:'#C9A84C',green:'#4ade80',red:'#f87171'};
  const [kpiCfg,setKpiCfg] = useState(()=>{
    try{return JSON.parse(localStorage.getItem('ip_dash_kpis')||'null')||KPI_DEFAULT;}
    catch{return KPI_DEFAULT;}
  });
  const save = next => {
    setKpiCfg(next);
    localStorage.setItem('ip_dash_kpis', JSON.stringify(next));
    window.dispatchEvent(new CustomEvent('ip-dash-kpis', {detail:next}));
  };
  const toggle = id => {
    const next = kpiCfg.includes(id) ? kpiCfg.filter(k=>k!==id) : [...kpiCfg, id];
    save(next); toast('Dashboard actualizado','success');
  };

    [next[idx],next[swap]]=[next[swap],next[idx]]; save(next);
  };
  const reset = () => { save(KPI_DEFAULT); toast('Dashboard restablecido','info'); };

  return <div style={{display:'flex',flexDirection:'column',gap:14}}>

            <button onClick={()=>mover(id,1)} disabled={idx===kpiCfg.length-1} className="btn btn-ghost btn-sm" style={{fontSize:11,padding:'2px 6px',opacity:idx===kpiCfg.length-1?.3:1}}>→</button>

    <div className="card-p">
      <div className="gline"/>

          return <div key={k.id} onClick={()=>toggle(k.id)} style={{
            display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:8,cursor:'pointer',
