const StoragePanel = () => {
  // Estado inicial: 'unknown' — check() se ejecuta en useEffect donde
  // window.StorageDiag ya existe (script plain cargado tras este bloque Babel)
  const [diag, setDiag] = useState({ status:'unknown', info:{ icon:'⏳', label:'Sin verificar', color:'#64748b' } });
  const [checking, setChecking] = useState(false);

  useEffect(() => {
    // window.StorageDiag existe aquí — definido en el script plain posterior
    const SD = window.StorageDiag;
    if(!SD) return;

    // Escuchar actualizaciones (uploads reales, cambios de conexión)
    const onDiag = e => setDiag(e.detail);
    window.addEventListener('ip-storage-diag', onDiag);
    window.addEventListener('online',  () => SD.check());
    window.addEventListener('offline', () => SD.check());

    // Ejecutar diagnóstico inmediato al montar — síncrono, resultado instantáneo
    SD.check();
    // Leer resultado recién escrito
    if(window.IP_STORAGE_STATUS) setDiag(window.IP_STORAGE_STATUS);

    return () => window.removeEventListener('ip-storage-diag', onDiag);
  }, []);

  const runCheck = () => {
    setChecking(true);
    window.StorageDiag?.check();
    if(window.IP_STORAGE_STATUS) setDiag(window.IP_STORAGE_STATUS);
    setChecking(false);
  };

  const info      = diag.info || {};
  const isOk      = diag.status === 'ok';
  const isUnknown = diag.status === 'unknown';
  const borderColor = isOk ? 'rgba(74,222,128,.3)' : isUnknown ? '#243447' : 'rgba(248,113,113,.3)';
  const bgColor     = isOk ? 'rgba(26,107,58,.1)'  : isUnknown ? '#0f1923' : 'rgba(153,27,27,.07)';

  return (
    <div style={{marginBottom:14,padding:12,borderRadius:10,border:`1px solid ${borderColor}`,background:bgColor}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:isOk||isUnknown?0:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:16}}>{info.icon||'⏳'}</span>
          <div>
            <p style={{fontSize:12,fontWeight:700,color:info.color||'#64748b',margin:0}}>
              Firebase Storage — {info.label||'Sin verificar'}
            </p>
            {diag.lastCheck&&(
              <p style={{fontSize:10,color:'#475569',margin:0}}>
                Verificado: {fmt.dt(diag.lastCheck)}
              </p>
            )}
          </div>
        </div>
        <button
          className="btn btn-ghost btn-sm"
          style={{fontSize:11,opacity:checking?0.6:1}}
          onClick={runCheck}
          disabled={checking}>
          {checking?'Verificando...':'↺ Verificar ahora'}
        </button>
      </div>

      {!isOk&&!isUnknown&&info.guide&&(
        <div style={{marginTop:10,padding:'10px 12px',background:'rgba(0,0,0,.2)',borderRadius:8,border:'1px solid rgba(255,255,255,.05)'}}>
          <p style={{fontSize:11,fontWeight:700,color:'#fbbf24',margin:'0 0 6px'}}>
            ¿Cómo resolverlo?
          </p>
          {info.guide.split('\n').map((line,i)=>(
            <p key={i} style={{
              fontSize:11,margin:'2px 0',lineHeight:1.6,
              fontFamily: line.startsWith('allow')?'monospace':'inherit',
              color:       line.startsWith('allow')?'#4ade80':'#94a3b8',
            }}>{line}</p>
          ))}
          {diag.lastError&&(
            <p style={{fontSize:10,color:'#64748b',margin:'8px 0 0',fontFamily:'monospace',
              wordBreak:'break-all',background:'rgba(0,0,0,.3)',padding:'4px 8px',borderRadius:4}}>
              Error: {diag.lastError}
            </p>
          )}
        </div>
      )}
    </div>
  );
};

// ── PERSONALIZAR TAB ─────────────────────────────────────────
// Componente React propio — necesario para usar useState sin
// violar la regla de hooks (React error #310 se produce al usar
// hooks dentro de una IIFE en lugar de un componente registrado).
// ══════════════════════════════════════════════════════════════════════
// PERSONALIZAR TAB — Sistema de Personalización Avanzada de PDFs
// Arquitectura: Single Source of Truth via localStorage 'ip_pdf_personalizar'
// Todos los módulos que generan PDFs consumen getPdfPersonalizar()
// ══════════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════════
// FASE 6 FIX — SeccionTituloInput
// Componente aislado para editar títulos de sección SIN perder el cursor.
// CAUSA RAÍZ ORIGINAL: onChange en PersonalizarTab llamaba saveSilent() → dispatchEvent
// → re-render completo de PersonalizarTab → input reconstruido → cursor al inicio.
// SOLUCIÓN: estado local (useState) completamente independiente del padre.
// Solo propaga el valor al padre en onBlur mediante el callback onCommit(id, titulo).
// ══════════════════════════════════════════════════════════════════════════════
const SeccionTituloInput = React.memo(({ secId, initialValue, visible, onCommit }) => {
  const [val, setVal] = useState(initialValue);
  // Sincronizar si el padre cambia el initialValue (ej: reset)
  const prevInit = useRef(initialValue);
  useEffect(() => {
    if(initialValue !== prevInit.current) {
      setVal(initialValue);
      prevInit.current = initialValue;
    }
  }, [initialValue]);

  return (
    <input
      className="inp"
      value={val}
      onChange={e => setVal(e.target.value)}
      onBlur={() => onCommit(secId, val)}
      style={{
        fontSize:12, fontWeight:600,
        background:'transparent', border:'none', padding:'2px 0',
        color: visible ? '#e2e8f0' : '#475569',
        width:'100%', outline:'none',
      }}
      placeholder="Título de la sección..."
    />
  );
});

// ══════════════════════════════════════════════════════════════════════════════
// TextoInput — input de texto aislado para Textos y Contenido en PersonalizarTab.
// MISMA CAUSA RAÍZ que SeccionTituloInput: onChange → saveSilent → setPdfCfg
// → re-render del padre → input reconstruido → cursor al inicio.
// SOLUCIÓN: estado local con useState. Solo sube al padre en onBlur (onCommit).
// ══════════════════════════════════════════════════════════════════════════════
const TextoInput = React.memo(({ initialValue, placeholder, onCommit }) => {
  const [val, setVal] = useState(initialValue);
  const prevRef = useRef(initialValue);
  useEffect(() => {
    if (initialValue !== prevRef.current) {
      setVal(initialValue);
      prevRef.current = initialValue;
    }
  }, [initialValue]);
  return (
    <input
      className="inp"
      value={val}
      onChange={e => setVal(e.target.value)}
      onBlur={() => onCommit(val)}
      placeholder={placeholder}
    />
  );
});

// ══════════════════════════════════════════════════════════════════════════════
// TextoTextarea — textarea aislado para Textos y Contenido.
// Mismo patrón que TextoInput: estado 100% local, persiste solo en onBlur.
// ══════════════════════════════════════════════════════════════════════════════
const TextoTextarea = React.memo(({ initialValue, placeholder, rows, onCommit }) => {
  const [val, setVal] = useState(initialValue);
  const prevRef = useRef(initialValue);
  useEffect(() => {
    if (initialValue !== prevRef.current) {
      setVal(initialValue);
      prevRef.current = initialValue;
    }
  }, [initialValue]);
  return (
    <textarea
      className="inp"
      rows={rows || 3}
      value={val}
      onChange={e => setVal(e.target.value)}
      onBlur={() => onCommit(val)}
      placeholder={placeholder}
      style={{ resize: 'vertical', minHeight: `${(rows || 3) * 1.6}em` }}
    />
  );
});

    tamanoFuente:       'normal',    // compacto | normal | grande

    orientacion:        'vertical',

    // ── ORDEN Y ESTRUCTURA DE SECCIONES ───────────────────────────────
    // Cada sección tiene: id, visible, orden, titulo personalizable
    secciones: [
      { id:'kpis',         label:'Resumen Ejecutivo / KPIs',    visible:true,  orden:1,  titulo:'RESUMEN EJECUTIVO' },
      { id:'tareas',       label:'Tareas y Actividades',        visible:true,  orden:2,  titulo:'ACTIVIDADES Y TAREAS' },
      { id:'compromisos',  label:'Compromisos Registrados',     visible:true,  orden:3,  titulo:'COMPROMISOS REGISTRADOS' },
      { id:'facturas',     label:'Facturación',                 visible:true,  orden:4,  titulo:'FACTURACION Y COBROS' },
      { id:'anticipos',    label:'Anticipos y Gastos',          visible:true,  orden:5,  titulo:'ANTICIPOS Y GASTOS' },
      { id:'equipo',       label:'Equipo de Trabajo',           visible:true,  orden:6,  titulo:'EQUIPO DE TRABAJO' },
      { id:'justificaciones', label:'Justificaciones',          visible:true,  orden:7,  titulo:'JUSTIFICACIONES DE INCUMPLIMIENTO' },
      { id:'responsables', label:'Responsables del Informe',    visible:true,  orden:8,  titulo:'RESPONSABLES DEL INFORME' },
    ],

    // ── TEXTOS EDITABLES ──────────────────────────────────────────────
    tituloDocumento:     'INFORME DE GESTION',
    subtituloDocumento:  '',
    textosSeccion: {
      introduccion:  '',
      conclusion:    '',
      observaciones: '',
    },

    // ── ENCABEZADO Y PIE DE PÁGINA ────────────────────────────────────
    piePersonalizado:    '',
    notasAdicionales:    '',
    mostrarNumeroPagina: true,
    mostrarFechaGeneracion: true,

    // ── RESPONSABLES / FIRMAS ─────────────────────────────────────────
    responsablesPDF: [
      { nombre: 'Sara Valencia Hincapie',       cargo: 'Especialista SST',        area: 'Seguridad y Salud en el Trabajo' },
      { nombre: 'Adolfo de Jesus Ibanez Berrio', cargo: 'Consultor de Personal',  area: 'Administracion de Personal' },
      { nombre: 'Yair Alonso Cardona Lopez',     cargo: 'Consultor Juridico',     area: 'Consultoria Juridica' },
    ],
    mostrarFirmas: false,
  };

  // ── Estado ────────────────────────────────────────────────────────
  const [pdfCfg, setPdfCfg] = useState(() => {
    try {
      const stored = JSON.parse(localStorage.getItem('ip_pdf_personalizar')||'null');
      if(!stored) return DEFAULT_CFG;
      // Merge: garantizar que secciones y responsablesPDF tengan estructura completa
      return {
        ...DEFAULT_CFG,
        ...stored,
        secciones: stored.secciones && stored.secciones.length
          ? stored.secciones
          : DEFAULT_CFG.secciones,
        responsablesPDF: stored.responsablesPDF && stored.responsablesPDF.length
          ? stored.responsablesPDF
          : DEFAULT_CFG.responsablesPDF,
        textosSeccion: { ...DEFAULT_CFG.textosSeccion, ...(stored.textosSeccion||{}) },
      };
    } catch(_) { return DEFAULT_CFG; }
  });

  // Tab activo dentro del panel Personalizar
  const [panelTab, setPanelTab] = useState('diseno'); // diseno | secciones | textos | responsables
  // Drag & drop para reordenar secciones
  const [dragIdx, setDragIdx]   = useState(null);

  // ── Persistencia global ───────────────────────────────────────────
  const saveCfg = (updates) => {
    const next = { ...pdfCfg, ...updates };
    setPdfCfg(next);
    localStorage.setItem('ip_pdf_personalizar', JSON.stringify(next));
    window.dispatchEvent(new CustomEvent('ip-pdf-config-updated', { detail: next }));
    toast('Configuracion guardada', 'success');
  };

  // Guardar silenciosamente (sin toast) — para cambios continuos como inputs
  const saveSilent = (updates) => {
    const next = { ...pdfCfg, ...updates };
    setPdfCfg(next);
    localStorage.setItem('ip_pdf_personalizar', JSON.stringify(next));
    window.dispatchEvent(new CustomEvent('ip-pdf-config-updated', { detail: next }));
  };

  const resetCfg = () => {
    setPdfCfg(DEFAULT_CFG);
    localStorage.setItem('ip_pdf_personalizar', JSON.stringify(DEFAULT_CFG));
    window.dispatchEvent(new CustomEvent('ip-pdf-config-updated', { detail: DEFAULT_CFG }));
    toast('Configuracion restablecida a valores por defecto', 'info');
  };

  // ── Helpers de secciones ─────────────────────────────────────────
  const seccionesOrdenadas = useMemo(() =>
    [...(pdfCfg.secciones||DEFAULT_CFG.secciones)].sort((a,b)=>a.orden-b.orden),
  [pdfCfg.secciones]);

  const toggleSeccion = (id) => {
    const next = (pdfCfg.secciones||DEFAULT_CFG.secciones).map(s =>
      s.id === id ? { ...s, visible: !s.visible } : s
    );
    saveSilent({ secciones: next });
  };

  // FASE 6 FIX — commitTituloSeccion usa saveSilent (sin toast).
  // saveCfg dispara toast('Configuracion guardada') → spam en cada onBlur.
  // saveSilent persiste silenciosamente y dispara ip-pdf-config-updated para el PDF.
  const commitTituloSeccion = (id, titulo) => {
    const next = (pdfCfg.secciones||DEFAULT_CFG.secciones).map(s =>
      s.id === id ? { ...s, titulo } : s
    );
    saveSilent({ secciones: next });
  };

  // FASE 4 — Agregar Sección personalizada
  const agregarSeccion = () => {
    const newId = 'custom_' + Date.now();
    const nuevoOrden = (pdfCfg.secciones||DEFAULT_CFG.secciones).length + 1;
    const nueva = {
      id: newId,
      label: 'Nueva Sección',
      titulo: 'NUEVA SECCIÓN',
      visible: true,
      orden: nuevoOrden,
      custom: true,
    };
    const next = [...(pdfCfg.secciones||DEFAULT_CFG.secciones), nueva];
    saveSilent({ secciones: next });   // silencioso — confirma sin spam de toast
    toast('Sección agregada', 'success');
  };

  // FASE 4 — Eliminar sección personalizada (solo las creadas por el usuario)
  const eliminarSeccion = (id) => {
    const next = (pdfCfg.secciones||DEFAULT_CFG.secciones).filter(s => s.id !== id);
    saveSilent({ secciones: next });
    toast('Sección eliminada', 'success');
  };

  // Drag & drop reorden de secciones
  const onDragStart = (e, idx) => {
    setDragIdx(idx);
    e.dataTransfer.effectAllowed = 'move';
  };
  const onDragOver = (e, idx) => {
    e.preventDefault();
    if(dragIdx === null || dragIdx === idx) return;
    const arr = [...seccionesOrdenadas];
    const [moved] = arr.splice(dragIdx, 1);
    arr.splice(idx, 0, moved);
    const reordered = arr.map((s, i) => ({ ...s, orden: i+1 }));
    setPdfCfg(p => ({ ...p, secciones: reordered }));
    setDragIdx(idx);
  };
  const onDragEnd = () => {
    setDragIdx(null);
    // Guardar el orden final
    localStorage.setItem('ip_pdf_personalizar', JSON.stringify(pdfCfg));
    window.dispatchEvent(new CustomEvent('ip-pdf-config-updated', { detail: pdfCfg }));
    toast('Orden de secciones guardado', 'success');
  };

  // ── Helpers de responsables ─────────────────────────────────────
  const addResponsable = () => {
    const next = [...(pdfCfg.responsablesPDF||[]), { nombre:'', cargo:'', area:'' }];
    saveSilent({ responsablesPDF: next });
  };
  const updateResponsable = (idx, patch) => {
    const arr = [...(pdfCfg.responsablesPDF||[])];
    arr[idx] = { ...arr[idx], ...patch };
    saveSilent({ responsablesPDF: arr });
  };
  const removeResponsable = (idx) => {
    const next = (pdfCfg.responsablesPDF||[]).filter((_,i) => i !== idx);
    saveSilent({ responsablesPDF: next });
  };

  // ── Sub-componentes UI ───────────────────────────────────────────
  const Toggle = ({ label, field, desc, value, onChange }) => {
    const on = value !== undefined ? value : pdfCfg[field] !== false;
    const handleClick = onChange
      ? () => onChange(!on)
      : () => saveSilent({ [field]: !on });

      <div onClick={handleClick} style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        padding:'10px 14px', marginBottom:5, cursor:'pointer', borderRadius:8,

        transition: 'all .15s',
      }}>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:12, fontWeight:600, color: on?'#e2e8f0':'#64748b', margin:0}}>{label}</p>
          {desc && <p style={{fontSize:10, color:'#475569', margin:'2px 0 0'}}>{desc}</p>}
        </div>
        <div style={{
          width:36, height:20, borderRadius:99, position:'relative', flexShrink:0, marginLeft:12,
          background: on ? '#C9A84C' : '#334155', transition:'background .2s',
        }}>
          <div style={{
            position:'absolute', top:2, width:16, height:16, borderRadius:'50%',
            background:'#fff', transition:'left .2s', left: on ? 18 : 2,
          }}/>
        </div>
      </div>
    );
  };

  const ST = ({ title, subtitle }) => (
    <div style={{marginBottom:14, paddingBottom:8, borderBottom:'1px solid rgba(201,168,76,.2)'}}>
      <p style={{
        fontSize:11, fontWeight:700, color:'#C9A84C', textTransform:'uppercase',
        letterSpacing:'.5px', margin:0,
      }}>{title}</p>
      {subtitle && <p style={{fontSize:10, color:'#475569', margin:'3px 0 0'}}>{subtitle}</p>}
    </div>
  );

  const Field = ({ label, children, half }) => (
    <div style={{marginBottom:12, ...(half ? {} : {})}}>
      <label style={{fontSize:11, color:'#64748b', fontWeight:600, display:'block', marginBottom:5, textTransform:'uppercase', letterSpacing:'.3px'}}>
        {label}
      </label>
      {children}
    </div>
  );

  const Select = ({ value, onChange, options, style={} }) => (
    <select className="inp" value={value} onChange={e=>onChange(e.target.value)}
      style={{fontSize:12, ...style}}>
      {options.map(([val,lab]) => <option key={val} value={val}>{lab}</option>)}
    </select>
  );

  // ── Paleta de colores de encabezado ──────────────────────────────
  const COLOR_PRESETS = [
    { key:'navy',  hex:'#1E3A5F', label:'Azul Corporativo' },
    { key:'dark',  hex:'#111827', label:'Negro Profesional' },
    { key:'verde', hex:'#065F46', label:'Verde Corporativo' },
    { key:'bordo', hex:'#7F1D1D', label:'Bordo Institucional' },
    { key:'slate', hex:'#1E293B', label:'Azul Pizarra' },
    { key:'custom',hex: pdfCfg.colorPersonalizadoHex||'#1E3A5F', label:'Personalizado' },
  ];

  const hexToRgb = (hex) => {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgb(${r},${g},${b})`;
  };

  const getHeaderHex = () => {
    const preset = COLOR_PRESETS.find(c=>c.key===pdfCfg.colorEncabezado);
    if(preset && preset.key !== 'custom') return preset.hex;
    return pdfCfg.colorPersonalizadoHex || '#1E3A5F';
  };

  // ── TAB: Diseño y Formato ────────────────────────────────────────
  const renderDiseno = () => (
    <div>
      {/* Vista previa del encabezado */}
      <div style={{
        borderRadius:10, overflow:'hidden', marginBottom:18,
        border:'1px solid #243447', boxShadow:'0 4px 20px rgba(0,0,0,.4)',
      }}>
        <div style={{
          background: getHeaderHex(), padding:'14px 18px',
          display:'flex', justifyContent:'space-between', alignItems:'center',
        }}>
          <div style={{display:'flex', alignItems:'center', gap:12}}>
            <div style={{
              width:32, height:32, borderRadius:6, background:'rgba(255,255,255,.15)',
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:14,
            }}>🏢</div>
            <div>
              <p style={{fontSize:12, fontWeight:700, color:'#fff', margin:0}}>Integra Consultores GR</p>
              <p style={{fontSize:9, color:'rgba(255,255,255,.65)', margin:0}}>NIT: 900.000.000-0</p>
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <p style={{fontSize:11, fontWeight:700, color:pdfCfg.colorAcentoHex||'#C9A84C', margin:0}}>
              {pdfCfg.tituloDocumento||'INFORME DE GESTION'}
            </p>
            <p style={{fontSize:9, color:'rgba(255,255,255,.6)', margin:0}}>Vista previa del encabezado</p>
          </div>
        </div>
        <div style={{
          padding:'10px 18px', background:'rgba(201,168,76,.08)',
          borderTop:`3px solid ${pdfCfg.colorAcentoHex||'#C9A84C'}`,
          display:'flex', gap:8,
        }}>
          {['Resumen Ejecutivo','Actividades','Compromisos'].map(s=>(
            <div key={s} style={{
              padding:'4px 12px', borderRadius:4,
              background: getHeaderHex(), color:'#fff', fontSize:10, fontWeight:600,
            }}>{s}</div>
          ))}
        </div>
      </div>

      <ST title="Tipografía y Escala" subtitle="Configurar el tamaño y familia de fuente del documento"/>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14}}>
        <Field label="Tamaño de fuente">
          <Select value={pdfCfg.tamanoFuente||'normal'} onChange={v=>saveCfg({tamanoFuente:v})}
            options={[['compacto','Compacto (más contenido)'],['normal','Normal (recomendado)'],['grande','Grande (más legible)']]}/>
        </Field>
        <Field label="Familia tipográfica">
          <Select value={pdfCfg.familiaFuente||'helvetica'} onChange={v=>saveCfg({familiaFuente:v})}
            options={[['helvetica','Helvetica (Sans-Serif)'],['times','Times (Serif)'],['courier','Courier (Monospace)']]}/>
        </Field>
        <Field label="Espaciado entre secciones">
          <Select value={pdfCfg.espaciadoSecciones||'normal'} onChange={v=>saveCfg({espaciadoSecciones:v})}
            options={[['compacto','Compacto'],['normal','Normal'],['amplio','Amplio']]}/>
        </Field>
        <Field label="Alineación del texto">
          <Select value={pdfCfg.alineacionTexto||'left'} onChange={v=>saveCfg({alineacionTexto:v})}
            options={[['left','Izquierda'],['justify','Justificado']]}/>
        </Field>
      </div>

      <ST title="Márgenes y Espaciado" subtitle="Configura los márgenes del documento PDF"/>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14}}>
        <Field label="Márgenes del documento">
          <Select value={pdfCfg.margen||'normal'} onChange={v=>saveCfg({margen:v})}
            options={[['estrecho','Estrecho  (10 mm)'],['normal','Normal  (14 mm)'],['amplio','Amplio  (20 mm)']]}/>
        </Field>
        <Field label="Alineación del logo">
          <Select value={pdfCfg.logoAlineacion||'izquierda'} onChange={v=>saveCfg({logoAlineacion:v})}
            options={[['izquierda','Izquierda'],['centro','Centro'],['derecha','Derecha']]}/>
        </Field>
      </div>

      <ST title="Paleta Corporativa" subtitle="Define los colores del encabezado, secciones y acentos"/>

      {/* Selector de color de encabezado */}
      <Field label="Color del encabezado y secciones">
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginBottom:8}}>
          {COLOR_PRESETS.filter(c=>c.key!=='custom').map(preset=>(
            <div key={preset.key} onClick={()=>saveCfg({colorEncabezado:preset.key})}
              style={{
                borderRadius:8, overflow:'hidden', cursor:'pointer', transition:'all .15s',
                border:`2px solid ${pdfCfg.colorEncabezado===preset.key?'#C9A84C':'transparent'}`,
                boxShadow: pdfCfg.colorEncabezado===preset.key ? '0 0 0 3px rgba(201,168,76,.25)' : 'none',
              }}>
              <div style={{height:28, background:preset.hex}}/>
              <div style={{padding:'4px 8px', background:'#0f1923'}}>
                <p style={{fontSize:10, color:'#94a3b8', margin:0, textAlign:'center'}}>{preset.label}</p>
              </div>
            </div>
          ))}
        </div>
        {/* Opción personalizada */}
        <div style={{
          padding:'10px 12px', borderRadius:8, background:'#0f1923', border:'1px solid #243447',
          display:'flex', alignItems:'center', gap:10,
        }}>
          <input type="color" value={pdfCfg.colorPersonalizadoHex||'#1E3A5F'}
            onChange={e=>saveSilent({colorEncabezado:'custom',colorPersonalizadoHex:e.target.value})}
            onBlur={e=>saveCfg({colorEncabezado:'custom',colorPersonalizadoHex:e.target.value})}
            style={{width:42,height:34,borderRadius:6,border:'1px solid #334155',background:'transparent',cursor:'pointer',padding:2}}/>
          <input className="inp" value={pdfCfg.colorPersonalizadoHex||'#1E3A5F'}
            onChange={e=>saveSilent({colorEncabezado:'custom',colorPersonalizadoHex:e.target.value})}
            onBlur={e=>saveCfg({colorEncabezado:'custom',colorPersonalizadoHex:e.target.value})}
            style={{flex:1,fontSize:12}} placeholder="#1E3A5F"/>
          <span style={{fontSize:11, color:'#475569'}}>Color personalizado</span>
        </div>
      </Field>

      <Field label="Color de acentos (líneas, badges)">
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          {['#C9A84C','#60a5fa','#4ade80','#f59e0b','#e879f9','#f87171'].map(hex=>(
            <div key={hex} onClick={()=>saveCfg({colorAcentoHex:hex})}
              style={{
                width:28, height:28, borderRadius:'50%', background:hex, cursor:'pointer',
                border:`3px solid ${pdfCfg.colorAcentoHex===hex?'#fff':'transparent'}`,
                boxShadow: pdfCfg.colorAcentoHex===hex ? `0 0 0 2px ${hex}` : 'none',
                transition:'all .15s',
              }}/>
          ))}
          <input type="color" value={pdfCfg.colorAcentoHex||'#C9A84C'}
            onChange={e=>saveSilent({colorAcentoHex:e.target.value})}
            onBlur={e=>saveCfg({colorAcentoHex:e.target.value})}
            style={{width:34,height:34,borderRadius:'50%',border:'2px dashed #334155',background:'transparent',cursor:'pointer',padding:2}}/>
        </div>
      </Field>

      <ST title="Encabezado y Pie de Página" subtitle="Controla qué elementos aparecen en el encabezado y pie"/>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:6}}>
        <Toggle label="Logo institucional"     field="mostrarLogo"         desc="Logo en portada y encabezado"/>
        <Toggle label="NIT"                    field="mostrarNIT"          desc="En pie de página"/>
        <Toggle label="Teléfono"               field="mostrarTelefono"     desc="En encabezado y pie"/>
        <Toggle label="Dirección"              field="mostrarDireccion"    desc="En encabezado"/>
        <Toggle label="Email corporativo"      field="mostrarEmail"        desc="En encabezado"/>
        <Toggle label="Número de página"       field="mostrarNumeroPagina" desc="Pág. X de Y"/>
        <Toggle label="Fecha de generación"    field="mostrarFechaGeneracion" desc="En portada"/>
        <Toggle label="Introducción"           field="mostrarIntroduccion" desc="Párrafo introductorio"/>
      </div>
    </div>
  );

  // ── TAB: Gestión de Secciones ────────────────────────────────────
  const renderSecciones = () => (
    <div>
      <ST title="Estructura del Documento"
        subtitle="Activa, desactiva o reordena las secciones arrastrando. Edita los títulos directamente."/>

      <div style={{
        padding:'8px 12px', marginBottom:14, borderRadius:8,
        background:'rgba(96,165,250,.08)', border:'1px solid rgba(96,165,250,.25)',
        display:'flex', alignItems:'center', gap:8,
      }}>
        <span style={{fontSize:14}}>💡</span>
        <p style={{fontSize:11, color:'#93c5fd', margin:0}}>
          Arrastra las secciones para reordenarlas. Los cambios se aplican a todos los PDFs generados.
        </p>
      </div>

      {/* Lista drag & drop */}
      <div style={{display:'flex', flexDirection:'column', gap:6}}>
        {seccionesOrdenadas.map((sec, idx) => (
          <div key={sec.id}
            draggable
            onDragStart={e=>onDragStart(e,idx)}
            onDragOver={e=>onDragOver(e,idx)}
            onDragEnd={onDragEnd}
            style={{
              display:'flex', alignItems:'center', gap:10,
              padding:'10px 12px', borderRadius:9,
              background: sec.visible ? 'rgba(30,58,95,.25)' : '#0f1923',
              border: `1px solid ${sec.visible ? 'rgba(96,165,250,.3)' : '#243447'}`,
              cursor:'grab', transition:'all .15s',
              opacity: dragIdx === idx ? .5 : 1,
            }}>
            {/* Handle drag */}
            <div style={{color:'#334155', fontSize:14, flexShrink:0, cursor:'grab'}}>⠿</div>
            {/* Número de orden */}
            <div style={{
              width:22, height:22, borderRadius:'50%', flexShrink:0,
              background: sec.visible ? 'rgba(201,168,76,.2)' : 'rgba(51,65,85,.4)',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:10, fontWeight:700, color: sec.visible ? '#C9A84C' : '#475569',
            }}>{idx+1}</div>
            {/* Toggle visible */}
            <div onClick={()=>toggleSeccion(sec.id)} style={{
              width:32, height:18, borderRadius:99, position:'relative', flexShrink:0, cursor:'pointer',
              background: sec.visible ? '#C9A84C' : '#334155', transition:'background .2s',
            }}>
              <div style={{
                position:'absolute', top:2, width:14, height:14, borderRadius:'50%',
                background:'#fff', transition:'left .2s', left: sec.visible ? 16 : 2,
              }}/>
            </div>
            {/* Etiqueta y título editable — FASE 6 FIX: input con estado local para evitar pérdida de cursor */}
            <div style={{flex:1, minWidth:0}}>
              <p style={{fontSize:10, color:'#475569', margin:'0 0 2px', textTransform:'uppercase', letterSpacing:'.3px'}}>
                {sec.label}{sec.custom ? ' ✦ Personalizada' : ''}
              </p>
              <SeccionTituloInput
                key={sec.id}
                secId={sec.id}
                initialValue={sec.titulo||''}
                visible={sec.visible}
                onCommit={commitTituloSeccion}
              />
            </div>
            {/* Indicador estado */}
            <span style={{
              fontSize:9, fontWeight:700, padding:'2px 7px', borderRadius:99, flexShrink:0,
              background: sec.visible ? 'rgba(74,222,128,.15)' : 'rgba(100,116,139,.15)',
              color:       sec.visible ? '#4ade80'              : '#64748b',
              border:`1px solid ${sec.visible ? 'rgba(74,222,128,.3)' : '#243447'}`,
            }}>
              {sec.visible ? 'Activa' : 'Oculta'}
            </span>
            {/* FASE 4: Botón eliminar solo para secciones personalizadas */}
            {sec.custom && (
              <button
                title="Eliminar sección personalizada"
                onClick={() => eliminarSeccion(sec.id)}
                style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',padding:'2px 4px',borderRadius:4,flexShrink:0}}
              ><Ico n="trash" s={13}/></button>
            )}
          </div>
        ))}
      </div>

      {/* FASE 4: Botón "Agregar Sección" */}
      <button
        onClick={agregarSeccion}
        style={{
          marginTop:12, width:'100%', display:'flex', alignItems:'center', justifyContent:'center',
          gap:8, padding:'9px 0', borderRadius:9, cursor:'pointer', fontSize:12, fontWeight:600,
          background:'rgba(201,168,76,.08)', border:'1px dashed rgba(201,168,76,.35)',
          color:'#C9A84C', transition:'all .15s',
        }}
        onMouseEnter={e=>{e.currentTarget.style.background='rgba(201,168,76,.15)';}}
        onMouseLeave={e=>{e.currentTarget.style.background='rgba(201,168,76,.08)';}}
      >
        <Ico n="plus" s={14}/> Agregar Sección
      </button>

      {/* Resumen */}
      <div style={{
        marginTop:12, padding:'10px 14px', borderRadius:8,
        background:'rgba(51,65,85,.2)', border:'1px solid #243447',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}>
        <p style={{fontSize:11, color:'#64748b', margin:0}}>
          {seccionesOrdenadas.filter(s=>s.visible).length} secciones activas de {seccionesOrdenadas.length} disponibles
        </p>
        <button className="btn btn-ghost btn-sm" onClick={()=>{
          const todas = (pdfCfg.secciones||DEFAULT_CFG.secciones).map(s=>({...s,visible:true}));
          saveCfg({secciones:todas});
        }}>Activar todas</button>
      </div>
    </div>
  );

  // ── TAB: Textos y Contenido ──────────────────────────────────────
  // CAUSA RAÍZ del bug "cursor salta al inicio":
  // onChange → saveSilent → setPdfCfg → re-render PersonalizarTab
  // → el input/textarea se reconstruye → cursor al inicio, foco perdido.
  // SOLUCIÓN: cada campo usa estado local (no toca pdfCfg en cada tecla).
  // El valor sube al padre ÚNICAMENTE en onBlur mediante saveCfg/saveSilent.
  // Mismo patrón que SeccionTituloInput (sección Estructura).
  const renderTextos = () => (
    <div>
      <ST title="Textos del Documento"
        subtitle="Personaliza los textos que aparecen en el PDF. Se aplican automáticamente en la generación."/>

      <Field label="Título principal del documento">
        <TextoInput
          initialValue={pdfCfg.tituloDocumento||'INFORME DE GESTION'}
          placeholder="INFORME DE GESTION"
          onCommit={v=>saveCfg({tituloDocumento:v})}
        />
        <p style={{fontSize:10, color:'#475569', margin:'4px 0 0'}}>
          Aparece en la portada y encabezado de cada página
        </p>
      </Field>

      <Field label="Subtítulo de portada (opcional)">
        <TextoInput
          initialValue={pdfCfg.subtituloDocumento||''}
          placeholder="Ej: Período Enero – Junio 2025"
          onCommit={v=>saveCfg({subtituloDocumento:v})}
        />
      </Field>

      <Field label="Texto de Introducción">
        <TextoTextarea
          rows={4}
          initialValue={pdfCfg.textosSeccion?.introduccion||''}
          placeholder="Texto introductorio que aparecerá al inicio del informe..."
          onCommit={v=>saveCfg({textosSeccion:{...(pdfCfg.textosSeccion||{}),introduccion:v}})}
        />
        <p style={{fontSize:10, color:'#475569', margin:'4px 0 0'}}>
          Se incluirá en la sección INTRODUCCION del PDF si está activada
        </p>
      </Field>

      <Field label="Conclusión del Informe">
        <TextoTextarea
          rows={3}
          initialValue={pdfCfg.textosSeccion?.conclusion||''}
          placeholder="Párrafo de cierre y conclusiones generales..."
          onCommit={v=>saveCfg({textosSeccion:{...(pdfCfg.textosSeccion||{}),conclusion:v}})}
        />
      </Field>

      <Field label="Observaciones Estándar">
        <TextoTextarea
          rows={3}
          initialValue={pdfCfg.textosSeccion?.observaciones||''}
          placeholder="Observaciones que se incluirán en el informe de forma estándar..."
          onCommit={v=>saveCfg({textosSeccion:{...(pdfCfg.textosSeccion||{}),observaciones:v}})}
        />
      </Field>

      <ST title="Encabezado y Pie" subtitle="Textos adicionales en cada página"/>

      <Field label="Texto personalizado en pie de página">
        <TextoInput
          initialValue={pdfCfg.piePersonalizado||''}
          placeholder="Ej: Documento confidencial – Integra Consultores GR"
          onCommit={v=>saveCfg({piePersonalizado:v})}
        />
        <p style={{fontSize:10, color:'#475569', margin:'4px 0 0'}}>
          Aparece centrado en el pie de todas las páginas
        </p>
      </Field>

      <Field label="Notas adicionales (al final del informe)">
        <TextoTextarea
          rows={3}
          initialValue={pdfCfg.notasAdicionales||''}
          placeholder="Observaciones o información adicional al cierre del documento..."
          onCommit={v=>saveCfg({notasAdicionales:v})}
        />
      </Field>
    </div>
  );

  // ── TAB: Responsables / Firmas ───────────────────────────────────
  const renderResponsables = () => (
    <div>
      <ST title="Responsables del Informe"
        subtitle="Configura los datos de los responsables que aparecerán al final del documento PDF"/>

      <Toggle label="Mostrar sección de responsables"
        field="mostrarResponsablesInforme"
        desc="Muestra el recuadro con responsables al final del PDF"/>
      <Toggle label="Mostrar línea de firma"
        field="mostrarFirmas"
        desc="Incluye espacio para firma física en el documento impreso"
        value={pdfCfg.mostrarFirmas}
        onChange={v=>saveCfg({mostrarFirmas:v})}/>

      <div style={{height:12}}/>

      {/* Lista de responsables */}
      {(pdfCfg.responsablesPDF||[]).map((resp, idx) => (
        <div key={idx} style={{
          padding:'12px 14px', borderRadius:10, marginBottom:10,
          background:'#0f1923', border:'1px solid #243447',
        }}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
            <span style={{
              fontSize:10, fontWeight:700, color:'#C9A84C', textTransform:'uppercase', letterSpacing:'.3px',
            }}>Responsable #{idx+1}</span>
            <button onClick={()=>removeResponsable(idx)}
              style={{
                background:'rgba(153,27,27,.3)', border:'1px solid rgba(248,113,113,.3)',
                borderRadius:6, color:'#fca5a5', fontSize:11, fontWeight:700, cursor:'pointer', padding:'2px 9px',
              }}>✕</button>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
            <div>
              <label style={{fontSize:10, color:'#64748b', fontWeight:600, display:'block', marginBottom:4}}>Nombre completo</label>
              <input className="inp" value={resp.nombre||''}
                onChange={e=>updateResponsable(idx,{nombre:e.target.value})}
                onBlur={()=>saveCfg({responsablesPDF:pdfCfg.responsablesPDF})}
                placeholder="Nombre del responsable"/>
            </div>
            <div>
              <label style={{fontSize:10, color:'#64748b', fontWeight:600, display:'block', marginBottom:4}}>Cargo</label>
              <input className="inp" value={resp.cargo||''}
                onChange={e=>updateResponsable(idx,{cargo:e.target.value})}
                onBlur={()=>saveCfg({responsablesPDF:pdfCfg.responsablesPDF})}
                placeholder="Cargo o título"/>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <label style={{fontSize:10, color:'#64748b', fontWeight:600, display:'block', marginBottom:4}}>Área de especialidad</label>
              <input className="inp" value={resp.area||''}
                onChange={e=>updateResponsable(idx,{area:e.target.value})}
                onBlur={()=>saveCfg({responsablesPDF:pdfCfg.responsablesPDF})}
                placeholder="Ej: Seguridad y Salud en el Trabajo"/>
            </div>
          </div>
        </div>
      ))}

      <button className="btn btn-ghost btn-sm" onClick={addResponsable}
        style={{width:'100%', justifyContent:'center', marginTop:4}}>
        + Agregar Responsable
      </button>

      {/* Vista previa del bloque de responsables */}
      {(pdfCfg.responsablesPDF||[]).length > 0 && (
        <div style={{
          marginTop:16, padding:'14px', borderRadius:10,
          background:'rgba(30,58,95,.15)', border:'1px solid rgba(96,165,250,.2)',
        }}>
          <p style={{fontSize:10, color:'#60a5fa', fontWeight:700, margin:'0 0 10px', textTransform:'uppercase', letterSpacing:'.4px'}}>
            Vista previa del bloque de responsables
          </p>
          <div style={{
            padding:'12px', borderRadius:8, background:'#fff',
            border:`2px solid ${getHeaderHex()}`,
          }}>
            <p style={{fontSize:11, fontWeight:700, color:getHeaderHex(), margin:'0 0 8px', borderBottom:`1px solid ${getHeaderHex()}`, paddingBottom:4}}>
              Responsables del Informe
            </p>
            {(pdfCfg.responsablesPDF||[]).map((r,i)=>(
              <div key={i} style={{marginBottom:6}}>
                <p style={{fontSize:11, fontWeight:700, color:'#1e293b', margin:0}}>{r.nombre||'—'}</p>
                <p style={{fontSize:10, color:'#64748b', margin:0}}>{r.cargo||'—'} · {r.area||'—'}</p>
                {pdfCfg.mostrarFirmas && (
                  <div style={{marginTop:4, borderTop:'1px solid #e2e8f0', paddingTop:2}}>
                    <p style={{fontSize:9, color:'#94a3b8', margin:0}}>_________________________  Firma</p>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );

  // ── RENDER PRINCIPAL ─────────────────────────────────────────────
  const TABS_P = [
    { id:'diseno',       icon:'🎨', label:'Diseño y Formato' },
    { id:'secciones',    icon:'📐', label:'Estructura' },
    { id:'textos',       icon:'✏️', label:'Textos y Contenido' },
    { id:'responsables', icon:'👤', label:'Responsables' },
  ];

  return (
    <div>
      {/* Header del panel */}
      <div style={{
        display:'flex', justifyContent:'space-between', alignItems:'flex-start',
        marginBottom:16, padding:'14px 16px', borderRadius:10,
        background:'rgba(30,58,95,.2)', border:'1px solid rgba(96,165,250,.2)',
      }}>
        <div>
          <h3 className="sy" style={{color:'#fff', fontWeight:700, fontSize:14, margin:'0 0 5px', display:'flex', alignItems:'center', gap:8}}>
            🎨 Personalización Avanzada de PDFs
          </h3>
          <p style={{fontSize:11, color:'#64748b', margin:0}}>
            Plantilla maestra centralizada · Cambios aplicados globalmente a todos los módulos
          </p>
        </div>
        <div style={{display:'flex', gap:8, flexShrink:0}}>
          <button className="btn btn-ghost btn-sm" onClick={resetCfg}
            style={{fontSize:11}}>↩ Restablecer</button>
        </div>
      </div>

      {/* Indicador SST */}
      <div style={{
        display:'flex', alignItems:'center', gap:8, padding:'8px 14px',
        borderRadius:8, marginBottom:16,
        background:'rgba(74,222,128,.06)', border:'1px solid rgba(74,222,128,.2)',
      }}>
        <span style={{fontSize:13}}>✅</span>
        <p style={{fontSize:11, color:'#4ade80', margin:0, fontWeight:600}}>
          Plantilla Global Activa — Todos los módulos consumen esta configuración
        </p>
      </div>

      {/* Sub-tabs del panel Personalizar */}
      <div style={{
        display:'flex', gap:4, marginBottom:18, flexWrap:'wrap',
        borderBottom:'1px solid #243447', paddingBottom:10,
      }}>
        {TABS_P.map(tab=>(
          <button key={tab.id} onClick={()=>setPanelTab(tab.id)}
            style={{
              display:'flex', alignItems:'center', gap:6,
              padding:'7px 14px', borderRadius:7, cursor:'pointer',
              fontSize:11, fontWeight: panelTab===tab.id ? 700 : 500,
              background: panelTab===tab.id ? 'rgba(201,168,76,.12)' : 'transparent',
              border: panelTab===tab.id ? '1px solid rgba(201,168,76,.4)' : '1px solid transparent',
              color: panelTab===tab.id ? '#C9A84C' : '#64748b',
              transition:'all .15s',
            }}>
            <span style={{fontSize:13}}>{tab.icon}</span> {tab.label}
          </button>
        ))}
      </div>

      {/* Contenido del sub-tab */}
      <div>
        {panelTab === 'diseno'       && renderDiseno()}
        {panelTab === 'secciones'    && renderSecciones()}
        {panelTab === 'textos'       && renderTextos()}
        {panelTab === 'responsables' && renderResponsables()}
      </div>

      {/* Footer de guardado */}
      <div style={{
        marginTop:20, padding:'12px 16px', borderRadius:8,
        background:'rgba(30,58,95,.15)', border:'1px solid #243447',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}>
        <p style={{fontSize:11, color:'#475569', margin:0}}>
          Los cambios se guardan automáticamente y se aplican en la próxima generación de PDF
        </p>
        <button className="btn btn-p btn-sm" onClick={()=>saveCfg(pdfCfg)}
          style={{fontSize:11}}>
          💾 Guardar Configuración
        </button>
      </div>
    </div>
  );
};

const Config = () => {
  const {user,toast,setEquipo} = useApp();
  const [tab,setTab]=useState('empresa');
  const [cfg,setCfg]=useState(()=>JSON.parse(localStorage.getItem('ip_config')||'{}'));
  // V13-FIX-H1: estado vacío + suscripción onSnapshot via DB.sub para tiempo real
  const [usuarios,setUsuarios]=useState(()=>DB.get('usuarios'));
  const [cargos,setCargos]=useState(()=>DB.get('cargos'));
  const [servicios,setServicios]=useState(()=>DB.get('servicios'));
  const [backup,setBackup]=useState(()=>JSON.parse(localStorage.getItem('ip_backup')||'null'));
  // FIX-BACKUP-H5: historial como estado reactivo para reflejar actualizaciones en vivo
  const [backupHist,setBackupHist]=useState(()=>JSON.parse(localStorage.getItem('ip_autobackup_hist')||'[]'));
  const [openUser,setOpenUser]=useState(false);
  const [formUser,setFormUser]=useState({});
  const [qrRef,setQrRef]=useState(null);
  const [newItem,setNewItem]=useState('');
  const [openDelUser,setOpenDelUser]=useState(null);
  const [openPwd,setOpenPwd]=useState(null);
  const [formPwd,setFormPwd]=useState({newPass:'',confirmPass:''});
  const [loadingPwd,setLoadingPwd]=useState(false);
  const [loadingDel,setLoadingDel]=useState(false);
  // FASE 3: Estado para asignación de rol al nuevo cargo
  const [newCargoRol,setNewCargoRol]=useState('consultor');
  // ─────────────────────────────────────────────────────────────────────────
  const isAdmin = user?.rol==='administrador';
  const PERMS = PERM_MODS;

  // V13-FIX-H1: suscripción en tiempo real a la colección usuarios
  // Reemplaza la lectura estática única de localStorage — ahora cualquier
  // cambio en Firestore (creación, edición, desactivación) se refleja
  // automáticamente en todos los clientes sin recargar la página.
  useEffect(()=>{
    const unsub = DB.sub('usuarios', data => setUsuarios(data));
    return ()=>unsub();
  },[]);

  // FIX-BACKUP-H1+H2: suscripción al evento ip-backup-updated para mantener
  // el estado backup reactivo en Config. Sin esta suscripción, el componente
  // no re-renderizaba cuando AutoBackup.run() actualizaba ip_backup,
  // resultando en el indicador estático "Backup Manual" permanente.
  useEffect(()=>{
    const onBackupUpd = (e) => {
      const info = e.detail || JSON.parse(localStorage.getItem('ip_backup')||'null');
      setBackup(info);
      setBackupHist(JSON.parse(localStorage.getItem('ip_autobackup_hist')||'[]'));
    };
    window.addEventListener('ip-backup-updated', onBackupUpd);
    // Leer estado actual al montar (por si hubo backup antes de que se montara Config)
    const current = JSON.parse(localStorage.getItem('ip_backup')||'null');
    if(current) setBackup(current);
    return () => window.removeEventListener('ip-backup-updated', onBackupUpd);
  },[]);

  const saveCfg=c=>{setCfg(c);localStorage.setItem('ip_config',JSON.stringify(c));window.dispatchEvent(new CustomEvent('ip-config-updated'));toast('Configuración guardada','success');};

  // FASE 1 — GUARDIA ADMIN: ubicada DESPUÉS de todos los hooks (React rules of hooks)
  // Capas 1 y 2 ya bloquean en Sidebar y App. Esta es la capa 3 (defensa en profundidad).
  if(!isAdmin) {
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        height:'60vh',gap:16,color:'#475569',textAlign:'center',padding:20}}>
        <div style={{fontSize:48}}>🔒</div>
        <div>
          <p style={{fontSize:15,fontWeight:600,color:'#e2e8f0',margin:'0 0 6px'}}>Acceso Restringido</p>
          <p style={{fontSize:13,margin:0}}>Solo los Administradores pueden acceder a Configuración.</p>
        </div>
      </div>
    );
  }
  // MEJORA-4: Soporte multi-formato para logo institucional (PNG con transparencia, JPG, JPEG, WebP, SVG, GIF, BMP) (PNG con transparencia, JPG, JPEG, WebP, SVG, GIF, BMP)
  const loadLogo=e=>{
    const f=e.target.files[0];
    if(!f)return;
    // Validar MIME: aceptar todos los formatos de imagen comunes
    const MIME_OK=['image/png','image/jpeg','image/jpg','image/webp','image/svg+xml','image/gif','image/bmp','image/x-png'];
    if(!MIME_OK.includes(f.type)&&!f.type.startsWith('image/')){
      toast('Formato no soportado. Use PNG, JPG, JPEG, WebP, SVG, GIF o BMP.','error');
      return;
    }
    const r=new FileReader();
    r.onload=ev=>saveCfg({...cfg,logo:ev.target.result});
    r.onerror=()=>toast('Error al leer el archivo de logo.','error');
    r.readAsDataURL(f);
  };

  // V13-FIX-H3: saveUser reescrito como async/await.
  // Antes: fire-and-forget en Firestore (.catch solo) causaba race condition donde
  // localStorage y UI se actualizaban ANTES de confirmar escritura en Firestore.
  // Ahora: await garantiza que la UI se actualiza solo tras confirmación del servidor.
  const saveUser = async () => {
    if(!formUser.nombre?.trim()||!formUser.email?.trim()) return toast('Nombre y email requeridos','error');
    if(!formUser.id&&!formUser.password) return toast('Contraseña requerida para nuevo usuario','error');
    if(formUser.password){
      if(formUser.password.length<8||!/[A-Z]/.test(formUser.password)||!/[0-9]/.test(formUser.password))
        return toast('Contraseña: mín. 8 chars, 1 mayúscula, 1 número','error');
    }
    toast('Guardando usuario...','info');
    try {
      // Paso 1: Crear en Firebase Auth (solo usuario nuevo)
      let firebaseUid = formUser.id;
      if(!firebaseUid) {
        if(!FIREBASE_OK) return toast('Se requiere conexión Firebase para crear usuarios','error');
        const cred = await _authSecundario.createUserWithEmailAndPassword(
          formUser.email.trim(), formUser.password
        );
        firebaseUid = cred.user.uid;
        await _authSecundario.signOut();
      }
      const perfil = {
        id:       firebaseUid,
        nombre:   formUser.nombre.trim(),
        email:    formUser.email.trim().toLowerCase(),
        rol:      formUser.rol || 'consultor',
        cargo:    formUser.cargo || '',   // FASE 3: campo cargo
        activo:   formUser.activo !== false,
        permisos: formUser.permisos || {},
        creadoEn: formUser.creadoEn || new Date().toISOString(),
        _modPor:  user?.id || 'anon',
        _modEn:   new Date().toISOString(),
      };
      // Paso 2: AWAIT confirmación Firestore antes de actualizar UI
      if(FIREBASE_OK) {
        await _db.collection('usuarios').doc(firebaseUid).set(perfil, {merge:true});
      }
      // Paso 3: Actualizar caché localStorage (DB.sub propagará via onSnapshot)
      const list = formUser.id
        ? usuarios.map(x=>x.id===perfil.id?perfil:x)
        : [perfil, ...usuarios];
      localStorage.setItem('ip_usuarios', JSON.stringify(list));
      // FIX INC-3: Registrar cambio de rol explícito en ip_rol_lock
      // Esto evita que _shouldBeAdmin revierta el rol en la próxima lectura de sesión
      try {
        const locks = JSON.parse(localStorage.getItem('ip_rol_lock')||'{}');
        if(perfil.rol === 'administrador') {
          delete locks[perfil.id]; // si se restaura como admin, quitar el bloqueo
        } else {
          locks[perfil.id] = perfil.rol; // guardar el rol no-admin asignado explícitamente
        }
        localStorage.setItem('ip_rol_lock', JSON.stringify(locks));
      } catch(_){}
      // Paso 4: Auto-actualizar sesión si el admin edita su propio perfil
      if(firebaseUid === user?.id) {
        localStorage.setItem('ip_session', JSON.stringify(perfil));
        if(window.__ipSetUser) window.__ipSetUser(perfil);
      }
      setOpenUser(false);
      toast('Usuario guardado correctamente','success');
    } catch(e) {
      const msgs = {
        'auth/email-already-in-use': 'Este email ya está registrado',
        'auth/invalid-email':        'Email inválido',
        'auth/weak-password':        'Contraseña muy débil',
        'auth/operation-not-allowed':'Habilite Email/Password en Firebase Auth',
        'auth/network-request-failed':'Sin conexión a internet',
        'permission-denied':         'Sin permisos — verifique reglas Firestore',
      };
      toast(msgs[e.code] || ('Error: ' + e.message), 'error');
    }
  };

  // V13-FIX-H2: delUser desactiva en Firestore (activo:false) — preserva auditoría
  // y bloquea login. onAuthStateChanged detecta activo:false y fuerza logout automático.
  const delUser = async (id) => {
    if(id === user?.id) return toast('No puede desactivarse a usted mismo','error');
    if(!FIREBASE_OK) {
      const l=usuarios.map(u=>u.id===id?{...u,activo:false}:u);
      setUsuarios(l); localStorage.setItem('ip_usuarios',JSON.stringify(l));
      return toast('Usuario desactivado localmente (sin conexión)','warning');
    }
    try {
      await _db.collection('usuarios').doc(id).update({
        activo:false, _desactivadoEn:new Date().toISOString(), _desactivadoPor:user?.id||'anon'
      });
      const l=usuarios.map(u=>u.id===id?{...u,activo:false}:u);
      setUsuarios(l); localStorage.setItem('ip_usuarios',JSON.stringify(l));
      toast('Usuario desactivado. No podrá iniciar sesión.','success');
    } catch(e){ toast('Error al desactivar: '+e.message,'error'); }
  };

  // ── V13.1: ELIMINAR USUARIO PERMANENTEMENTE ─────────────────────────────
  // Estrategia: eliminar el documento Firestore de 'usuarios' es la acción que
  // bloquea el acceso en el servidor (onAuthStateChanged + reglas Firestore).
  // La cuenta Firebase Auth solo puede borrarse desde el SDK Admin (backend).
  // Desde el SDK cliente NO existe una API pública para borrar una cuenta ajena.
  // Por ello la función:
  //   1. Elimina el documento Firestore → acceso bloqueado de inmediato
  //   2. Elimina la caché localStorage del usuario
  //   3. Deja documentado el uid en ip_deleted_uids para que un Cloud Function
  //      o el administrador lo limpie de Firebase Auth cuando lo requiera.
  const deleteUserPermanent = async (id) => {
    if(id === user?.id) return toast('No puede eliminarse a usted mismo','error');
    if(!FIREBASE_OK) return toast('Se requiere conexión Firebase para eliminar usuarios','error');
    setLoadingDel(true);
    try {
      // Paso 1: eliminar documento en Firestore (bloquea acceso de inmediato)
      await _db.collection('usuarios').doc(id).delete();
      // Paso 2: registrar uid en colección de pendientes para limpieza Admin SDK
      try {
        await _db.collection('ip_deleted_uids').doc(id).set({
          uid: id,
          deletedBy: user?.id || 'anon',
          deletedAt: new Date().toISOString(),
          note: 'Pendiente eliminar de Firebase Auth via Admin SDK',
        });
      } catch(_) { /* no bloquear si la colección no existe */ }
      // Paso 3: actualizar caché local
      const lista = usuarios.filter(u => u.id !== id);
      setUsuarios(lista);
      localStorage.setItem('ip_usuarios', JSON.stringify(lista));
      setOpenDelUser(null);
      toast('Usuario eliminado de Firestore. La cuenta Auth quedará inactiva sin documento de perfil.','success');
    } catch(e) {
      const msgs = {
        'permission-denied': 'Sin permisos para eliminar — verifique reglas Firestore',
        'not-found':         'El usuario ya no existe en Firestore',
      };
      toast(msgs[e.code] || ('Error al eliminar: ' + e.message), 'error');
    } finally { setLoadingDel(false); }
  };

  // ── V13.1: CAMBIAR CONTRASEÑA DESDE FIREBASE ────────────────────────────
  // Estrategia: la única API del SDK cliente que permite cambiar la contraseña
  // de OTRO usuario requiere el Admin SDK (backend). Desde el cliente solo se
  // puede cambiar la contraseña del usuario ACTUALMENTE autenticado.
  //
  // Flujo implementado:
  //   a) Si el admin cambia SU PROPIA contraseña → updatePassword() directamente.
  //   b) Si el admin cambia la contraseña de OTRO usuario →
  //      - Guarda un documento temporal en Firestore colección 'ip_pwd_requests'
  //        con estado 'pendiente' (cifrado en tránsito por TLS, no persiste en claro).
  //      - Una Cloud Function 'onWrite' en esa colección llama admin.auth().updateUser()
  //        y marca el documento como 'procesado'.
  //      - Mientras la Cloud Function no esté desplegada, se muestra el procedimiento
  //        manual alternativo con enlace directo a Firebase Console.
  //
  // IMPORTANTE: Esta función NUNCA almacena la contraseña en localStorage ni en
  // logs de la aplicación. El documento en 'ip_pwd_requests' contiene un hash
  // SHA-256 solo para que la Cloud Function pueda verificar integridad; la
  // contraseña en texto plano se envía únicamente por TLS a Firestore y se borra
  // del documento una vez procesada por el Admin SDK.
  const changeUserPassword = async () => {
    const { newPass, confirmPass } = formPwd;
    if(!newPass || !confirmPass) return toast('Complete ambos campos','error');
    if(newPass !== confirmPass) return toast('Las contraseñas no coinciden','error');
    if(newPass.length < 8 || !/[A-Z]/.test(newPass) || !/[0-9]/.test(newPass))
      return toast('Contraseña: mín. 8 caracteres, 1 mayúscula, 1 número','error');
    if(!openPwd) return;
    setLoadingPwd(true);
    try {
      // Rama A: el admin cambia SU PROPIA contraseña
      if(openPwd.id === user?.id && FIREBASE_OK && _auth?.currentUser) {
        await _auth.currentUser.updatePassword(newPass);
        setOpenPwd(null); setFormPwd({newPass:'',confirmPass:''});
        toast('Contraseña actualizada correctamente en Firebase Auth','success');
        setLoadingPwd(false); return;
      }
      // Rama B: cambio de contraseña de OTRO usuario via Cloud Function
      if(!FIREBASE_OK) {
        setLoadingPwd(false);
        return toast('Se requiere conexión Firebase para cambiar contraseñas de otros usuarios','error');
      }
      // Calcular hash SHA-256 de la nueva contraseña (no almacena en claro)
      let hashHex = '';
      try {
        const encoder = new TextEncoder();
        const data    = encoder.encode(newPass);
        const hashBuf = await crypto.subtle.digest('SHA-256', data);
        hashHex = Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      } catch(_) { hashHex = 'no-crypto-support'; }

      // Escribir solicitud en Firestore — la Cloud Function la procesa y borra el campo pwd
      const requestRef = _db.collection('ip_pwd_requests').doc(openPwd.id);
      await requestRef.set({
        uid:         openPwd.id,
        email:       openPwd.email,
        pwd:         newPass,        // borrado por la CF tras procesarse
        pwdHash:     hashHex,        // para verificación de integridad
        requestedBy: user?.id || 'anon',
        requestedAt: new Date().toISOString(),
        status:      'pendiente',
      });

      // Esperar hasta 8s a que la Cloud Function marque 'procesado'
      let procesado = false;
      for(let i = 0; i < 16; i++) {
        await new Promise(r => setTimeout(r, 500));
        try {
          const snap = await requestRef.get();
          if(snap.exists && snap.data()?.status === 'procesado') {
            procesado = true;
            await requestRef.delete(); // limpiar solicitud
            break;
          }
        } catch(_) { break; }
      }

      setOpenPwd(null); setFormPwd({newPass:'',confirmPass:''});
      if(procesado) {
        toast('Contraseña actualizada correctamente en Firebase Auth','success');
      } else {
        // Cloud Function no respondió — mostrar instrucción manual
        toast(
          'Solicitud registrada. Si la Cloud Function no está activa, cambie la contraseña manualmente en Firebase Console → Authentication.',
          'warning'
        );
      }
    } catch(e) {
      const msgs = {
        'auth/requires-recent-login': 'Para cambiar su propia contraseña debe iniciar sesión nuevamente',
        'auth/weak-password':         'Contraseña demasiado débil según Firebase',
        'permission-denied':          'Sin permisos — verifique reglas Firestore para ip_pwd_requests',
      };
      toast(msgs[e.code] || ('Error: ' + e.message), 'error');
    } finally { setLoadingPwd(false); }
  };
  // ─────────────────────────────────────────────────────────────────────────

  // V13-FIX-H4: addItem y delItem sincronizan con Firestore vía DB.set/del.
  // Antes: solo localStorage — servicios y cargos no eran visibles para otros usuarios.
  // OfflineQueue maneja automáticamente el reintento si hay error de red.
  const addItem=async(col,setFn,list)=>{
    if(!newItem.trim()) return;
    const item={id:uid(),nombre:newItem.trim()};
    const arr=[...list,item];
    setFn(arr); localStorage.setItem('ip_'+col,JSON.stringify(arr)); setNewItem('');
    try { await DB.set(col,item); }
    catch(e){ console.warn('addItem Firestore ['+col+']:',e.message); }
  };
  const delItem=async(col,setFn,list,id)=>{
    const arr=list.filter(x=>x.id!==id);
    setFn(arr); localStorage.setItem('ip_'+col,JSON.stringify(arr));
    try { await DB.del(col,id); }
    catch(e){ console.warn('delItem Firestore ['+col+']:',e.message); }
  };

  const generarBackup=()=>{
    const COLS = ['tareas','clientes','equipo','proyectos','facturas','anticipos','alertas','servicios','cargos','visitas_cliente'];
    const data = {ts: new Date().toISOString(), manual: true};
    COLS.forEach(c => { data[c] = DB.get(c); });
    data.usuarios   = JSON.parse(localStorage.getItem('ip_usuarios')||'[]');
    data.cfg        = JSON.parse(localStorage.getItem('ip_config')||'{}');
    data.apariencia = JSON.parse(localStorage.getItem('ip_apariencia')||'{}');
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'INTPLANNER_backup_'+new Date().toISOString().split('T')[0]+'.json'; a.click();
    // FIX-BACKUP-H4: Llamar AutoBackup.run() para que el indicador y el historial
    // se actualicen correctamente vía evento ip-backup-updated. La descarga manual
    // no sustituye al snapshot automático — ambos deben registrarse.
    window.AutoBackup?.run();
    toast('Backup manual generado y descargado','success');
  };

  const restaurarBackup = async (file) => {
    if(!file) return;
    try {
      const text = await file.text();
      let data;
      try { data = JSON.parse(text); } catch(pe) {
        toast('Error: el archivo no es un JSON válido','error'); return;
      }
      const COLS = ['tareas','clientes','equipo','proyectos','facturas','anticipos','alertas','servicios','cargos','visitas_cliente'];

      // Validación mínima: debe tener al menos una colección o ts
      const hasContent = COLS.some(c => Array.isArray(data[c]) && data[c].length > 0) || data.ts;
      if(!hasContent) { toast('Error: el archivo de backup está vacío o tiene formato incorrecto','error'); return; }

      let total = 0;

      // ── PASO 1: Escribir TODO en localStorage de forma síncrona ──
      // Esto es lo primero y más importante — garantiza datos disponibles siempre.
      COLS.forEach(c => {
        if(Array.isArray(data[c])) {
          localStorage.setItem('ip_'+c, JSON.stringify(data[c]));
          total += data[c].length;
        }
      });
      if(data.cfg)        localStorage.setItem('ip_config',     JSON.stringify(data.cfg));
      if(data.apariencia) localStorage.setItem('ip_apariencia', JSON.stringify(data.apariencia));
      if(data.usuarios)   localStorage.setItem('ip_usuarios',   JSON.stringify(data.usuarios));

      // ── Actualizar marca de backup ──
      // ROOT-FIX-B2: incluir auto:true para que el indicador del Header muestre "Backup auto"
      const info = {ts: new Date().toISOString(), auto: true, restoredFrom: file.name, total};
      setBackup(info);
      localStorage.setItem('ip_backup', JSON.stringify(info));

      // ── Forzar un autobackup del estado restaurado ──
      window.AutoBackup?.run();

      toast(`✅ Backup restaurado: ${total} registros cargados. Recargando...`, 'success');

      // ── PASO 2: Sincronizar en Firebase en segundo plano (no bloquea el reload) ──
      const doFirebaseSync = async () => {
        if(!FIREBASE_OK || !window.IP_ONLINE) return;
        let synced = 0;
        for(const c of COLS) {
          if(!Array.isArray(data[c])) continue;
          for(const doc of data[c]) {
            if(!doc || !doc.id) continue;
            try {
              await _db.collection(c).doc(doc.id).set(doc, {merge:true});
              synced++;
            } catch(e) {
              // Encolar para sincronización posterior si falla
              if(window.OfflineQueue) window.OfflineQueue.push(c, doc, 'set');
            }
          }
        }
        console.log(`☁️ Backup restaurado en Firestore: ${synced} documentos`);
      };

      // Iniciar sincronización Firebase sin await — no bloquea el flujo
      doFirebaseSync().catch(e => console.warn('Firebase sync parcial:', e.message));

      // ── PASO 3: Recargar la app después de 2.5s para que React re-inicialice ──
      setTimeout(() => window.location.reload(), 2500);

    } catch(e) {
      console.error('restaurarBackup error:', e);
      toast('Error al restaurar: ' + (e.message || 'archivo inválido'), 'error');
    }
  };

  const [qrExpira,setQrExpira]=useState(null);
  const [qrSegundos,setQrSegundos]=useState(0);
  const [qrURL,setQrURL]=useState('');
  const qrTimerRef=useRef(null);

  const genQR=async()=>{
    if(!qrRef) return;
    toast('Generando código QR seguro...','info');
    // Limpiar temporizador anterior
    if(qrTimerRef.current) clearInterval(qrTimerRef.current);
    try {
      const token   = await QRTokenSvc.create(user);
      const qrURL   = QRTokenSvc.buildURL(token);
      const expira  = Date.now() + QRTokenSvc.TTL_MS;
      setQrExpira(expira);
      setQrSegundos(600);
      setQrURL(qrURL);
      qrRef.innerHTML='';
      new QRCode(qrRef,{
        text:       qrURL,
        width:      180,
        height:     180,
        colorDark:  '#C9A84C',
        colorLight: '#162030',
        correctLevel: QRCode.CorrectLevel.M,
      });
      toast('QR generado — válido 10 minutos','success');
      // Cuenta regresiva real
      qrTimerRef.current = setInterval(()=>{
        setQrSegundos(s=>{
          if(s<=1){
            clearInterval(qrTimerRef.current);
            if(qrRef) qrRef.innerHTML='<p style="color:#f87171;font-size:12px;text-align:center;padding:20px">QR expirado.<br/>Genere uno nuevo.</p>';
            setQrExpira(null);
            setQrURL('');
            return 0;
          }
          return s-1;
        });
      },1000);
    } catch(e){
      toast('Error generando QR: '+e.message,'error');
    }
  };

  useEffect(()=>()=>{ if(qrTimerRef.current) clearInterval(qrTimerRef.current); },[]);

  const TABS=[{id:'empresa',l:'Empresa'},{id:'apariencia',l:'Apariencia'},{id:'usuarios',l:'Usuarios'},{id:'servicios',l:'Servicios'},{id:'cargos',l:'Cargos'},{id:'personalizar',l:'🎨 Personalizar'},{id:'notificaciones',l:'🔔 Notificaciones'},{id:'backup',l:'Backup & QR'},{id:'dashboard',l:'🎛️ Dashboard'},{id:'diagnostico',l:'🔬 Diagnóstico V13'}];

  return <div className="fade">
    <div className="card-p" style={{marginBottom:12,display:'flex',alignItems:'center',gap:12}}>
      <div style={{width:40,height:40,borderRadius:'50%',background:'linear-gradient(135deg,#1E3A5F,#2a5298)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:'#fff',fontSize:16}}>
        {(user?.nombre||'A').charAt(0)}

      <div>
        <p style={{fontWeight:600,color:'#fff',fontSize:13,margin:0}}>{user?.nombre}</p>
        <p style={{fontSize:11,color:'#475569',margin:0,textTransform:'capitalize'}}>{user?.rol} · Sesión activa</p>
      </div>
      <SBadge s="activo"/>
    </div>

    <div style={{display:'flex',gap:4,marginBottom:14,overflowX:'auto',paddingBottom:4}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={clx('btn btn-sm',tab===t.id?'btn-p':'btn-ghost')}>{t.l}</button>)}
    </div>

    {tab==='empresa'&&<div className="card-p">
      <div className="gline"/>
      <div style={{display:'flex',gap:16,alignItems:'flex-start',marginBottom:18}}>
        <div style={{width:96,height:96,borderRadius:12,border:'2px solid #243447',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',background:'rgba(255,255,255,.03)',flexShrink:0}}>
          {cfg.logo?<img src={cfg.logo} alt="Logo" style={{width:88,height:88,objectFit:'contain'}}/>:<Ico n="photo" s={32} c="#334155"/>}
        </div>
        <div>
          <label className="btn btn-ghost btn-sm" style={{cursor:'pointer',display:'inline-flex',marginBottom:6}}><Ico n="up" s={13}/>Cargar Logo (200×200)<input type="file" accept="image/png,image/jpeg,image/jpg,image/webp,image/svg+xml,image/gif,image/bmp,image/*" style={{display:'none'}} onChange={loadLogo}/></label>
          <p style={{fontSize:11,color:'#475569',margin:0}}>PNG · JPG · WebP · SVG (con transparencia) · Se mostrará en login y exportables</p>
          {cfg.logo&&<button onClick={()=>saveCfg({...cfg,logo:''})} style={{fontSize:11,color:'#ef4444',background:'none',border:'none',cursor:'pointer',padding:0,marginTop:4}}>Eliminar logo</button>}
        </div>
      </div>
      <div className="grid-2">
        {[['empresa','Nombre de la Empresa'],['nit','NIT'],['adminEmail','Email Administrador'],['telefono','Teléfono']].map(([k,l])=>(
          <div key={k}><label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6}}>{l}</label><input className="inp" value={cfg[k]||''} onChange={e=>setCfg(p=>({...p,[k]:e.target.value}))}/></div>
        ))}
        <div style={{gridColumn:'1/-1'}}><label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6}}>Dirección</label><input className="inp" value={cfg.direccion||''} onChange={e=>setCfg(p=>({...p,direccion:e.target.value}))}/></div>
        <div style={{gridColumn:'1/-1'}}><label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6}}>WhatsApp Administrador</label><input className="inp" value={cfg.whatsappAdmin||''} onChange={e=>setCfg(p=>({...p,whatsappAdmin:e.target.value}))}/></div>
        {/* BLOQUE 3: Mensaje personalizable para envío de facturas por email */}
        <div style={{gridColumn:'1/-1'}}>
          <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:4}}>

            value={cfg.mensajeFactura||''} onChange={e=>setCfg(p=>({...p,mensajeFactura:e.target.value}))}/>
          <p style={{fontSize:10,color:'#475569',margin:'3px 0 0'}}>

          </p>
        </div>
        <div style={{gridColumn:'1/-1'}}>
          <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:4}}>URL de la Aplicación <span style={{color:'#C9A84C',fontSize:10}}>(requerida para QR entre dispositivos)</span></label>
          <input className="inp" value={cfg.appURL||''} onChange={e=>setCfg(p=>({...p,appURL:e.target.value}))} placeholder="https://intplanner-v12.web.app"/>
          <p style={{fontSize:10,color:'#475569',margin:'4px 0 0'}}>⓵ Esta URL se codifica en el QR para que otros dispositivos puedan acceder. Debe ser accesible desde internet (Firebase Hosting o dominio propio).</p>
        </div>
      </div>
      <button className="btn btn-g btn-sm" style={{marginTop:16}} onClick={()=>saveCfg(cfg)}><Ico n="check" s={13}/>Guardar</button>
    </div>}

    {tab==='apariencia'&&(()=>{
      const ap = JSON.parse(localStorage.getItem('ip_apariencia')||'{}');
      const setAp = (key,val) => {
        const next = {...ap,[key]:val};
        applyApariencia(next);
      };

      const temaActual   = ap.tema||'oscuro';
      const botonesActual= ap.botones||'redondeado';

              <div key={t.id} onClick={()=>setAp('tema',t.id)} style={{

              }}>
                <div style={{height:48,background:t.bg,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  <div style={{width:20,height:20,borderRadius:4,background:t.card,border:'1px solid rgba(255,255,255,.1)'}}/>
                  <div style={{width:10,height:10,borderRadius:'50%',background:'#C9A84C'}}/>
                </div>
                <div style={{padding:'6px 8px',background:temaActual===t.id?'rgba(201,168,76,.15)':'#0f1923'}}>
                  <p style={{fontSize:11,fontWeight:600,color:temaActual===t.id?'#C9A84C':'#64748b',margin:0,textAlign:'center'}}>{t.nombre}</p>
                </div>

        <div className="card-p">

          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}>
            {PALETAS.map(p=>(
              <div key={p.id} onClick={()=>setAp('paleta',p.id)} style={{
                padding:'10px 12px',borderRadius:10,cursor:'pointer',border:'2px solid',
                borderColor:paletaActual===p.id&&!ap.colorPersonalizado?'#C9A84C':'#243447',

                  <div style={{width:20,height:20,borderRadius:4,background:p.bg,border:'1px solid #243447'}}/>
                </div>
                <p style={{fontSize:11,fontWeight:600,color:paletaActual===p.id&&!ap.colorPersonalizado?'#C9A84C':'#64748b',margin:0}}>{p.nombre}</p>

          <div style={{background:'#0f1923',borderRadius:10,border:'1px solid #243447',padding:14}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <input type="checkbox" id="cpChk" style={{accentColor:'#C9A84C'}}
                checked={!!ap.colorPersonalizado}
                onChange={e=>{ if(!e.target.checked){const n={...ap};delete n.colorPersonalizado;delete n.acentoPersonalizado;applyApariencia(n);} else setAp('colorPersonalizado',ap.colorPersonalizado||'#1E3A5F');}}/>
              <label htmlFor="cpChk" style={{fontSize:13,color:'#cbd5e1',fontWeight:500}}>Color personalizado</label>
            </div>
            {ap.colorPersonalizado&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[['colorPersonalizado','Color Primario'],['acentoPersonalizado','Color Acento']].map(([k,l])=>(
                <div key={k}>
                  <label style={{fontSize:11,color:'#64748b',display:'block',marginBottom:4}}>{l}</label>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <input type="color" value={ap[k]||'#1E3A5F'} onChange={e=>setAp(k,e.target.value)}
                      style={{width:40,height:36,borderRadius:6,border:'1px solid #243447',cursor:'pointer',background:'none',padding:2}}/>
                    <input className="inp" style={{fontFamily:'monospace',fontSize:12}} value={ap[k]||''} onChange={e=>setAp(k,e.target.value)} placeholder="#000000"/>
                  </div>
                </div>
              ))}
            </div>}
          </div>
        </div>

        {/* Tipografía */}
        <div className="card-p">
          <div className="gline"/>
          <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:14}}>🔤 Tipografía</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div>
              <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:8,textTransform:'uppercase',letterSpacing:'.4px'}}>Fuente</label>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {['Syne','DM Sans','Inter','Roboto'].map(f=>(
                  <div key={f} onClick={()=>setAp('fontFamily',f)} style={{
                    padding:'10px 14px',borderRadius:8,cursor:'pointer',border:'1px solid',
                    borderColor:fontActual===f?'rgba(201,168,76,.4)':'#243447',
                    background:fontActual===f?'rgba(201,168,76,.08)':'#0f1923',
                    display:'flex',justifyContent:'space-between',alignItems:'center'
                  }}>
                    <span style={{fontFamily:f+',sans-serif',fontSize:14,color:fontActual===f?'#e8c96a':'#94a3b8'}}>{f}</span>
                    <span style={{fontFamily:f+',sans-serif',fontSize:11,color:'#475569'}}>Aa Bb Cc</span>
                  </div>
                ))}
              </div>
            </div>
            <div>
              <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:8,textTransform:'uppercase',letterSpacing:'.4px'}}>Tamaño de Fuente</label>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {[['compacto','Compacto','12px — Más información visible'],['normal','Normal','13px — Equilibrado (default)'],['grande','Grande','15px — Mayor legibilidad']].map(([id,nombre,desc])=>(
                  <div key={id} onClick={()=>setAp('fuente',id)} style={{
                    padding:'10px 14px',borderRadius:8,cursor:'pointer',border:'1px solid',
                    borderColor:fuenteActual===id?'rgba(201,168,76,.4)':'#243447',
                    background:fuenteActual===id?'rgba(201,168,76,.08)':'#0f1923'
                  }}>
                    <p style={{fontSize:13,fontWeight:600,color:fuenteActual===id?'#e8c96a':'#94a3b8',margin:'0 0 2px'}}>{nombre}</p>
                    <p style={{fontSize:11,color:'#475569',margin:0}}>{desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Botones */}
        <div className="card-p">
          <div className="gline"/>
          <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:14}}>🔘 Estilo de Botones</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {[['redondeado','Redondeado','8px'],['cuadrado','Cuadrado','4px'],['pildora','Píldora','999px']].map(([id,nombre,radio])=>(
              <div key={id} onClick={()=>setAp('botones',id)} style={{
                padding:14,borderRadius:10,cursor:'pointer',border:'2px solid',textAlign:'center',
                borderColor:botonesActual===id?'#C9A84C':'#243447',
                background:botonesActual===id?'rgba(201,168,76,.08)':'#0f1923',transition:'all .2s'
              }}>
                <div style={{display:'flex',justifyContent:'center',marginBottom:8}}>
                  <div style={{
                    padding:'6px 16px',background:'linear-gradient(135deg,#1E3A5F,#2a5298)',
                    borderRadius:radio,fontSize:12,color:'#fff',fontWeight:600

              </div>

          </div>
