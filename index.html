                    ? 'Puede adjuntar evidencia de cierre (JPG, PNG o PDF) — no obligatorio'
                    : libre>0
                      ? `Puede agregar ${libre} archivo${libre!==1?'s':''} más`
                      : 'Límite alcanzado (4/4)'}
                </p>
              </div>
            </div>

            {/* Lista de archivos cargados */}
            {ev.length > 0 && (
              <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:12}}>
                {ev.map((item,idx) => {
                  const isPDF = item.tipo === 'application/pdf';
                  return (
                    <div key={idx} style={{
                      display:'flex',alignItems:'center',gap:10,
                      padding:'8px 11px',borderRadius:8,
                      background:'#0f1923',border:'1px solid #243447',
                    }}>
                      {/* Preview: miniatura imagen o ícono PDF */}
                      {isPDF
                        ? <div style={{
                            width:38,height:38,borderRadius:7,flexShrink:0,
                            background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.22)',
                            display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,
                          }}>📄</div>
                        : <img src={item.data} alt={item.nombre}
                            style={{width:38,height:38,objectFit:'cover',borderRadius:7,
                              border:'1px solid #243447',flexShrink:0}}/>
                      }
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{fontSize:12,fontWeight:500,color:'#e2e8f0',margin:0,
                          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          {item.nombre}
                        </p>
                        <p style={{fontSize:10,color:'#475569',margin:0}}>
                          {isPDF ? 'PDF' : 'Imagen'} · {item.kb} KB
                        </p>
                      </div>
                      <button type="button" onClick={()=>onDel(idx)}
                        style={{
                          background:'rgba(153,27,27,.32)',border:'1px solid rgba(248,113,113,.3)',
                          borderRadius:6,color:'#fca5a5',fontSize:11,fontWeight:700,
                          cursor:'pointer',padding:'3px 9px',flexShrink:0,transition:'all .15s',
                        }}>✕</button>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Zona de carga */}
            {libre > 0 && (
              <label style={{
                display:'flex',alignItems:'center',gap:11,
                padding:'11px 15px',borderRadius:9,border:'2px dashed',
                cursor:'pointer',transition:'all .15s',userSelect:'none',
                borderColor: ev.length===0 ? 'rgba(248,113,113,.55)' : 'rgba(74,222,128,.38)',
                background:  ev.length===0 ? 'rgba(153,27,27,.06)'   : 'rgba(26,107,58,.05)',
              }}>
                <input
                  type="file"
                  accept=".jpg,.jpeg,.png,.pdf,image/jpeg,image/png,application/pdf"
                  multiple style={{display:'none'}}
                  onChange={onAdd}
                />
                <span style={{fontSize:22}}>📁</span>
                <div>
                  <p style={{fontSize:12,fontWeight:700,margin:0,
                    color: ev.length===0 ? '#94a3b8' : '#4ade80'}}>
                    {ev.length===0 ? 'Adjuntar soporte de cierre (opcional)' : 'Agregar más archivos'}
                  </p>
                  <p style={{fontSize:10,color:'#64748b',margin:0}}>
                    JPG · PNG · PDF &nbsp;·&nbsp; máx. 8 MB por archivo &nbsp;·&nbsp;
                    {libre} slot{libre!==1?'s':''} disponible{libre!==1?'s':''}
                  </p>
                </div>
              </label>
            )}
          </div>
        );
      })()}

      {/* ════════════════════════════════════════════════════════
          SECCIÓN COMPROMISOS — Opcional
          Permite registrar compromisos derivados de la tarea.
          Responsabilidad: Integra Consultores (empleado) o Cliente.
      ════════════════════════════════════════════════════════ */}
      <div style={{marginTop:12}}>
        <button type="button"
          onClick={() => setForm(p => ({...p, showCompromisos: !p.showCompromisos}))}
          style={{
            display:'inline-flex',alignItems:'center',gap:9,
            padding:'9px 18px',borderRadius:9,fontSize:13,fontWeight:700,
            cursor:'pointer',transition:'all .18s',border:'2px solid',
            borderColor: form.showCompromisos ? 'rgba(96,165,250,.55)' : 'rgba(100,116,139,.4)',
            background:  form.showCompromisos ? 'rgba(30,58,95,.18)'  : 'rgba(51,65,85,.1)',
            color:       form.showCompromisos ? '#93c5fd'              : '#94a3b8',
          }}>
          <span style={{fontSize:17}}>🤝</span>
          {form.showCompromisos ? 'Compromisos activos' : 'Compromisos (Opcional)'}
          <span style={{
            fontSize:9,fontWeight:600,padding:'2px 7px',borderRadius:99,
            background:  form.showCompromisos ? 'rgba(96,165,250,.18)' : 'rgba(100,116,139,.15)',
            border:'1px solid',
            borderColor: form.showCompromisos ? 'rgba(96,165,250,.4)'  : 'rgba(100,116,139,.3)',
            color:       form.showCompromisos ? '#93c5fd'               : '#64748b',
          }}>
            {form.showCompromisos
              ? `${(form.compromisos||[]).length} compromiso${(form.compromisos||[]).length!==1?'s':''}`
              : 'cerrado'}
          </span>
        </button>
      </div>

      {/* ── PANEL DE COMPROMISOS ── */}
      {form.showCompromisos && (()=>{
        const comps = Array.isArray(form.compromisos) ? form.compromisos : [];

        const addComp = () => setForm(p => ({
          ...p,
          compromisos: [...(Array.isArray(p.compromisos)?p.compromisos:[]),
            {id:uid(), descripcion:'', responsabilidad:'integra', empleadoId:'', fechaCompromiso:''}]
        }));

        const updComp = (idx, k, v) => setForm(p => {
          const arr = [...(Array.isArray(p.compromisos)?p.compromisos:[])];
          arr[idx] = {...arr[idx], [k]:v};
          return {...p, compromisos:arr};
        });

        const delComp = idx => setForm(p => ({
          ...p,
          compromisos: (Array.isArray(p.compromisos)?p.compromisos:[]).filter((_,i)=>i!==idx)
        }));

        return (
          <div style={{
            marginTop:12,padding:'16px',borderRadius:10,
            border:'2px solid rgba(96,165,250,.35)',
            background:'rgba(30,58,95,.08)',
          }}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:20}}>🤝</span>
                <div>
                  <p style={{fontSize:13,fontWeight:700,margin:0,color:'#93c5fd'}}>Compromisos</p>
                  <p style={{fontSize:10,color:'#64748b',margin:0}}>Responsabilidad de Integra Consultores o del Cliente</p>
                </div>
              </div>
              <button type="button" onClick={addComp}
                style={{display:'inline-flex',alignItems:'center',gap:5,padding:'5px 13px',
                  borderRadius:7,fontSize:12,fontWeight:700,cursor:'pointer',
                  background:'rgba(96,165,250,.18)',border:'1px solid rgba(96,165,250,.38)',
                  color:'#93c5fd',transition:'all .15s'}}>
                + Agregar
              </button>
            </div>

            {comps.length === 0 && (
              <p style={{fontSize:12,color:'#475569',textAlign:'center',padding:'12px 0',margin:0}}>
                Sin compromisos registrados. Haga clic en "+ Agregar" para añadir uno.
              </p>
            )}

            {comps.map((comp, idx) => (
              <div key={comp.id||idx} style={{
                marginBottom:10,padding:'12px',borderRadius:9,
                background:'#0f1923',border:'1px solid #243447',
              }}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <span style={{fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase',
                    letterSpacing:'.4px'}}>Compromiso #{idx+1}</span>
                  <button type="button" onClick={()=>delComp(idx)}
                    style={{background:'rgba(153,27,27,.3)',border:'1px solid rgba(248,113,113,.25)',
                      borderRadius:5,color:'#fca5a5',fontSize:11,fontWeight:700,cursor:'pointer',
                      padding:'2px 8px'}}>✕</button>
                </div>

                {/* Descripción */}
                <textarea
                  className="inp"
                  value={comp.descripcion||''}
                  onChange={e=>updComp(idx,'descripcion',e.target.value)}
                  placeholder="Descripción del compromiso..."
                  rows={2}
                  style={{marginBottom:8,minHeight:56}}
                />

                <div className="grid-2">
                  {/* Responsabilidad */}
                  <div>
                    <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',
                      marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}}>Responsabilidad</label>
                    <select className="inp"
                      value={comp.responsabilidad||'integra'}
                      onChange={e=>updComp(idx,'responsabilidad',e.target.value)}>
                      <option value="integra">Integra Consultores</option>
                      <option value="cliente">Cliente</option>
                    </select>
                  </div>

                  {/* Fecha del compromiso */}
                  <div>
                    <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',
                      marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}}>Fecha</label>
                    <input type="date" className="inp"
                      value={comp.fechaCompromiso||''}
                      onChange={e=>updComp(idx,'fechaCompromiso',e.target.value)}/>
                  </div>

                  {/* Empleado (solo si responsabilidad = integra) */}
                  {comp.responsabilidad==='integra' && (
                    <div style={{gridColumn:'1/-1'}}>
                      <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',
                        marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}}>Empleado Responsable</label>
                      <select className="inp"
                        value={comp.empleadoId||''}
                        onChange={e=>updComp(idx,'empleadoId',e.target.value)}>
                        <option value="">— Seleccionar integrante —</option>
                        {equipo.map(m=><option key={m.id} value={m.id}>{m.nombre}{m.cargo?` · ${m.cargo}`:''}</option>)}
                      </select>
                    </div>
                  )}
                </div>

                {/* Badge resumen */}
                <div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>
                  <span style={{
                    fontSize:10,fontWeight:700,padding:'2px 9px',borderRadius:99,
                    background: comp.responsabilidad==='cliente'
                      ? 'rgba(201,168,76,.15)' : 'rgba(30,58,95,.3)',
                    border:'1px solid',
                    borderColor: comp.responsabilidad==='cliente'
                      ? 'rgba(201,168,76,.35)' : 'rgba(147,197,253,.3)',
                    color: comp.responsabilidad==='cliente' ? '#e8c96a' : '#93c5fd',
                  }}>
                    {comp.responsabilidad==='cliente' ? '🏢 Cliente' : '👤 Integra Consultores'}
                  </span>
                  {comp.fechaCompromiso && (
                    <span style={{fontSize:10,color:'#64748b',padding:'2px 9px',borderRadius:99,
                      background:'rgba(51,65,85,.3)',border:'1px solid #243447'}}>
                      📅 {comp.fechaCompromiso}
                    </span>
                  )}
                  {comp.responsabilidad==='integra' && comp.empleadoId && (
                    <span style={{fontSize:10,color:'#4ade80',padding:'2px 9px',borderRadius:99,
                      background:'rgba(26,107,58,.15)',border:'1px solid rgba(74,222,128,.25)'}}>
                      ✓ {equipo.find(e=>e.id===comp.empleadoId)?.nombre||'—'}
                    </span>
                  )}
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      {/* ── Botones de acción ── */}
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setOpen(false)}>Cancelar</button>
        <button className="btn btn-g btn-sm" onClick={save}>
          <Ico n="check" s={14}/>
          {form.showCierre ? 'Guardar con Cierre' : 'Guardar Tarea'}
        </button>
      </div>
    </Modal>
    {del&&<Confirm msg="¿Eliminar esta tarea permanentemente?" onOk={()=>remove(del)} onCancel={()=>setDel(null)}/>}
    {/* B-item5: Modal vista detalle — solo lectura */}
    {viewDetail&&<Modal open={!!viewDetail} onClose={()=>setViewDetail(null)} title="Detalle de Tarea" wide>
      {(()=>{
        const t = viewDetail;
        const isVenc = t.fechaVen&&t.fechaVen<hoy&&t.estado!=='completada';
        const tieneCompPend = t.estado==='completada'&&Array.isArray(t.compromisos)&&t.compromisos.some(c=>c.fechaCompromiso&&c.fechaCompromiso<hoy&&!c.cumplido);
        const rIds = Array.isArray(t.responsablesIds)&&t.responsablesIds.length ? t.responsablesIds : (t.responsableId?[t.responsableId]:[]);
        const resps = rIds.map(id=>equipo.find(e=>e.id===id)).filter(Boolean);
        const cli = clientes.find(c=>c.id===t.clienteId);
        const AREA_LABEL = {administracion_personal:'Administración de Personal',gestion_sst:'Gestión SST',consultoria_juridica:'Consultoría Jurídica',gestion_operativa:'Gestión Operativa',gestion_calidad:'Gestión de Calidad',ambiental:'Ambiental',i_d:'I+D'};
        return <div style={{display:'grid',gap:14}}>
          {tieneCompPend&&<div style={{padding:'8px 14px',borderRadius:8,background:'rgba(234,88,12,.12)',border:'1px solid rgba(234,88,12,.3)',color:'#fb923c',fontSize:13,fontWeight:600}}>⚠️ Esta tarea tiene compromisos pendientes</div>}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Título</p><p style={{color:'#fff',fontWeight:600,margin:0,fontSize:14}}>{t.titulo}</p></div>
            <div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Estado</p><SBadge s={isVenc?'vencida':t.estado}/></div>
            <div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Cliente</p><p style={{color:'#94a3b8',margin:0}}>{cli?.nombre||'—'}</p></div>
            <div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Prioridad</p><SBadge s={t.prioridad}/></div>
            <div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Responsable(s)</p><p style={{color:'#94a3b8',margin:0}}>{resps.length?resps.map(r=>r.nombre).join(', '):'—'}</p></div>
            <div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Área de Especialidad</p><p style={{color:'#60a5fa',margin:0}}>{t.areaEspecialidad?AREA_LABEL[t.areaEspecialidad]||t.areaEspecialidad:'—'}</p></div>
            <div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Fecha de Asignación</p><p style={{color:'#C9A84C',margin:0}}>{fmt.date(t.fechaAsignada)||'—'}</p></div>
            <div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Fecha de Vencimiento</p><p style={{color:isVenc?'#f87171':'#94a3b8',margin:0}}>{fmt.date(t.fechaVen)||'—'}</p></div>
            {t.fechaCumplimiento&&<div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Fecha de Cumplimiento</p><p style={{color:'#4ade80',margin:0}}>{fmt.date(t.fechaCumplimiento)}</p></div>}
          </div>
          {t.desc&&<div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Descripción</p><p style={{color:'#94a3b8',margin:0,lineHeight:1.5}}>{t.desc}</p></div>}
          {t.actividadesRealizadas&&<div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Actividades Realizadas</p><p style={{color:'#4ade80',margin:0,lineHeight:1.5}}>{t.actividadesRealizadas}</p></div>}
          {t.reporteInforme&&<div style={{padding:'10px 14px',borderRadius:8,background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.25)'}}><p style={{fontSize:10,color:'#C9A84C',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>📋 Reporte Informe de Gestión</p><p style={{color:'#e2c97e',margin:0,lineHeight:1.5}}>{t.reporteInforme}</p></div>}
          {tieneCompPend&&t.justificacionIncumplimiento&&<div style={{padding:'10px 14px',borderRadius:8,background:'rgba(234,88,12,.08)',border:'1px solid rgba(234,88,12,.25)'}}><p style={{fontSize:10,color:'#fb923c',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 4px'}}>Justificación de Incumplimiento</p><p style={{color:'#fca5a5',margin:0}}><strong>Responsable:</strong> {t.responsableIncumplimiento==='cliente'?'Cliente':'INTEGRA CONSULTORES'}</p><p style={{color:'#94a3b8',margin:'4px 0 0',lineHeight:1.5}}>{t.justificacionIncumplimiento}</p></div>}
          {Array.isArray(t.compromisos)&&t.compromisos.length>0&&<div><p style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 8px'}}>Compromisos ({t.compromisos.length})</p>
            {[...t.compromisos].sort((a,b)=>(b.fechaCompromiso||'').localeCompare(a.fechaCompromiso||'')).map((c,i)=>{
              const venc = c.fechaCompromiso&&c.fechaCompromiso<hoy&&!c.cumplido;
              return <div key={i} style={{padding:'6px 10px',borderRadius:6,marginBottom:4,background:venc?'rgba(153,27,27,.12)':'rgba(51,65,85,.3)',border:'1px solid '+(venc?'rgba(248,113,113,.2)':'rgba(100,116,139,.2)')}}>
                <p style={{margin:0,fontSize:12,color:venc?'#f87171':'#94a3b8'}}>{c.descripcion||'Sin descripción'} — <strong>{c.responsabilidad==='cliente'?'Cliente':'Integra'}</strong> — Fecha: {fmt.date(c.fechaCompromiso)||'—'} {venc&&<span style={{color:'#ef4444',fontWeight:700}}>VENCIDO</span>}</p>
              </div>;
            })}
          </div>}
          <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:8}}>
            <button className="btn" style={{background:'rgba(51,65,85,.5)',border:'1px solid #334155',color:'#94a3b8'}} onClick={()=>setViewDetail(null)}>Cerrar</button>
            <button className="btn btn-p" onClick={()=>{setViewDetail(null);openEdit(t);}}>✏️ Editar</button>
          </div>
        </div>;
      })()}
    </Modal>}
  </div>;
};


// ── CLIENTES ─────────────────────────────────────────────────
const Clientes = () => {
  const {clientes,setClientes,tareas,facturas,servicios,toast} = useApp();
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState({});
  const [del,setDel]=useState(null);
  const [q,setQ]=useState('');
  const [detalle,setDetalle]=useState(null); // cliente seleccionado para panel de detalle

  const list = useMemo(()=>clientes
    .filter(c=>!q||c.nombre?.toLowerCase().includes(q.toLowerCase())||c.nit?.includes(q))
    .sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||'','es',{sensitivity:'base'}))
  ,[clientes,q]);
  const upd = k => e => setForm(p=>({...p,[k]:e.target.value}));

  // LOGO: handler de carga de imagen — convierte a base64, recorta a 200×200 px en canvas
  // LOGO-FIX v2: Handler corregido desde causa raíz.
  // Bug anterior: ctx.drawImage(img, sx, sy, sw, sh) con sx/sy negativos
  // renderizaba la imagen fuera del canvas (porción recortada quedaba invisible).
  // Corrección: usar la firma de 9 argumentos para recorte centrado preciso.
  const handleLogoUpload = (e) => {
    const file = e.target.files?.[0];
    if(!file) return;
    if(!file.type.startsWith('image/')) return toast('Solo se permiten imágenes (JPG, PNG, SVG)','error');
    if(file.size > 2*1024*1024) return toast('El logo no debe superar 2 MB','error');
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onerror = () => toast('No se pudo procesar la imagen seleccionada','error');
      img.onload = () => {
        try {
          const SIZE = 200;
          const canvas = document.createElement('canvas');
          canvas.width = SIZE; canvas.height = SIZE;
          const ctx = canvas.getContext('2d');
          // Fondo blanco (para transparencias en JPG)
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, SIZE, SIZE);
          // Escalar en modo "contain" (fit completo sin corte)
          const scale = Math.min(SIZE / img.width, SIZE / img.height);
          const dw = img.width * scale;
          const dh = img.height * scale;
          const dx = (SIZE - dw) / 2;
          const dy = (SIZE - dh) / 2;
          // Firma correcta: drawImage(img, dx, dy, dw, dh)
          ctx.drawImage(img, dx, dy, dw, dh);
          const base64 = canvas.toDataURL('image/png');
          if(!base64 || base64 === 'data:,') return toast('Error al procesar imagen','error');
          setForm(p=>({...p, logo: base64}));
          toast('Logo cargado correctamente','success');
        } catch(err) {
          toast('Error al procesar imagen: ' + err.message, 'error');
        }
      };
      img.src = ev.target.result;
    };
    reader.onerror = () => toast('Error al leer el archivo','error');
    reader.readAsDataURL(file);
  };

  const openNew = () => { setForm({nombre:'',nit:'',contacto:'',email:'',telefono:'',direccion:'',fechaInicioContrato:'',tipoContrato:'',valorContrato:'',motivoCobro:'',estado:'activo',servicios:[],notas:'',logo:''}); setOpen(true); };
  // CLI-8 FIX: Normalizar servicios al editar — garantizar siempre array limpio
  // LOGO-FIX v4: Siempre re-leer el logo desde LogoStore al abrir edición.
  // Esto previene que un estado React obsoleto (logo ausente por sync de Firestore)
  // cause que el formulario guarde el cliente sin logo.
  const openEdit = c => {
    // Resolver el logo real desde LogoStore — fuente de verdad del logo
    const logoResuelto = LogoStore.resolve(c) || (c.logo && !c.logo.startsWith('__') ? c.logo : '');
    setForm({
      ...c,
      logo: logoResuelto,
      // Normalización defensiva: servicios puede ser undefined (clientes viejos),
      // string (corrupción), o array. Siempre convertir a array de strings.
      servicios: Array.isArray(c.servicios)
        ? c.servicios.filter(id => typeof id === 'string')
        : [],
    });
    setOpen(true);
  };

  // CLI-1 FIX: Handler estable para checkbox de servicios
  // Captura el sid en el scope del map para evitar closures stale
  const toggleServicio = useCallback((sid, checked) => {
    setForm(prev => {
      const actual = Array.isArray(prev.servicios) ? prev.servicios : [];
      return {
        ...prev,
        servicios: checked
          ? actual.includes(sid) ? actual : [...actual, sid]
          : actual.filter(x => x !== sid),
      };
    });
  }, []);

  const save = () => {
    if(!form.nombre?.trim()) return toast('El nombre es requerido','error');
    // E-item29: Validar que los servicios con No Aplica tengan justificación
    const sAplic = form.serviciosAplicables || {};
    for(const sid of Object.keys(sAplic)) {
      if(sAplic[sid]?.estado === 'no_aplica' && !sAplic[sid]?.justificacion?.trim()) {
        const srv = servicios.find(s=>s.id===sid);
        return toast('Justificación requerida para servicio "No Aplica": '+(srv?.nombre||sid),'error');
      }
    }
    const clienteId = form.id || uid();

    // LOGO-FIX v4: Persistir logo en LogoStore ANTES de construir el objeto a guardar.
    // Garantiza que el logo esté seguro en su clave dedicada independientemente
    // de lo que le ocurra al documento en ip_clientes o en Firestore.
    const logoBase64 = form.logo && form.logo.startsWith('data:image') ? form.logo : null;
    if(logoBase64) {
      const saved = LogoStore.save(clienteId, logoBase64);
      if(!saved) toast('Advertencia: no se pudo guardar el logo por cuota de almacenamiento','warning');
    } else if(form.logo === '' && form.id) {
      // El usuario quitó el logo explícitamente — eliminar de LogoStore también
      LogoStore.remove(form.id);
    }

    // Garantizar que servicios se guarda siempre como array
    const cli = {
      ...form,
      id:       clienteId,
      _ts:      Date.now(),
      servicios: Array.isArray(form.servicios) ? form.servicios : [],
      serviciosAplicables: sAplic,
      // El logo en el objeto de BD siempre apunta al flag '__local__' si hay logo guardado
      // El base64 real vive en LogoStore — esto evita que el sync de Firestore lo borre
      logo: logoBase64 ? '__local__' : (form.logo || ''),
    };

    // Para la UI local: usar el base64 real (no '__local__') para renderizado inmediato
    const cliParaUI = {...cli, logo: logoBase64 || LogoStore.get(clienteId) || ''};

    DB.set('clientes', cli);
    // FIX VALOR TARJETA: reflejar inmediatamente con logo resuelto
    setClientes(prev => {
      const updated = form.id ? prev.map(x => x.id === cli.id ? cliParaUI : x) : [cliParaUI, ...prev];
      return updated;
    });
    // FIX VALOR TARJETA: Si el panel de detalle estaba abierto para este cliente, actualizar también
    if(detalle && detalle.id === cli.id) setDetalle(cliParaUI);
    // INTERVENCIÓN QUIRÚRGICA v12.2: Emitir evento de sincronización para actualizar Cobros y otros módulos
    if(window.SyncSvc) window.SyncSvc.emitClienteChange(cli);
    setOpen(false); toast('Cliente guardado','success');
  };

  const remove = id => {
    DB.del('clientes',id); setClientes(prev=>prev.filter(x=>x.id!==id)); setDel(null); toast('Cliente eliminado','info');
  };

  return <div className="fade">
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      <button className="btn btn-p btn-sm" onClick={openNew}><Ico n="plus" s={14}/>Nuevo Cliente</button>
      <input className="inp" style={{flex:1,minWidth:200,padding:'5px 10px',fontSize:12}} placeholder="Buscar por nombre o NIT..." value={q} onChange={e=>setQ(e.target.value)}/>
    </div>
    <div className="grid-3">
      {list.length===0&&<div className="card-p" style={{gridColumn:'1/-1',textAlign:'center',color:'#475569'}}>Sin clientes registrados.</div>}
      {list.map(c=>{
        const ct       = tareas.filter(t=>t.clienteId===c.id);
        const pct      = ct.length?Math.round(ct.filter(t=>t.estado==='completada').length/ct.length*100):0;
        const facTotal = facturas.filter(f=>f.clienteId===c.id).reduce((a,f)=>a+(Number(f.valor)||0),0);
        // CLI-3 + CLI-4 FIX: Calcular servicios del cliente para mostrar en tarjeta
        const cServIds    = Array.isArray(c.servicios) ? c.servicios : [];
        const totalServs  = servicios.length;
        const usedServs   = cServIds.filter(id => servicios.some(s=>s.id===id)).length;
        const pctServs    = totalServs>0 ? Math.round(usedServs/totalServs*100) : 0;
        const cServNombres= servicios.filter(s=>cServIds.includes(s.id)).map(s=>s.nombre);

        return <div key={c.id} className="card-p" style={{cursor:'pointer'}} onClick={()=>openEdit(c)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:10,flex:1,minWidth:0}}>
              {/* LOGO: avatar con logo o inicial */}
              <div style={{width:44,height:44,borderRadius:8,border:'1px solid #243447',background:'#0f1923',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
                {c.logo
                  ? <img src={c.logo} alt="Logo" style={{width:'100%',height:'100%',objectFit:'contain'}}/>
                  : <span style={{fontSize:16,fontWeight:700,color:'#C9A84C'}}>{(c.nombre||'?').charAt(0).toUpperCase()}</span>
                }
              </div>
              <div style={{minWidth:0}}>
                <p className="sy" style={{fontWeight:700,color:'#fff',fontSize:14,margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.nombre}</p>
                {c.nit&&<p style={{fontSize:11,color:'#475569',margin:0}}>NIT: {c.nit}</p>}
              </div>
            </div>
            <SBadge s={c.estado}/>
          </div>
          {[c.email&&{ico:'user',v:c.email},c.telefono&&{ico:'link',v:c.telefono},c.tipoContrato&&{ico:'bill',v:c.tipoContrato}].filter(Boolean).map(x=>(
            <p key={x.v} style={{fontSize:12,color:'#64748b',display:'flex',alignItems:'center',gap:5,margin:'3px 0'}}><Ico n={x.ico} s={12}/>{x.v}</p>
          ))}

          {/* FIX: Mostrar Valor Servicio General en tarjeta - Se actualiza en tiempo real */}
          {c.valorContrato&&(
            <p style={{fontSize:12,color:'#C9A84C',display:'flex',alignItems:'center',gap:5,margin:'3px 0',fontWeight:600}}>
              <Ico n="money" s={12}/>{fmt.cop(Number(c.valorContrato))} /mes
            </p>
          )}

          {/* CLI-3 FIX: Chips de servicios contratados */}
          {cServNombres.length>0&&(
            <div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:4}}>
              {cServNombres.slice(0,3).map(nom=>(
                <span key={nom} style={{fontSize:10,padding:'2px 7px',borderRadius:10,
                  background:'rgba(201,168,76,.12)',border:'1px solid rgba(201,168,76,.3)',
                  color:'#C9A84C',fontWeight:600}}>
                  {nom}
                </span>
              ))}
              {cServNombres.length>3&&(
                <span style={{fontSize:10,padding:'2px 7px',borderRadius:10,
                  background:'#1e2d42',border:'1px solid #2f4460',color:'#64748b'}}>
                  +{cServNombres.length-3} más
                </span>
              )}
            </div>
          )}

          <div style={{marginTop:12,borderTop:'1px solid #243447',paddingTop:10}}>
            {/* Indicador cumplimiento tareas */}
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:5}}>
              <span style={{color:'#475569'}}>Cumplimiento</span>
              <span style={{color:'#C9A84C',fontWeight:700}}>{pct}%</span>
            </div>
            <div className="pbar"><div className="pfill" style={{width:pct+'%',background:'#C9A84C'}}/></div>

            {/* CLI-4 FIX: Indicador gráfico servicios utilizados vs disponibles */}
            {totalServs>0&&(
              <div style={{marginTop:8}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,marginBottom:3}}>
                  <span style={{color:'#475569',display:'flex',alignItems:'center',gap:4}}>
                    <span style={{width:7,height:7,borderRadius:'50%',background:'#60a5fa',display:'inline-block'}}/>
                    Servicios {usedServs}/{totalServs}
                  </span>
                  <span style={{color:'#60a5fa',fontWeight:600}}>{pctServs}%</span>
                </div>
                <div style={{height:5,background:'#1e2d42',borderRadius:3,overflow:'hidden'}}>
                  <div style={{
                    height:'100%',borderRadius:3,
                    background: pctServs===0 ? '#334155'
                               : pctServs<50  ? '#f59e0b'
                               : pctServs<100 ? '#60a5fa'
                               : '#4ade80',
                    width:pctServs+'%',
                    transition:'width .5s ease',
                  }}/>
                </div>
              </div>
            )}

            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginTop:6}}>
              <span style={{color:'#475569'}}>{ct.length} tarea{ct.length!==1?'s':''}</span>
            </div>
          </div>

          <div style={{display:'flex',gap:6,marginTop:10}} onClick={e=>e.stopPropagation()}>
            <button className="btn btn-p btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>openEdit(c)}><Ico n="edit" s={13}/>Editar</button>
            <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:'center',color:'#60a5fa',border:'1px solid #243447'}} onClick={()=>setDetalle(c)} title="Ver historial completo"><Ico n="analytics" s={13}/>Detalle</button>
            <button className="btn btn-d btn-sm" onClick={()=>setDel(c.id)}><Ico n="trash" s={13}/></button>
          </div>
        </div>;
      })}
    </div>

    <Modal open={open} onClose={()=>setOpen(false)} title={form.id?'Editar Cliente':'Nuevo Cliente'} wide>
      <div className="grid-2">
        <F label="Nombre / Razón Social *"><input className="inp" value={form.nombre||''} onChange={upd('nombre')}/></F>
        <F label="NIT"><input className="inp" value={form.nit||''} onChange={upd('nit')}/></F>
        <F label="Contacto"><input className="inp" value={form.contacto||''} onChange={upd('contacto')}/></F>
        <F label="Email"><input type="email" className="inp" value={form.email||''} onChange={upd('email')}/></F>
        <F label="Teléfono"><input className="inp" value={form.telefono||''} onChange={upd('telefono')}/></F>
        <F label="Estado"><select className="inp" value={form.estado||'activo'} onChange={upd('estado')}>
          <option value="activo">Activo</option><option value="inactivo">Inactivo</option>
        </select></F>
        <F label="Dirección" col2><input className="inp" value={form.direccion||''} onChange={upd('direccion')}/></F>
        {/* CLIENTES-FIX v2: Fecha Inicio de Contrato (siempre) y Fecha Finalización (solo edición) */}
        <F label="📅 Fecha Inicio de Contrato">
          <input type="date" className="inp" value={form.fechaInicioContrato||''} onChange={upd('fechaInicioContrato')}/>
        </F>
        {form.id && (
          <F label="📅 Fecha Finalización de Contrato">
            <input type="date" className="inp" value={form.fechaFinalizacion||''} onChange={upd('fechaFinalizacion')}
              style={{borderColor: form.fechaFinalizacion && form.fechaFinalizacion < new Date().toISOString().split('T')[0] ? 'rgba(248,113,113,.6)' : ''}}/>
            {form.fechaFinalizacion && form.fechaFinalizacion < new Date().toISOString().split('T')[0] && (
              <p style={{fontSize:10,color:'#f87171',margin:'3px 0 0'}}>⚠ Contrato vencido</p>
            )}
          </F>
        )}

        {/* LOGO DEL CLIENTE — 200×200 px, guardado como base64 PNG */}
        <F label="Logo del Cliente (200×200 px)" col2>
          <div style={{display:'flex',gap:14,alignItems:'center'}}>
            {/* Previsualización */}
            <div style={{width:72,height:72,borderRadius:10,border:'1px solid #243447',background:'#0f1923',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
              {form.logo
                ? <img src={form.logo} alt="Logo" style={{width:'100%',height:'100%',objectFit:'contain'}}/>
                : <span style={{fontSize:10,color:'#334155',textAlign:'center',padding:4}}>Sin logo</span>
              }
            </div>
            <div style={{flex:1}}>
              <label style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 14px',borderRadius:8,background:'rgba(201,168,76,.12)',border:'1px solid rgba(201,168,76,.3)',color:'#C9A84C',fontSize:12,fontWeight:600,cursor:'pointer'}}>
                📁 {form.logo ? 'Cambiar logo' : 'Cargar logo'}
                <input type="file" accept="image/*" onChange={handleLogoUpload} style={{display:'none'}}/>
              </label>
              {form.logo && (
                <button type="button" onClick={()=>setForm(p=>({...p,logo:''}))}
                  style={{marginLeft:8,fontSize:11,color:'#ef4444',background:'none',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,padding:'4px 10px',cursor:'pointer'}}>
                  ✕ Quitar
                </button>
              )}
              <p style={{fontSize:10,color:'#475569',margin:'5px 0 0'}}>JPG, PNG o SVG · máx. 2 MB · se escala a 200×200 px</p>
            </div>
          </div>
        </F>

        <F label="Tipo de Contrato"><select className="inp" value={form.tipoContrato||''} onChange={upd('tipoContrato')}>
          <option value="">—</option>{['Mensualidad','Por Proyecto','Honorarios','Retainer','Otro'].map(t=><option key={t} value={t}>{t}</option>)}
        </select></F>
        <F label="Valor Servicio General ($/mes)">
          <div style={{position:'relative'}}>
            <input type="number" className="inp" value={form.valorContrato||''} onChange={upd('valorContrato')} placeholder="0"
              style={{paddingRight:80}}/>
            <span style={{
              position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
              fontSize:11,color:'#C9A84C',fontWeight:700,pointerEvents:'none',
              background:'rgba(201,168,76,.1)',padding:'2px 7px',borderRadius:20,
            }}>COP/mes</span>
          </div>
          <p style={{fontSize:10,color:'#C9A84C',margin:'4px 0 0',display:'flex',alignItems:'center',gap:4}}>
            <span>⚡</span> Se actualiza automáticamente en Cobros, Informes y Exportables
          </p>
        </F>
        {/* V13-BLOQUE1: Campo nuevo para motivo predeterminado del cobro */}
        <F label="Motivo del Cobro (Predeterminado)">
          <input 
            type="text" 
            className="inp" 
            value={form.motivoCobro||''} 
            onChange={upd('motivoCobro')} 
            placeholder="Ej: Servicios profesionales, Asesoría, Mantenimiento mensual..."
            style={{fontSize:13}}
          />
          <p style={{fontSize:10,color:'#94a3b8',margin:'3px 0 0'}}>
            Opcional: Este texto se sugerirá al generar cobros en el módulo Cobros
          </p>
        </F>
        <F label="Servicios" col2>
          {/* CLI-1 FIX: Usa toggleServicio (useCallback estable) para evitar closures stale */}
          <div style={{display:'flex',flexWrap:'wrap',gap:8,padding:'8px 0'}}>
            {servicios.length===0 && (
              <p style={{fontSize:12,color:'#475569',margin:0}}>
                Configure servicios en <strong>Configuración → Servicios</strong>.
              </p>
            )}
            {servicios.map(s=>{
              const isChecked = (form.servicios||[]).includes(s.id);
              return (
                <label key={s.id} style={{
                  display:'flex',alignItems:'center',gap:6,fontSize:12,cursor:'pointer',
                  padding:'5px 10px',borderRadius:20,transition:'all .14s',
                  background: isChecked ? 'rgba(201,168,76,.15)' : '#1e2d42',
                  border: `1px solid ${isChecked ? 'rgba(201,168,76,.5)' : '#2f4460'}`,
                  color: isChecked ? '#C9A84C' : '#94a3b8',
                  fontWeight: isChecked ? 600 : 400,
                }}>
                  <input
                    type="checkbox"
                    checked={isChecked}
                    onChange={e => toggleServicio(s.id, e.target.checked)}
                    style={{accentColor:'#C9A84C',width:13,height:13}}
                  />
                  {s.nombre}
                </label>
              );
            })}
          </div>
        </F>
        <F label="Notas" col2><textarea className="inp" value={form.notas||''} onChange={upd('notas')} style={{minHeight:60}}/></F>

        {/* E-items27-29: Servicios Aplicables — con estado Aplica/No Aplica y justificación */}
        {servicios.length>0&&<F label="Servicios Aplicables al Cliente" col2>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <p style={{fontSize:11,color:'#64748b',margin:'0 0 4px'}}>Indique para cada servicio si aplica o no a este cliente.</p>
            {servicios.map(s=>{
              const estado = (form.serviciosAplicables||{})[s.id]?.estado || 'aplica';
              const justif = (form.serviciosAplicables||{})[s.id]?.justificacion || '';
              const setServAplic = (k,v) => setForm(p=>({...p,serviciosAplicables:{...(p.serviciosAplicables||{}),[s.id]:{...(p.serviciosAplicables||{})[s.id],[k]:v}}}));
              return <div key={s.id} style={{padding:'8px 12px',borderRadius:8,border:'1px solid',borderColor:estado==='no_aplica'?'rgba(248,113,113,.25)':'rgba(74,222,128,.2)',background:estado==='no_aplica'?'rgba(153,27,27,.06)':'rgba(26,107,58,.05)'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
                  <span style={{fontSize:13,color:'#fff',fontWeight:500}}>{s.nombre}</span>
                  <div style={{display:'flex',gap:6}}>
                    <label style={{display:'flex',alignItems:'center',gap:4,fontSize:12,cursor:'pointer',padding:'2px 10px',borderRadius:99,border:'1px solid',borderColor:estado==='aplica'?'#4ade80':'#334155',background:estado==='aplica'?'rgba(74,222,128,.12)':'transparent',color:estado==='aplica'?'#4ade80':'#64748b'}}>
                      <input type="radio" name={'sa_'+s.id} value="aplica" checked={estado==='aplica'} onChange={()=>setServAplic('estado','aplica')} style={{accentColor:'#4ade80'}}/> Aplica
                    </label>
                    <label style={{display:'flex',alignItems:'center',gap:4,fontSize:12,cursor:'pointer',padding:'2px 10px',borderRadius:99,border:'1px solid',borderColor:estado==='no_aplica'?'#f87171':'#334155',background:estado==='no_aplica'?'rgba(239,68,68,.12)':'transparent',color:estado==='no_aplica'?'#f87171':'#64748b'}}>
                      <input type="radio" name={'sa_'+s.id} value="no_aplica" checked={estado==='no_aplica'} onChange={()=>setServAplic('estado','no_aplica')} style={{accentColor:'#f87171'}}/> No Aplica
                    </label>
                  </div>
                </div>
                {estado==='no_aplica'&&<div style={{marginTop:6}}>
                  <input className="inp" value={justif} onChange={e=>setServAplic('justificacion',e.target.value)} placeholder="Justificación requerida (ej: fuera del alcance del contrato)..." style={{fontSize:11,padding:'5px 10px'}} required/>
                  {!justif.trim()&&<p style={{fontSize:10,color:'#ef4444',margin:'3px 0 0'}}>⚠ La justificación es obligatoria cuando el servicio No Aplica.</p>}
                </div>}
              </div>;
            })}
          </div>
        </F>}
      </div>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setOpen(false)}>Cancelar</button>
        <button className="btn btn-g btn-sm" onClick={save}><Ico n="check" s={14}/>Guardar Cliente</button>
      </div>
    </Modal>
    {del&&<Confirm msg="¿Eliminar este cliente?" onOk={()=>remove(del)} onCancel={()=>setDel(null)}/>}

    {/* ── Panel de detalle del cliente ──────────────────────────── */}
    {detalle&&(()=>{
      const dc=detalle;
      // CLI-5 FIX: Obtener equipo del contexto aquí (no dentro del map) para resolver responsables
      const {equipo:eqPanel} = useApp();
      const cliTareas=tareas.filter(t=>t.clienteId===dc.id&&!t.esAlerta);
      const cliFacturas=facturas.filter(f=>f.clienteId===dc.id);
      const totalFact=cliFacturas.reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
      const totalCob=cliFacturas.filter(f=>['Pagada','pagada','Paz y Salvo','Paz Y Salvo'].includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
      const pctT=cliTareas.length?Math.round(cliTareas.filter(t=>t.estado==='completada').length/cliTareas.length*100):0;
      // CLI-6 FIX: Estados corregidos para coincidir con el sistema
      // Original incorrecto: 'Pendiente' (mayúscula), 'en progreso', 'Vencida' (mayúscula)
      const ECOL={
        pendiente:   '#C9A84C',
        en_curso:    '#60a5fa',
        revision:    '#a78bfa',
        completada:  '#4ade80',
        cancelada:   '#475569',
        vencida:     '#f87171', // calculado, no estado real
      };
      const SCOL={'Pendiente':'#C9A84C','Enviada':'#60a5fa','Pagada':'#4ade80','Vencida':'#f87171','Paz y Salvo':'#a78bfa'};
      return <div style={{position:'fixed',inset:0,zIndex:1800,display:'flex',alignItems:'stretch'}}>
        <div style={{flex:1,background:'rgba(0,0,0,.5)'}} onClick={()=>setDetalle(null)}/>
        <div style={{width:'min(520px,100vw)',background:'#0f1923',borderLeft:'1px solid #243447',overflowY:'auto',display:'flex',flexDirection:'column',animation:'fadeIn .2s'}}>
          {/* Header panel */}
          <div style={{background:'#1e2d42',padding:'16px 20px',borderBottom:'1px solid #243447',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              {/* LOGO en panel de detalle */}
              <div style={{width:52,height:52,borderRadius:10,border:'1px solid #243447',background:'#0f1923',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
                {dc.logo
                  ? <img src={dc.logo} alt="Logo" style={{width:'100%',height:'100%',objectFit:'contain'}}/>
                  : <span style={{fontSize:18,fontWeight:700,color:'#C9A84C'}}>{(dc.nombre||'?').charAt(0).toUpperCase()}</span>
                }
              </div>
              <div>
                <p style={{margin:0,fontWeight:700,color:'#fff',fontSize:15}}>{dc.nombre}</p>
                {dc.nit&&<p style={{margin:0,fontSize:11,color:'#64748b'}}>NIT: {dc.nit}</p>}
              </div>
            </div>
            <button onClick={()=>setDetalle(null)} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:20,lineHeight:1}}>×</button>
          </div>
          <div style={{padding:'16px 20px',display:'flex',flexDirection:'column',gap:14}}>

            {/* KPIs rápidos */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>
              {[
                {l:'Total Facturado',v:fmt.cop(totalFact),c:'#C9A84C'},
                {l:'Total Cobrado',  v:fmt.cop(totalCob), c:'#4ade80'},
                {l:'Por Cobrar',     v:fmt.cop(totalFact-totalCob),c:'#f87171'},
                {l:'Cumplimiento',   v:pctT+'%',          c:'#60a5fa'},
              ].map(k=><div key={k.l} style={{background:'#1e2d42',borderRadius:8,padding:'10px 14px',border:'1px solid #243447'}}>
                <p style={{margin:0,fontSize:10,color:'#64748b'}}>{k.l}</p>
                <p style={{margin:0,fontSize:16,fontWeight:700,color:k.c}}>{k.v}</p>
              </div>)}
            </div>

            {/* Info de contacto */}
            <div style={{background:'#1e2d42',borderRadius:8,padding:'12px 16px',border:'1px solid #243447'}}>
              <p style={{margin:'0 0 8px',fontSize:12,fontWeight:700,color:'#94a3b8'}}>CONTACTO</p>
              {[dc.contacto&&['👤',dc.contacto],dc.email&&['✉️',dc.email],dc.telefono&&['📞',dc.telefono],dc.direccion&&['📍',dc.direccion]].filter(Boolean).map(([ico,val])=>(
                <p key={val} style={{margin:'4px 0',fontSize:12,color:'#cbd5e1',display:'flex',gap:8}}><span>{ico}</span><span>{val}</span></p>
              ))}
              {dc.tipoContrato&&<p style={{margin:'4px 0',fontSize:12,color:'#cbd5e1'}}>📄 {dc.tipoContrato}{dc.valorContrato?` — ${fmt.cop(Number(dc.valorContrato))}`:''}/ mes</p>}
              {!dc.email&&!dc.telefono&&!dc.contacto&&<p style={{fontSize:12,color:'#475569'}}>Sin datos de contacto</p>}
            </div>

            {/* Historial de facturas */}
            <div>
              <p style={{margin:'0 0 8px',fontSize:12,fontWeight:700,color:'#94a3b8'}}>FACTURAS ({cliFacturas.length})</p>
              {cliFacturas.length===0&&<p style={{fontSize:12,color:'#475569',textAlign:'center',padding:12}}>Sin facturas registradas</p>}
              {cliFacturas.sort((a,b)=>(b.numero||0)-(a.numero||0)).map(f=>(
                <div key={f.id} style={{background:'#1e2d42',borderRadius:6,padding:'10px 14px',marginBottom:6,border:'1px solid #243447',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <p style={{margin:0,fontSize:12,fontWeight:600,color:'#fff'}}>#{f.numero} — {f.concepto||'Sin concepto'}</p>
                    <p style={{margin:0,fontSize:11,color:'#64748b'}}>{f.fechaEmision||'Sin fecha'} · {f.formaPago||'—'}</p>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <p style={{margin:0,fontSize:13,fontWeight:700,color:'#C9A84C'}}>{fmt.cop((Number(f.valor)||0)*(f.iva?1.19:1))}</p>
                    <span style={{fontSize:10,fontWeight:600,padding:'2px 6px',borderRadius:10,background:(SCOL[f.estado]||'#475569')+'22',color:SCOL[f.estado]||'#94a3b8',border:`1px solid ${SCOL[f.estado]||'#334155'}44`}}>{f.estado||'Pendiente'}</span>
                  </div>
                </div>
              ))}
            </div>

            {/* Historial de tareas */}
            <div>
              <p style={{margin:'0 0 8px',fontSize:12,fontWeight:700,color:'#94a3b8'}}>TAREAS ({cliTareas.length})</p>
              {cliTareas.length===0&&<p style={{fontSize:12,color:'#475569',textAlign:'center',padding:12}}>Sin tareas registradas</p>}
              {cliTareas.sort((a,b)=>(b._ts||0)-(a._ts||0)).slice(0,10).map(t=>{
                // CLI-5 FIX: Usar _ts (timestamp de creación) para ordenar
                // t.fecha no existe — el campo real es fechaVen o _ts
                const hoyStr = new Date().toISOString().split('T')[0];
                const isVenc = t.fechaVen && t.fechaVen < hoyStr && t.estado !== 'completada';
                const estadoEfectivo = isVenc ? 'vencida' : t.estado;
                return (
                <div key={t.id} style={{background:'#1e2d42',borderRadius:6,padding:'10px 14px',marginBottom:6,border:`1px solid ${isVenc?'rgba(248,113,113,.25)':'#243447'}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{margin:0,fontSize:12,fontWeight:600,color:isVenc?'#fca5a5':'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {t.titulo||'Sin título'}
                    </p>
                    {/* CLI-5 FIX: Mostrar fechaVen (campo real) + resolver responsable via equipo */}
                    <p style={{margin:0,fontSize:11,color:'#64748b'}}>
                      {t.fechaVen ? (isVenc ? '⚠️ Venció: ' : '📅 ') + fmt.date(t.fechaVen) : 'Sin vencimiento'}
                      {t.responsableId && eqPanel && (' · ' + (eqPanel.find(e=>e.id===t.responsableId)?.nombre||'—'))}
                    </p>
                  </div>
                  {/* CLI-6 FIX: Usar estadoEfectivo para chip con color correcto */}
                  <span style={{
                    fontSize:10,fontWeight:600,padding:'2px 6px',borderRadius:10,marginLeft:8,
                    background:(ECOL[estadoEfectivo]||'#475569')+'22',
                    color:ECOL[estadoEfectivo]||'#94a3b8',
                    border:`1px solid ${ECOL[estadoEfectivo]||'#334155'}44`,
                    whiteSpace:'nowrap'
                  }}>
                    {isVenc ? 'vencida' : (t.estado||'pendiente')}
                  </span>
                </div>
              );
              })}
              {cliTareas.length>10&&<p style={{fontSize:11,color:'#475569',textAlign:'center'}}>+{cliTareas.length-10} tareas más</p>}
            </div>

            {/* CLI-2 FIX: Sección de servicios contratados en panel detalle */}
            {(()=>{
              const dcServIds    = Array.isArray(dc.servicios) ? dc.servicios : [];
              const dcServObjs   = servicios.filter(s=>dcServIds.includes(s.id));
              const noContratados= servicios.filter(s=>!dcServIds.includes(s.id));
              const totalS       = servicios.length;
              const usedS        = dcServObjs.length;
              const pctS         = totalS>0 ? Math.round(usedS/totalS*100) : 0;
              if(totalS===0) return null;
              return (
                <div style={{background:'#1e2d42',borderRadius:8,padding:'12px 16px',border:'1px solid #243447'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <p style={{margin:0,fontSize:12,fontWeight:700,color:'#94a3b8'}}>
                      SERVICIOS CONTRATADOS
                    </p>
                    <span style={{fontSize:11,fontWeight:700,color:'#60a5fa'}}>{usedS}/{totalS}</span>
                  </div>

                  {/* Barra de progreso de cobertura de servicios */}
                  <div style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#64748b',marginBottom:4}}>
                      <span>Cobertura de servicios</span>
                      <span style={{
                        color: pctS===0?'#475569':pctS<50?'#f59e0b':pctS<100?'#60a5fa':'#4ade80',
                        fontWeight:700
                      }}>{pctS}%</span>
                    </div>
                    <div style={{height:6,background:'#0f1923',borderRadius:3,overflow:'hidden'}}>
                      <div style={{
                        height:'100%',borderRadius:3,transition:'width .6s ease',
                        width:pctS+'%',
                        background: pctS===0   ? '#334155'
                                   :pctS<50   ? '#f59e0b'
                                   :pctS<100  ? '#60a5fa'
                                   :            '#4ade80',
                      }}/>
                    </div>
                  </div>

                  {/* Servicios activos */}
                  {dcServObjs.length>0&&(
                    <div style={{marginBottom:8}}>
                      <p style={{margin:'0 0 5px',fontSize:10,color:'#4ade80',fontWeight:600,textTransform:'uppercase',letterSpacing:'.4px'}}>✓ Contratados</p>
                      <div style={{display:'flex',flexWrap:'wrap',gap:5}}>

                  )}

                  {noContratados.length>0&&(

                      <p style={{margin:'0 0 5px',fontSize:10,color:'#475569',fontWeight:600,textTransform:'uppercase',letterSpacing:'.4px'}}>○ Disponibles</p>
                      <div style={{display:'flex',flexWrap:'wrap',gap:5}}>

            <div style={{display:'flex',gap:8,paddingBottom:8}}>

              <button className="btn btn-d btn-sm" onClick={()=>{setDetalle(null);setDel(dc.id);}}><Ico n="trash" s={13}/>Eliminar</button>
            </div>

      </div>;
    })()}
