// ── VISITA CLIENTE ─────────────────────────────────────────────
const VisitaCliente = () => {
  const {clientes,tareas,setTareas,equipo,proyectos,alertas,setAlertas,toast,user} = useApp();

  // ─── Estado principal ───────────────────────────────────────
  const [visitas,    setVisitas]    = useState(()=>DB.get('visitas_cliente'));
  const [open,       setOpen]       = useState(false);
  const [form,       setForm]       = useState({});
  const [delId,      setDelId]      = useState(null);
  const [viewDetail, setViewDetail] = useState(null);
  const [filCli,     setFilCli]     = useState('');
  const [tabModal,   setTabModal]   = useState('visita'); // 'visita'|'temas'|'compromisos'

  // ─── Estado modal Agendar Tarea independiente ───────────────
  const [openTarea,        setOpenTarea]        = useState(false);
  const [tareaForm,        setTareaForm]        = useState({});
  const [visitaParaTarea,  setVisitaParaTarea]  = useState(null);

  const hoy = new Date().toISOString().split('T')[0];

  // ─── Suscripción en tiempo real ─────────────────────────────
  useEffect(()=>{
    const unsub = DB.sub('visitas_cliente', rows => setVisitas(rows));
    return ()=>unsub();
  },[]);

  // ─── Helpers form visita ─────────────────────────────────────
  const upd  = k => e => setForm(p=>({...p,[k]:e.target.value}));
  const updT = k => e => setTareaForm(p=>({...p,[k]:e.target.value}));

  // ─── Helpers helpers compromisos-tarea dentro de form ────────
  // Cada compromiso tiene la estructura completa de una tarea:
  // { id, descripcion, titulo, clienteId, estado, prioridad,
  //   fechaAsignada, fechaVen, fechaEjecucion, desc,
  //   responsablesIds, responsableId, equipoIntegra,
  //   areaEspecialidad, proyectoId,
  //   showCompromisos, compromisos, showCierre, soporteCierre,
  //   actividadesRealizadas, reporteInforme,
  //   responsable:'integra'|'cliente', cumplido }

  const addCompTarea = () => {
    const nuevo = {
      id: uid(),
      // Campos de tarea completos
      titulo:          '',
      clienteId:       form.clienteId||'',
      estado:          'pendiente',
      prioridad:       'media',
      fechaAsignada:   form.fecha||hoy,
      fechaVen:        '',
      fechaEjecucion:  '',
      desc:            '',
      responsablesIds: form.responsableId ? [form.responsableId] : [],
      responsableId:   form.responsableId||'',
      equipoIntegra:   false,
      areaEspecialidad:'',
      proyectoId:      '',
      showCompromisos: false,
      compromisos:     [],
      showCierre:      false,
      soporteCierre:   [],
      actividadesRealizadas:'',
      reporteInforme:  '',
      // Control de visita
      responsable:     'integra',
      cumplido:        false,
    };
    setForm(p=>({...p, compromisos:[...(p.compromisos||[]), nuevo]}));
  };

  const updComp = (idx, patch) => setForm(p=>{
    const arr = [...(p.compromisos||[])];
    arr[idx] = {...arr[idx], ...patch};
    return {...p, compromisos:arr};
  });

  const delComp = idx => setForm(p=>({
    ...p, compromisos:(p.compromisos||[]).filter((_,i)=>i!==idx)
  }));

  // ─── openNew ────────────────────────────────────────────────
  const openNew = () => {
    setForm({
      clienteId:'', fecha:hoy, responsableId:'',
      temas:[], compromisos:[], resultado:'',
      observaciones:'', satisfaccion:'buena', estado:'realizada',
      _nuevoTema:'',
    });
    setTabModal('visita');
    setOpen(true);
  };

  const openEdit = v => {
    setForm({...v, _nuevoTema:''});
    setTabModal('visita');
    setOpen(true);
  };

  // ─── Temas ──────────────────────────────────────────────────
  const addTema = () => {
    const t = (form._nuevoTema||'').trim();
    if(!t) return;
    setForm(p=>({...p,
      temas:[...(p.temas||[]),{id:uid(),descripcion:t,discutido:false}],
      _nuevoTema:''}));
  };

  // ─── Sincronización completa hacia todos los módulos ─────────
  const _sincTarea = (tareaData, isNew) => {
    const PRIO_TIPO = {urgente:'Urgente',alta:'Vencimiento',media:'Recordatorio',baja:'Recordatorio'};

    // 1. Persistir tarea
    DB.set('tareas', tareaData);

    // 2. Actualizar contexto global → reflejo inmediato en Tareas, Kanban, Informes
    setTareas(prev => isNew
      ? [tareaData,...prev]
      : prev.map(x=>x.id===tareaData.id ? tareaData : x));

    // 3. Alerta vinculada determinista
    const alertaId = 'alrt_' + tareaData.id;
    const alerta = {
      id:              alertaId,
      titulo:          tareaData.titulo,
      tipo:            PRIO_TIPO[tareaData.prioridad]||'Recordatorio',
      fechaVen:        tareaData.fechaVen||'',
      estado:          tareaData.estado==='completada'?'completada':'pendiente',
      prioridad:       tareaData.prioridad,
      esAlerta:        true,
      tareaVinculadaId:tareaData.id,
      auto:            true,
      clienteId:       tareaData.clienteId,
      responsableId:   tareaData.responsableId,
      creadoEn:        new Date().toISOString(),
      updatedAt:       new Date().toISOString(),
    };
    DB.set('tareas', alerta);
    setTareas(prev=>{
      const existe = prev.find(x=>x.id===alertaId);
      return existe ? prev.map(x=>x.id===alertaId?alerta:x) : [alerta,...prev];
    });

    // 4. Disparar actualización en Calendario
    window.dispatchEvent(new CustomEvent('ip-calendario-updated',{detail:{tareaId:tareaData.id,ts:Date.now()}}));
  };

  // ─── Save Visita ─────────────────────────────────────────────
  const saveVisita = () => {
    if(!form.clienteId) return toast('Seleccione un cliente','error');
    if(!form.fecha)     return toast('La fecha es requerida','error');

    const esNueva = !form.id;
    // FIX: construir el objeto visita explícitamente sin campos UI internos
    // para evitar que JSON.stringify omita campos 'undefined' y corrompa el doc.
    const visita  = {
      id:          form.id||uid(),
      clienteId:   form.clienteId||'',
      fecha:       form.fecha||'',
      responsableId: form.responsableId||'',
      estado:      form.estado||'realizada',  // FIX: garantizar que el estado se preserve
      satisfaccion: form.satisfaccion||'buena',
      resultado:   form.resultado||'',
      observaciones: form.observaciones||'',
      temas:       (form.temas||[]).filter(t=>t.descripcion?.trim()),
      compromisos: (form.compromisos||[]).map(c=>({...c})),
      updatedAt:   new Date().toISOString(),
      creadoEn:    form.creadoEn||new Date().toISOString(),
      creadoPor:   form.creadoPor||user?.id||'',
    };

    // CORRECCIÓN CAUSA RAÍZ #1+#2:
    // • Eliminar doble escritura: DB.set ya gestiona localStorage internamente (L554-558)
    // • Establecer writelock ANTES de DB.set para proteger contra race condition
    //   donde onSnapshot de Firestore llega antes de que DB.set active el lock
    // • Actualización optimista del estado React antes de la confirmación async
    _setWriteLock('visitas_cliente', visita.id);
    // Actualizar estado React inmediatamente (actualización optimista)
    setVisitas(prev => esNueva
      ? [visita,...prev]
      : prev.map(x=>x.id===visita.id?visita:x));
    // DB.set escribe en localStorage Y Firestore (única fuente de escritura)
    DB.set('visitas_cliente', visita).catch(e=>
      console.warn('VisitaCliente: Firestore write error:', e.message)
    );

    // 2. Compromisos tipo Integra → crear tareas completas
    (visita.compromisos||[]).forEach(comp=>{
      if(comp.responsable!=='integra') return;
      const titulo = (comp.titulo||comp.descripcion||'').trim();
      if(!titulo) return;

      const rIds = Array.isArray(comp.responsablesIds) && comp.responsablesIds.length
        ? comp.responsablesIds
        : (comp.responsableId ? [comp.responsableId] : []);

      const tareaId  = comp.tareaId || uid();
      const tareaData = {
        id:                tareaId,
        titulo,
        clienteId:         visita.clienteId,
        responsableId:     rIds[0]||'',
        responsablesIds:   rIds,
        equipoIntegra:     !!comp.equipoIntegra,
        estado:            comp.estado||'pendiente',
        prioridad:         comp.prioridad||'media',
        fechaAsignada:     comp.fechaAsignada||visita.fecha,
        fechaVen:          comp.fechaVen||'',
        fechaEjecucion:    comp.fechaEjecucion||'',
        desc:              comp.desc||`Compromiso desde visita del ${visita.fecha}`,
        areaEspecialidad:  comp.areaEspecialidad||'',
        proyectoId:        comp.proyectoId||'',
        actividadesRealizadas: comp.actividadesRealizadas||'',
        reporteInforme:    comp.reporteInforme||'',
        compromisos:       Array.isArray(comp.compromisos)?comp.compromisos:[],
        soporteCierre:     Array.isArray(comp.soporteCierre)?comp.soporteCierre:[],
        showCierre:        !!comp.showCierre,
        showCompromisos:   !!comp.showCompromisos,
        esAlerta:          false,
        visitaId:          visita.id,
        creadoPor:         user?.id||'',
        creadoEn:          new Date().toISOString(),
        updatedAt:         new Date().toISOString(),
      };
      _sincTarea(tareaData, esNueva || !comp.tareaId);
      // Actualizar el tareaId en el compromiso para enlace bidireccional
      comp.tareaId = tareaId;
    });

    setOpen(false);
    toast(esNueva?'✅ Visita registrada':'✅ Visita actualizada','success');
  };

  // ─── Agendar Tarea (modal independiente desde tarjeta/detalle) ─
  const abrirAgendarTarea = v => {
    setVisitaParaTarea(v);
    const cli = clientes.find(c=>c.id===v.clienteId);
    setTareaForm({
      titulo:'',
      clienteId:       v.clienteId||'',
      responsableId:   v.responsableId||'',
      responsablesIds: v.responsableId?[v.responsableId]:[],
      equipoIntegra:   false,
      estado:          'pendiente',
      prioridad:       'media',
      fechaAsignada:   v.fecha||hoy,
      fechaVen:'', fechaEjecucion:'',
      desc:`Tarea desde visita al cliente ${cli?.nombre||''} del ${v.fecha}`,
      areaEspecialidad:'', proyectoId:'',
      actividadesRealizadas:'', reporteInforme:'',
      compromisos:[], soporteCierre:[],
      showCierre:false, showCompromisos:false, equipoIntegra:false,
      visitaId: v.id,
    });
    setOpenTarea(true);
  };

  // ─── Save Tarea independiente ─────────────────────────────────
  const saveTarea = () => {
    if(!tareaForm.titulo?.trim()) return toast('El título es requerido','error');
    const rIds = Array.isArray(tareaForm.responsablesIds)
      ? tareaForm.responsablesIds.filter(Boolean)
      : (tareaForm.responsableId?[tareaForm.responsableId]:[]);
    const esNueva = !tareaForm.id;
    const tareaData = {
      ...tareaForm,
      id:              tareaForm.id||uid(),
      creadoPor:       user?.id,
      creadoEn:        tareaForm.creadoEn||new Date().toISOString(),
      updatedAt:       new Date().toISOString(),
      responsableId:   rIds[0]||'',
      responsablesIds: rIds,
      soporteCierre:   Array.isArray(tareaForm.soporteCierre)?tareaForm.soporteCierre.filter(Boolean):[],
      compromisos:     Array.isArray(tareaForm.compromisos)?tareaForm.compromisos:[],
      fechaCumplimiento: tareaForm.estado==='completada'?(tareaForm.fechaCumplimiento||hoy):(tareaForm.fechaCumplimiento||''),
      esAlerta: false,
      visitaId: visitaParaTarea?.id||tareaForm.visitaId||'',
    };
    _sincTarea(tareaData, esNueva);
    setOpenTarea(false);
    setVisitaParaTarea(null);
    toast(esNueva?'✅ Tarea creada y sincronizada':'✅ Tarea actualizada','success');
  };

  // ─── Eliminar visita ─────────────────────────────────────────
  const removeVisita = id => {
    // CORRECCIÓN: DB.del gestiona localStorage internamente.
    // Actualización optimista del estado React + delegación a DB.del
    setVisitas(prev=>prev.filter(x=>x.id!==id));
    setDelId(null);
    DB.del('visitas_cliente', id).catch(e=>
      console.warn('removeVisita Firestore:', e.message)
    );
    toast('Visita eliminada','info');
  };

  // ─── Derivados memoizados ─────────────────────────────────────
  const lista = useMemo(()=>
    [...visitas]
      .filter(v=>!filCli||v.clienteId===filCli)
      .sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')),
  [visitas,filCli]);

  const tareasDeVisita = useCallback(vid =>
    tareas.filter(t=>t.visitaId===vid && !t.esAlerta),
  [tareas]);

  // ─── Constantes UI ───────────────────────────────────────────
  const SATISFACCION = {excelente:'😄 Excelente',buena:'🙂 Buena',regular:'😐 Regular',mala:'😞 Mala'};
  const ESTADO_VIS   = {programada:'Programada',realizada:'Realizada',cancelada:'Cancelada',reprogramada:'Reprogramada'};
  const SCOLOR       = {excelente:'#4ade80',buena:'#C9A84C',regular:'#f59e0b',mala:'#f87171'};
  const AREA_LABEL   = {
    administracion_personal:'Adm. Personal',gestion_sst:'Gestión SST',
    consultoria_juridica:'Cons. Jurídica',gestion_operativa:'Gestión Operativa',
    gestion_calidad:'Gestión Calidad',ambiental:'Ambiental',i_d:'I+D'
  };

  // ─── CompTareaForm definido externamente (fuera de VisitaCliente)
  // FIX: evita re-mount en cada render → soluciona pérdida de foco en inputs  };

  // ─── Exportar PDF de Visita ──────────────────────────────────

      const EST_LABEL    = {realizada:'Realizada',programada:'Programada',cancelada:'Cancelada',reprogramada:'Reprogramada'};

        gestion_calidad:'Gestión Calidad',ambiental:'Ambiental',i_d:'I+D'

      doc.text(empresa, PW-M, 19, {align:'right'});
      if(nit){ doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.text('NIT: '+nit, PW-M, 25, {align:'right'}); }
      if(tel){ doc.setFontSize(8); doc.text('Tel: '+tel, PW-M, 30, {align:'right'}); }
      if(emailCfg){ doc.setFontSize(7.5); doc.text(emailCfg, PW-M, 35, {align:'right'}); }

      // ── TÍTULO DEL DOCUMENTO ────────────────────────────────
      doc.setFont('helvetica','bold'); doc.setFontSize(10);
      doc.setTextColor(201,168,76);
      doc.text('INFORME DE VISITA AL CLIENTE', PW/2, 44, {align:'center'});

      // ── LÍNEA DORADA SEPARADORA ──────────────────────────────
      doc.setDrawColor(201,168,76); doc.setLineWidth(0.4);
      doc.line(M, 50, PW-M, 50);

      let y = 58;

      // ─── SECCIÓN 1: DATOS DE LA VISITA ──────────────────────
      doc.setFillColor(30,58,95); doc.rect(M,y-6,PW-M*2,7,'F');
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
      doc.text('1. DATOS DE LA VISITA', M+2, y-0.5);
      y += 7;

      // Grid 2 columnas
      const col1 = M+2;
      const col2 = PW/2+2;
      const cellH = 7.5;

      const drawRow2 = (l1,v1,l2,v2) => {
        doc.setFillColor(248,250,253); doc.rect(M,y-5,PW-M*2,cellH,'F');
        doc.setDrawColor(220,230,245); doc.setLineWidth(0.15); doc.rect(M,y-5,PW-M*2,cellH,'S');
        doc.setFont('helvetica','bold'); doc.setTextColor(80,100,130); doc.setFontSize(7.5);
        doc.text(l1, col1, y); doc.text(l2, col2, y);
        doc.setFont('helvetica','normal'); doc.setTextColor(30,30,30); doc.setFontSize(8.5);
        doc.text(v1||'—', col1+26, y); doc.text(v2||'—', col2+26, y);
        y += cellH;
      };
      const drawRow1 = (lbl,val,width) => {
        const w = width||(PW-M*2);
        doc.setFillColor(248,250,253); doc.rect(M,y-5,w,cellH,'F');
        doc.setDrawColor(220,230,245); doc.setLineWidth(0.15); doc.rect(M,y-5,w,cellH,'S');
        doc.setFont('helvetica','bold'); doc.setTextColor(80,100,130); doc.setFontSize(7.5);
        doc.text(lbl, col1, y);
        doc.setFont('helvetica','normal'); doc.setTextColor(30,30,30); doc.setFontSize(8.5);
        doc.text(String(val||'—').substring(0,90), col1+26, y);
        y += cellH;
      };

      drawRow2('Cliente:', cli?.nombre||'—', 'Fecha:', v.fecha||'—');
      drawRow2('Responsable:', resp?.nombre||'—', 'Estado:', EST_LABEL[v.estado]||v.estado||'—');
      drawRow2('Satisfacción:', SAT_LABEL[v.satisfaccion]||v.satisfaccion||'—', 'NIT Cliente:', cli?.nit||'—');
      y += 3;

      // ─── SECCIÓN 2: RESULTADO DE LA VISITA ──────────────────
      if(v.resultado){
        doc.setFillColor(30,58,95); doc.rect(M,y-6,PW-M*2,7,'F');
        doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
        doc.text('2. RESULTADO DE LA VISITA', M+2, y-0.5);
        y += 7;
        const lines = doc.splitTextToSize(v.resultado, PW-M*2-6);
        const blockH = Math.max(lines.length*5+6, 12);
        doc.setFillColor(252,253,255); doc.rect(M,y-5,PW-M*2,blockH,'F');
        doc.setDrawColor(220,230,245); doc.setLineWidth(0.15); doc.rect(M,y-5,PW-M*2,blockH,'S');
        doc.setFont('helvetica','normal'); doc.setTextColor(40,40,40); doc.setFontSize(8.5);
        doc.text(lines, M+3, y);
        y += blockH + 4;
      } else { y += 2; }

      // ─── SECCIÓN 3: TEMAS TRATADOS ───────────────────────────
      if((v.temas||[]).length > 0){
        doc.setFillColor(30,58,95); doc.rect(M,y-6,PW-M*2,7,'F');
        doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
        doc.text('3. TEMAS TRATADOS ('+(v.temas.length)+')', M+2, y-0.5);
        y += 7;
        v.temas.forEach((t,i) => {
          if(y > PH-25){ doc.addPage(); y=20; }
          const bgC = t.discutido ? [235,253,243] : [250,250,252];
          doc.setFillColor(...bgC); doc.rect(M, y-5, PW-M*2, 6.5, 'F');
          doc.setDrawColor(220,230,245); doc.setLineWidth(0.12); doc.rect(M,y-5,PW-M*2,6.5,'S');
          doc.setFont('helvetica','bold'); doc.setFontSize(7);
          doc.setTextColor(...(t.discutido?[22,163,74]:[100,116,139]));
          doc.text(t.discutido?'✓':'○', M+3, y-0.5);
          doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(40,40,40);
          doc.text(String(t.descripcion||'').substring(0,100), M+9, y-0.5);
          if(t.discutido){ doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(22,163,74); doc.text('DISCUTIDO', PW-M-3, y-0.5,{align:'right'}); }
          y += 7;
        });
        y += 2;
      }

      // ─── SECCIÓN 4: COMPROMISOS / TAREAS ────────────────────
      if((v.compromisos||[]).length > 0){
        if(y > PH-40){ doc.addPage(); y=20; }
        doc.setFillColor(30,58,95); doc.rect(M,y-6,PW-M*2,7,'F');
        doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
        doc.text('4. COMPROMISOS / TAREAS ('+(v.compromisos.length)+')', M+2, y-0.5);
        y += 8;
        // Encabezado tabla
        doc.setFillColor(230,236,245); doc.rect(M,y-5,PW-M*2,6.5,'F');
        doc.setTextColor(30,58,95); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
        doc.text('DESCRIPCIÓN',M+2,y-0.5);
        doc.text('RESPONSABLE',PW*0.52,y-0.5);
        doc.text('ESTADO',PW*0.69,y-0.5);
        doc.text('VENCIMIENTO',PW*0.82,y-0.5);
        y += 7;
        v.compromisos.forEach((c,i) => {
          if(y > PH-25){ doc.addPage(); y=20; }
          const bg = i%2===0?[252,253,255]:[246,248,252];
          doc.setFillColor(...bg); doc.rect(M,y-5,PW-M*2,7,'F');
          doc.setDrawColor(220,230,245); doc.setLineWidth(0.12); doc.rect(M,y-5,PW-M*2,7,'S');
          doc.setFont('helvetica','normal'); doc.setTextColor(40,40,40); doc.setFontSize(8);
          const titulo = String(c.titulo||c.descripcion||'—').substring(0,55);
          doc.text(titulo, M+2, y-0.5);
          doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
          const respColor = c.responsable==='integra'?[30,58,95]:[180,100,20];
          doc.setTextColor(...respColor);
          doc.text(c.responsable==='integra'?'Integra':'Cliente', PW*0.52, y-0.5);
          doc.setTextColor(40,40,40); doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
          doc.text(String(c.estado||'—'), PW*0.69, y-0.5);
          doc.text(c.fechaVen||'—', PW*0.82, y-0.5);
          y += 7.5;
        });
        y += 3;
      }

      // ─── SECCIÓN 5: TAREAS GENERADAS ────────────────────────
      if(tareasV.length > 0){
        if(y > PH-40){ doc.addPage(); y=20; }
        doc.setFillColor(30,58,95); doc.rect(M,y-6,PW-M*2,7,'F');
        doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
        doc.text('5. TAREAS GENERADAS EN SISTEMA ('+tareasV.length+')', M+2, y-0.5);
        y += 8;
        doc.setFillColor(230,236,245); doc.rect(M,y-5,PW-M*2,6.5,'F');
        doc.setTextColor(30,58,95); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
        doc.text('TÍTULO DE TAREA', M+2, y-0.5);
        doc.text('ESTADO', PW*0.62, y-0.5);
        doc.text('PRIORIDAD', PW*0.76, y-0.5);
        doc.text('VENCIMIENTO', PW*0.88, y-0.5);
        y += 7;
        tareasV.forEach((t,i) => {
          if(y > PH-22){ doc.addPage(); y=20; }
          const bg = i%2===0?[252,253,255]:[246,248,252];
          doc.setFillColor(...bg); doc.rect(M,y-5,PW-M*2,7,'F');
          doc.setDrawColor(220,230,245); doc.setLineWidth(0.12); doc.rect(M,y-5,PW-M*2,7,'S');
          doc.setFont('helvetica','normal'); doc.setTextColor(40,40,40); doc.setFontSize(8);
          doc.text(String(t.titulo||'—').substring(0,60), M+2, y-0.5);
          doc.setFontSize(7.5);
          doc.text(String(t.estado||'—'), PW*0.62, y-0.5);
          doc.text(String(t.prioridad||'—'), PW*0.76, y-0.5);
          doc.text(t.fechaVen||'—', PW*0.88, y-0.5);
          y += 7.5;
        });
        y += 3;
      }

      // ─── SECCIÓN 6: OBSERVACIONES ────────────────────────────
      if(v.observaciones){
        if(y > PH-35){ doc.addPage(); y=20; }
        doc.setFillColor(30,58,95); doc.rect(M,y-6,PW-M*2,7,'F');
        doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
        doc.text('6. OBSERVACIONES', M+2, y-0.5);
        y += 7;
        const obsLines = doc.splitTextToSize(v.observaciones, PW-M*2-6);
        const obsH = Math.max(obsLines.length*5+6, 10);
        doc.setFillColor(252,253,255); doc.rect(M,y-5,PW-M*2,obsH,'F');
        doc.setDrawColor(220,230,245); doc.setLineWidth(0.15); doc.rect(M,y-5,PW-M*2,obsH,'S');
        doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60); doc.setFontSize(8.5);
        doc.text(obsLines, M+3, y);
        y += obsH + 4;
      }

      // ─── FOOTER en cada página ───────────────────────────────
      const totalPages = doc.internal.getNumberOfPages();
      for(let p=1; p<=totalPages; p++){
        doc.setPage(p);
        doc.setDrawColor(201,168,76); doc.setLineWidth(0.3);
        doc.line(M, PH-14, PW-M, PH-14);
        doc.setFillColor(20,40,75); doc.rect(M,PH-13,PW-M*2,8,'F');
        doc.setFont('helvetica','normal'); doc.setTextColor(200,200,200); doc.setFontSize(7);
        doc.text(empresa+' · Generado: '+new Date().toLocaleDateString('es-CO'), M+2, PH-7.5);
        doc.text('Pág. '+p+' / '+totalPages, PW-M-2, PH-7.5, {align:'right'});
      }

      const cliNombre = (cli?.nombre||'cliente').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
      doc.save('VisitaCliente_'+cliNombre+'_'+v.fecha+'.pdf');
      toast('✅ PDF de visita generado','success');
    } catch(err){
      console.error('exportVisitaPDF error:', err);
      toast('Error generando PDF: '+err.message,'error');
    }
  };

  // ══════════════════════════════════════════════════════════════
  // RENDER
  // ══════════════════════════════════════════════════════════════
  return <div className="fade">

    {/* ── Barra de controles ────────────────────────────────── */}
    <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:14}}>
      <button className="btn btn-p btn-sm" onClick={openNew}>
        <Ico n="plus" s={14}/> Nueva Visita
      </button>
      <select className="inp" style={{width:'auto',padding:'5px 10px',fontSize:12}}
        value={filCli} onChange={e=>setFilCli(e.target.value)}>
        <option value="">Todos los clientes</option>
        {[...clientes].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'))
          .map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
      </select>
      <span style={{fontSize:11,color:'#475569',marginLeft:'auto'}}>
        {lista.length} visita{lista.length!==1?'s':''}
      </span>
    </div>

    {/* ── KPIs ─────────────────────────────────────────────── */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:14}}>
      {[
        {l:'Total Visitas',   v:visitas.filter(v=>v.clienteId&&v.fecha).length,                                              c:'blue'},
        {l:'Realizadas',      v:visitas.filter(v=>(v.estado||'').toLowerCase()==='realizada').length,             c:'green'},
        {l:'Programadas',     v:visitas.filter(v=>v.estado==='programada').length,            c:'gold'},
        {l:'Clientes Visita', v:new Set(visitas.filter(v=>v.clienteId&&v.clienteId.trim()).map(v=>v.clienteId)).size,    c:'blue'},
      ].map(({l,v,c})=><KPI key={l} label={l} val={v} ico="noteEdit" color={c}/>)}
    </div>

    {/* ── Lista vacía ──────────────────────────────────────── */}
    {lista.length===0&&<div className="card-p" style={{textAlign:'center',color:'#475569',padding:40}}>
      {filCli?'Sin visitas para este cliente.':'Sin visitas registradas. Haga clic en "Nueva Visita" para comenzar.'}
    </div>}

    {/* ── Tarjetas ─────────────────────────────────────────── */}
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {lista.map(v=>{
        const cli      = clientes.find(c=>c.id===v.clienteId);
        const resp     = equipo.find(e=>e.id===v.responsableId);
        const tareasV  = tareasDeVisita(v.id);
        const tDis     = (v.temas||[]).filter(t=>t.discutido).length;
        const cCump    = (v.compromisos||[]).filter(c=>c.cumplido).length;
        const cTotal   = (v.compromisos||[]).length;

        return <div key={v.id} className="card-p">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:5,flexWrap:'wrap'}}>
                <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99,
                  background:v.estado==='realizada'?'rgba(74,222,128,.15)':'rgba(201,168,76,.12)',
                  color:v.estado==='realizada'?'#4ade80':'#C9A84C',
                  border:`1px solid ${v.estado==='realizada'?'rgba(74,222,128,.3)':'rgba(201,168,76,.25)'}`}}>
                  {ESTADO_VIS[v.estado]||v.estado}
                </span>
                <span style={{fontSize:11,color:SCOLOR[v.satisfaccion],fontWeight:600}}>
                  {SATISFACCION[v.satisfaccion]||''}
                </span>
              </div>
              <p className="sy" style={{fontWeight:700,color:'#fff',fontSize:14,margin:'0 0 4px'}}>
                🏢 {cli?.nombre||'—'}
              </p>
              <div style={{display:'flex',flexWrap:'wrap',gap:10,fontSize:11,color:'#475569'}}>
                <span>📅 {v.fecha}</span>
                {resp&&<span>👤 {resp.nombre}</span>}
                {(v.temas||[]).length>0&&<span style={{color:'#93c5fd'}}>🗂 {tDis}/{(v.temas||[]).length} temas</span>}
                {cTotal>0&&<span style={{color:'#4ade80'}}>🤝 {cCump}/{cTotal} compromisos</span>}
                {tareasV.length>0&&<span style={{color:'#C9A84C'}}>✅ {tareasV.length} tarea{tareasV.length!==1?'s':''}</span>}
              </div>
            </div>
            <div style={{display:'flex',gap:4,flexShrink:0,marginLeft:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
              <button title="Agendar Tarea" onClick={()=>abrirAgendarTarea(v)}
                style={{background:'rgba(201,168,76,.1)',border:'1px solid rgba(201,168,76,.3)',
                  borderRadius:6,padding:'4px 9px',cursor:'pointer',color:'#C9A84C',fontSize:11,fontWeight:600}}>
                + Tarea
              </button>
              <button title="Exportar PDF de Visita" onClick={()=>exportVisitaPDF(v)}
                style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',
                  borderRadius:6,padding:'4px 9px',cursor:'pointer',color:'#ef4444',fontSize:11,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
                <Ico n="pdf" s={13}/> PDF
              </button>
              <button title="Ver detalle" onClick={()=>setViewDetail(v)}
                style={{background:'none',border:'1px solid #243447',borderRadius:6,
                  padding:'4px 7px',cursor:'pointer',color:'#64748b',fontSize:12}}>👁</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(v)}>
                <Ico n="edit" s={13}/>
              </button>
              <button className="btn btn-d btn-sm" onClick={()=>setDelId(v.id)}>
                <Ico n="trash" s={13}/>
              </button>
            </div>
          </div>

          {v.resultado&&<div style={{padding:'8px 12px',borderRadius:7,marginBottom:6,
            background:'rgba(30,58,95,.2)',border:'1px solid #243447'}}>
            <p style={{fontSize:10,color:'#64748b',margin:'0 0 3px',textTransform:'uppercase',letterSpacing:'.3px'}}>Resultado</p>
            <p style={{color:'#cbd5e1',fontSize:12,margin:0,lineHeight:1.5}}>{v.resultado}</p>
          </div>}

          {(v.temas||[]).length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:5}}>
            {(v.temas||[]).slice(0,5).map((t,i)=>(
              <span key={i} style={{fontSize:10,padding:'2px 8px',borderRadius:99,
                background:t.discutido?'rgba(74,222,128,.12)':'rgba(51,65,85,.4)',
                color:t.discutido?'#4ade80':'#64748b',
                border:`1px solid ${t.discutido?'rgba(74,222,128,.25)':'#243447'}`}}>
                {t.discutido?'✓ ':'○ '}{t.descripcion.substring(0,28)}
              </span>
            ))}
            {(v.temas||[]).length>5&&<span style={{fontSize:10,color:'#475569'}}>+{(v.temas||[]).length-5} más</span>}
          </div>}

          {tareasV.length>0&&<div style={{marginTop:7,padding:'6px 10px',borderRadius:6,
            background:'rgba(201,168,76,.06)',border:'1px solid rgba(201,168,76,.2)'}}>
            <p style={{fontSize:10,color:'#C9A84C',fontWeight:700,margin:'0 0 3px'}}>Tareas ({tareasV.length})</p>
            {tareasV.slice(0,3).map(t=>(
              <div key={t.id} style={{display:'flex',justifyContent:'space-between',fontSize:11,
                color:'#94a3b8',padding:'2px 0'}}>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{t.titulo}</span>
                <SBadge s={t.estado}/>
              </div>
            ))}
            {tareasV.length>3&&<p style={{fontSize:10,color:'#475569',margin:'2px 0 0'}}>+{tareasV.length-3} más</p>}
          </div>}
        </div>;
      })}
    </div>

    {/* ══════════════════════════════════════════════════════════
        MODAL NUEVA / EDITAR VISITA
    ══════════════════════════════════════════════════════════ */}
    <Modal open={open} onClose={()=>setOpen(false)}
      title={form.id?'Editar Visita Cliente':'Nueva Visita Cliente'} wide>

      {/* Tabs */}
      <div style={{display:'flex',gap:6,marginBottom:16,borderBottom:'1px solid #243447',paddingBottom:10}}>
        {[
          {id:'visita',     l:'🏢 Datos de la Visita'},
          {id:'temas',      l:'🗂 Temas Tratados'},
          {id:'compromisos',l:'📋 Nueva Tarea / Compromisos'},
        ].map(tab=>(
          <button key={tab.id} onClick={()=>setTabModal(tab.id)}
            className={tabModal===tab.id?'btn btn-sm btn-p':'btn btn-sm btn-ghost'}
            style={{fontSize:11}}>
            {tab.l}
            {tab.id==='compromisos'&&(form.compromisos||[]).length>0&&(
              <span style={{marginLeft:5,fontSize:9,fontWeight:700,background:'rgba(201,168,76,.25)',
                color:'#C9A84C',borderRadius:99,padding:'1px 6px'}}>
                {(form.compromisos||[]).length}
              </span>
            )}
          </button>
        ))}
      </div>

      {/* TAB 1: Datos de la Visita */}
      {tabModal==='visita'&&<div className="grid-2">
        <F label="Cliente *">
          <select className="inp" value={form.clienteId||''} onChange={upd('clienteId')}>
            <option value="">— Seleccione cliente —</option>
            {[...clientes].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'))
              .map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
          </select>
        </F>
        <F label="Fecha *">
          <input type="date" className="inp" value={form.fecha||''} onChange={upd('fecha')}/>
        </F>
        <F label="Responsable">
          <select className="inp" value={form.responsableId||''} onChange={upd('responsableId')}>
            <option value="">Sin asignar</option>
            {equipo.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
          </select>
        </F>
        <F label="Estado de la Visita">
          <select className="inp" value={form.estado||'realizada'} onChange={upd('estado')}>
            <option value="programada">Programada</option>
            <option value="realizada">Realizada</option>
            <option value="reprogramada">Reprogramada</option>
            <option value="cancelada">Cancelada</option>
          </select>
        </F>
        <F label="Satisfacción del Cliente">
          <select className="inp" value={form.satisfaccion||'buena'} onChange={upd('satisfaccion')}>
            <option value="excelente">😄 Excelente</option>
            <option value="buena">🙂 Buena</option>
            <option value="regular">😐 Regular</option>
            <option value="mala">😞 Mala</option>
          </select>
        </F>
        <F label="Resultado de la Visita" col2>
          <textarea className="inp" value={form.resultado||''} onChange={upd('resultado')} rows={3}
            placeholder="Resultado general, acuerdos alcanzados..."/>
        </F>
        <F label="Observaciones" col2>
          <textarea className="inp" value={form.observaciones||''} onChange={upd('observaciones')} rows={2}
            placeholder="Notas adicionales..."/>
        </F>
      </div>}

      {/* TAB 2: Temas Tratados */}
      {tabModal==='temas'&&<div>
        <div style={{padding:'14px 16px',borderRadius:10,border:'1px solid rgba(96,165,250,.3)',
          background:'rgba(30,58,95,.08)'}}>
          <p style={{fontSize:12,fontWeight:700,color:'#93c5fd',margin:'0 0 10px'}}>
            🗂 Temas Tratados en la Visita
          </p>
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <input className="inp" style={{flex:1}} value={form._nuevoTema||''} onChange={upd('_nuevoTema')}
              placeholder="Describe el tema tratado..." onKeyDown={e=>e.key==='Enter'&&addTema()}/>
            <button className="btn btn-ghost btn-sm" onClick={addTema}><Ico n="plus" s={13}/></button>
          </div>
          {(form.temas||[]).length===0&&(
            <p style={{fontSize:11,color:'#334155',textAlign:'center',padding:'8px 0',margin:0}}>
              Sin temas. Escribe y presiona Enter o haz clic en +.
            </p>
          )}
          {(form.temas||[]).map((t,i)=>(
            <div key={t.id||i} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',
              background:'#0f1923',border:'1px solid #243447',borderRadius:7,marginBottom:5}}>
              <input type="checkbox" checked={!!t.discutido} style={{accentColor:'#4ade80',flexShrink:0}}
                onChange={e=>setForm(p=>{const a=[...(p.temas||[])];a[i]={...a[i],discutido:e.target.checked};return{...p,temas:a};})}/>
              <input className="inp" style={{flex:1,background:'transparent',border:'none',padding:'2px 0',fontSize:12}}
                value={t.descripcion||''}
                onChange={e=>setForm(p=>{const a=[...(p.temas||[])];a[i]={...a[i],descripcion:e.target.value};return{...p,temas:a};})}/>
              <button onClick={()=>setForm(p=>({...p,temas:(p.temas||[]).filter((_,j)=>j!==i)}))}
                style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',padding:'2px 4px'}}>✕</button>
            </div>
          ))}
        </div>
      </div>}

      {/* TAB 3: Nueva Tarea / Compromisos */}
      {tabModal==='compromisos'&&<div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <p style={{fontSize:13,fontWeight:700,color:'#C9A84C',margin:'0 0 3px'}}>
              📋 Tareas / Compromisos de la Visita
            </p>
            <p style={{fontSize:11,color:'#475569',margin:0}}>
              Cada compromiso se convierte en una Tarea completa al guardar la visita. Los compromisos de tipo "Integra" quedan conectados con Tareas, Calendario y Alertas.
            </p>
          </div>
          <button className="btn btn-p btn-sm" onClick={addCompTarea}>
            <Ico n="plus" s={13}/> Nueva Tarea
          </button>
        </div>

        {(form.compromisos||[]).length===0&&(
          <div style={{textAlign:'center',padding:'30px 0',color:'#334155'}}>
            <p style={{fontSize:28,margin:'0 0 8px'}}>📋</p>
            <p style={{fontSize:13,fontWeight:600,margin:'0 0 4px',color:'#475569'}}>Sin tareas registradas</p>
            <p style={{fontSize:11,color:'#334155',margin:0}}>
              Haga clic en "Nueva Tarea" para agregar compromisos de esta visita.
            </p>
          </div>
        )}

        {(form.compromisos||[]).map((comp,idx)=>(
          <CompTareaForm key={comp.id||idx} comp={comp} idx={idx}
              equipo={equipo} clientes={clientes} proyectos={proyectos}
              toast={toast} onUpdate={updComp} onDelete={delComp}/>
        ))}
      </div>}

      {/* Navegación + Guardar */}
      <div style={{display:'flex',gap:8,justifyContent:'space-between',alignItems:'center',marginTop:18,
        paddingTop:14,borderTop:'1px solid #243447'}}>
        <div style={{display:'flex',gap:6}}>
          {tabModal!=='visita'&&(
            <button className="btn btn-ghost btn-sm" onClick={()=>setTabModal(
              tabModal==='compromisos'?'temas':'visita')}>← Anterior</button>
          )}
          {tabModal!=='compromisos'&&(
            <button className="btn btn-ghost btn-sm" onClick={()=>setTabModal(
              tabModal==='visita'?'temas':'compromisos')}>Siguiente →</button>
          )}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setOpen(false)}>Cancelar</button>
          <button className="btn btn-g btn-sm" onClick={saveVisita}>
            <Ico n="check" s={14}/>
            {form.id?'Actualizar Visita':'Guardar Visita'}
          </button>
        </div>
      </div>
    </Modal>

    {/* ══════════════════════════════════════════════════════════
        MODAL AGENDAR TAREA INDEPENDIENTE (desde tarjeta/detalle)
    ══════════════════════════════════════════════════════════ */}
    <Modal open={openTarea} onClose={()=>{setOpenTarea(false);setVisitaParaTarea(null);}}
      title="Nueva Tarea desde Visita Cliente" wide>

      {visitaParaTarea&&(
        <div style={{padding:'8px 14px',borderRadius:8,marginBottom:14,
          display:'flex',alignItems:'center',gap:10,
          background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.28)'}}>
          <span style={{fontSize:16,flexShrink:0}}>🏢</span>
          <div>
            <p style={{fontSize:12,color:'#C9A84C',margin:0,fontWeight:700}}>
              {clientes.find(c=>c.id===visitaParaTarea.clienteId)?.nombre||'—'}
            </p>
            <p style={{fontSize:10,color:'#64748b',margin:0}}>
              Visita del {visitaParaTarea.fecha} · Tarea vinculada automáticamente
            </p>
          </div>
        </div>
      )}

      <div className="grid-2">
        <F label="Título *" col2>
          <input className="inp" value={tareaForm.titulo||''} onChange={updT('titulo')}
            placeholder="Título de la tarea..."/>
        </F>
        <F label="Cliente">
          <select className="inp" value={tareaForm.clienteId||''} onChange={updT('clienteId')}>
            <option value="">Sin cliente</option>
            {[...clientes].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'))
              .map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
          </select>
        </F>
        <F label="Estado">
          <select className="inp" value={tareaForm.estado||'pendiente'} onChange={e=>{
            const s=e.target.value;
            setTareaForm(p=>({...p,estado:s,showCierre:s==='completada'?(p.showCierre||false):p.showCierre}));
          }}>
            <option value="pendiente">Pendiente</option>
            <option value="en_curso">En Curso</option>
            <option value="revision">En Revisión</option>
            <option value="completada">Completada</option>
            <option value="reprogramada">Reprogramada</option>
            <option value="cancelada">Cancelada</option>
          </select>
        </F>
        <F label="Prioridad">
          <select className="inp" value={tareaForm.prioridad||'media'} onChange={updT('prioridad')}>
            <option value="baja">Baja</option>
            <option value="media">Media</option>
            <option value="alta">Alta</option>
            <option value="urgente">Urgente</option>
          </select>
        </F>
        <F label="Fecha de Asignación">
          <div style={{position:'relative'}}>
            <input type="date" className="inp" value={tareaForm.fechaAsignada||''} onChange={updT('fechaAsignada')}
              style={{paddingLeft:36}}/>
            <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',
              fontSize:14,pointerEvents:'none',opacity:.7}}>📅</span>
          </div>
          <p style={{fontSize:10,color:'#475569',margin:'4px 0 0'}}>Fecha acordada para inicio o reunión</p>
        </F>
        <F label="Fecha de Vencimiento">
          <input type="date" className="inp" value={tareaForm.fechaVen||''} onChange={updT('fechaVen')}/>
        </F>
        <F label="Fecha de Ejecución">
          <div style={{position:'relative'}}>
            <input type="date" className="inp" value={tareaForm.fechaEjecucion||''} onChange={updT('fechaEjecucion')}
              style={{paddingLeft:36}}/>
            <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',
              fontSize:14,pointerEvents:'none',opacity:.7}}>🗓️</span>
          </div>
          <p style={{fontSize:10,color:'#475569',margin:'4px 0 0'}}>Fecha de ejecución real</p>
        </F>
        <F label="Proyecto">
          <select className="inp" value={tareaForm.proyectoId||''} onChange={updT('proyectoId')}>
            <option value="">Sin proyecto</option>
            {(proyectos||[]).map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
          </select>
        </F>
        <F label="Descripción / Notas" col2>
          <textarea className="inp" value={tareaForm.desc||''} onChange={updT('desc')} rows={2}/>
        </F>
        {tareaForm.estado==='completada'&&(
          <F label={<span style={{display:'flex',alignItems:'center',gap:6}}>
            <span>✅</span>Actividades Realizadas
            <span style={{fontSize:9,fontWeight:600,padding:'1px 6px',borderRadius:99,
              background:'rgba(74,222,128,.14)',border:'1px solid rgba(74,222,128,.3)',color:'#4ade80'}}>
              para informe
            </span>
          </span>} col2>
            <textarea className="inp" value={tareaForm.actividadesRealizadas||''} rows={3}
              style={{border:'1px solid rgba(74,222,128,.35)',minHeight:80}}
              onChange={updT('actividadesRealizadas')}/>
          </F>
        )}
        {tareaForm.estado==='completada'&&(
          <F label="📋 Reporte Informe de Gestión" col2>
            <textarea className="inp" value={tareaForm.reporteInforme||''} rows={2}
              onChange={updT('reporteInforme')}/>
          </F>
        )}
        <F label="Responsable(s)" col2>
          {equipo.length===0
            ? <p style={{fontSize:12,color:'#475569',margin:0}}>Sin integrantes en el equipo.</p>
            : <>
                {(()=>{
                  const esEI=!!tareaForm.equipoIntegra;
                  const toggleEI2=()=>{
                    if(!esEI) setTareaForm(p=>({...p,equipoIntegra:true,responsablesIds:equipo.map(m=>m.id)}));
                    else setTareaForm(p=>({...p,equipoIntegra:false,responsablesIds:[]}));
                  };
                  return (
                    <label onClick={toggleEI2} style={{display:'flex',alignItems:'center',gap:10,
                      padding:'9px 12px',cursor:'pointer',userSelect:'none',marginBottom:6,borderRadius:9,
                      background:esEI?'rgba(30,58,95,.25)':'rgba(201,168,76,.05)',
                      border:`2px solid ${esEI?'rgba(30,58,95,.8)':'rgba(201,168,76,.35)'}`,transition:'all .15s'}}>
                      <div style={{width:22,height:22,borderRadius:5,flexShrink:0,border:'2px solid',
                        borderColor:esEI?'#60a5fa':'#C9A84C',background:esEI?'#1E3A5F':'transparent',
                        display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {esEI&&<span style={{fontSize:11,color:'#60a5fa',fontWeight:900}}>✓</span>}
                      </div>
                      <span style={{fontSize:17}}>👥</span>
                      <div style={{flex:1}}>
                        <p style={{fontSize:13,fontWeight:700,margin:0,color:esEI?'#93c5fd':'#C9A84C'}}>Equipo Integra</p>
                        <p style={{fontSize:10,color:'#475569',margin:0}}>Todo el equipo</p>
                      </div>
                      {esEI&&<span style={{fontSize:9,fontWeight:700,color:'#93c5fd',background:'rgba(30,58,95,.4)',
                        border:'1px solid rgba(147,197,253,.3)',borderRadius:99,padding:'1px 8px'}}>
                        {equipo.length} integrantes</span>}
                    </label>
                  );
                })()}
                <div style={{fontSize:10,color:'#334155',fontWeight:600,textTransform:'uppercase',
                  letterSpacing:'.4px',marginBottom:4,paddingLeft:2}}>O individualmente:</div>
                <div style={{border:'1px solid #243447',borderRadius:8,background:'#0f1923',maxHeight:160,overflowY:'auto'}}>
                  {equipo.map(mm=>{
                    const selArr=Array.isArray(tareaForm.responsablesIds)?tareaForm.responsablesIds:[];
                    const selM=selArr.includes(mm.id);
                    const toggleM2=()=>setTareaForm(p=>{
                      const prev=Array.isArray(p.responsablesIds)?p.responsablesIds:[];
                      const next=selM?prev.filter(x=>x!==mm.id):[...prev,mm.id];
                      return{...p,responsablesIds:next,equipoIntegra:next.length===equipo.length};
                    });
                    return (
                      <label key={mm.id} onClick={toggleM2} style={{
                        display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
                        cursor:'pointer',userSelect:'none',transition:'background .12s',
                        background:selM?'rgba(201,168,76,.09)':'transparent',borderBottom:'1px solid #1a2840'}}>
                        <div style={{width:16,height:16,borderRadius:4,flexShrink:0,border:'2px solid',
                          borderColor:selM?'#C9A84C':'#334155',background:selM?'#C9A84C':'transparent',
                          display:'flex',alignItems:'center',justifyContent:'center'}}>
                          {selM&&<span style={{fontSize:10,color:'#0f1923',fontWeight:900}}>✓</span>}
                        </div>
                        <div style={{width:28,height:28,borderRadius:'50%',flexShrink:0,
                          background:'linear-gradient(135deg,#1E3A5F,#2a5298)',
                          display:'flex',alignItems:'center',justifyContent:'center',
                          fontSize:12,fontWeight:700,color:'#fff'}}>{mm.nombre.charAt(0)}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <p style={{fontSize:13,fontWeight:selM?700:400,color:selM?'#e8c96a':'#e2e8f0',
                            margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{mm.nombre}</p>
                          {mm.cargo&&<p style={{fontSize:10,color:'#475569',margin:0}}>{mm.cargo}</p>}
                        </div>
                        {selM&&<span style={{fontSize:9,fontWeight:700,color:'#C9A84C',flexShrink:0,
                          background:'rgba(201,168,76,.12)',border:'1px solid rgba(201,168,76,.28)',
                          borderRadius:99,padding:'1px 7px'}}>asignado</span>}
                      </label>
                    );
                  })}
                </div>
                {(()=>{
                  const sel=(Array.isArray(tareaForm.responsablesIds)?tareaForm.responsablesIds:[])
                    .map(id=>equipo.find(e=>e.id===id)?.nombre).filter(Boolean);
                  return sel.length>0
                    ? <div style={{marginTop:7,display:'flex',flexWrap:'wrap',gap:4}}>
                        {tareaForm.equipoIntegra&&<span style={{fontSize:11,color:'#93c5fd',
                          background:'rgba(30,58,95,.3)',border:'1px solid rgba(147,197,253,.25)',
                          borderRadius:99,padding:'2px 10px'}}>👥 Equipo Integra</span>}
                        {!tareaForm.equipoIntegra&&sel.map((n,i)=>(
                          <span key={i} style={{fontSize:11,color:'#C9A84C',background:'rgba(201,168,76,.1)',
                            border:'1px solid rgba(201,168,76,.25)',borderRadius:99,padding:'2px 10px'}}>{n}</span>
                        ))}
                      </div>
                    : <p style={{fontSize:11,color:'#334155',margin:'6px 0 0'}}>Sin responsable</p>;
                })()}
              </>
          }
        </F>
      </div>

      {/* Área de Especialidad */}
      <div style={{marginTop:14,padding:'12px 16px',borderRadius:10,
        border:'1px solid rgba(100,116,139,.3)',background:'rgba(51,65,85,.12)'}}>
        <p style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',
          letterSpacing:'.5px',margin:'0 0 10px'}}>Área de Especialidad / Componente</p>
        <select className="inp" value={tareaForm.areaEspecialidad||''} onChange={updT('areaEspecialidad')} style={{fontSize:13}}>
          <option value="">— Sin clasificar —</option>
          <option value="administracion_personal">Administración de Personal</option>
          <option value="gestion_sst">Gestión SST</option>
          <option value="consultoria_juridica">Consultoría Jurídica</option>
          <option value="gestion_operativa">Gestión Operativa</option>
          <option value="gestion_calidad">Gestión de Calidad</option>
          <option value="ambiental">Ambiental</option>
          <option value="i_d">I+D</option>
        </select>
        {tareaForm.areaEspecialidad&&<p style={{fontSize:10,color:'#60a5fa',margin:'4px 0 0'}}>
          ✓ Área asignada — se incluirá en reportes y clasificación
        </p>}
      </div>

      {/* Botón Cierre */}
      <div style={{marginTop:16}}>
        <button type="button" onClick={()=>setTareaForm(p=>({...p,showCierre:!p.showCierre}))}
          style={{display:'inline-flex',alignItems:'center',gap:9,padding:'9px 18px',borderRadius:9,
            fontSize:13,fontWeight:700,cursor:'pointer',transition:'all .18s',border:'2px solid',
            borderColor:tareaForm.showCierre?'rgba(74,222,128,.55)':'rgba(201,168,76,.5)',
            background:tareaForm.showCierre?'rgba(26,107,58,.14)':'rgba(120,80,10,.12)',
            color:tareaForm.showCierre?'#4ade80':'#C9A84C'}}>
          <span style={{fontSize:17}}>{tareaForm.showCierre?'🔒':'📋'}</span>
          {tareaForm.showCierre?'Cierre activo':'Cierre (Fase final)'}
          <span style={{fontSize:9,fontWeight:600,padding:'2px 7px',borderRadius:99,
            background:tareaForm.showCierre?'rgba(74,222,128,.18)':'rgba(201,168,76,.15)',
            border:'1px solid',borderColor:tareaForm.showCierre?'rgba(74,222,128,.4)':'rgba(201,168,76,.3)',
            color:tareaForm.showCierre?'#4ade80':'#C9A84C'}}>
            {tareaForm.showCierre?'abierto':'cerrado'}
          </span>
        </button>
      </div>

      {/* Panel de Cierre */}
      {tareaForm.showCierre&&(()=>{
        const ev=(Array.isArray(tareaForm.soporteCierre)?tareaForm.soporteCierre:[]).filter(Boolean);
        const libre=4-ev.length;
        const onAddT=e=>{
          const files=Array.from(e.target.files||[]).slice(0,libre);
          files.forEach(file=>{
            if(!['image/jpeg','image/jpg','image/png','application/pdf'].includes(file.type))
              return toast('Solo JPG, PNG o PDF','error');
            if(file.size>8*1024*1024) return toast(`"${file.name}" excede 8 MB`,'error');
            const reader=new FileReader();
            reader.onload=ev2=>setTareaForm(p=>{
              const actual=Array.isArray(p.soporteCierre)?p.soporteCierre.filter(Boolean):[];
              if(actual.length>=4) return p;
              return{...p,soporteCierre:[...actual,{data:ev2.target.result,nombre:file.name,tipo:file.type,kb:Math.round(file.size/1024)}]};
            });
            reader.readAsDataURL(file);
          });
          e.target.value='';
        };
        const onDelT=idx=>setTareaForm(p=>({...p,soporteCierre:(Array.isArray(p.soporteCierre)?p.soporteCierre:[]).filter((_,i)=>i!==idx)}));
        return (
          <div style={{marginTop:12,padding:'16px',borderRadius:10,border:'2px solid',
            borderColor:ev.length>0?'rgba(74,222,128,.4)':'rgba(248,113,113,.4)',
            background:ev.length>0?'rgba(26,107,58,.07)':'rgba(153,27,27,.07)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <div style={{width:36,height:36,borderRadius:9,flexShrink:0,fontSize:18,
                display:'flex',alignItems:'center',justifyContent:'center',
                background:ev.length>0?'rgba(74,222,128,.14)':'rgba(248,113,113,.12)',
                border:'1px solid',borderColor:ev.length>0?'rgba(74,222,128,.3)':'rgba(248,113,113,.3)'}}>
                {ev.length>0?'✅':'📎'}
              </div>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:700,margin:0,color:ev.length>0?'#4ade80':'#94a3b8'}}>
                  Soporte de Cierre — {ev.length}/4 (Opcional)
                </p>
                <p style={{fontSize:11,color:'#64748b',margin:0}}>
                  {ev.length===0?'Adjunte evidencia (JPG, PNG o PDF)':libre>0?`${libre} slot${libre!==1?'s':''} disponible${libre!==1?'s':''}  `:'Límite alcanzado'}
                </p>
              </div>
            </div>
            {ev.length>0&&<div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:12}}>
              {ev.map((item,idx)=>(
                <div key={idx} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 11px',
                  borderRadius:8,background:'#0f1923',border:'1px solid #243447'}}>
                  {item.tipo==='application/pdf'
                    ? <div style={{width:38,height:38,borderRadius:7,flexShrink:0,background:'rgba(239,68,68,.1)',
                        border:'1px solid rgba(239,68,68,.22)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>📄</div>
                    : <img src={item.data} alt={item.nombre} style={{width:38,height:38,objectFit:'cover',borderRadius:7,border:'1px solid #243447',flexShrink:0}}/>}
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:12,fontWeight:500,color:'#e2e8f0',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.nombre}</p>
                    <p style={{fontSize:10,color:'#475569',margin:0}}>{item.tipo==='application/pdf'?'PDF':'Imagen'} · {item.kb} KB</p>
                  </div>
                  <button type="button" onClick={()=>onDelT(idx)} style={{background:'rgba(153,27,27,.32)',border:'1px solid rgba(248,113,113,.3)',
                    borderRadius:6,color:'#fca5a5',fontSize:11,fontWeight:700,cursor:'pointer',padding:'3px 9px',flexShrink:0}}>✕</button>
                </div>
              ))}
            </div>}
            {libre>0&&<label style={{display:'flex',alignItems:'center',gap:11,padding:'11px 15px',borderRadius:9,
              border:'2px dashed',cursor:'pointer',transition:'all .15s',userSelect:'none',
              borderColor:ev.length===0?'rgba(248,113,113,.55)':'rgba(74,222,128,.38)',
              background:ev.length===0?'rgba(153,27,27,.06)':'rgba(26,107,58,.05)'}}>
              <input type="file" accept=".jpg,.jpeg,.png,.pdf" multiple style={{display:'none'}} onChange={onAddT}/>
              <span style={{fontSize:22}}>📁</span>
              <div>
                <p style={{fontSize:12,fontWeight:700,margin:0,color:ev.length===0?'#94a3b8':'#4ade80'}}>
                  {ev.length===0?'Adjuntar soporte de cierre (opcional)':'Agregar más archivos'}
                </p>
                <p style={{fontSize:10,color:'#64748b',margin:0}}>JPG · PNG · PDF · máx. 8 MB · {libre} slot{libre!==1?'s':''}</p>
              </div>
            </label>}
          </div>
        );
      })()}

      {/* Botón Compromisos */}
      <div style={{marginTop:12}}>
        <button type="button" onClick={()=>setTareaForm(p=>({...p,showCompromisos:!p.showCompromisos}))}
          style={{display:'inline-flex',alignItems:'center',gap:9,padding:'9px 18px',borderRadius:9,
            fontSize:13,fontWeight:700,cursor:'pointer',transition:'all .18s',border:'2px solid',
            borderColor:tareaForm.showCompromisos?'rgba(96,165,250,.55)':'rgba(100,116,139,.4)',
            background:tareaForm.showCompromisos?'rgba(30,58,95,.18)':'rgba(51,65,85,.1)',
            color:tareaForm.showCompromisos?'#93c5fd':'#94a3b8'}}>
          <span style={{fontSize:17}}>🤝</span>
          {tareaForm.showCompromisos?`Compromisos (${(tareaForm.compromisos||[]).length})`:'Compromisos (Opcional)'}
        </button>
      </div>

      {/* Panel Compromisos */}
      {tareaForm.showCompromisos&&(()=>{
        const comps=Array.isArray(tareaForm.compromisos)?tareaForm.compromisos:[];
        const addC=()=>setTareaForm(p=>({...p,compromisos:[...(Array.isArray(p.compromisos)?p.compromisos:[]),
          {id:uid(),descripcion:'',responsabilidad:'integra',empleadoId:'',fechaCompromiso:''}]}));
        const updC=(si,k,v)=>setTareaForm(p=>{const arr=[...(Array.isArray(p.compromisos)?p.compromisos:[])];arr[si]={...arr[si],[k]:v};return{...p,compromisos:arr};});
        const delC=si=>setTareaForm(p=>({...p,compromisos:(Array.isArray(p.compromisos)?p.compromisos:[]).filter((_,i)=>i!==si)}));
        return (
          <div style={{marginTop:12,padding:'16px',borderRadius:10,border:'2px solid rgba(96,165,250,.35)',background:'rgba(30,58,95,.08)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:20}}>🤝</span>
                <div>
                  <p style={{fontSize:13,fontWeight:700,margin:0,color:'#93c5fd'}}>Compromisos</p>
                  <p style={{fontSize:10,color:'#64748b',margin:0}}>Responsabilidad de Integra o Cliente</p>
                </div>
              </div>
              <button type="button" onClick={addC} style={{display:'inline-flex',alignItems:'center',gap:5,
                padding:'5px 13px',borderRadius:7,fontSize:12,fontWeight:700,cursor:'pointer',
                background:'rgba(96,165,250,.18)',border:'1px solid rgba(96,165,250,.38)',color:'#93c5fd'}}>
                + Agregar
              </button>
            </div>
            {comps.length===0&&<p style={{fontSize:12,color:'#475569',textAlign:'center',padding:'12px 0',margin:0}}>
              Sin compromisos. Haga clic en "+ Agregar".
            </p>}
            {comps.map((comp2,si)=>(
              <div key={comp2.id||si} style={{marginBottom:10,padding:'12px',borderRadius:9,background:'#0f1923',border:'1px solid #243447'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                  <span style={{fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px'}}>Compromiso #{si+1}</span>
                  <button type="button" onClick={()=>delC(si)} style={{background:'rgba(153,27,27,.3)',border:'1px solid rgba(248,113,113,.25)',borderRadius:5,color:'#fca5a5',fontSize:11,fontWeight:700,cursor:'pointer',padding:'2px 8px'}}>✕</button>
                </div>
                <textarea className="inp" value={comp2.descripcion||''} onChange={e=>updC(si,'descripcion',e.target.value)}
                  placeholder="Descripción..." rows={2} style={{marginBottom:8,minHeight:56}}/>
                <div className="grid-2">
                  <div>
                    <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}}>Responsabilidad</label>
                    <select className="inp" value={comp2.responsabilidad||'integra'} onChange={e=>updC(si,'responsabilidad',e.target.value)}>
                      <option value="integra">Integra Consultores</option>
                      <option value="cliente">Cliente</option>
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}}>Fecha</label>
                    <input type="date" className="inp" value={comp2.fechaCompromiso||''} onChange={e=>updC(si,'fechaCompromiso',e.target.value)}/>
                  </div>
                  {comp2.responsabilidad==='integra'&&(
                    <div style={{gridColumn:'1/-1'}}>
                      <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}}>Responsable</label>
                      <select className="inp" value={comp2.empleadoId||''} onChange={e=>updC(si,'empleadoId',e.target.value)}>
                        <option value="">— Seleccionar —</option>
                        {equipo.map(mm=><option key={mm.id} value={mm.id}>{mm.nombre}{mm.cargo?` · ${mm.cargo}`:''}</option>)}
                      </select>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>{setOpenTarea(false);setVisitaParaTarea(null);}}>Cancelar</button>
        <button className="btn btn-g btn-sm" onClick={saveTarea}>
          <Ico n="check" s={14}/>
          {tareaForm.showCierre?'Guardar con Cierre':'Guardar Tarea'}
        </button>
      </div>
    </Modal>

    {/* ── MODAL DETALLE VISITA ──────────────────────────────── */}
    {viewDetail&&<Modal open={!!viewDetail} onClose={()=>setViewDetail(null)} title="Detalle de Visita" wide>
      {(()=>{
        const v=viewDetail;
        const cli=clientes.find(c=>c.id===v.clienteId);
        const resp=equipo.find(e=>e.id===v.responsableId);
        const tareasV=tareasDeVisita(v.id);
        return <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div className="card-p"><p style={{fontSize:10,color:'#64748b',margin:'0 0 4px'}}>Cliente</p><p style={{fontSize:14,fontWeight:700,color:'#fff',margin:0}}>{cli?.nombre||'—'}</p></div>
            <div className="card-p"><p style={{fontSize:10,color:'#64748b',margin:'0 0 4px'}}>Fecha</p><p style={{fontSize:14,fontWeight:700,color:'#C9A84C',margin:0}}>{v.fecha}</p></div>
            <div className="card-p"><p style={{fontSize:10,color:'#64748b',margin:'0 0 4px'}}>Responsable</p><p style={{fontSize:13,color:'#fff',margin:0}}>{resp?.nombre||'—'}</p></div>
            <div className="card-p"><p style={{fontSize:10,color:'#64748b',margin:'0 0 4px'}}>Satisfacción</p><p style={{fontSize:13,color:SCOLOR[v.satisfaccion]||'#fff',margin:0,fontWeight:600}}>{SATISFACCION[v.satisfaccion]||v.satisfaccion}</p></div>
          </div>
          {v.resultado&&<div className="card-p"><p style={{fontSize:10,color:'#64748b',margin:'0 0 6px',textTransform:'uppercase',letterSpacing:'.4px'}}>Resultado</p><p style={{color:'#cbd5e1',fontSize:13,margin:0,lineHeight:1.6}}>{v.resultado}</p></div>}
          {(v.temas||[]).length>0&&<div className="card-p">
            <p style={{fontSize:10,color:'#93c5fd',fontWeight:700,margin:'0 0 8px',textTransform:'uppercase',letterSpacing:'.4px'}}>🗂 Temas ({v.temas.length})</p>
            {v.temas.map((t,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid #1e2d42'}}>
                <span style={{color:t.discutido?'#4ade80':'#334155',fontSize:12}}>{t.discutido?'✅':'⬜'}</span>
                <span style={{fontSize:12,color:t.discutido?'#94a3b8':'#cbd5e1'}}>{t.descripcion}</span>
              </div>
            ))}
          </div>}
          {(v.compromisos||[]).length>0&&<div className="card-p">
            <p style={{fontSize:10,color:'#4ade80',fontWeight:700,margin:'0 0 8px',textTransform:'uppercase',letterSpacing:'.4px'}}>📋 Tareas/Compromisos ({v.compromisos.length})</p>
            {v.compromisos.map((c,i)=>(
              <div key={i} style={{padding:'8px 10px',borderRadius:7,marginBottom:6,
                background:'rgba(30,58,95,.15)',border:'1px solid #243447'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                  <p style={{fontSize:12,fontWeight:600,color:'#e2e8f0',margin:0}}>{c.titulo||c.descripcion||'—'}</p>
                  <div style={{display:'flex',gap:5}}>
                    <span style={{fontSize:10,fontWeight:700,padding:'1px 7px',borderRadius:99,
                      color:c.responsable==='integra'?'#93c5fd':'#C9A84C',
                      background:c.responsable==='integra'?'rgba(30,58,95,.5)':'rgba(201,168,76,.15)',
                      border:`1px solid ${c.responsable==='integra'?'rgba(147,197,253,.3)':'rgba(201,168,76,.3)'}`}}>
                      {c.responsable==='integra'?'Integra':'Cliente'}
                    </span>
                    {c.estado&&<SBadge s={c.estado}/>}
                  </div>
                </div>
                {(c.fechaVen||c.areaEspecialidad)&&<div style={{display:'flex',gap:8,fontSize:10,color:'#64748b'}}>
                  {c.fechaVen&&<span>📅 {c.fechaVen}</span>}
                  {c.areaEspecialidad&&<span>🔷 {AREA_LABEL[c.areaEspecialidad]||c.areaEspecialidad}</span>}
                </div>}
              </div>
            ))}
          </div>}
          {tareasV.length>0&&<div className="card-p">
            <p style={{fontSize:10,color:'#C9A84C',fontWeight:700,margin:'0 0 8px',textTransform:'uppercase',letterSpacing:'.4px'}}>✅ Tareas Generadas ({tareasV.length})</p>
            {tareasV.map(t=>(
              <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #1e2d42'}}>
                <p style={{fontSize:12,color:'#94a3b8',margin:0,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.titulo}</p>
                <div style={{display:'flex',gap:4,flexShrink:0,marginLeft:8}}><SBadge s={t.estado}/><SBadge s={t.prioridad}/></div>
              </div>
            ))}
          </div>}
          {v.observaciones&&<div className="card-p"><p style={{fontSize:10,color:'#64748b',margin:'0 0 6px',textTransform:'uppercase',letterSpacing:'.4px'}}>Observaciones</p><p style={{color:'#94a3b8',fontSize:12,margin:0}}>{v.observaciones}</p></div>}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setViewDetail(null);abrirAgendarTarea(v);}}>+ Agendar Tarea</button>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>exportVisitaPDF(v)}
                style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.35)',
                  borderRadius:6,padding:'5px 12px',cursor:'pointer',color:'#ef4444',
                  fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:5}}>
                <Ico n="pdf" s={13}/> Exportar PDF
              </button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setViewDetail(null)}>Cerrar</button>
            </div>
          </div>
        </div>;
      })()}
    </Modal>}

    {delId&&<Confirm msg="¿Eliminar esta visita?" onOk={()=>removeVisita(delId)} onCancel={()=>setDelId(null)}/>}
  </div>;
};


// ── ANALYTICS ────────────────────────────────────────────────
const Analytics = () => {
  const {tareas,clientes,proyectos,facturas,equipo} = useApp();
  const hoy = new Date().toISOString().split('T')[0];
  const [vista, setVista] = React.useState('general');
  const [periodoMeses, setPeriodoMeses] = React.useState(6);

  // ── KPIs globales ─────────────────────────────────────────
  const kpis = React.useMemo(()=>{
    const total   = tareas.length;
    const comp    = tareas.filter(t=>t.estado==='completada').length;
    const venc    = tareas.filter(t=>t.fechaVen&&t.fechaVen<hoy&&t.estado!=='completada').length;
    const enCurso = tareas.filter(t=>t.estado==='en_curso').length;
    const pct     = total ? Math.round(comp/total*100) : 0;
    const totalFact = facturas.reduce((a,f)=>a+(Number(f.valor)||0),0);
    const PAGADOS=['Pagada','pagada','Paz y Salvo','Paz Y Salvo'];
    const cobradas  = facturas.filter(f=>PAGADOS.includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
    const pendFact  = facturas.filter(f=>!PAGADOS.includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
    return {total,comp,venc,enCurso,pct,totalFact,cobradas,pendFact};
  },[tareas,facturas,hoy]);

  // ── Tendencia facturación N meses ─────────────────────────
  const mesesData = React.useMemo(()=>{
    const now = new Date();
    return Array.from({length:periodoMeses},(_,i)=>{
      const d = new Date(now.getFullYear(), now.getMonth()-(periodoMeses-1-i), 1);
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const label = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()];
      const facturado = facturas.filter(f=>f.fechaEmision?.startsWith(k)).reduce((a,f)=>a+(Number(f.valor)||0),0);
      const cobrado   = facturas.filter(f=>f.fechaPago?.startsWith(k)||(['Pagada','pagada','Paz y Salvo'].includes(f.estado)&&f.fechaEmision?.startsWith(k))).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
      const tComp = tareas.filter(t=>t.completadoEn?.startsWith(k)||t.updatedAt?.startsWith(k)&&t.estado==='completada').length;
      return {k, label, facturado, cobrado, tComp};
    });
  },[facturas,tareas,periodoMeses]);
  const maxF = Math.max(...mesesData.map(m=>m.facturado),1);

  // ── Productividad por consultor ───────────────────────────
  const consultores = React.useMemo(()=>{
    return equipo.map(e=>{
      const mis = tareas.filter(t=>t.responsableId===e.id);
      const comp = mis.filter(t=>t.estado==='completada');
      const venc = mis.filter(t=>t.fechaVen&&t.fechaVen<hoy&&t.estado!=='completada');
      const enCurso = mis.filter(t=>t.estado==='en_curso');
      const pct  = mis.length ? Math.round(comp.length/mis.length*100) : 0;

      // Tiempo promedio de cierre (días)
      const tiempos = comp.filter(t=>t.creadoEn&&t.completadoEn).map(t=>{
        const diff = new Date(t.completadoEn)-new Date(t.creadoEn);
        return Math.round(diff/86400000);
      });
      const avgDias = tiempos.length ? Math.round(tiempos.reduce((a,b)=>a+b,0)/tiempos.length) : null;

      // Carga últimas 4 semanas
      const hace28 = new Date(Date.now()-28*86400000).toISOString().split('T')[0];
      const recientes = mis.filter(t=>t.creadoEn?.split('T')[0]>=hace28).length;

      return {
        ...e,
        total:mis.length, comp:comp.length, venc:venc.length,
        enCurso:enCurso.length, pct, avgDias, recientes
      };
    }).sort((a,b)=>b.pct-a.pct);
  },[equipo,tareas,hoy]);

  // ── Estado de proyectos ───────────────────────────────────
  const proyEstados = React.useMemo(()=>{
    const grupos = {};
    proyectos.forEach(p=>{
      grupos[p.estado] = (grupos[p.estado]||0)+1;
    });
    return Object.entries(grupos).map(([estado,n])=>({estado,n}));
  },[proyectos]);

  // ── Distribución tareas por estado ───────────────────────
  const tareasEstado = React.useMemo(()=>[
    {label:'Pendiente', n:tareas.filter(t=>t.estado==='pendiente').length, color:'#64748b'},
    {label:'En Curso',  n:tareas.filter(t=>t.estado==='en_curso').length,  color:'#C9A84C'},
    {label:'Revisión',  n:tareas.filter(t=>t.estado==='revision').length,  color:'#60a5fa'},
    {label:'Completada',n:tareas.filter(t=>t.estado==='completada').length,color:'#4ade80'},
    {label:'Vencida',   n:tareas.filter(t=>t.fechaVen&&t.fechaVen<hoy&&t.estado!=='completada').length, color:'#f87171'},
  ],[tareas,hoy]);
  const maxTE = Math.max(...tareasEstado.map(t=>t.n),1);

  // fmtK: formato compacto para labels de gráficos (barras, tooltips)
  // fmt.cop se usa para todos los valores monetarios en COP
  const fmtK = n => n>=1000000?`$${(n/1000000).toFixed(1)}M`:n>=1000?`$${Math.round(n/1000)}k`:`$${n}`;
  const TABS_AN = [{id:'general',l:'General'},{id:'consultores',l:'Consultores'},{id:'financiero',l:'Financiero'}];

  return <div className="fade">
    {/* KPIs fila superior */}
    <div className="grid-4" style={{marginBottom:14}}>
      <KPI label="Cumplimiento Global" val={kpis.pct+'%'} ico="analytics" color="blue"/>
      <KPI label="Tareas Vencidas"     val={kpis.venc}    ico="bell"      color="red"/>
      <KPI label="Facturado Total"     val={fmt.cop(kpis.totalFact)} ico="cobros" color="gold"/>
      <KPI label="Por Cobrar"          val={fmt.cop(kpis.pendFact)}  ico="dollar" color="green"/>
    </div>

    {/* Sub-tabs */}
    <div style={{display:'flex',gap:6,marginBottom:14}}>
      {TABS_AN.map(t=>(
        <button key={t.id} onClick={()=>setVista(t.id)} className="btn btn-sm"
          style={{background:vista===t.id?'linear-gradient(135deg,#1E3A5F,#2a5298)':'#162030',
            color:vista===t.id?'#fff':'#64748b',border:'1px solid',
            borderColor:vista===t.id?'rgba(201,168,76,.3)':'#243447',fontWeight:vista===t.id?700:400}}>
          {t.l}
        </button>
      ))}
    </div>

    {/* ── VISTA GENERAL ── */}
    {vista==='general'&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>

        {/* Gráfico tendencia facturación */}
        <div className="card-p">
          <div className="gline"/>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,margin:0}}>Tendencia Facturación</h3>
            <select className="inp" style={{width:'auto',fontSize:11,padding:'3px 8px'}}
              value={periodoMeses} onChange={e=>setPeriodoMeses(Number(e.target.value))}>
              {[3,6,12].map(n=><option key={n} value={n}>{n} meses</option>)}
            </select>
          </div>
          <div style={{display:'flex',alignItems:'flex-end',gap:5,height:130}}>
            {mesesData.map(m=>(
              <div key={m.k} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                <span style={{fontSize:9,color:'#475569',whiteSpace:'nowrap'}}>{m.facturado>0?fmtK(m.facturado):''}</span>
                <div style={{width:'100%',display:'flex',gap:2,alignItems:'flex-end',height:100}}>
                  <div title={`Facturado: ${fmt.cop(m.facturado)}`} style={{flex:1,borderRadius:'3px 3px 0 0',background:'linear-gradient(180deg,#C9A84C,#b8943e)',height:Math.max(4,m.facturado/maxF*100)+'%',transition:'height .4s'}}/>
                  <div title={`Cobrado: ${fmt.cop(m.cobrado)}`} style={{flex:1,borderRadius:'3px 3px 0 0',background:'linear-gradient(180deg,#4ade80,#22c55e)',height:Math.max(2,m.cobrado/maxF*100)+'%',transition:'height .4s'}}/>
                </div>
                <span style={{fontSize:9,color:'#64748b'}}>{m.label}</span>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:12,marginTop:8}}>
            {[['#C9A84C','Facturado'],['#4ade80','Cobrado']].map(([c,l])=>(
              <div key={l} style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'#64748b'}}>
                <div style={{width:8,height:8,borderRadius:2,background:c}}/>
                {l}
              </div>
            ))}
          </div>
        </div>

        {/* Distribución tareas por estado */}
        <div className="card-p">
          <div className="gline"/>
          <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:14}}>Distribución de Tareas</h3>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {tareasEstado.map(t=>(
              <div key={t.label} style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:12,color:'#94a3b8',width:72,flexShrink:0}}>{t.label}</span>
                <div style={{flex:1,background:'#0f1923',borderRadius:99,height:10,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:99,background:t.color,width:Math.max(2,t.n/maxTE*100)+'%',transition:'width .5s'}}/>
                </div>
                <span style={{fontSize:12,fontWeight:700,color:t.color,width:24,textAlign:'right'}}>{t.n}</span>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:16,marginTop:12,paddingTop:12,borderTop:'1px solid #243447'}}>
