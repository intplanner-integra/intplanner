// ── BÚSQUEDA GLOBAL TRANSVERSAL ──────────────────────────────
// Ctrl+K o ⌘K abre el modal. Busca en: tareas, clientes, equipo, proyectos, facturas
const BusquedaGlobal = ({tareas,clientes,equipo,proyectos,facturas,onNav}) => {
  const [open,   setOpen]   = useState(false);
  const [q,      setQ]      = useState('');
  const inputRef            = useRef();

  // Registrar shortcut Ctrl+K / ⌘K
  useEffect(()=>{
    const handler = e => {
      if((e.ctrlKey||e.metaKey) && e.key==='k'){
        e.preventDefault();
        setOpen(o=>{ if(!o) setTimeout(()=>inputRef.current?.focus(),50); return !o; });
      }
      if(e.key==='Escape') setOpen(false);
    };
    window.addEventListener('keydown', handler);
    // Escuchar evento desde botón del Header
    const btnHandler = () => { setOpen(true); setTimeout(()=>inputRef.current?.focus(),50); };
    window.addEventListener('ip-search-open', btnHandler);
    return ()=>{ window.removeEventListener('keydown',handler); window.removeEventListener('ip-search-open',btnHandler); };
  },[]);

  const resultados = useMemo(()=>{
    if(!q.trim()||q.length<2) return [];
    const ql = q.toLowerCase();
    const hits = [];
    tareas.filter(t=>!t.esAlerta).forEach(t=>{
      if((t.titulo||'').toLowerCase().includes(ql)||(t.desc||'').toLowerCase().includes(ql))
        hits.push({tipo:'Tarea',ico:'tasks',color:'#60a5fa',label:t.titulo,sub:t.estado,mod:'tareas',id:t.id});
    });
    clientes.forEach(c=>{
      if((c.nombre||'').toLowerCase().includes(ql)||(c.nit||'').toLowerCase().includes(ql)||(c.email||'').toLowerCase().includes(ql))
        hits.push({tipo:'Cliente',ico:'clients',color:'#4ade80',label:c.nombre,sub:c.nit||c.email||'',mod:'clientes',id:c.id});
    });
    equipo.forEach(e=>{
      if((e.nombre||'').toLowerCase().includes(ql)||(e.rol||'').toLowerCase().includes(ql)||(e.email||'').toLowerCase().includes(ql))
        hits.push({tipo:'Equipo',ico:'team',color:'#c084fc',label:e.nombre,sub:e.rol||'',mod:'equipo',id:e.id});
    });
    proyectos.forEach(p=>{
      if((p.nombre||'').toLowerCase().includes(ql)||(p.desc||'').toLowerCase().includes(ql))
        hits.push({tipo:'Proyecto',ico:'proj',color:'#fb923c',label:p.nombre,sub:p.estado||'',mod:'proyectos',id:p.id});
    });
    facturas.forEach(f=>{
      if((f.numero||'').toLowerCase().includes(ql)||(f.concepto||'').toLowerCase().includes(ql))
        hits.push({tipo:'Factura',ico:'bill',color:'#C9A84C',label:f.numero||f.concepto||'Factura',sub:fmt.cop(Number(f.valor||0)),mod:'cobros',id:f.id});
    });
    return hits.slice(0,12);
  },[q, tareas, clientes, equipo, proyectos, facturas]);

  if(!open) return null;

  const ir = (mod) => { onNav(mod); setOpen(false); setQ(''); };

  return <div onClick={()=>setOpen(false)} style={{
    position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:9999,
    display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:'15vh',backdropFilter:'blur(4px)'
  }}>
    <div onClick={e=>e.stopPropagation()} style={{
      width:'100%',maxWidth:580,background:'#111827',borderRadius:14,
      border:'1px solid rgba(201,168,76,.3)',boxShadow:'0 24px 64px rgba(0,0,0,.7)',overflow:'hidden'
    }}>
      {/* Input */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',borderBottom:'1px solid #1e2d42'}}>
        <Ico n="search" s={18} c="#C9A84C"/>
        <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
          placeholder="Buscar tareas, clientes, equipo, facturas…"
          style={{flex:1,background:'transparent',border:'none',outline:'none',color:'#fff',fontSize:15,fontFamily:'inherit'}}/>
        <kbd style={{fontSize:10,color:'#475569',background:'#1e2d42',padding:'2px 6px',borderRadius:4,border:'1px solid #334155'}}>ESC</kbd>
      </div>
      {/* Resultados */}
      {q.length>=2&&<div style={{maxHeight:360,overflowY:'auto'}}>
        {resultados.length===0&&<p style={{textAlign:'center',color:'#475569',fontSize:13,padding:'24px 0'}}>
          Sin resultados para "{q}"
        </p>}
        {resultados.map((r,i)=>(
          <div key={i} onClick={()=>ir(r.mod)} style={{
            display:'flex',alignItems:'center',gap:12,padding:'10px 16px',cursor:'pointer',
            borderBottom:'1px solid #0f1923',transition:'background .1s',
          }}
          onMouseEnter={e=>e.currentTarget.style.background='#1e2d42'}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{width:32,height:32,borderRadius:8,background:r.color+'1a',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Ico n={r.ico} s={15} c={r.color}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:13,fontWeight:600,color:'#fff',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.label}</p>
              <p style={{fontSize:11,color:'#64748b',margin:0}}>{r.tipo} · {r.sub}</p>
            </div>
            <span style={{fontSize:10,color:'#334155',fontFamily:'monospace'}}>→ {r.mod}</span>
          </div>
        ))}
      </div>}
      {/* Footer shortcut */}
      {q.length<2&&<div style={{padding:'12px 16px',display:'flex',gap:16,flexWrap:'wrap'}}>
        {[['tasks','Tareas','#60a5fa'],['clients','Clientes','#4ade80'],['team','Equipo','#c084fc'],['bill','Facturas','#C9A84C']].map(([ico,lbl,c])=>(
          <span key={lbl} style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'#475569'}}>
            <Ico n={ico} s={13} c={c}/>{lbl}
          </span>
        ))}
        <span style={{marginLeft:'auto',fontSize:11,color:'#334155'}}>
          <kbd style={{background:'#1e2d42',padding:'1px 5px',borderRadius:3,border:'1px solid #334155',fontSize:10}}>Ctrl</kbd>
          {' + '}
          <kbd style={{background:'#1e2d42',padding:'1px 5px',borderRadius:3,border:'1px solid #334155',fontSize:10}}>K</kbd>
          {' para abrir/cerrar'}
        </span>
      </div>}
    </div>
  </div>;
};

// PresenciaBadge — Subcomponente separado para el indicador de usuarios online en Header.
// Separado del Header para que sus hooks (useState, useEffect, useRef) sean siempre
// válidos independientemente del ciclo de render del Header.
const AVATAR_COLS_P = ['#1E3A5F','#C9A84C','#1A6B3A','#7C3AED','#0F766E','#BE185D','#B45309'];
const avatarColorP = (id) => {
  if(!id) return AVATAR_COLS_P[0];
  let h = 0;
  for(let i=0; i<id.length; i++) h = (h*31 + id.charCodeAt(i)) % AVATAR_COLS_P.length;
  return AVATAR_COLS_P[h];
};

const PresenciaBadge = ({ presencia }) => {
  const [showDrop, setShowDrop] = React.useState(false);
  const dropRef = React.useRef(null);

  React.useEffect(() => {
    if(!showDrop) return;
    const close = (e) => {
      if(dropRef.current && !dropRef.current.contains(e.target)) setShowDrop(false);
    };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [showDrop]);

  return (
    <div ref={dropRef} className="mob-hide" style={{position:'relative'}}>
      <button
        onClick={() => setShowDrop(s => !s)}
        title={`${presencia.online} usuario${presencia.online!==1?'s':''} en línea — clic para ver detalles`}
        style={{display:'flex',alignItems:'center',gap:6,fontSize:11,fontWeight:600,
          padding:'4px 10px',borderRadius:20,cursor:'pointer',
          border:'1px solid rgba(74,222,128,.25)',background:'rgba(74,222,128,.08)',color:'#4ade80'}}>
        <span style={{width:6,height:6,borderRadius:'50%',background:'#4ade80',display:'inline-block',animation:'pulse 1.6s infinite'}}/>
        {presencia.online} en línea
        <span style={{fontSize:9,opacity:.7}}>{showDrop?'▲':'▼'}</span>
      </button>
      {showDrop && (
        <div style={{
          position:'absolute',top:'calc(100% + 6px)',right:0,zIndex:9999,
          background:'#162030',border:'1px solid #243447',borderRadius:10,
          minWidth:270,maxHeight:360,overflowY:'auto',
          boxShadow:'0 8px 24px rgba(0,0,0,.5)',
        }}>
          <div style={{padding:'8px 14px 6px',fontSize:10,color:'#64748b',
            textTransform:'uppercase',letterSpacing:1,fontWeight:700,borderBottom:'1px solid #243447'}}>
            Usuarios conectados ({presencia.online})
          </div>
          {presencia.users.length === 0 && (
            <div style={{padding:'14px',fontSize:12,color:'#475569',textAlign:'center',fontStyle:'italic'}}>
              Ningún usuario activo
            </div>
          )}
          {presencia.users.map(u => (
            <div key={u.id} style={{padding:'9px 14px',borderBottom:'1px solid rgba(36,52,71,.4)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <div style={{width:28,height:28,borderRadius:'50%',flexShrink:0,
                  background:avatarColorP(u.id),
                  display:'flex',alignItems:'center',justifyContent:'center',
                  color:'#fff',fontSize:12,fontWeight:700}}>
                  {(u.nombre||'?').charAt(0).toUpperCase()}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#e2e8f0',
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {u.nombre}
                  </div>
                  {u.email && (
                    <div style={{fontSize:10,color:'#64748b',
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {u.email}
                    </div>
                  )}
                </div>
                <span style={{width:7,height:7,borderRadius:'50%',background:'#4ade80',
                  flexShrink:0,boxShadow:'0 0 4px #4ade80'}}/>
              </div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap',marginLeft:36}}>
                {u.cargo && (
                  <span style={{fontSize:9,padding:'1px 6px',borderRadius:99,
                    background:'rgba(30,58,95,.4)',color:'#93c5fd',border:'1px solid rgba(59,130,246,.2)'}}>
                    {u.cargo}
                  </span>
                )}
                {u.rol && (
                  <span style={{fontSize:9,padding:'1px 6px',borderRadius:99,
                    background:'rgba(201,168,76,.1)',color:'#C9A84C',
                    border:'1px solid rgba(201,168,76,.2)',textTransform:'capitalize'}}>
                    {u.rol}
                  </span>
                )}
                <span style={{fontSize:9,padding:'1px 6px',borderRadius:99,
                  background:'rgba(74,222,128,.08)',color:'#4ade80',border:'1px solid rgba(74,222,128,.2)'}}>
                  Activo
                </span>
              </div>
              {u.horaConexion && (
                <div style={{fontSize:9,color:'#475569',marginLeft:36,marginTop:2}}>
                  Conectado: {new Date(u.horaConexion).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const Header = ({title,user,onLogout,backup,onMobOpen}) => {
  const [online,     setOnline]    = React.useState(navigator.onLine);
  const [queueN,     setQueueN]    = React.useState(0);
  const [chatUnread, setChatUnread] = React.useState(0);  // FASE 3: Chat badge
  const [presencia, setPresencia] = React.useState({online:0, users:[]});  // NEW: Indicador presencia
  // ROOT-FIX-B1: Leer ip_backup directamente desde localStorage como fuente primaria.
  // El evento ip-backup-updated puede dispararse ANTES de que React monte (Babel es async ~1s).
  // La lectura directa desde localStorage garantiza el estado correcto siempre al montar.
  const [lastBackup, setLastBackup]= React.useState(()=>{
    try {
      const stored = JSON.parse(localStorage.getItem('ip_backup')||'null');
      return stored || window.AutoBackup?.last() || backup || null;
    } catch(_){ return backup || null; }
  });
  const [pushOn,     setPushOn]    = React.useState(()=>typeof Notification!=='undefined'&&Notification.permission==='granted'&&window.PushSvc?.getCfg()?.enabled!==false);

  React.useEffect(()=>{
    const upd = () => {
      setOnline(navigator.onLine);
      setQueueN(window.OfflineQueue?.count()||0);
      setPushOn(typeof Notification!=='undefined'&&Notification.permission==='granted'&&window.PushSvc?.getCfg()?.enabled!==false);
    };
    const onBackup = (e) => {
      // Siempre leer desde localStorage para garantizar consistencia
      try {
        const stored = e.detail || JSON.parse(localStorage.getItem('ip_backup')||'null');
        setLastBackup(stored);
      } catch(_){}
    };
    // FASE 3: Escuchar badge de Chat
    const onChatBadge = (e) => {
      setChatUnread(e.detail || 0);
    };
    // NEW: Escuchar cambios de presencia (usuarios online)
    const onPresenciaChange = (e) => {
      setPresencia(e.detail || {online:0, users:[]});
    };
    // NEW: Leer presencia inicial desde localStorage
    try {
      const storedPresencia = JSON.parse(localStorage.getItem('ip_chat_presencia')||'{"online":0,"users":[]}');
      setPresencia(storedPresencia);
    } catch(_){}
    const onPush = () => setPushOn(true);
    window.addEventListener('online',  upd);
    window.addEventListener('offline', upd);
    window.addEventListener('ip-backup-updated', onBackup);
    window.addEventListener('ip-push-ready',     onPush);
    window.addEventListener('chat-unread-badge', onChatBadge);
    window.addEventListener('chat-presencia-updated', onPresenciaChange);  // NEW
    const t = setInterval(upd, 5000);
    // ROOT-FIX-B1-REFUERZO: Re-leer ip_backup al montar por si el evento
    // ya se disparó antes de que este useEffect se registrara
    setTimeout(()=>{
      try {
        const stored = JSON.parse(localStorage.getItem('ip_backup')||'null');
        if(stored) setLastBackup(stored);
      } catch(_){}
    }, 200);
    return ()=>{
      window.removeEventListener('online',  upd);
      window.removeEventListener('offline', upd);
      window.removeEventListener('ip-backup-updated', onBackup);
      window.removeEventListener('ip-push-ready',     onPush);
      window.removeEventListener('chat-unread-badge', onChatBadge);
      window.removeEventListener('chat-presencia-updated', onPresenciaChange);  // NEW
      clearInterval(t);
    };
  },[]);

  return (
  <div className="topbar">
    {/* Hamburguesa — solo visible en móvil (≤640px) */}
    <button onClick={onMobOpen} className="mob-ham"
      style={{display:'none',background:'none',border:'none',cursor:'pointer',
        color:'#94a3b8',padding:'6px 8px 6px 0',borderRadius:6,
        alignItems:'center',flexShrink:0}}
      aria-label="Abrir menú">
      <Ico n="menu" s={22}/>
    </button>
    <h2 className="sy" style={{fontWeight:700,fontSize:16,color:'#fff',margin:0}}>{title}</h2>
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      {!online && (
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,fontWeight:600,padding:'4px 10px',borderRadius:20,background:'rgba(180,83,9,.25)',border:'1px solid rgba(217,119,6,.4)',color:'#fbbf24'}}>
          <span style={{width:7,height:7,borderRadius:'50%',background:'#f59e0b',display:'inline-block'}}/>
          Offline{queueN>0?` · ${queueN} pendiente${queueN>1?'s':''}` :''}
        </div>
      )}
      {online && queueN>0 && (
        <div title="Sincronizando..." onClick={()=>window.SyncQueue?.process()} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,fontWeight:600,padding:'4px 10px',borderRadius:20,background:'rgba(59,130,246,.15)',border:'1px solid rgba(59,130,246,.3)',color:'#60a5fa',cursor:'pointer'}}>
          <span style={{width:7,height:7,borderRadius:'50%',background:'#3b82f6',display:'inline-block'}}/>
          Sincronizando {queueN}
        </div>
      )}
      {/* Botón Búsqueda Global — Ctrl+K */}
      <button
        onClick={()=>window.dispatchEvent(new CustomEvent('ip-search-open'))}
        title="Búsqueda global (Ctrl+K)"
        style={{display:'flex',alignItems:'center',gap:6,fontSize:11,fontWeight:600,
          padding:'4px 12px',borderRadius:20,border:'1px solid #243447',
          background:'transparent',color:'#64748b',cursor:'pointer',
          transition:'all .15s'}}
        onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(201,168,76,.4)';e.currentTarget.style.color='#C9A84C';}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor='#243447';e.currentTarget.style.color='#64748b';}}>
        <Ico n="search" s={13}/>
        <span className="mob-hide">Buscar</span>
        <kbd style={{fontSize:9,background:'#1e2d42',padding:'1px 5px',borderRadius:3,
          border:'1px solid #334155',color:'#475569',marginLeft:2}}>⌃K</kbd>
      </button>
      {/* Badge notificaciones */}
      <div className="mob-hide" title={pushOn?'Notificaciones activas — clic en Configuración para ajustar':'Notificaciones inactivas — ir a Configuración → Notificaciones'}
        style={{display:'flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600,padding:'4px 10px',borderRadius:20,border:'1px solid',
          borderColor:pushOn?'rgba(201,168,76,.3)':'#243447',background:pushOn?'rgba(201,168,76,.08)':'transparent',color:pushOn?'#C9A84C':'#475569'}}>
        <span style={{fontSize:13}}>{pushOn?'🔔':'🔕'}</span>
      </div>
      
      {/* NEW: Indicador de usuarios conectados — subcomponente aislado (hooks válidos) */}
      <PresenciaBadge presencia={presencia}/>
      {/* Indicador auto-backup */}
      <div className="mob-hide" title={lastBackup?`Último backup: ${new Date(lastBackup.ts).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}`:''} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,fontWeight:600,padding:'4px 12px',borderRadius:20,border:'1px solid',borderColor:lastBackup?'rgba(74,222,128,.25)':'#243447',background:lastBackup?'rgba(26,107,58,.15)':'transparent',color:lastBackup?'#4ade80':'#475569'}}>
        <span style={{width:7,height:7,borderRadius:'50%',background:lastBackup?'#4ade80':'#334155',display:'inline-block'}}/>
        {lastBackup ? `Backup ${lastBackup.auto?'auto':'manual'}` : 'Sin backup'}
      </div>
      <button onClick={onLogout} style={{background:'none',border:'none',cursor:'pointer',color:'#64748b',padding:6,borderRadius:6,display:'flex',alignItems:'center',gap:5,fontSize:12}}>
        <Ico n="logout" s={16}/>
      </button>
    </div>
  </div>
  );
};

// ── GRÁFICO EVOLUCIÓN 6 MESES (Dashboard) ─────────────────────
const GraficoEvolucion = ({tareas, facturas}) => {
  const meses6 = useMemo(()=>{
    const hoy = new Date();
    return Array.from({length:6},(_,i)=>{
      const d = new Date(hoy.getFullYear(), hoy.getMonth()-5+i, 1);
      const y = d.getFullYear(); const m = d.getMonth();
      const label = d.toLocaleString('es-CO',{month:'short'}).replace('.','');
      const PAGADOS_G=['pagada','Paz y Salvo','Pagada','Paz Y Salvo'];
      const comp = tareas.filter(t=>!t.esAlerta&&t.estado==='completada'&&t.fechaVen&&new Date(t.fechaVen).getFullYear()===y&&new Date(t.fechaVen).getMonth()===m).length;
      const pend = tareas.filter(t=>!t.esAlerta&&t.estado!=='completada'&&t.fechaVen&&new Date(t.fechaVen).getFullYear()===y&&new Date(t.fechaVen).getMonth()===m).length;
      const fact = facturas.filter(f=>f.fecha&&new Date(f.fecha).getFullYear()===y&&new Date(f.fecha).getMonth()===m).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
      const cob  = facturas.filter(f=>PAGADOS_G.includes(f.estado)&&f.fecha&&new Date(f.fecha).getFullYear()===y&&new Date(f.fecha).getMonth()===m).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
      return {label,comp,pend,fact,cob};
    });
  },[tareas,facturas]);

  const maxT = Math.max(...meses6.map(m=>m.comp+m.pend),1);
  const maxF = Math.max(...meses6.map(m=>m.fact),1);
  const W=60; const H=90; const GAP=12; const TOTAL_W=6*(W+GAP);
  const ultimo = meses6[meses6.length-1]||{};

  return <div className="card-p" style={{marginBottom:14}}>
    <div className="gline"/>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,margin:0}}>
        <Ico n="analytics" s={15} c="#C9A84C"/> Evolución 6 Meses
      </h3>
      <div style={{display:'flex',gap:12,fontSize:11,color:'#64748b',flexWrap:'wrap'}}>

const Dashboard = () => {
  const {tareas,clientes,proyectos,facturas,equipo} = useApp();
  const hoy = new Date().toISOString().split('T')[0];

  // KPIs configurables — leer preferencia guardada o usar defecto
  const [kpiActivos, setKpiActivos] = useState(()=>{
    try { return JSON.parse(localStorage.getItem('ip_dash_kpis')||'null') || KPI_DEFAULT; }
    catch{ return KPI_DEFAULT; }
  });

  // Escuchar cambios en tiempo real desde Config
  useEffect(()=>{
    const handler = e => setKpiActivos(e.detail);
    window.addEventListener('ip-dash-kpis', handler);
    return ()=>window.removeEventListener('ip-dash-kpis', handler);
  },[]);

  const st = useMemo(()=>{
    const comp = tareas.filter(t=>!t.esAlerta&&t.estado==='completada').length;
    const venc = tareas.filter(t=>!t.esAlerta&&t.fechaVen&&t.fechaVen<hoy&&t.estado!=='completada').length;
    const prox = tareas.filter(t=>{if(t.esAlerta)return false;const d=new Date(t.fechaVen+'T12:00:00');const df=(d-new Date())/86400000;return df>=0&&df<=7&&t.estado!=='completada';}).length;
    const pct = tareas.filter(t=>!t.esAlerta).length?Math.round(comp/tareas.filter(t=>!t.esAlerta).length*100):0;
    const PAGADOS_D=['pagada','Paz y Salvo','Pagada','Paz Y Salvo'];
    const cobrado    = facturas.filter(f=>PAGADOS_D.includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
    const porCobrar  = facturas.filter(f=>!PAGADOS_D.includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
    const totalFact  = facturas.reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0);
    const cliActivos = clientes.filter(c=>c.estado==='activo').length;
    return {
      comp, venc, prox, pct, cobrado, porCobrar, totalFact,
      cli: cliActivos, cliActivos,
      proy: proyectos.filter(p=>p.estado==='activo'||p.estado==='en curso').length,
      totalTar:  tareas.filter(t=>!t.esAlerta).length,
      totalCli:  clientes.length,
      totalProy: proyectos.length,
      totalFactN: facturas.length,
    };
  },[tareas,clientes,proyectos,facturas,hoy]);

  // Renderizar KPIs activos en filas de 4
  const kpiRows = useMemo(()=>{
    const activos = KPI_CATALOG.filter(k=>kpiActivos.includes(k.id));
    const rows = [];
    for(let i=0;i<activos.length;i+=4) rows.push(activos.slice(i,i+4));
    return rows;
  },[kpiActivos]);

  const proxTareas = tareas.filter(t=>!t.esAlerta&&t.estado!=='completada').sort((a,b)=>new Date(a.fechaVen)-new Date(b.fechaVen)).slice(0,6);

  const cumplCliente = clientes.slice(0,4).map(c=>{
    const ct=tareas.filter(t=>t.clienteId===c.id&&!t.esAlerta);
    const cc=ct.filter(t=>t.estado==='completada');
    return{...c,pct:ct.length?Math.round(cc.length/ct.length*100):0,n:ct.length};
  });

  return <div className="fade">
    {kpiRows.map((row,ri)=>(
      <div key={ri} className="grid-4" style={{marginBottom:16}}>
        {row.map(k=><KPI key={k.id} label={k.label} val={k.fn(st)} ico={k.ico} color={k.color}/>)}
      </div>
    ))}

    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:14,marginBottom:14}}>
      <div className="card-p">
        <div className="gline"/>
        <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:12,display:'flex',alignItems:'center',gap:8}}><Ico n="tasks" s={15} c="#C9A84C"/>Próximas Tareas</h3>
        {proxTareas.length===0&&<p style={{color:'#475569',fontSize:13,textAlign:'center',padding:'24px 0'}}>Sin tareas pendientes ✓</p>}
        {proxTareas.map(t=>(
          <div key={t.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',background:'#0f1923',borderRadius:8,border:'1px solid #243447',marginBottom:6}}>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:13,color:'#fff',fontWeight:500,margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.titulo}</p>
              <p style={{fontSize:11,color:'#475569',margin:0}}>{clientes.find(c=>c.id===t.clienteId)?.nombre||'—'}</p>
            </div>
            <div style={{display:'flex',gap:6,alignItems:'center',marginLeft:10,flexShrink:0}}>
              <SBadge s={t.prioridad}/>
              <span style={{fontSize:11,color:'#64748b'}}>{fmt.rel(t.fechaVen)}</span>
            </div>
          </div>
        ))}
      </div>

      <div className="card-p">
        <div className="gline"/>
        <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:12,display:'flex',alignItems:'center',gap:8}}><Ico n="analytics" s={15} c="#C9A84C"/>Estado Tareas</h3>
        {[
          {l:'Completadas',v:st.comp,c:'#22c55e',pct:st.pct},
          {l:'En Curso',v:tareas.filter(t=>t.estado==='en_curso').length,c:'#3b82f6',pct:tareas.length?Math.round(tareas.filter(t=>t.estado==='en_curso').length/tareas.length*100):0},
          {l:'Pendientes',v:tareas.filter(t=>t.estado==='pendiente').length,c:'#f59e0b',pct:tareas.length?Math.round(tareas.filter(t=>t.estado==='pendiente').length/tareas.length*100):0},
          {l:'Vencidas',v:st.venc,c:'#ef4444',pct:tareas.length?Math.round(st.venc/tareas.length*100):0},
        ].map(({l,v,c,pct})=>(
          <div key={l} style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
              <span style={{color:'#94a3b8'}}>{l}</span>
              <span style={{color:'#fff',fontWeight:600}}>{v}</span>
            </div>
            <PBar pct={pct} color={`bg-[${c}]`}/>
            <div className="pbar"><div className="pfill" style={{width:pct+'%',background:c}}/></div>
          </div>
        ))}
      </div>
    </div>

    <div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:12,display:'flex',alignItems:'center',gap:8}}><Ico n="clients" s={15} c="#C9A84C"/>Cumplimiento por Cliente</h3>
      <div className="grid-4">
        {cumplCliente.length===0&&<p style={{color:'#475569',fontSize:13}}>Sin clientes registrados.</p>}
        {cumplCliente.map(c=>(
          <div key={c.id} style={{background:'#0f1923',borderRadius:10,border:'1px solid #243447',padding:14}}>
            <p style={{fontSize:13,fontWeight:600,color:'#fff',margin:'0 0 8px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.nombre}</p>
            <div className="pbar" style={{marginBottom:6}}><div className="pfill" style={{width:c.pct+'%',background:'#C9A84C'}}/></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11}}>
              <span style={{color:'#475569'}}>{c.n} tareas</span>
              <span style={{color:'#C9A84C',fontWeight:700}}>{c.pct}%</span>
            </div>
          </div>
        ))}
      </div>
    </div>

    {/* Gráfico evolución mensual — componente independiente */}
    <GraficoEvolucion tareas={tareas} facturas={facturas}/>

  </div>;

// ── TAREAS ───────────────────────────────────────────────────
const Tareas = () => {
  const {tareas,setTareas,clientes,equipo,proyectos,toast,user} = useApp();
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState({});
  const [del,setDel]=useState(null);
  const [fil,setFil]=useState({estado:'',prioridad:'',resp:'',cliente:'',q:''});
  const [vista,setVista]=useState('lista'); // 'lista' | 'kanban'
  const [drag,setDrag]=useState(null);      // {id, fromCol}
  const [dragOver,setDragOver]=useState(null);
  const [viewDetail,setViewDetail]=useState(null); // B-item5: tarea para vista detalle (solo lectura)
  const hoy = new Date().toISOString().split('T')[0];

  const list = useMemo(()=>{
    const hoyStr = new Date().toISOString().split('T')[0];
    // Helper: ¿tiene compromisos pendientes (fecha vencida o sin cumplir)?
    const tieneCompromisosPendientes = t => {
      if(!Array.isArray(t.compromisos)||t.compromisos.length===0) return false;
      return t.compromisos.some(c => c.fechaCompromiso && c.fechaCompromiso < hoyStr && !c.cumplido);
    };
    // B-item3: completadas con compromisos pendientes → peso 0 (arriba, color naranja)
    // Peso por estado: comp_pendiente=0, vencidas=1, pendiente=2, en_curso=3, revision=4, reprogramada=5, completada=6, cancelada=7
    const pesoEstado = t => {
      if(t.estado==='completada' && tieneCompromisosPendientes(t)) return 0;
      if(t.estado==='completada') return 6;
      if(t.estado==='cancelada')  return 7;
      if(t.fechaVen && t.fechaVen < hoyStr) return 1; // vencida
      if(t.estado==='pendiente')   return 2;
      if(t.estado==='en_curso')    return 3;
      if(t.estado==='revision')    return 4;
      if(t.estado==='reprogramada')return 5;
      return 3;
    };
    return tareas.filter(t=>{
      if(t.esAlerta) return false;
      // Para el chip "vencida" filtramos por fecha < hoy y estado != completada/cancelada
      if(fil.estado==='vencida'){
        if(!t.fechaVen||t.fechaVen>=hoyStr||t.estado==='completada'||t.estado==='cancelada') return false;
      } else if(fil.estado&&t.estado!==fil.estado) return false;
      if(fil.prioridad&&t.prioridad!==fil.prioridad) return false;
      if(fil.resp){
        if(fil.resp==='__equipo_integra__'){
          // Equipo Integra: cualquier integrante asignado
          const rIds=Array.isArray(t.responsablesIds)&&t.responsablesIds.length?t.responsablesIds:(t.responsableId?[t.responsableId]:[]);
          if(!rIds.length) return false;
        } else {
          const rIds=Array.isArray(t.responsablesIds)&&t.responsablesIds.length?t.responsablesIds:(t.responsableId?[t.responsableId]:[]);
          if(!rIds.includes(fil.resp)) return false;
        }
      }
      if(fil.cliente&&t.clienteId!==fil.cliente) return false;
      if(fil.q&&!t.titulo?.toLowerCase().includes(fil.q.toLowerCase())) return false;
      return true;
    }).sort((a,b)=>{
      const pa = pesoEstado(a), pb = pesoEstado(b);
      if(pa!==pb) return pa-pb;
      // Dentro del mismo grupo, ordenar por fecha de vencimiento ascendente
      const fa = a.fechaVen||'9999-99-99', fb = b.fechaVen||'9999-99-99';
      return fa<fb?-1:fa>fb?1:0;
    });
  },[tareas,fil]);

  const COMP_BLANK = {descripcion:'',responsabilidad:'integra',empleadoId:'',fechaCompromiso:''};
  const openNew = () => { setForm({titulo:'',clienteId:'',responsableId:'',responsablesIds:[],estado:'pendiente',prioridad:'media',fechaVen:'',fechaAsignada:'',actividadesRealizadas:'',desc:'',proyectoId:'',soporteCierre:[],showCierre:false,compromisos:[],showCompromisos:false}); setOpen(true); };
  const openEdit = t => { setForm({...t, responsablesIds:Array.isArray(t.responsablesIds)?t.responsablesIds:(t.responsableId?[t.responsableId]:[]), soporteCierre:Array.isArray(t.soporteCierre)?t.soporteCierre:[], showCierre:!!(Array.isArray(t.soporteCierre)&&t.soporteCierre.length), fechaAsignada:t.fechaAsignada||'', actividadesRealizadas:t.actividadesRealizadas||'', compromisos:Array.isArray(t.compromisos)?t.compromisos:[], showCompromisos:!!(Array.isArray(t.compromisos)&&t.compromisos.length)}); setOpen(true); };

  // ── Helpers de interconexión ───────────────────────────────
  // Mapeo de prioridad → tipo de alerta automática
  const PRIO_TIPO = {urgente:'Urgente', alta:'Vencimiento', media:'Recordatorio', baja:'Recordatorio'};

  // Construye el objeto de alerta vinculada a partir de una tarea
  const buildAlertaVinculada = (tarea, alertaIdExistente) => ({
    id:           alertaIdExistente || 'alrt_' + tarea.id,  // ID determinista: siempre 1 alerta por tarea
    titulo:       tarea.titulo,
    tipo:         PRIO_TIPO[tarea.prioridad] || 'Recordatorio',
    clienteId:    tarea.clienteId  || '',
    responsableId:tarea.responsableId || '',
    fechaVen:     tarea.fechaVen   || '',
    desc:         tarea.desc ? '↔ Tarea: ' + tarea.desc : '↔ Vinculada a tarea',
    estado:       tarea.estado === 'completada' ? 'completada' : tarea.estado === 'cancelada' ? 'completada' : 'pendiente',
    esAlerta:     true,
    tareaVinculadaId: tarea.id,   // referencia cruzada
    auto:         true,           // generada automáticamente
  });

  // Despacha evento de calendario para forzar re-render reactivo
  const dispatchCalendario = (tarea) => {
    window.dispatchEvent(new CustomEvent('ip-calendario-updated', {
      detail: { tareaId: tarea.id, fechaVen: tarea.fechaVen, ts: Date.now() }
    }));
  };

  // Crea o actualiza la alerta vinculada y programa notificación si corresponde
  const sincronizarAlerta = (tarea) => {
    // No crear alerta si la tarea ya es una alerta manual o no tiene fecha
    if(tarea.esAlerta) return;
    const alertaId = 'alrt_' + tarea.id;
    const alerta   = buildAlertaVinculada(tarea, alertaId);
    DB.set('tareas', alerta);

    // Actualizar estado React global — alerta vive en la misma colección tareas
    setTareas(prev => {
      const existe = prev.find(x => x.id === alertaId);
      return existe
        ? prev.map(x => x.id === alertaId ? alerta : x)
        : [alerta, ...prev];
    });

    // Programar notificación push si hay fecha y PushSvc activo
    if(tarea.fechaVen && window.PushSvc?.isEnabled()) {
      const icon = tarea.prioridad === 'urgente' ? '🔴' : tarea.prioridad === 'alta' ? '⚠️' : '🔔';
      window.PushSvc.schedule(
        'alerta_' + tarea.id,
        icon + ' ' + (PRIO_TIPO[tarea.prioridad] || 'Recordatorio'),
        tarea.titulo,
        tarea.fechaVen + 'T08:00:00',
        'ip-alerta'
      );
    }
  };

  // Elimina la alerta vinculada automática cuando se elimina la tarea
  const eliminarAlertaVinculada = (tareaId) => {
    const alertaId = 'alrt_' + tareaId;
    const existe   = tareas.find(x => x.id === alertaId);
    if(!existe) return;
    DB.del('tareas', alertaId);
    setTareas(prev => prev.filter(x => x.id !== alertaId));
  };

  // ── CRUD principal ─────────────────────────────────────────
  const save = () => {
    if(!form.titulo?.trim()) return toast('El título es requerido','error');

    // Cierre es OPCIONAL: si showCierre activo sin archivos, se guarda igual (soporte vacío)

    // Normalizar responsablesIds → responsableId (retrocompatibilidad con 15+ módulos externos)
    const rIds = Array.isArray(form.responsablesIds) ? form.responsablesIds.filter(Boolean)
               : (form.responsableId ? [form.responsableId] : []);

    const esNueva = !form.id;
    const tareaData = {
      ...form,
      id:              form.id || uid(),
      creadoPor:       user?.id,
      creadoEn:        form.creadoEn || new Date().toISOString(),
      updatedAt:       new Date().toISOString(),
      // Retrocompatibilidad total: responsableId = primer elemento del array
      responsableId:   rIds[0] || '',
      responsablesIds: rIds,
      // Campos de cierre (aditivos — ya opcionales)
      soporteCierre:   Array.isArray(form.soporteCierre) ? form.soporteCierre.filter(Boolean) : [],
      showCierre:      !!form.showCierre,
      // Compromisos
      compromisos:     Array.isArray(form.compromisos) ? form.compromisos : [],
      showCompromisos: !!form.showCompromisos,
      // Nuevos campos v2
      fechaAsignada:        form.fechaAsignada || '',
      fechaEjecucion:       form.fechaEjecucion || '',
      actividadesRealizadas: form.estado === 'completada' ? (form.actividadesRealizadas || '') : (form.actividadesRealizadas || ''),
      // B-item4: Fecha de Cumplimiento automática al completar
      fechaCumplimiento: form.estado === 'completada' ? (form.fechaCumplimiento || new Date().toISOString().split('T')[0]) : (form.fechaCumplimiento || ''),
      // B-item6: Área de especialidad del responsable
      areaEspecialidad: form.areaEspecialidad || '',
      // B-item7: Texto para Informe de Gestión (solo visible en completadas)
      reporteInforme: form.estado === 'completada' ? (form.reporteInforme || '') : (form.reporteInforme || ''),
      // B-item9: Justificación de incumplimiento para tareas vencidas
      justificacionIncumplimiento: form.justificacionIncumplimiento || '',
      responsableIncumplimiento: form.responsableIncumplimiento || '',
    };

    // 1. Persistir tarea
    DB.set('tareas', tareaData);

    // 2. Actualizar estado React (refleja en Calendario inmediatamente via contexto)
    setTareas(prev =>
      esNueva
        ? [tareaData, ...prev]
        : prev.map(x => x.id === tareaData.id ? tareaData : x)
    );

    // 3. Crear/actualizar alerta vinculada automáticamente
    sincronizarAlerta(tareaData);

    // 4. Despachar evento de calendario
    dispatchCalendario(tareaData);

    setOpen(false);
    toast(
      esNueva
        ? '✅ Tarea creada · Alerta y Calendario actualizados'
        : '✅ Tarea actualizada · Alerta sincronizada',
      'success'
    );
  };

  const remove = id => {
    // 1. Eliminar alerta vinculada automática antes de eliminar la tarea
    eliminarAlertaVinculada(id);
    // 2. Eliminar tarea
    DB.del('tareas', id);
    setTareas(prev => prev.filter(x => x.id !== id));
    setDel(null);
    toast('Tarea y alerta vinculada eliminadas', 'info');
  };

  // Cambiar estado desde Kanban (drag & drop o clic rápido)
  const moverTarea = (id, nuevoEstado) => {
    const t = tareas.find(x => x.id === id);
    if(!t || t.estado === nuevoEstado) return;

    const updated = {
      ...t,
      estado:      nuevoEstado,
      updatedAt:   new Date().toISOString(),
      completadoEn: nuevoEstado === 'completada' ? new Date().toISOString() : t.completadoEn,
      // B-item4: Registrar Fecha de Cumplimiento al completar via Kanban
      fechaCumplimiento: nuevoEstado === 'completada' ? (t.fechaCumplimiento || new Date().toISOString().split('T')[0]) : (t.fechaCumplimiento || ''),
    };

    // 1. Persistir cambio de estado
    DB.set('tareas', updated);
    setTareas(prev => prev.map(x => x.id === id ? updated : x));

    // 2. Sincronizar estado en alerta vinculada
    sincronizarAlerta(updated);

    // 3. Despachar evento de calendario
    dispatchCalendario(updated);

    toast(
      `Tarea movida a "${KANBAN_COLS.find(c => c.id === nuevoEstado)?.label || nuevoEstado}" · Alerta actualizada`,
      'success'
    );
  };

  const upd = k => e => setForm(p=>({...p,[k]:e.target.value}));

  // ── Columnas Kanban ────────────────────────────────────────
  const KANBAN_COLS = [
    {id:'pendiente',   label:'Pendiente',    color:'#64748b', bg:'rgba(100,116,139,.08)', border:'rgba(100,116,139,.2)'},
    {id:'en_curso',    label:'En Curso',     color:'#C9A84C', bg:'rgba(201,168,76,.08)',  border:'rgba(201,168,76,.25)'},
    {id:'revision',    label:'En Revisión',  color:'#60a5fa', bg:'rgba(96,165,250,.08)',  border:'rgba(96,165,250,.2)'},
    {id:'reprogramada',label:'Reprogramada', color:'#c084fc', bg:'rgba(192,132,252,.08)', border:'rgba(192,132,252,.22)'},
    {id:'completada',  label:'Completada',   color:'#4ade80', bg:'rgba(74,222,128,.08)',  border:'rgba(74,222,128,.2)'},
    {id:'cancelada',   label:'Cancelada',    color:'#475569', bg:'rgba(71,85,105,.06)',   border:'rgba(71,85,105,.18)'},
  ];

  // Tareas por columna (sin filtro de estado para Kanban)
  const tareasKanban = useMemo(()=>{
    const base = tareas.filter(t=>{
      if(t.esAlerta) return false;                  // excluir alertas del tablero Kanban
      if(fil.prioridad&&t.prioridad!==fil.prioridad) return false;
      if(fil.resp){
        const rIds=Array.isArray(t.responsablesIds)&&t.responsablesIds.length?t.responsablesIds:(t.responsableId?[t.responsableId]:[]);
        if(!rIds.includes(fil.resp)) return false;
      }
      if(fil.q&&!t.titulo?.toLowerCase().includes(fil.q.toLowerCase())) return false;
      if(fil.cliente&&t.clienteId!==fil.cliente) return false;
      return true;
    });
    const map = {};
    KANBAN_COLS.forEach(c=>{ map[c.id] = base.filter(t=>t.estado===c.id); });
    return map;
  },[tareas,fil]);

  // Drag handlers
  const onDragStart = (e, id, fromCol) => {
    setDrag({id, fromCol});
    e.dataTransfer.effectAllowed = 'move';
  };
  const onDragOver  = (e, colId) => { e.preventDefault(); setDragOver(colId); };
  const onDrop      = (e, colId) => {
    e.preventDefault();
    if(drag && drag.fromCol !== colId) moverTarea(drag.id, colId);
    setDrag(null); setDragOver(null);
  };
  const onDragEnd   = () => { setDrag(null); setDragOver(null); };

  const prioBadge = p => {
    const map = {urgente:'#ef4444',alta:'#f97316',media:'#C9A84C',baja:'#64748b'};
    return <span style={{fontSize:10,fontWeight:700,color:map[p]||'#64748b',textTransform:'uppercase',letterSpacing:'.4px'}}>{p}</span>;
  };

  return <div className="fade">
    {/* Barra de controles */}
    <div className="fil-bar" style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14,alignItems:'center'}}>
      <button className="btn btn-p btn-sm" onClick={openNew}><Ico n="plus" s={14}/>Nueva Tarea</button>

      {/* Toggle vista */}
      <div style={{display:'flex',background:'#0f1923',borderRadius:8,border:'1px solid #243447',overflow:'hidden'}}>
        {[['lista','☰ Lista'],['kanban','⬛ Kanban']].map(([v,l])=>(
          <button key={v} onClick={()=>setVista(v)}
            style={{padding:'5px 14px',fontSize:12,fontWeight:vista===v?700:400,border:'none',cursor:'pointer',
              background:vista===v?'linear-gradient(135deg,#1E3A5F,#2a5298)':'transparent',
              color:vista===v?'#fff':'#64748b',transition:'all .15s'}}>
            {l}
          </button>
        ))}
      </div>

      {/* Filtros — ocultar filtro estado en Kanban */}
      {vista==='lista'&&[
        {v:'',  l:'Todos'},
        {v:'pendiente',   l:'Pendiente'},
        {v:'en_curso',    l:'En Curso'},
        {v:'revision',    l:'En Revisión'},
        {v:'completada',  l:'Completada'},
        {v:'reprogramada',l:'Reprogramada'},
        {v:'cancelada',   l:'Cancelada'},
        {v:'vencida',     l:'Vencidas'},
      ].map(({v,l})=>(
        <button key={v} className={clx('chip',fil.estado===v&&'active')} onClick={()=>setFil(p=>({...p,estado:v}))}>
          {l}
        </button>
      ))}
      <select className="inp" style={{width:'auto',padding:'4px 10px',fontSize:12}} value={fil.prioridad} onChange={e=>setFil(p=>({...p,prioridad:e.target.value}))}>
        <option value="">Toda prioridad</option>
        <option value="baja">Baja</option>
        <option value="media">Media</option>
        <option value="alta">Alta</option>
        <option value="urgente">Urgente</option>
      </select>
      <select className="inp" style={{width:'auto',padding:'4px 10px',fontSize:12}} value={fil.resp} onChange={e=>setFil(p=>({...p,resp:e.target.value}))}>
        <option value="">Responsable</option>
        <option value="__equipo_integra__">👥 Equipo Integra</option>
        {equipo.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
      </select>
      <select className="inp" style={{width:'auto',padding:'4px 10px',fontSize:12}} value={fil.cliente} onChange={e=>setFil(p=>({...p,cliente:e.target.value}))}>
        <option value="">Filtro Clientes</option>
        {[...clientes].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
      </select>
      <input className="inp" style={{flex:1,minWidth:160,padding:'5px 10px',fontSize:12}} placeholder="Buscar tarea..." value={fil.q} onChange={e=>setFil(p=>({...p,q:e.target.value}))}/>
    </div>

    {/* ── VISTA LISTA (original) ── */}
    {vista==='lista'&&<div className="card" style={{overflowX:'auto'}}>
      <table className="tbl">
        <thead><tr>
          {['Tarea','Cliente','Responsable','Estado','Prioridad','F. Asignación','Vencimiento','Acciones'].map(h=><th key={h}>{h}</th>)}
        </tr></thead>
        <tbody>
          {list.length===0&&<tr><td colSpan={8} style={{textAlign:'center',padding:40,color:'#475569'}}>Sin tareas. Cree la primera tarea.</td></tr>}
          {list.map(t=>{
            const isVenc = t.fechaVen&&t.fechaVen<hoy&&t.estado!=='completada';
            // B-item3: completada con compromisos pendientes → naranja
            const tieneCompPend = t.estado==='completada'&&Array.isArray(t.compromisos)&&t.compromisos.some(c=>c.fechaCompromiso&&c.fechaCompromiso<hoy&&!c.cumplido);
            const rowStyle = tieneCompPend ? {background:'rgba(234,88,12,.08)',borderLeft:'3px solid #ea580c'} : isVenc?{background:'rgba(153,27,27,.06)'}:{};
            return <tr key={t.id} style={rowStyle}>
              <td><p style={{fontWeight:500,color: tieneCompPend ? '#fb923c' : '#fff',margin:0,fontSize:13}}>{t.titulo}</p>
                {tieneCompPend&&<p style={{fontSize:10,color:'#fb923c',margin:'2px 0 0',display:'flex',alignItems:'center',gap:3}}><span>⚠️</span><span>Compromisos pendientes</span></p>}
                {t.desc&&<p style={{fontSize:11,color:'#475569',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}>{t.desc}</p>}
                {/* Indicador de actividades realizadas */}
                {t.actividadesRealizadas&&<p style={{fontSize:10,color:'#4ade80',margin:'2px 0 0',display:'flex',alignItems:'center',gap:3}}>
                  <span>✅</span><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160}}>{t.actividadesRealizadas.substring(0,60)}{t.actividadesRealizadas.length>60?'…':''}</span>
                </p>}
              </td>
              <td style={{color:'#94a3b8',fontSize:12}}>{clientes.find(c=>c.id===t.clienteId)?.nombre||'—'}</td>
              <td style={{color:'#94a3b8',fontSize:12}}>
                {(()=>{
                  const rIds = Array.isArray(t.responsablesIds)&&t.responsablesIds.length ? t.responsablesIds : (t.responsableId?[t.responsableId]:[]);
                  const nombres = rIds.map(id=>equipo.find(e=>e.id===id)?.nombre).filter(Boolean);
                  if(!nombres.length) return <span style={{color:'#334155'}}>—</span>;
                  return <div style={{display:'flex',flexDirection:'column',gap:2}}>
                    {nombres.map((n,i)=>(
                      <span key={i} style={{display:'flex',alignItems:'center',gap:4,whiteSpace:'nowrap'}}>
                        <span style={{width:16,height:16,borderRadius:'50%',background:'linear-gradient(135deg,#1E3A5F,#2a5298)',
                          display:'inline-flex',alignItems:'center',justifyContent:'center',
                          fontSize:8,fontWeight:700,color:'#fff',flexShrink:0}}>{n.charAt(0)}</span>
                        {n}
                      </span>
                    ))}
                  </div>;
                })()}
              </td>
              <td><SBadge s={isVenc?'vencida':t.estado}/></td>
              <td><SBadge s={t.prioridad}/></td>
              <td style={{fontSize:11,color: t.fechaAsignada ? '#C9A84C' : '#334155'}}>
                {t.fechaAsignada ? <span title="Fecha de asignación" style={{display:'flex',alignItems:'center',gap:3}}>
                  <span>📅</span>{fmt.date(t.fechaAsignada)}
                </span> : '—'}
              </td>
              <td style={{fontSize:11,color:'#64748b'}}>{fmt.date(t.fechaVen)}</td>
              <td>
                <div style={{display:'flex',gap:4,alignItems:'center'}}>
                  {/* B-item5: Ícono ojo — ver detalle sin editar */}
                  <button title="Ver detalle" onClick={()=>setViewDetail(t)} style={{background:'none',border:'1px solid #243447',borderRadius:6,padding:'4px 6px',cursor:'pointer',color:'#64748b',display:'flex',alignItems:'center'}} aria-label="Ver detalle">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                  <ActBtns onEdit={()=>openEdit(t)} onDel={()=>setDel(t.id)}/>
                </div>
              </td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>}

    {/* ── VISTA KANBAN ── */}
    {vista==='kanban'&&<div className="kanban-scroll">
      <div className="kanban-cols" style={{display:'grid',gridTemplateColumns:'repeat(6,minmax(190px,1fr))',gap:12,alignItems:'start'}}>
      {KANBAN_COLS.map(col=>{
        const colTareas = tareasKanban[col.id]||[];
        const isOver    = dragOver===col.id;
        return (
          <div key={col.id} className="kanban-col"
            onDragOver={e=>onDragOver(e,col.id)}
            onDrop={e=>onDrop(e,col.id)}
            onDragLeave={()=>setDragOver(null)}
            style={{
              borderRadius:12,border:'2px solid',minHeight:200,
              borderColor:isOver?col.color:col.border,
              background:isOver?col.bg+'cc':col.bg,
              transition:'all .15s',padding:'0 0 8px'
            }}>

            {/* Header columna */}
            <div style={{padding:'12px 14px 10px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid',borderColor:col.border}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:col.color,flexShrink:0}}/>
                <span style={{fontSize:13,fontWeight:700,color:'#fff'}}>{col.label}</span>
              </div>
              <span style={{fontSize:11,fontWeight:700,color:col.color,background:col.bg,border:'1px solid',borderColor:col.border,borderRadius:99,padding:'1px 8px'}}>{colTareas.length}</span>
            </div>

            {/* Tarjetas */}
            <div style={{padding:'8px 8px 0',display:'flex',flexDirection:'column',gap:8}}>
              {colTareas.length===0&&(
                <div style={{textAlign:'center',padding:'24px 8px',color:'#334155',fontSize:12,borderRadius:8,border:'2px dashed #243447',margin:'4px 0'}}>
                  Sin tareas
                </div>
              )}
              {colTareas.map(t=>{
                const isVenc  = t.fechaVen&&t.fechaVen<hoy&&t.estado!=='completada';
                const cliente = clientes.find(c=>c.id===t.clienteId);
                const rIds    = Array.isArray(t.responsablesIds)&&t.responsablesIds.length ? t.responsablesIds : (t.responsableId?[t.responsableId]:[]);
                const resps   = rIds.map(id=>equipo.find(e=>e.id===id)).filter(Boolean);
                const isDragging = drag?.id===t.id;
                return (
                  <div key={t.id}
                    draggable
                    onDragStart={e=>onDragStart(e,t.id,col.id)}
                    onDragEnd={onDragEnd}
                    style={{
                      background:isDragging?'rgba(255,255,255,.03)':'#162030',
                      border:'1px solid',
                      borderColor:isVenc?'rgba(248,113,113,.35)':isDragging?col.color:'#243447',
                      borderRadius:10,padding:'10px 12px',cursor:'grab',
                      opacity:isDragging?.4:1,
                      boxShadow:isDragging?`0 0 0 2px ${col.color}44`:'none',
                      transition:'all .15s'
                    }}>

                    {/* Título + prioridad */}
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:6,marginBottom:6}}>
                      <p style={{fontSize:12,fontWeight:600,color:'#fff',margin:0,lineHeight:1.4}}>{t.titulo}</p>
                      {t.prioridad&&prioBadge(t.prioridad)}
                    </div>

                    {/* Cliente */}
                    {cliente&&<p style={{fontSize:11,color:'#60a5fa',margin:'0 0 4px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      📁 {cliente.nombre}
                    </p>}

                    {/* Vencimiento */}
                    {t.fechaVen&&<p style={{fontSize:11,color:isVenc?'#f87171':'#64748b',margin:'0 0 2px'}}>
                      {isVenc?'⚠️':'📅'} Vence: {fmt.date(t.fechaVen)}
                    </p>}

                    {/* Fecha Asignada */}
                    {t.fechaAsignada&&<p style={{fontSize:11,color:'#C9A84C',margin:'0 0 4px',display:'flex',alignItems:'center',gap:3}}>
                      <span>🗓️</span> Asignada: {fmt.date(t.fechaAsignada)}
                    </p>}

                    {/* Actividades realizadas — indicador rápido */}
                    {t.actividadesRealizadas&&<p style={{fontSize:10,color:'#4ade80',margin:'0 0 4px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      ✅ {t.actividadesRealizadas.substring(0,40)}{t.actividadesRealizadas.length>40?'…':''}
                    </p>}

                    {/* Footer: responsables + acciones */}
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:6,paddingTop:6,borderTop:'1px solid #243447'}}>
                      <div style={{display:'flex',alignItems:'center',gap:2,flex:1,minWidth:0}}>
                        {resps.length
                          ? <>
                              {resps.slice(0,3).map((r,i)=>(
                                <div key={r.id} title={r.nombre}
                                  style={{width:20,height:20,borderRadius:'50%',
                                    background:'linear-gradient(135deg,#1E3A5F,#2a5298)',
                                    display:'flex',alignItems:'center',justifyContent:'center',
                                    fontSize:9,fontWeight:700,color:'#fff',flexShrink:0,
                                    marginLeft:i>0?-4:0,border:'1px solid #162030',zIndex:3-i,
                                    cursor:'default'}}>
                                  {r.nombre.charAt(0)}
                                </div>
                              ))}
                              <span style={{fontSize:10,color:'#94a3b8',marginLeft:6,overflow:'hidden',
                                textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:70}}>
                                {resps.length===1 ? resps[0].nombre : `${resps[0].nombre.split(' ')[0]} +${resps.length-1}`}
                              </span>
                            </>
                          : <span style={{fontSize:11,color:'#334155'}}>Sin asignar</span>
                        }
                        {/* Ícono de cierre si tiene soporte */}
                        {Array.isArray(t.soporteCierre)&&t.soporteCierre.length>0&&(
                          <span title={`${t.soporteCierre.length} archivo(s) de cierre`}
                            style={{marginLeft:'auto',fontSize:12}}>🔒</span>
                        )}
                      </div>
                      <div style={{display:'flex',gap:4,flexShrink:0}}>
                        <button onClick={()=>openEdit(t)} style={{background:'none',border:'none',cursor:'pointer',color:'#475569',padding:'2px 4px',borderRadius:4,fontSize:11}} title="Editar">✏️</button>
                        <button onClick={()=>setDel(t.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#475569',padding:'2px 4px',borderRadius:4,fontSize:11}} title="Eliminar">🗑️</button>
                      </div>
                    </div>

                    {/* Mover rápido a siguiente estado */}
                    {col.id!=='completada'&&(
                      <button
                        onClick={()=>moverTarea(t.id, KANBAN_COLS[KANBAN_COLS.findIndex(c=>c.id===col.id)+1]?.id||col.id)}
                        style={{width:'100%',marginTop:6,background:'rgba(255,255,255,.03)',border:'1px solid #243447',borderRadius:6,padding:'3px 0',fontSize:10,color:'#475569',cursor:'pointer',transition:'all .15s'}}
                        title="Mover a siguiente estado">
                        → {KANBAN_COLS[KANBAN_COLS.findIndex(c=>c.id===col.id)+1]?.label}
                      </button>
                    )}
                  </div>
                );
              })}

              {/* Botón agregar en columna */}
              <button onClick={()=>{setForm({titulo:'',estado:col.id,prioridad:'media',clienteId:'',responsableId:'',responsablesIds:[],fechaVen:'',fechaAsignada:'',actividadesRealizadas:'',desc:'',proyectoId:'',soporteCierre:[],showCierre:false,compromisos:[],showCompromisos:false});setOpen(true);}}
                style={{width:'100%',padding:'8px',background:'transparent',border:'1px dashed #243447',borderRadius:8,color:'#334155',fontSize:12,cursor:'pointer',marginTop:4,transition:'all .15s'}}>
                + Agregar tarea
              </button>
            </div>
          </div>
        );
      })}
      </div>
    </div>}

    {/* ── MODAL TAREAS ── */}
    <Modal open={open} onClose={()=>setOpen(false)} title={form.id?'Editar Tarea':'Nueva Tarea'} wide>
      <div className="grid-2">

        {/* Título */}
        <F label="Título *" col2>
          <input className="inp" value={form.titulo||''} onChange={upd('titulo')}/>
        </F>

        {/* Cliente */}
        <F label="Cliente">
          <select className="inp" value={form.clienteId||''} onChange={upd('clienteId')}>
            <option value="">Sin cliente</option>
            {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
          </select>
        </F>

        {/* ── Estado — con lógica de auto-activar cierre ── */}
        <F label="Estado">
          <select className="inp" value={form.estado||'pendiente'} onChange={e=>{
            const nuevoEstado = e.target.value;
            setForm(p=>({...p, estado:nuevoEstado, showCierre: nuevoEstado==='completada' ? (p.showCierre||false) : p.showCierre}));
          }}>
            <option value="pendiente">Pendiente</option>
            <option value="en_curso">En Curso</option>
            <option value="revision">En Revisión</option>
            <option value="completada">Completada</option>
            <option value="reprogramada">Reprogramada</option>
            <option value="cancelada">Cancelada</option>
          </select>
        </F>

        {/* ── Prioridad — valores estandarizados ── */}
        <F label="Prioridad">
          <select className="inp" value={form.prioridad||'media'} onChange={upd('prioridad')}>
            <option value="baja">Baja</option>
            <option value="media">Media</option>
            <option value="alta">Alta</option>
            <option value="urgente">Urgente</option>
          </select>
        </F>

        {/* ── Fecha de Asignación — PRIMERO ── */}
        <F label="Fecha de Asignación">
          <div style={{position:'relative'}}>
            <input type="date" className="inp" value={form.fechaAsignada||''} onChange={upd('fechaAsignada')}
              style={{paddingLeft:36}}/>
            <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',
              fontSize:14,pointerEvents:'none',opacity:.7}}>📅</span>
          </div>
          <p style={{fontSize:10,color:'#475569',margin:'4px 0 0'}}>Fecha acordada con el cliente para inicio o reunión</p>
        </F>

        {/* ── Fecha Vencimiento — DESPUÉS ── */}
        <F label="Fecha de Vencimiento">
          <input type="date" className="inp" value={form.fechaVen||''} onChange={upd('fechaVen')}/>
        </F>


        {/* ── Fecha de Ejecución — TERCERO ── */}
        <F label="Fecha de Ejecución">
          <div style={{position:'relative'}}>
            <input type="date" className="inp" value={form.fechaEjecucion||''} onChange={upd('fechaEjecucion')}
              style={{paddingLeft:36}}/>
            <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',
              fontSize:14,pointerEvents:'none',opacity:.7}}>🗓️</span>
          </div>
          <p style={{fontSize:10,color:'#475569',margin:'4px 0 0'}}>Fecha real en que se ejecutó o se ejecutará la actividad</p>
        </F>

        {/* ── Proyecto ── */}
        <F label="Proyecto">
          <select className="inp" value={form.proyectoId||''} onChange={upd('proyectoId')}>
            <option value="">Sin proyecto</option>
            {proyectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
          </select>
        </F>

        {/* ── Descripción / Notas ── */}
        <F label="Descripción / Notas" col2>
          <textarea className="inp" value={form.desc||''} onChange={upd('desc')} rows={2}/>
        </F>

        {/* ── Actividades Realizadas — solo visible cuando estado = completada ── */}
        {form.estado === 'completada' && (
          <F label={
            <span style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:13}}>✅</span>
              Actividades Realizadas
              <span style={{fontSize:9,fontWeight:600,padding:'1px 7px',borderRadius:99,
                background:'rgba(74,222,128,.14)',border:'1px solid rgba(74,222,128,.3)',
                color:'#4ade80'}}>requerido para informe</span>
            </span>} col2>
            <textarea className="inp"
              value={form.actividadesRealizadas||''}
              onChange={upd('actividadesRealizadas')}
              rows={4}
              placeholder="Describa detalladamente las actividades ejecutadas para completar esta tarea. Este campo se usa como insumo directo para los informes de gestión mensual..."
              style={{
                border:'1px solid rgba(74,222,128,.35)',
                boxShadow:'0 0 0 2px rgba(74,222,128,.06)',
                minHeight:100,
              }}
            />
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
              <p style={{fontSize:10,color:'#475569',margin:0}}>
                Insumo directo para informe mensual de gestión
              </p>
              <span style={{fontSize:10,color:(form.actividadesRealizadas||'').length>=50?'#4ade80':'#64748b'}}>
                {(form.actividadesRealizadas||'').length} caracteres
                {(form.actividadesRealizadas||'').length<50&&' (mín. recomendado: 50)'}
              </span>
            </div>
          </F>
        )}

        {/* B-item7: Reporte Informe de Gestión — solo visible cuando completada */}
        {form.estado === 'completada' && (
          <F label={<span style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:13}}>📋</span>Reporte Informe de Gestión<span style={{fontSize:9,fontWeight:600,padding:'1px 7px',borderRadius:99,background:'rgba(201,168,76,.14)',border:'1px solid rgba(201,168,76,.3)',color:'#C9A84C'}}>para el informe</span></span>} col2>
            <textarea className="inp" value={form.reporteInforme||''} onChange={upd('reporteInforme')} rows={3} placeholder="Describa el logro o actividad tal como aparecerá en el Informe de Gestión exportado..."/>
            <p style={{fontSize:10,color:'#475569',margin:'4px 0 0'}}>Este texto se incluirá literalmente en la sección Tareas del PDF del Informe de Gestión.</p>
          </F>
        )}

        {/* B-item9: Justificación de incumplimiento — para completadas con compromisos vencidos */}
        {form.estado === 'completada' && Array.isArray(form.compromisos) && form.compromisos.some(c=>c.fechaCompromiso&&c.fechaCompromiso<new Date().toISOString().split('T')[0]&&!c.cumplido) && (
          <F label={<span style={{color:'#fb923c'}}>⚠️ Justificación de Incumplimiento</span>} col2>
            <div style={{display:'flex',gap:8,marginBottom:6}}>
              <label style={{display:'flex',alignItems:'center',gap:4,fontSize:12,cursor:'pointer'}}>
                <input type="radio" name="respInc" value="cliente" checked={form.responsableIncumplimiento==='cliente'} onChange={upd('responsableIncumplimiento')}/> Cliente
              </label>
              <label style={{display:'flex',alignItems:'center',gap:4,fontSize:12,cursor:'pointer'}}>
                <input type="radio" name="respInc" value="integra" checked={form.responsableIncumplimiento==='integra'} onChange={upd('responsableIncumplimiento')}/> INTEGRA CONSULTORES
              </label>
            </div>
            <textarea className="inp" value={form.justificacionIncumplimiento||''} onChange={upd('justificacionIncumplimiento')} rows={2} placeholder="Describa brevemente la causa del incumplimiento..."/>
          </F>
        )}

        {/* ── RESPONSABLE(S) — lista desplegable con selección múltiple + Equipo Integra ── */}
        <F label="Responsable(s)" col2>
          {equipo.length === 0
            ? <p style={{fontSize:12,color:'#475569',margin:0}}>No hay integrantes registrados en el equipo.</p>
            : <>
                {/* Opción especial: Equipo Integra */}
                {(()=>{
                  const esEquipoIntegra = !!(form.equipoIntegra);
                  const toggleEI = () => {
                    if(!esEquipoIntegra){
                      // Seleccionar todos los miembros del equipo
                      setForm(p=>({...p, equipoIntegra:true, responsablesIds:equipo.map(m=>m.id)}));
                    } else {
                      setForm(p=>({...p, equipoIntegra:false, responsablesIds:[]}));
                    }
                  };
                  return (
                    <label onClick={toggleEI} style={{
                      display:'flex',alignItems:'center',gap:10,
                      padding:'9px 12px',cursor:'pointer',userSelect:'none',
                      marginBottom:6,borderRadius:9,
                      background: esEquipoIntegra ? 'rgba(30,58,95,.25)' : 'rgba(201,168,76,.05)',
                      border: `2px solid ${esEquipoIntegra ? 'rgba(30,58,95,.8)' : 'rgba(201,168,76,.35)'}`,
                      transition:'all .15s',
                    }}>
                      <div style={{
                        width:22,height:22,borderRadius:5,flexShrink:0,
                        border:'2px solid',transition:'all .15s',
                        borderColor: esEquipoIntegra ? '#60a5fa' : '#C9A84C',
                        background:  esEquipoIntegra ? '#1E3A5F' : 'transparent',
                        display:'flex',alignItems:'center',justifyContent:'center',
                      }}>
                        {esEquipoIntegra && <span style={{fontSize:11,color:'#60a5fa',fontWeight:900,lineHeight:1}}>✓</span>}
                      </div>
                      <span style={{fontSize:17}}>👥</span>
                      <div style={{flex:1}}>
                        <p style={{fontSize:13,fontWeight:700,margin:0,color: esEquipoIntegra ? '#93c5fd' : '#C9A84C'}}>
                          Equipo Integra
                        </p>
                        <p style={{fontSize:10,color:'#475569',margin:0}}>Asignar a todo el equipo de trabajo</p>
                      </div>
                      {esEquipoIntegra && (
                        <span style={{fontSize:9,fontWeight:700,color:'#93c5fd',background:'rgba(30,58,95,.4)',
                          border:'1px solid rgba(147,197,253,.3)',borderRadius:99,padding:'1px 8px',flexShrink:0}}>
                          {equipo.length} integrantes
                        </span>
                      )}
                    </label>
                  );
                })()}

                {/* Separador */}
                <div style={{fontSize:10,color:'#334155',fontWeight:600,textTransform:'uppercase',
                  letterSpacing:'.4px',marginBottom:4,paddingLeft:2}}>O seleccionar individualmente:</div>

                {/* Lista scrollable */}
                <div style={{border:'1px solid #243447',borderRadius:8,background:'#0f1923',
                  maxHeight:160,overflowY:'auto'}}>
                  {equipo.map(m => {
                    const selArr = Array.isArray(form.responsablesIds) ? form.responsablesIds : [];
                    const sel    = selArr.includes(m.id);
                    const toggle = () => setForm(p => {
                      const prev = Array.isArray(p.responsablesIds) ? p.responsablesIds : [];
                      const next = sel ? prev.filter(x => x !== m.id) : [...prev, m.id];
                      const esEI = next.length === equipo.length;
                      return {...p, responsablesIds: next, equipoIntegra: esEI};
                    });
                    return (
                      <label key={m.id} onClick={toggle} style={{
                        display:'flex',alignItems:'center',gap:10,
                        padding:'8px 12px',cursor:'pointer',userSelect:'none',
                        transition:'background .12s',
                        background: sel ? 'rgba(201,168,76,.09)' : 'transparent',
                        borderBottom:'1px solid #1a2840',
                      }}>
                        {/* Checkbox visual */}
                        <div style={{
                          width:16,height:16,borderRadius:4,flexShrink:0,
                          border:'2px solid',transition:'all .15s',
                          borderColor: sel ? '#C9A84C' : '#334155',
                          background:  sel ? '#C9A84C' : 'transparent',
                          display:'flex',alignItems:'center',justifyContent:'center',
                        }}>
                          {sel && <span style={{fontSize:10,color:'#0f1923',fontWeight:900,lineHeight:1}}>✓</span>}
                        </div>
                        {/* Avatar */}
                        <div style={{
                          width:28,height:28,borderRadius:'50%',flexShrink:0,
                          background:'linear-gradient(135deg,#1E3A5F,#2a5298)',
                          display:'flex',alignItems:'center',justifyContent:'center',
                          fontSize:12,fontWeight:700,color:'#fff',
                        }}>{m.nombre.charAt(0)}</div>
                        {/* Nombre completo + cargo */}
                        <div style={{flex:1,minWidth:0}}>
                          <p style={{
                            fontSize:13,fontWeight: sel ? 700 : 400,
                            color: sel ? '#e8c96a' : '#e2e8f0',
                            margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                          }}>{m.nombre}</p>
                          {m.cargo && <p style={{fontSize:10,color:'#475569',margin:0}}>{m.cargo}</p>}
                        </div>
                        {sel && (
                          <span style={{
                            fontSize:9,fontWeight:700,color:'#C9A84C',flexShrink:0,
                            background:'rgba(201,168,76,.12)',border:'1px solid rgba(201,168,76,.28)',
                            borderRadius:99,padding:'1px 7px',
                          }}>asignado</span>
                        )}
                      </label>
                    );
                  })}
                </div>

                {/* Resumen: chips con nombres completos */}
                {(()=>{
                  const sel = (Array.isArray(form.responsablesIds) ? form.responsablesIds : [])
                    .map(id => equipo.find(e => e.id === id)?.nombre).filter(Boolean);
                  return sel.length > 0
                    ? <div style={{marginTop:7,display:'flex',flexWrap:'wrap',gap:4}}>
                        {form.equipoIntegra && <span style={{fontSize:11,color:'#93c5fd',
                          background:'rgba(30,58,95,.3)',border:'1px solid rgba(147,197,253,.25)',
                          borderRadius:99,padding:'2px 10px'}}>👥 Equipo Integra</span>}
                        {!form.equipoIntegra && sel.map((n,i) => (
                          <span key={i} style={{
                            fontSize:11,color:'#C9A84C',
                            background:'rgba(201,168,76,.1)',
                            border:'1px solid rgba(201,168,76,.25)',
                            borderRadius:99,padding:'2px 10px',
                          }}>{n}</span>
                        ))}
                      </div>
                    : <p style={{fontSize:11,color:'#334155',margin:'6px 0 0'}}>
                        Ningún responsable seleccionado
                      </p>;
                })()}
              </>
          }
        </F>

      </div>

      {/* ════════════════════════════════════════════════════════
          BOTÓN CIERRE — Fase final de la tarea (OPCIONAL)
          Al seleccionar estado "Completada", se activa automáticamente.
          El soporte documental es opcional — no bloquea el guardado.
      ════════════════════════════════════════════════════════ */}

      {/* B-item6: Área de Especialidad / Componente — asociado a la tarea */}
      <div style={{marginTop:14,padding:'12px 16px',borderRadius:10,border:'1px solid rgba(100,116,139,.3)',background:'rgba(51,65,85,.12)'}}>
        <p style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.5px',margin:'0 0 10px'}}>Área de Especialidad / Componente</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr',gap:8}}>
          <select className="inp" value={form.areaEspecialidad||''} onChange={upd('areaEspecialidad')} style={{fontSize:13}}>
            <option value="">— Sin clasificar —</option>
            <option value="administracion_personal">Administración de Personal</option>
            <option value="gestion_sst">Gestión SST</option>
            <option value="consultoria_juridica">Consultoría Jurídica</option>
            <option value="gestion_operativa">Gestión Operativa</option>
            <option value="gestion_calidad">Gestión de Calidad</option>
            <option value="ambiental">Ambiental</option>
            <option value="i_d">I+D</option>
          </select>
          {form.areaEspecialidad&&<p style={{fontSize:10,color:'#60a5fa',margin:0}}>✓ Área asignada — se incluirá en reportes y clasificación de tareas</p>}
        </div>
      </div>

      <div style={{marginTop:16}}>
        <button type="button"
          onClick={() => setForm(p => ({...p, showCierre: !p.showCierre}))}
          style={{
            display:'inline-flex',alignItems:'center',gap:9,
            padding:'9px 18px',borderRadius:9,fontSize:13,fontWeight:700,
            cursor:'pointer',transition:'all .18s',border:'2px solid',
            borderColor: form.showCierre ? 'rgba(74,222,128,.55)' : 'rgba(201,168,76,.5)',
            background:  form.showCierre ? 'rgba(26,107,58,.14)'  : 'rgba(120,80,10,.12)',
            color:       form.showCierre ? '#4ade80'               : '#C9A84C',
          }}>
          <span style={{fontSize:17}}>{form.showCierre ? '🔒' : '📋'}</span>
          {form.showCierre ? 'Cierre activo' : 'Cierre (Fase final)'}
          <span style={{
            fontSize:9,fontWeight:600,padding:'2px 7px',borderRadius:99,
            background:  form.showCierre ? 'rgba(74,222,128,.18)' : 'rgba(201,168,76,.15)',
            border:'1px solid',
            borderColor: form.showCierre ? 'rgba(74,222,128,.4)'  : 'rgba(201,168,76,.3)',
            color:       form.showCierre ? '#4ade80'               : '#C9A84C',
          }}>
            {form.showCierre ? 'abierto' : 'cerrado'}
          </span>
        </button>
      </div>

      {/* ── PANEL DE CIERRE — visible solo cuando showCierre = true ── */}
      {form.showCierre && (()=>{
        const ev    = Array.isArray(form.soporteCierre) ? form.soporteCierre.filter(Boolean) : [];
        const libre = 4 - ev.length;

        const onAdd = e => {
          const files = Array.from(e.target.files||[]).slice(0, libre);
          files.forEach(file => {
            const TIPOS = ['image/jpeg','image/jpg','image/png','application/pdf'];
            if(!TIPOS.includes(file.type))
              return toast('Solo se aceptan archivos JPG, PNG o PDF','error');
            if(file.size > 8*1024*1024)
              return toast(`"${file.name}" excede el límite de 8 MB`,'error');
            const reader = new FileReader();
            reader.onload = ev2 => setForm(p => {
              const actual = Array.isArray(p.soporteCierre) ? p.soporteCierre.filter(Boolean) : [];
              if(actual.length >= 4) return p;
              return {...p, soporteCierre:[...actual,{
                data:   ev2.target.result,
                nombre: file.name,
                tipo:   file.type,
                kb:     Math.round(file.size/1024),
              }]};
            });
            reader.readAsDataURL(file);
          });
          e.target.value = '';
        };

        const onDel = idx => setForm(p => ({...p,
          soporteCierre: (Array.isArray(p.soporteCierre)?p.soporteCierre:[]).filter((_,i)=>i!==idx)
        }));

        return (
          <div style={{
            marginTop:12,padding:'16px',borderRadius:10,border:'2px solid',
            borderColor: ev.length > 0 ? 'rgba(74,222,128,.4)' : 'rgba(248,113,113,.4)',
            background:  ev.length > 0 ? 'rgba(26,107,58,.07)' : 'rgba(153,27,27,.07)',
          }}>

            {/* Encabezado */}
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <div style={{
                width:36,height:36,borderRadius:9,flexShrink:0,fontSize:18,
                display:'flex',alignItems:'center',justifyContent:'center',
                background:  ev.length>0 ? 'rgba(74,222,128,.14)' : 'rgba(248,113,113,.12)',
                border:'1px solid',
                borderColor: ev.length>0 ? 'rgba(74,222,128,.3)'  : 'rgba(248,113,113,.3)',
              }}>{ev.length>0 ? '✅' : '📎'}</div>
              <div style={{flex:1}}>
                <p style={{
                  fontSize:13,fontWeight:700,margin:0,
                  color: ev.length>0 ? '#4ade80' : '#94a3b8',
                }}>
                  Soporte de Cierre — {ev.length}/4 archivo{ev.length!==1?'s':''} (Opcional)
                </p>
                <p style={{fontSize:11,color:'#64748b',margin:0}}>
                  {ev.length===0
