  default-src 'self';

<script>
// Manifest PWA generado en runtime — evita errores de parseo de data:URIs largos
// con caracteres especiales (% +). Más robusto que un data:URI inline.
(function(){
  try {
    const manifest = {
      name: "INTPLANNER PRO",
      short_name: "INT PRO",
      // start_url debe ser absoluto cuando el manifest se sirve desde Blob URL
      start_url: location.origin + location.pathname,
      scope: location.origin + location.pathname.replace(/[^/]*$/, ''),
      display: "standalone",
      background_color: "#0f1923",
      theme_color: "#0f1923",
      icons: [{
        src: "data:image/svg+xml;utf8," + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#1E3A5F"/><text y=".9em" font-size="60" x="50%" text-anchor="middle" fill="#C9A84C" font-weight="bold">IP</text></svg>'
        ),
        sizes: "any",
        type: "image/svg+xml"
      }]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    document.getElementById('ip-manifest').href = URL.createObjectURL(blob);
  } catch(e){ /* no crítico — la PWA simplemente no se instalará */ }
})();
</script>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#0f1923;color:#e2e8f0;margin:0;overflow-x:hidden}
h1,h2,h3,.sy{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0f1923}
::-webkit-scrollbar-thumb{background:#2f4460;border-radius:3px}
input,select,textarea{-webkit-appearance:none;appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7);cursor:pointer}

/* Layout */
.page{display:flex;height:100vh;overflow:hidden;background:#0f1923}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.content{flex:1;overflow-y:auto;padding:20px}

/* Cards */
.card{background:#162030;border:1px solid #243447;border-radius:12px}
.card-p{background:#162030;border:1px solid #243447;border-radius:12px;padding:20px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;transition:all .18s;border:none;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:linear-gradient(135deg,#1E3A5F,#2a5298);color:#fff}
.btn-p:hover:not(:disabled){background:linear-gradient(135deg,#2a5298,#3573d4);transform:translateY(-1px)}
.btn-g{background:linear-gradient(135deg,#C9A84C,#e8c96a);color:#0f1923;font-weight:700}
.btn-g:hover:not(:disabled){filter:brightness(1.08)}
.btn-d{background:#7f1d1d;color:#fecaca}
.btn-d:hover:not(:disabled){background:#991b1b}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px;gap:5px}
.btn-ghost{background:rgba(255,255,255,.05);color:#94a3b8;border:1px solid #243447}
.btn-ghost:hover{background:#1e2d42;color:#e2e8f0}

/* Inputs */
.inp{background:#0f1923;border:1px solid #243447;border-radius:8px;padding:9px 13px;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:#C9A84C;box-shadow:0 0 0 2px rgba(201,168,76,.12)}
.inp::placeholder{color:#4a6080}
select.inp option{background:#162030;color:#e2e8f0}
textarea.inp{resize:vertical;min-height:80px}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.b-blue{background:rgba(30,58,95,.6);color:#93c5fd;border:1px solid rgba(147,197,253,.25)}
.b-gold{background:rgba(201,168,76,.2);color:#e8c96a;border:1px solid rgba(201,168,76,.35)}
.b-green{background:rgba(26,107,58,.35);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
.b-red{background:rgba(153,27,27,.35);color:#fca5a5;border:1px solid rgba(248,113,113,.25)}
.b-yellow{background:rgba(120,80,10,.3);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.b-gray{background:rgba(51,65,85,.5);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}
.b-purple{background:rgba(88,28,135,.35);color:#c4b5fd;border:1px solid rgba(196,181,253,.25)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#162030;border:1px solid #2f4460;border-radius:16px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.modal-lg{max-width:760px}

/* Sidebar */
.sidebar{width:220px;flex-shrink:0;background:#162030;border-right:1px solid #243447;display:flex;flex-direction:column;height:100vh;transition:width .22s cubic-bezier(.4,0,.2,1)}
.sidebar.col{width:60px}
.si{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:all .14s;color:#94a3b8;font-size:13px;font-weight:500;border:1px solid transparent;width:100%;background:none;text-align:left;overflow:hidden}
.si:hover{background:#1e2d42;color:#e2e8f0;border-color:#243447}
.si.active{background:linear-gradient(135deg,rgba(30,58,95,.7),rgba(42,82,152,.4));color:#C9A84C;border-color:rgba(201,168,76,.3)}
.sidebar.col .si{justify-content:center;padding:9px}
.sidebar.col .si-label{display:none}

/* Header */
.topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:#162030;border-bottom:1px solid #243447;flex-shrink:0}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#64748b;border-bottom:1px solid #243447}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(36,52,71,.5);vertical-align:middle}
.tbl tr:hover td{background:#1a2840}
.tbl tr:last-child td{border-bottom:none}

/* Misc */
.gline{height:3px;background:linear-gradient(90deg,#C9A84C,transparent);border-radius:2px;margin-bottom:16px}
.pbar{height:6px;background:#1e2d42;border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .6s ease}
.fade{animation:fi .28s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.kpi{background:#162030;border:1px solid #243447;border-radius:12px;padding:18px}
.cbme{background:linear-gradient(135deg,#1E3A5F,#2a5298);border-radius:12px 12px 4px 12px;padding:10px 14px;max-width:70%}
.cboth{background:#1e2d42;border:1px solid #2f4460;border-radius:12px 12px 12px 4px;padding:10px 14px;max-width:70%}
.notif-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.grid-4{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr}}

/* ── RESPONSIVE MÓVIL (≤640px) ────────────────────────────── */
@media(max-width:640px){
  /* Grids */
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}

  /* Sidebar — drawer lateral con overlay */
  .sidebar{
    position:fixed;z-index:200;height:100%;
    transform:translateX(-100%);
    transition:transform .26s cubic-bezier(.4,0,.2,1);
    box-shadow:none;
  }
  .sidebar.mob-open{
    transform:translateX(0);
    box-shadow:6px 0 32px rgba(0,0,0,.6);
  }
  /* Ocultar botón colapsar escritorio en móvil */
  .sidebar .mob-hide-toggle{display:none}

  /* Overlay oscuro detrás del sidebar */
  .mob-overlay{
    display:none;position:fixed;inset:0;z-index:199;
    background:rgba(0,0,0,.65);backdrop-filter:blur(2px);
  }
  .mob-overlay.active{display:block}

  /* Topbar — botón hamburguesa visible */
  .mob-ham{display:flex!important}

  /* Topbar — compactar indicadores */
  .topbar{padding:0 12px;gap:6px}
  .topbar .mob-hide{display:none!important}

  /* Content padding reducido */
  .content{padding:12px}

  /* Modales — full-width en móvil */
  .modal{padding:16px;border-radius:12px}

  /* Kanban — scroll horizontal nativo, columnas de ancho fijo */
  .kanban-scroll{
    overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:8px;
    /* Snap entre columnas */
    scroll-snap-type:x mandatory;
  }
  .kanban-scroll::-webkit-scrollbar{height:4px}
  .kanban-cols{
    display:flex;gap:12px;
    width:max-content;
    align-items:start;
  }
  .kanban-col{
    width:280px;flex-shrink:0;
    scroll-snap-align:start;
  }

  /* Calendario — celdas compactas */
  .cal-cel{min-height:42px!important;padding:3px 2px!important}
  .cal-dia{font-size:10px!important}
  .cal-header{font-size:9px!important;padding:3px 0!important}

  /* Barra filtros Tareas — stack vertical */
  .fil-bar{flex-direction:column;align-items:stretch!important}
  .fil-bar input,.fil-bar select{width:100%!important;min-width:unset!important}
}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;background:#1e2d42;border:1px solid #2f4460;color:#94a3b8;cursor:pointer}
.chip.active{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.4);color:#C9A84C}

<body>

<script type="text/babel">
// ── INTPLANNER V13.1 — PARCHE QA APLICADO ────────────────────
// Correcciones: iconos faltantes · CSS utilities · ErrorBoundary
// PushSvc precedencia · polling optimizado · useCallback toast
// substr→substring · execCommand moderno · visibilitychange guard
// ─────────────────────────────────────────────────────────────

const getPermNivel = (permisos, mod) => {
  const v = permisos?.[mod];
  if(v === true)                    return 3; // legacy bool true  → administrar
  if(v === false)                   return 0; // legacy bool false → sin acceso
  if(v === undefined || v === null) return 0; // SIN permiso definido = SIN acceso
  const n = parseInt(v);
  return isNaN(n) ? 0 : Math.min(3, Math.max(0, n));
};

 ────────────────────────────────────────────────────────────────
 La configuración Firebase a continuación es pública por diseño del SDK
 web de Firebase (las claves del lado cliente no son secretas per se),

    rules_version = '2';
    service cloud.firestore {
      match /databases/{database}/documents {

        // ── FUNCIONES DE AYUDA ──────────────────────────────────────
        // Verifica que el usuario esté autenticado
        function isAuth() {
          return request.auth != null;
        }

        // Obtiene el documento de perfil del usuario autenticado
        function getUser() {
          return get(/databases/$(database)/documents/usuarios/$(request.auth.uid)).data;
        }

        // Verifica si el usuario es administrador (rol = 'administrador')
        function isAdmin() {
          return isAuth() && getUser().rol == 'administrador';
        }

        // Verifica si el usuario está activo
        function isActive() {
          return isAuth() && getUser().activo != false;

        // Verifica el nivel de permiso para un módulo específico
        // nivel: 1=Lectura, 2=Editar, 3=Administrar
        // V13-FIX-H5b: default 0 (sin acceso) — antes era 3 (admin) — principio de mínimo privilegio
        function hasModuleAccess(mod, minLevel) {
          let u = getUser();
          if (!isActive()) { return false; }
          // Si es admin, acceso total
          if (u.rol == 'administrador') { return true; }
          // Verificar permiso del módulo
          let perms = u.get('permisos', {});
          // V13-FIX-H5b: default 0 (sin acceso) — antes era 3 (admin)
          let nivel = perms.get(mod, 0);

// ── PERSISTENCIA (Firestore + localStorage fallback) ──────────
// ── WRITE-LOCK: Protección contra sobrescritura por onSnapshot ────────
// Cuando DB.set escribe un documento, registra su ID + timestamp aquí.
// DB.sub consulta este registro para IGNORAR snapshots de Firestore que
// lleguen antes de que la escritura se confirme (ventana de 5 segundos).
// Esto garantiza que la UI siempre muestre el dato LOCAL más reciente
// sin que onSnapshot lo revierta con un dato viejo del servidor.
const _writeLocks = {};
const _setWriteLock = (col, docId) => {
  const key = col + ':' + docId;
  _writeLocks[key] = Date.now();
  // Auto-limpiar después de 5 segundos (la escritura ya se habrá confirmado)
  setTimeout(() => { delete _writeLocks[key]; }, 5000);
};
const _isWriteLocked = (col, docId) => {
  const key = col + ':' + docId;
  const ts = _writeLocks[key];
  if (!ts) return false;
  // Lock activo si fue escrito hace menos de 5 segundos
  return (Date.now() - ts) < 5000;
};

// ── LOGOSTORE — Almacenamiento aislado de logos de clientes ───────────────────
// ROOT CAUSE FIX: Los logos base64 (~50-200 KB) embebidos en ip_clientes
// causaban 4 fallos distintos:
//   1. DB.sub merge podía preferir el documento de Firestore (sin logo) sobre el local
//   2. QuotaExceededError al serializar ip_clientes con múltiples logos
//   3. Firestore rechazaba silenciosamente documentos > límite de campo
//   4. Cualquier actualización de otro dispositivo borraba el logo al re-serializar
//
// SOLUCIÓN: Logo almacenado en ip_logo_<clientId> — completamente aislado del
// ciclo de sync Firestore. El documento cliente solo lleva el flag logo:'__local__'
// como indicador de presencia. El base64 real vive exclusivamente en localStorage.
const LogoStore = {
  KEY: id => 'ip_logo_' + id,

  // Guarda el base64 del logo en su clave dedicada
  save: (clientId, base64) => {
    if(!clientId || !base64) return false;
    try {
      localStorage.setItem(LogoStore.KEY(clientId), base64);
      return true;
    } catch(e) {
      // QuotaExceededError — intentar limpiar logos huérfanos y reintentar
      try {
        LogoStore._purgeOrphans();
        localStorage.setItem(LogoStore.KEY(clientId), base64);
        return true;
      } catch(e2) {
        console.warn('LogoStore.save: quota exceeded incluso tras purga:', e2.message);
        return false;
      }
    }
  },

  // Lee el base64 del logo desde su clave dedicada
  get: (clientId) => {
    if(!clientId) return '';
    try { return localStorage.getItem(LogoStore.KEY(clientId)) || ''; }
    catch(_){ return ''; }
  },

  // Elimina el logo de un cliente (cuando se quita o se elimina el cliente)
  remove: (clientId) => {
    if(!clientId) return;
    try { localStorage.removeItem(LogoStore.KEY(clientId)); } catch(_){}
  },

  // Resuelve el campo logo de un objeto cliente:
  // si logo === '__local__' → carga desde clave dedicada
  // si logo es base64 real → migra al nuevo sistema y devuelve el valor
  // si logo está vacío → devuelve ''
  resolve: (cliente) => {
    if(!cliente) return '';
    const raw = cliente.logo || '';
    if(!raw) return '';
    if(raw === '__local__') return LogoStore.get(cliente.id);
    // Logo embebido (datos legacy) — migrar al nuevo sistema si hay ID
    if(raw.startsWith('data:image') && cliente.id) {
      LogoStore.save(cliente.id, raw);
      return raw;
    }
    return raw;
  },

  // Migra todos los logos embebidos existentes en ip_clientes al nuevo sistema
  // Se ejecuta una sola vez al arrancar la aplicación
  migrateAll: () => {
    try {
      const clientes = JSON.parse(localStorage.getItem('ip_clientes')||'[]');
      let dirty = false;
      const migrated = clientes.map(c => {
        if(c.logo && c.logo.startsWith('data:image') && c.id) {
          LogoStore.save(c.id, c.logo);
          dirty = true;
          return {...c, logo: '__local__'};
        }
        return c;
      });
      if(dirty) {
        localStorage.setItem('ip_clientes', JSON.stringify(migrated));
        console.log('LogoStore: migración completada para', migrated.filter(c=>c.logo==='__local__').length, 'logo(s)');
      }
    } catch(e) { console.warn('LogoStore.migrateAll error:', e.message); }
  },

  // Elimina logos huérfanos (clientes eliminados) para liberar cuota
  _purgeOrphans: () => {
    try {
      const ids = new Set(
        JSON.parse(localStorage.getItem('ip_clientes')||'[]').map(c=>c.id)
      );
      for(let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if(k && k.startsWith('ip_logo_')) {
          const cid = k.replace('ip_logo_','');
          if(!ids.has(cid)) { localStorage.removeItem(k); i--; }
        }
      }
    } catch(_){}
  },
};
// Ejecutar migración al arrancar (sin bloquear el hilo principal)
setTimeout(() => LogoStore.migrateAll(), 500);

const DB = {
  // Lee colección completa (fallback localStorage)
  get: col => JSON.parse(localStorage.getItem('ip_'+col)||'[]'),

  // Guarda documento — Firestore si disponible, sino encola para sync posterior
  set: async (col, data) => {
    // B4 FIX: Campos de auditoría — trazabilidad completa de quién y cuándo
    // Se inyectan en cada escritura sin afectar la lógica existente.
    const now    = new Date().toISOString();
    const uid_u  = (() => {
      try {
        // Preferir Firebase Auth uid (fuente primaria) sobre localStorage (puede estar desactualizado)
        if(FIREBASE_OK && _auth?.currentUser?.uid) return _auth.currentUser.uid;
        const s = JSON.parse(localStorage.getItem('ip_session')||'{}');
        return s.id || s.uid || 'anon';
      } catch(_){ return 'anon'; }
    })();
    const esNuevo = !data.id; // true = creación, false = actualización
    const r = {
      ...data,
      id:          data.id || uid(),
      _ts:         Date.now(),
      // V13-FIX-H6: _serverTs via FieldValue.serverTimestamp() actúa como árbitro
      // de conflictos en el merge DB.sub() — inmune a relojes de cliente desincronizados.
      // Solo se inyecta cuando Firebase está disponible; localStorage usa _ts (Date.now).
      ...(FIREBASE_OK ? {_serverTs: firebase.firestore.FieldValue.serverTimestamp()} : {}),
      // Campos de auditoría (no sobreescribir creadoPor/creadoEn en actualizaciones)
      _creadoPor:  esNuevo ? uid_u : (data._creadoPor || uid_u),
      _creadoEn:   esNuevo ? now   : (data._creadoEn  || now),
      _modPor:     uid_u,
      _modEn:      now,
    };
    // Siempre actualizar localStorage inmediatamente (UI no espera)
    // LOGO-FIX: Si el doc es un cliente con logo embebido, migrarlo a LogoStore
    // antes de escribir en ip_clientes para evitar QuotaExceededError y sync corruption
    let rToStore = r;
    if(col === 'clientes' && r.logo && r.logo.startsWith('data:image')) {
      if(LogoStore.save(r.id, r.logo)) {
        rToStore = {...r, logo: '__local__'};
      }
      // Si LogoStore.save falla (quota total agotada), mantener embebido como fallback
    }
    try {
      const list = JSON.parse(localStorage.getItem('ip_'+col)||'[]');
      const i = list.findIndex(x=>x.id===rToStore.id);
      if(i>=0) list[i]=rToStore; else list.unshift(rToStore);
      localStorage.setItem('ip_'+col, JSON.stringify(list));
    } catch(quotaErr) {
      console.warn('DB.set localStorage quota error:', quotaErr.message);
      // Intentar escribir solo el documento modificado (sin reconstruir el array completo)
      try {
        const list = JSON.parse(localStorage.getItem('ip_'+col)||'[]');
        const i = list.findIndex(x=>x.id===rToStore.id);
        if(i>=0) list[i]=rToStore; else list.unshift(rToStore);
        // Guardar versión compacta (sin logos embebidos) como emergencia
        const compact = list.map(d => d.logo?.startsWith('data:image') ? {...d, logo:'__local__'} : d);
        localStorage.setItem('ip_'+col, JSON.stringify(compact));
      } catch(e2) { console.error('DB.set: no se pudo escribir en localStorage:', e2.message); }
    }

    // LOGO-FIX: Enviar a Firestore SIN el logo base64 para evitar rechazo por tamaño.
    // El logo vive exclusivamente en localStorage (LogoStore). El campo logo en Firestore
    // es solo un flag '__local__' o vacío — nunca contiene el base64.
    const rForFirestore = (col === 'clientes' && r.logo?.startsWith('data:image'))
      ? {...rToStore, logo: '__local__'}
      : rToStore;

    // WRITE-LOCK: Registrar que este documento fue escrito localmente.
    // DB.sub ignorará snapshots de Firestore para este doc durante 5 segundos,
    // evitando que onSnapshot revierta el valor con datos del servidor aún no confirmados.
    _setWriteLock(col, r.id);

    // Auto-backup tras cada escritura (debounce 3s)
    window.AutoBackup?.schedule();

    if(FIREBASE_OK && window.IP_ONLINE !== false) {
      try {
        await _db.collection(col).doc(rForFirestore.id).set(rForFirestore, {merge:true});
      } catch(e) {
        // CORRECCIÓN F: Capturar assertion errors de Firestore sin propagar
        const isAssertion = e?.message?.includes('INTERNAL ASSERTION') || e?.message?.includes('Unexpected state');
        if(isAssertion) {
          console.warn('Firestore assertion en DB.set — dato guardado en localStorage, se sincronizará al reconectar:', e.message);
        } else {
          console.warn('Firestore write error — encolando:', e.message);
        }
        if(window.OfflineQueue) { window.OfflineQueue.push(col, rForFirestore, 'set'); window.updateQueueBadge?.(); }
      }
    } else if(FIREBASE_OK) {
      if(window.OfflineQueue) { window.OfflineQueue.push(col, rForFirestore, 'set'); window.updateQueueBadge?.(); }
    }
    return r; // devolver r original (con logo base64 real) para que la UI lo muestre
  },

  // Elimina documento — Firestore si disponible, sino encola
  del: async (col, id) => {
    // LOGO-FIX: Si es un cliente, limpiar su logo de LogoStore al eliminarlo
    if(col === 'clientes') LogoStore.remove(id);
    // Eliminar de localStorage inmediatamente
    localStorage.setItem('ip_'+col, JSON.stringify(
      JSON.parse(localStorage.getItem('ip_'+col)||'[]').filter(x=>x.id!==id)
    ));

    // Auto-backup tras cada eliminación (debounce 3s)
    window.AutoBackup?.schedule();

    if(FIREBASE_OK && window.IP_ONLINE !== false) {
      try { await _db.collection(col).doc(id).delete(); } catch(e) {
        if(window.OfflineQueue) { window.OfflineQueue.push(col, {id}, 'del'); window.updateQueueBadge?.(); }
      }
    } else if(FIREBASE_OK) {
      if(window.OfflineQueue) { window.OfflineQueue.push(col, {id}, 'del'); window.updateQueueBadge?.(); }
    }
  },

  // Suscripción en tiempo real — Firestore onSnapshot o polling localStorage
  sub: (col, cb) => {
    // Lectura inmediata desde localStorage — UI nunca espera a Firestore
    // Se emite siempre (incluso array vacío) para hidratar el estado React inmediatamente
    const cached = JSON.parse(localStorage.getItem('ip_'+col)||'[]');
    // LOGO-FIX: resolver logos desde LogoStore antes de emitir al callback
    cb(col === 'clientes'
      ? cached.map(d => d.logo === '__local__' ? {...d, logo: LogoStore.get(d.id)||''} : d)
      : cached
    );

    if(FIREBASE_OK) {
      // CORRECCIÓN C: Envolver onSnapshot con protección de errores.
      // Si Firestore lanza "Unexpected state" u otro error interno,
      // DB.sub lo atrapa y usa localStorage como fallback sin propagar
      // el error al ErrorBoundary de React.
      let unsub = () => {};
      const _startSnapshot = () => {
        try {
          unsub = _db.collection(col).onSnapshot(snap => {
        const fsDocs  = snap.docs.map(d=>({...d.data(), id:d.id}));
        // Merge inteligente: nunca pisar un documento local más nuevo que Firestore
        // Cubre el caso de write async pendiente o falla de red en sesión anterior
        const localArr = JSON.parse(localStorage.getItem('ip_'+col)||'[]');
        const localMap = Object.fromEntries(localArr.map(d=>[d.id,d]));
        const fsIds    = new Set(fsDocs.map(d=>d.id));

        // V13-FIX-H6: usar _serverTs (epoch ms del servidor) como árbitro si existe,
        // fallback a _ts (cliente). Tolerancia de 2s para escrituras recientes pendientes.
        const merged = fsDocs.map(fd=>{
          const ld = localMap[fd.id];
          if(!ld) return fd; // sin versión local — usar Firestore
          // WRITE-LOCK: Si este documento fue escrito localmente en los últimos 5 segundos,
          // SIEMPRE preferir la versión local. Esto impide que onSnapshot revierta
          // el valor que el usuario acaba de guardar antes de que Firestore confirme.
          if(_isWriteLocked(col, fd.id)) return ld;
          // V13-FIX-H6: preferir _serverTs si existe (inmune a relojes desincronizados).
          // Tolerancia 2000ms para escrituras recientes aún no confirmadas por el servidor.
          const fsTs = fd._serverTs?.toMillis?.() || fd._ts || 0;
          const ldTs = ld._ts || 0;
          const winner = ldTs > fsTs + 2000 ? ld : fd;
          // LOGO-FIX: El campo logo NUNCA se hereda de Firestore si el local tiene un logo.
          // Firestore solo almacena '__local__' como flag; el base64 real vive en LogoStore.
          // Si el ganador no tiene logo pero el perdedor tiene '__local__' o base64, preservar.
          if(col === 'clientes') {
            const localLogo = LogoStore.get(winner.id) || LogoStore.get(ld.id);
            const hasLocalLogo = localLogo || ld.logo === '__local__' || ld.logo?.startsWith?.('data:image');
            if(hasLocalLogo && !winner.logo) {
              return {...winner, logo: '__local__'};
            }
          }
          return winner;
        });
        // Documentos solo en localStorage (writes pendientes no llegaron a Firestore aún)
        localArr.filter(d=>!fsIds.has(d.id)).forEach(d=>merged.push(d));

        // LOGO-FIX: Guardar versión sin logos embebidos para evitar QuotaExceededError
        const mergedCompact = merged.map(d =>
          (col === 'clientes' && d.logo?.startsWith?.('data:image'))
            ? {...d, logo: '__local__'}
            : d
        );
        try {
          localStorage.setItem('ip_'+col, JSON.stringify(mergedCompact));
        } catch(qe) {
          console.warn('DB.sub localStorage quota error:', qe.message);
        }
        // Resolver logos al pasar el array al callback (la UI recibe base64 real)
        cb(col === 'clientes'
          ? merged.map(d => d.logo === '__local__' ? {...d, logo: LogoStore.get(d.id)||''} : d)
          : merged
        );
          }, err => {
            // Error en onSnapshot — fallback a localStorage
            console.warn('Firestore onSnapshot error, usando localStorage:', err.message);
            const fb = JSON.parse(localStorage.getItem('ip_'+col)||'[]');
            cb(col === 'clientes'
              ? fb.map(d => d.logo === '__local__' ? {...d, logo: LogoStore.get(d.id)||''} : d)
              : fb
            );
          });
        } catch(assertionErr) {
          // CORRECCIÓN C: Capturar "INTERNAL ASSERTION FAILED: Unexpected state"
          // y otros errores internos del SDK. Usar localStorage como fallback
          // sin propagar el error al árbol de React.
          console.warn('Firestore DB.sub assertion error, modo localStorage:', assertionErr.message);
          const fb = JSON.parse(localStorage.getItem('ip_'+col)||'[]');
          cb(col === 'clientes'
            ? fb.map(d => d.logo === '__local__' ? {...d, logo: LogoStore.get(d.id)||''} : d)
            : fb
          );
        }
      };
      // Esperar a que enablePersistence complete antes de iniciar onSnapshot
      if(window._persistenceReady) {
        _startSnapshot();
      } else {
        // Servir localStorage inmediatamente mientras espera la persistencia
        const _immediate = JSON.parse(localStorage.getItem('ip_'+col)||'[]');
        cb(col === 'clientes'
          ? _immediate.map(d => d.logo === '__local__' ? {...d, logo: LogoStore.get(d.id)||''} : d)
          : _immediate
        );
        // Iniciar el snapshot cuando la persistencia esté lista
        const _waitPersistence = setInterval(()=>{
          if(window._persistenceReady) {
            clearInterval(_waitPersistence);
            _startSnapshot();
          }
        }, 100);
        // Timeout de seguridad: si después de 5s no está listo, iniciar igual
        setTimeout(()=>{ clearInterval(_waitPersistence); _startSnapshot(); }, 5000);
      }
      return () => unsub();
    }
    // Fallback: polling localStorage — pausa cuando la pestaña está oculta (FIX v12.1)
    // Reduce consumo de CPU/batería en dispositivos móviles significativamente.
    let t = null;
    const POLL_MS = 8000; // aumentado de 3s a 8s — suficiente para sincronización local
    const startPoll = () => {
      if(t) return;
      t = setInterval(()=>{
        if(!document.hidden) {
          const data = JSON.parse(localStorage.getItem('ip_'+col)||'[]');
          cb(col === 'clientes'
            ? data.map(d => d.logo === '__local__' ? {...d, logo: LogoStore.get(d.id)||''} : d)
            : data
          );
        }
      }, POLL_MS);
    };
    const stopPoll = () => { if(t){ clearInterval(t); t=null; } };
    const onVisibility = () => document.hidden ? stopPoll() : startPoll();
    document.addEventListener('visibilitychange', onVisibility);
    startPoll();
    return () => {
      stopPoll();
      document.removeEventListener('visibilitychange', onVisibility);
    };
  }
};

// ── AUTENTICACIÓN (Firebase Auth + fallback) ──────────────────
const AuthSvc = {
  login: async (email, pass) => {
    if(FIREBASE_OK) {
      try {
        const cred = await _auth.signInWithEmailAndPassword(email, pass);
        const fbUid = cred.user.uid;

        // B5 FIX: ADMIN_EMAIL leído EXCLUSIVAMENTE de la configuración del sistema.
        // Si no está configurado, el primer usuario que hace login recibe rol 'consultor'
        // y un administrador con acceso a Firestore debe elevar su rol manualmente.
        // Esto elimina el email hardcodeado y obliga a gestionar roles via Firestore.
        const ADMIN_EMAIL = (() => {
          try {
            const cfg = JSON.parse(localStorage.getItem('ip_config')||'{}');
            // Solo retornar si hay un email configurado explícitamente por el admin
            return cfg.adminEmail && cfg.adminEmail.trim() ? cfg.adminEmail.trim() : null;
          } catch(_){ return null; }
        })();

        // Perfil base — Firestore es la fuente de verdad, este perfil es solo emergencia
        let perfil = {
          id:     fbUid,
          nombre: email.split('@')[0],
          email,
          rol:    'consultor', // Rol por defecto — se sobreescribe con datos de Firestore
          activo: true,
        };

        // Intentar leer perfil de Firestore con timeout de 4s (fuente de verdad)
        try {
          const snap = await Promise.race([
            _db.collection('usuarios').doc(fbUid).get(),
            new Promise((_,r) => setTimeout(()=>r(new Error('timeout')), 4000))
          ]);
          if(snap.exists) {
            perfil = {id:fbUid, ...snap.data()};
          } else if(ADMIN_EMAIL && email === ADMIN_EMAIL) {
            // B5: Solo eleva a admin si hay email configurado explícitamente Y coincide
            // Esta es la única excepción controlada para el primer bootstrap del sistema
            perfil.rol    = 'administrador';
            perfil.nombre = 'Administrador';
          }
        } catch(e){
          // V20-FIX: Cuando Firestore falla (bloqueado por navegador, offline, sin reglas),
          // recuperar rol desde fuentes locales para no degradar a 'consultor' a usuarios que
          // ya eran admin. Orden de fallback:
          //   1. ip_usuarios local (caché del último onSnapshot exitoso)
          //   2. ip_session previo (sesión anterior del mismo email)
          //   3. ADMIN_EMAIL configurado
          //   4. perfil base con rol 'consultor'
          let recovered = null;
          try {
            const usuariosLocal = JSON.parse(localStorage.getItem('ip_usuarios')||'[]');
            recovered = usuariosLocal.find(u => u.id === fbUid || u.email === email);
          } catch(_){}
          if(!recovered) {
            try {
              const prevSession = JSON.parse(localStorage.getItem('ip_session')||'null');
              if(prevSession && prevSession.email === email) recovered = prevSession;
            } catch(_){}
          }
          if(recovered && recovered.rol) {
            perfil = {...perfil, ...recovered, id: fbUid, email};
            console.warn('Firestore inaccesible — usando perfil cacheado localmente. Rol:', perfil.rol);
          } else if(ADMIN_EMAIL && email === ADMIN_EMAIL) {
            perfil.rol    = 'administrador';
            perfil.nombre = 'Administrador';
          }
        }

        // Guardar sesión local inmediatamente
        localStorage.setItem('ip_session', JSON.stringify(perfil));

        // Sincronizar Firestore en segundo plano (crea el documento si no existe)
        _db.collection('usuarios').doc(fbUid).set(perfil, {merge:true}).catch(()=>{});

        return perfil;

      } catch(e) {
        const msgs = {
          'auth/user-not-found':        'Usuario no encontrado',
          'auth/wrong-password':        'Contraseña incorrecta',
          'auth/invalid-email':         'Correo inválido',
          'auth/user-disabled':         'Usuario desactivado',
          'auth/too-many-requests':     'Demasiados intentos. Espere unos minutos.',
          'auth/invalid-credential':    'Credenciales incorrectas',
          'auth/network-request-failed':'Sin conexión a internet',
        };
        // B3 FIX: Eliminar fallback con contraseñas en texto plano.
        // El login siempre requiere conectividad a Firebase. Si hay error de red,
        // informar al usuario en lugar de comparar contraseñas locales.
        // Razón: almacenar y comparar contraseñas en localStorage es una
        // vulnerabilidad crítica (robo por XSS, extensiones, acceso físico).
        if(e.code==='auth/network-request-failed' || e.message?.includes('fetch')) {
          throw new Error('Sin conexión a internet. El inicio de sesión requiere conexión a Firebase. Verifique su red e intente nuevamente.');
        }
        throw new Error(msgs[e.code] || e.message);
      }
    }

    // B3 FIX: Fallback offline eliminado por razones de seguridad.
    // Las contraseñas NO se almacenan localmente.
    // Si Firebase no está disponible y no hay sesión activa, el usuario
    // debe conectarse para autenticarse. Los datos offline siguen accesibles
    // para usuarios con sesión ya iniciada (localStorage + OfflineQueue).
    throw new Error('Se requiere conexión a internet para iniciar sesión. Si ya tiene sesión activa, recargue la página.');
  },

  logout: async () => {
    if(FIREBASE_OK) { try { await _auth.signOut(); } catch(e){} }
    localStorage.removeItem('ip_session');
  },

  // V20-FIX QUIRÚRGICO: normaliza el rol al leer la sesión.
  // Si el email coincide con cfg.adminEmail O el email es admin@ O el nombre es "admin"/"administrador"
  // pero el rol guardado es otro, se corrige a 'administrador' y se persiste.
  // Esto resuelve el caso donde Firestore falla o no existe el doc de usuario en BD,
  // dejando al admin real con rol 'consultor' por defecto.
  //
  // FIX INC-3: Se añade comprobación de "rol bloqueado explícitamente" (ip_rol_lock).
  // Cuando un administrador cambia el rol de un usuario desde Config > Usuarios,
  // se escribe una entrada en ip_rol_lock:{userId: nuevoRol}.
  // _shouldBeAdmin respeta este bloqueo y NO eleva el rol si existe un cambio explícito.
  _shouldBeAdmin: (sess) => {
    if(!sess) return false;
    if(sess.rol === 'administrador') return true;
    // FIX INC-3: Respetar cambio de rol explícito guardado por un administrador
    try {
      const locks = JSON.parse(localStorage.getItem('ip_rol_lock')||'{}');
      if(locks[sess.id] !== undefined) return false; // hay un cambio explícito — no elevar
    } catch(_){}
    const email = (sess.email||'').toLowerCase().trim();
    const nombre = (sess.nombre||'').trim();
    let adminEmailCfg = '';
    try {
      adminEmailCfg = (JSON.parse(localStorage.getItem('ip_config')||'{}').adminEmail||'').toLowerCase().trim();
    } catch(_){}
    if(adminEmailCfg && email === adminEmailCfg) return true;
    if(/^admin(istrador)?@/.test(email)) return true;
    if(/^admin(istrador)?$/i.test(nombre)) return true;
    return false;
  },

  session: () => {
    const sess = JSON.parse(localStorage.getItem('ip_session')||'null');
    if(!sess) return null;
    // FIX INC-3: Aplicar rol bloqueado explícitamente si existe
    try {
      const locks = JSON.parse(localStorage.getItem('ip_rol_lock')||'{}');
      if(locks[sess.id] !== undefined && sess.rol !== locks[sess.id]) {
        sess.rol = locks[sess.id];
        localStorage.setItem('ip_session', JSON.stringify(sess));
      }
    } catch(_){}
    // Auto-corrección: si debería ser admin pero el rol guardado es otro, persistir el cambio
    if(AuthSvc._shouldBeAdmin(sess) && sess.rol !== 'administrador') {
      sess.rol = 'administrador';
      // Asegurar que tenga todos los permisos en nivel administrar (3)
      sess.permisos = sess.permisos || {};
      ['dashboard','tareas','clientes','equipo','calendario','analytics',
       'alertas','chat','cobros','anticipos','whatsapp','exportar'].forEach(m => {
        sess.permisos[m] = 3;
      });
      try {
        localStorage.setItem('ip_session', JSON.stringify(sess));
        // Sincronizar caché de usuarios también
        const us = JSON.parse(localStorage.getItem('ip_usuarios')||'[]');
        const idx = us.findIndex(u => u.id === sess.id);
        if(idx>=0) us[idx] = {...us[idx], rol:'administrador', permisos:sess.permisos};
        else us.push(sess);
        localStorage.setItem('ip_usuarios', JSON.stringify(us));
        console.log('🔧 AuthSvc: rol auto-corregido a administrador para', sess.email);
      } catch(e){ console.warn('No se pudo persistir corrección:', e.message); }
    }
    return sess;
  }
};

// ── SERVICIO DE TOKENS QR ─────────────────────────────────────
// Genera un token criptográficamente seguro temporal (10 min)
// vinculado al perfil del usuario emisor. El dispositivo que escanea
// valida el token en Firestore y recibe la sesión pre-autenticada
// con el rol y permisos reales. Uso único — el token se elimina
// inmediatamente después de ser validado.
const QRTokenSvc = {
  TTL_MS: 10 * 60 * 1000, // 10 minutos

  // ── Genera token criptográficamente seguro ──────────────────
  // Usa crypto.getRandomValues (CSPRNG del navegador) en lugar de
  // Math.random() que es predecible y no apto para tokens de seguridad.
  _generarToken: () => {
    const arr = new Uint8Array(24);
    crypto.getRandomValues(arr);
    return 'qrt_' + Array.from(arr, b => b.toString(16).padStart(2,'0')).join('');
  },

  // ── Crea y persiste el token ────────────────────────────────
  create: async (perfil) => {
    const token  = QRTokenSvc._generarToken();
    const expira = Date.now() + QRTokenSvc.TTL_MS;
    const doc = {
      id:      token,
      uid:     perfil.id,
      nombre:  perfil.nombre,
      email:   perfil.email,
      rol:     perfil.rol,
      activo:  perfil.activo !== false,
      permisos:perfil.permisos || {},
      expira,
      creadoEn: new Date().toISOString(),
    };

    // Limpiar tokens expirados del localStorage antes de agregar uno nuevo
    QRTokenSvc._limpiarExpirados();

    // Guardar en Firestore si disponible — fuente primaria para validación entre dispositivos
    const isOnline = (window.IP_ONLINE !== undefined) ? window.IP_ONLINE : navigator.onLine;
    if(FIREBASE_OK && isOnline) {
      try {
        await _db.collection('qr_tokens').doc(token).set(doc);
        console.log('QR token creado en Firestore:', token.slice(0,12)+'...');
      } catch(e) {
        console.warn('QRTokenSvc: no se pudo guardar en Firestore:', e.message);
      }
    }
    // Siempre guardar en localStorage como respaldo (mismo dispositivo)
    const lista = JSON.parse(localStorage.getItem('ip_qr_tokens')||'[]');
    lista.push(doc);
    localStorage.setItem('ip_qr_tokens', JSON.stringify(lista));
    // Auto-eliminación local al expirar + margen de 5s
    setTimeout(() => QRTokenSvc._limpiarLocal(token), QRTokenSvc.TTL_MS + 5000);
    return token;
  },

  // ── Valida token y devuelve el perfil del usuario emisor ────
  validate: async (token) => {
    if(!token || !token.startsWith('qrt_') || token.length < 52) {
      throw new Error('Token QR inválido o malformado');
    }
    const ahora = Date.now();

    // ── RUTA 1: Firestore (validación entre dispositivos) ──────
    const isOnline = (window.IP_ONLINE !== undefined) ? window.IP_ONLINE : navigator.onLine;
    if(FIREBASE_OK && isOnline) {
      try {
        const snap = await _db.collection('qr_tokens').doc(token).get();

        // Token no existe o ya fue consumido (uso único)
        if(!snap.exists) {
          throw new Error('Código QR ya utilizado o no encontrado. Solicite uno nuevo.');
        }

        const doc = snap.data();

        // Verificar expiración con tolerancia de 10s para diferencias de reloj
        if(ahora > doc.expira + 10000) {
          await _db.collection('qr_tokens').doc(token).delete().catch(()=>{});
          QRTokenSvc._limpiarLocal(token);
          throw new Error('El código QR ha expirado. Solicite uno nuevo al administrador.');
        }

        if(doc.activo === false) {
          throw new Error('El usuario asociado a este QR está inactivo.');
        }

        // ── Consumir token: eliminar inmediatamente (uso único) ──
        await _db.collection('qr_tokens').doc(token).delete().catch(()=>{});
        QRTokenSvc._limpiarLocal(token);

        const perfil = {
          id:      doc.uid,
          nombre:  doc.nombre,
          email:   doc.email,
          rol:     doc.rol,
          activo:  doc.activo !== false,
          permisos:doc.permisos || {},
        };
        console.log('QR validado correctamente para:', perfil.nombre);
        return perfil;

      } catch(e) {
        // Re-lanzar errores de negocio propios sin intentar fallback
        const propios = ['expirado','utilizado','no encontrado','inactivo','inválido','malformado'];
        if(propios.some(k => e.message.toLowerCase().includes(k))) throw e;
        // Para errores de permisos de Firestore — el token es legítimo pero
        // las reglas no permiten leer sin auth. Intentar localStorage.
        const esErrorRed = e.code === 'permission-denied' ||
                           e.message.includes('permission') ||
                           e.message.includes('network') ||
                           e.message.includes('unavailable') ||
                           e.message.includes('fetch');
        if(!esErrorRed) throw e;
        console.warn('QRTokenSvc: error Firestore, intentando localStorage:', e.message);
      }
    }

    // ── RUTA 2: localStorage (mismo dispositivo o modo offline) ─
    const lista = JSON.parse(localStorage.getItem('ip_qr_tokens')||'[]');
    const doc   = lista.find(x => x.id === token);

    if(!doc) {
      throw new Error(
        isOnline
          ? 'Token no encontrado. Si está en otro dispositivo, asegúrese de tener conexión a internet y Firebase activo.'
          : 'Sin conexión a internet. El QR solo puede validarse en el mismo dispositivo donde fue generado.'
      );
    }

    if(ahora > doc.expira + 10000) {
      QRTokenSvc._limpiarLocal(token);
      throw new Error('El código QR ha expirado. Solicite uno nuevo.');
    }

    if(doc.activo === false) {
      throw new Error('El usuario asociado a este QR está inactivo.');
    }

    // Consumir token en localStorage
    QRTokenSvc._limpiarLocal(token);

    return {
      id:      doc.uid,
      nombre:  doc.nombre,
      email:   doc.email,
      rol:     doc.rol,
      activo:  doc.activo !== false,
      permisos:doc.permisos || {},
    };
  },

  // ── Elimina un token específico del localStorage ────────────
  _limpiarLocal: (token) => {
    try {
      const lista = JSON.parse(localStorage.getItem('ip_qr_tokens')||'[]');
      localStorage.setItem('ip_qr_tokens', JSON.stringify(lista.filter(x => x.id !== token)));
    } catch(_){}
  },

  // ── Elimina tokens expirados del localStorage (mantenimiento) ─
  _limpiarExpirados: () => {
    try {
      const ahora = Date.now();
      const lista = JSON.parse(localStorage.getItem('ip_qr_tokens')||'[]');
      const vigentes = lista.filter(x => x.expira && x.expira > ahora - 60000);
      if(vigentes.length !== lista.length) {
        localStorage.setItem('ip_qr_tokens', JSON.stringify(vigentes));
      }
    } catch(_){}
  },

  // ── Construye la URL que se codifica en el QR ───────────────
  buildURL: (token) => {
    const proto = window.location.protocol;
    let base;
    if(proto === 'http:' || proto === 'https:') {
      // Limpiar query string Y hash para obtener la URL base pura
      base = window.location.origin + window.location.pathname;
    } else {
      // file:// o about: — usar URL configurada en Settings o Firebase Hosting
      const cfg = JSON.parse(localStorage.getItem('ip_config')||'{}');
      base = cfg.appURL || cfg.hostingURL || '';
      if(!base) {
        try {
          const fbCfg = window._fbCfg || {};
          if(fbCfg.projectId) base = 'https://' + fbCfg.projectId + '.web.app';
        } catch(_){}
      }
      if(!base) base = window.location.origin + window.location.pathname;
    }
    // Asegurar que la base no termine en / antes de agregar query
    base = base.replace(/\/$/, '');
    return base + '?qr_token=' + encodeURIComponent(token);
  },

  // ── Lee el token de la URL actual si existe ─────────────────
  fromURL: () => {
    try {
      const p = new URLSearchParams(window.location.search);
      const t = p.get('qr_token');
      return (t && t.startsWith('qrt_')) ? t : null;
    } catch(_){ return null; }
  },

  // ── Limpia el parámetro qr_token de la URL sin recargar ─────
  clearURL: () => {
    try {
      const url = new URL(window.location.href);
      url.searchParams.delete('qr_token');
      // Preservar otros parámetros si existen; limpiar solo el token
      const cleanURL = url.pathname + (url.searchParams.toString() ? '?' + url.searchParams.toString() : '') + url.hash;
      window.history.replaceState({}, document.title, cleanURL);
    } catch(_){
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  },
};

const Toast = ({msg,type,onClose}) => {
  useEffect(()=>{const t=setTimeout(onClose,3800);return()=>clearTimeout(t)},[onClose]);
  const colors = {success:'border-green-600 bg-green-900/30 text-green-300',error:'border-red-600 bg-red-900/30 text-red-300',info:'border-blue-700 bg-blue-900/30 text-blue-300',warning:'border-yellow-600 bg-yellow-900/30 text-yellow-300'};
  return <div className={clx('fixed top-4 right-4 z-50 px-4 py-3 rounded-xl border text-sm font-medium flex items-center gap-2 fade shadow-2xl',colors[type]||colors.info)}>
    <Ico n={type==='success'?'check':type==='error'?'close':'info'} s={15}/>
    <span>{msg}</span>
    <button onClick={onClose} className="ml-2 opacity-60 hover:opacity-100"><Ico n="close" s={13}/></button>
  </div>;
};

const Modal = ({open,onClose,title,wide,children}) => {
  if(!open) return null;
  return <div className="overlay" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>

};

// ── LOGIN ─────────────────────────────────────────────────────
const Login = ({onLogin}) => {
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [qrLoading,setQrLoading]=useState(false);
  // A1: Toggle visibilidad contraseña
  const [showPass,setShowPass]=useState(false);
  // A2: "Mantener sesión iniciada" — persiste en localStorage para sobrevivir cierre del navegador
  const [keepSession,setKeepSession]=useState(()=>{ try{ return localStorage.getItem('ip_keep_session')==='1'; }catch(_){ return false; } });

  // B6 FIX: Rate limiting HÍBRIDO — sessionStorage (UX inmediata) + Firestore (cross-device)
  // El rate limit de sessionStorage da feedback inmediato sin red.
  // El rate limit de Firestore persiste entre dispositivos/tabs/modo incógnito.
  // Firebase Auth también aplica su propio throttle automático en el servidor.
  const [intentos,setIntentos]=useState(()=>{
    try {
      const rl = JSON.parse(sessionStorage.getItem('ip_rl')||'{}');
      if(rl.bloqueadoHasta && Date.now() > rl.bloqueadoHasta) {
        sessionStorage.removeItem('ip_rl'); return 0;
      }
      return rl.intentos || 0;
    } catch(_){ return 0; }
  });
  const [bloqueadoHasta,setBloqueadoHasta]=useState(()=>{
    try {
      const rl = JSON.parse(sessionStorage.getItem('ip_rl')||'{}');
      return (rl.bloqueadoHasta && Date.now() < rl.bloqueadoHasta) ? rl.bloqueadoHasta : null;
    } catch(_){ return null; }
  });
  const cfg = JSON.parse(localStorage.getItem('ip_config')||'{}');

  const segsBloqueo = bloqueadoHasta ? Math.max(0, Math.ceil((bloqueadoHasta - Date.now())/1000)) : 0;

  // Helper: hash simple del email para clave Firestore (no se almacena email en texto)
  const hashEmail = (em) => {
    let h = 0;
    for(let i=0;i<em.length;i++){ h = ((h<<5)-h)+em.charCodeAt(i); h|=0; }
    return 'rl_' + Math.abs(h).toString(36);
  };

  // B6: Verificar rate limit en Firestore antes del login (cross-device)
  const checkFirestoreRL = async (em) => {
    if(!FIREBASE_OK || !window.IP_ONLINE) return { bloqueado: false };
    try {
      const key  = hashEmail(em);
      const snap = await _db.collection('ip_rate_limits').doc(key).get();
      if(!snap.exists) return { bloqueado: false };
      const data = snap.data();
      if(data.bloqueadoHasta && data.bloqueadoHasta > Date.now()) {
        return { bloqueado: true, hasta: data.bloqueadoHasta };
      }
      return { bloqueado: false, intentos: data.intentos || 0 };
    } catch(_){ return { bloqueado: false }; }
  };

  // B6: Registrar intento en Firestore (async, no bloquea el flujo principal)
  const registrarEnFirestore = async (em, exito, intentosActuales) => {
    if(!FIREBASE_OK || !window.IP_ONLINE) return;
    try {
      const key = hashEmail(em);
      if(exito){
        // Login exitoso: limpiar contadores
        await _db.collection('ip_rate_limits').doc(key).delete().catch(()=>{});
      } else {
        const nuevoConteo = (intentosActuales || 0) + 1;
        const bloqueo     = nuevoConteo >= 5 ? Date.now() + 60000 : null;
        await _db.collection('ip_rate_limits').doc(key).set({
          email:         em,
          intentos:      nuevoConteo,
          ultimoIntento: Date.now(),
          bloqueadoHasta: bloqueo,
        });
      }
    } catch(_){ /* Fallo silencioso — no bloquear el flujo */ }
  };

  // Ticker de cuenta regresiva para el bloqueo
  useEffect(()=>{
    if(!bloqueadoHasta) return;
    const t = setInterval(()=>{
      if(Date.now() >= bloqueadoHasta){
        setBloqueadoHasta(null); setIntentos(0);
        sessionStorage.removeItem('ip_rl');
        clearInterval(t);
      }
    }, 1000);
    return ()=>clearInterval(t);
  },[bloqueadoHasta]);

  const registrarIntento = (exitoso) => {
    if(exitoso){
      sessionStorage.removeItem('ip_rl');
      setIntentos(0);
      setBloqueadoHasta(null);
      // Limpiar Firestore en background
      if(email) registrarEnFirestore(email.toLowerCase(), true, 0);
      return;
    }
    const nuevos = intentos + 1;
    setIntentos(nuevos);
    const bloqueo = nuevos >= 5 ? Date.now() + 60000 : null;
    if(bloqueo) setBloqueadoHasta(bloqueo);
    sessionStorage.setItem('ip_rl', JSON.stringify({intentos:nuevos, bloqueadoHasta:bloqueo}));
    // Registrar en Firestore en background (cross-device)
    if(email) registrarEnFirestore(email.toLowerCase(), false, intentos);
  };

  // Interceptar token QR en la URL al montar el componente Login
  useEffect(()=>{
    const token = QRTokenSvc.fromURL();
    if(!token) return;
    setQrLoading(true);
    QRTokenSvc.validate(token)
      .then(perfil => {
        localStorage.setItem('ip_session', JSON.stringify(perfil));
        QRTokenSvc.clearURL();
        window.dispatchEvent(new CustomEvent('ip-user-ready', { detail: { uid: perfil.id } }));
        onLogin(perfil);
      })
      .catch(e => {
        QRTokenSvc.clearURL();
        setQrLoading(false);
        setErr('Acceso por QR: ' + e.message);
      });
  },[]);

  const submit = async e => {
    e.preventDefault();
    // B6: Verificar bloqueo local primero (inmediato, sin red)
    if(bloqueadoHasta && Date.now() < bloqueadoHasta) {
      setErr(`Demasiados intentos fallidos. Espere ${Math.ceil((bloqueadoHasta-Date.now())/1000)}s.`);
      return;
    }
    setErr('');
    setLoading(true);

    // B6: Verificar rate limit en Firestore (cross-device) antes de intentar login
    if(email) {
      const rlCheck = await checkFirestoreRL(email.toLowerCase());
      if(rlCheck.bloqueado) {
        const segs = Math.ceil((rlCheck.hasta - Date.now()) / 1000);
        setBloqueadoHasta(rlCheck.hasta);
        setErr(`Cuenta bloqueada por múltiples intentos fallidos. Espere ${segs}s.`);
        setLoading(false);
        return;
      }
    }

    // B3: Timeout 8s — sin fallback con contraseñas locales
    const timer = setTimeout(() => {
      registrarIntento(false);
      setErr('Sin respuesta del servidor. Verifique su conexión a internet e intente nuevamente.');
      setLoading(false);
    }, 8000);

    try {
      const u = await AuthSvc.login(email, pass);
      clearTimeout(timer);
      registrarIntento(true);
      // A2: Persistir preferencia "mantener sesión"
      if(keepSession){ localStorage.setItem('ip_keep_session','1'); } else { localStorage.removeItem('ip_keep_session'); }
      onLogin(u);
    } catch(ex) {
      clearTimeout(timer);
      registrarIntento(false);
      setErr(ex.message || 'Error al iniciar sesión');
      setLoading(false);
    }
  };

  return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at 20% 50%,rgba(30,58,95,.5) 0%,#0f1923 60%),radial-gradient(ellipse at 80% 20%,rgba(201,168,76,.08) 0%,transparent 50%)'}}>
    <div className="card" style={{width:'100%',maxWidth:420,margin:'0 16px',padding:36,boxShadow:'0 32px 80px rgba(0,0,0,.6)'}}>
      {/* Logo */}
      <div style={{textAlign:'center',marginBottom:32}}>
        {cfg.logo
          ? <img src={cfg.logo} alt="Logo" style={{width:80,height:80,objectFit:'contain',margin:'0 auto 16px',display:'block',borderRadius:12,background:'rgba(255,255,255,.05)',padding:4}}/>
          : <div style={{width:72,height:72,borderRadius:16,background:'linear-gradient(135deg,#1E3A5F,#C9A84C)',margin:'0 auto 16px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span className="sy" style={{fontSize:22,fontWeight:800,color:'#fff'}}>IP</span>
            </div>
        }
        <h1 className="sy" style={{fontSize:22,fontWeight:800,color:'#fff',letterSpacing:'-0.5px',margin:0}}>
          INTPLANNER <span style={{color:'#C9A84C'}}>PRO</span>
        </h1>
        <p style={{color:'#64748b',fontSize:13,marginTop:4}}>{cfg.empresa||'Integra Consultores'}</p>
        {!FIREBASE_OK&&<div style={{marginTop:8,fontSize:11,color:'#fbbf24',background:'rgba(251,191,36,.1)',border:'1px solid rgba(251,191,36,.2)',borderRadius:6,padding:'4px 10px',display:'inline-block'}}>
          Modo Demo — Configure Firebase para producción
        </div>}
      </div>

      {/* Pantalla de validación QR */}
      {qrLoading ? (
        <div style={{textAlign:'center',padding:'24px 0'}}>
          <div style={{width:48,height:48,borderRadius:'50%',background:'linear-gradient(135deg,#1E3A5F,#C9A84C)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
            <Ico n="qr" s={24} c="#fff"/>
          </div>
          <p style={{color:'#C9A84C',fontWeight:600,fontSize:14,margin:'0 0 6px'}}>Verificando acceso por QR...</p>
          <p style={{color:'#64748b',fontSize:12}}>Validando token de sesión</p>
        </div>
      ) : (<>
      {err&&<div role="alert" aria-live="assertive" style={{background:'rgba(153,27,27,.2)',border:'1px solid rgba(248,113,113,.25)',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#fca5a5',marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
        <Ico n="info" s={14}/>{err}
      </div>}
      {/* Indicador de intentos fallidos — FIX v12.1 */}
      {intentos > 0 && intentos < 5 && !bloqueadoHasta && (
        <div style={{fontSize:11,color:'#f59e0b',textAlign:'center',marginBottom:8}}>
          {5 - intentos} intento{5-intentos!==1?'s':''} restante{5-intentos!==1?'s':''} antes del bloqueo temporal
        </div>
      )}
      <form onSubmit={submit} aria-label="Formulario de inicio de sesión">
        <div style={{marginBottom:14}}>
          <label htmlFor="ip-email" style={{display:'block',fontSize:11,fontWeight:600,color:'#64748b',marginBottom:6,textTransform:'uppercase',letterSpacing:'.4px'}}>Correo Electrónico</label>
          <input id="ip-email" className="inp" type="email" placeholder="usuario@empresa.com" value={email} onChange={e=>setEmail(e.target.value)} required autoComplete="email" aria-required="true" disabled={!!bloqueadoHasta}/>
        </div>
        <div style={{marginBottom:14}}>
          <label htmlFor="ip-pass" style={{display:'block',fontSize:11,fontWeight:600,color:'#64748b',marginBottom:6,textTransform:'uppercase',letterSpacing:'.4px'}}>Contraseña</label>
          <div style={{position:'relative'}}>
            <input id="ip-pass" className="inp" type={showPass?'text':'password'} placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} required autoComplete="current-password" aria-required="true" disabled={!!bloqueadoHasta} style={{paddingRight:40}}/>
            <button type="button" onClick={()=>setShowPass(p=>!p)} aria-label={showPass?'Ocultar contraseña':'Mostrar contraseña'} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#64748b',padding:4,display:'flex',alignItems:'center'}}>
              {showPass
                ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              }
            </button>
          </div>
        </div>
        {/* A2: Mantener sesión iniciada */}
        <div style={{marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
          <input type="checkbox" id="ip-keep-session" checked={keepSession} onChange={e=>{setKeepSession(e.target.checked);}} style={{width:15,height:15,cursor:'pointer',accentColor:'#C9A84C'}}/>
          <label htmlFor="ip-keep-session" style={{fontSize:12,color:'#94a3b8',cursor:'pointer',userSelect:'none'}}>Mantener sesión iniciada</label>
        </div>
        <button type="submit" disabled={loading||!!bloqueadoHasta} className="btn btn-p" style={{width:'100%',justifyContent:'center',padding:'11px',marginTop:4}} aria-label="Iniciar sesión">
          {bloqueadoHasta
            ? `⏱ Bloqueado — espere ${segsBloqueo}s`
            : loading
              ? 'Iniciando sesión...'
              : <><Ico n="lock" s={15}/>Iniciar Sesión</>
          }
        </button>
      </form>

      <div style={{marginTop:20,textAlign:'center'}}>
        {/* B5: Email de contacto leído exclusivamente de la configuración */}
        <button style={{fontSize:12,color:'#475569',background:'none',border:'none',cursor:'pointer'}}
          onClick={()=>{
            const contacto = cfg.adminEmail || cfg.email || null;
            if(contacto){
              window.location.href = 'mailto:' + contacto + '?subject=Recuperación de contraseña INTPLANNER';
            } else {
              alert('Para recuperar su contraseña, contacte al administrador del sistema.');
            }
          }}>
          ¿Olvidé mi contraseña? — Contactar al Administrador
        </button>
      </div>

      <div style={{marginTop:16,borderTop:'1px solid #243447',paddingTop:16,textAlign:'center'}}>
        <p style={{fontSize:11,color:'#334155',marginBottom:4}}>Para acceso inicial configure Firebase Auth</p>
      </div>
      </>)}
    </div>
  </div>;
};
