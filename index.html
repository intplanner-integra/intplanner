      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(9);
      doc.text('TOTALES:', M+4, y+8);
      doc.text('Solicitado: '+fmt.cop(totalSol)+'   Gastado: '+fmt.cop(totalGas)+'   Saldo: '+fmt.cop(Math.abs(saldoTot))+(saldoTot>=0?' a favor':' en contra'), M+36, y+8);

      footer();
      doc.save('Informe_Anticipos_'+hoy.toISOString().split('T')[0]+'.pdf');
      toast('Informe consolidado generado','success');
    } catch(e){ console.error(e); toast('Error: '+e.message,'error'); }
  };

  // ── Resumen para vista Informe en pantalla ─────────────────────
  const resumen = useMemo(()=>{
    const datos = listaFiltrada;
    const totalSol = datos.reduce((a,x)=>a+Number(x.valorSolicitado||0),0);
    const totalGas = datos.reduce((a,x)=>a+totalG(x.gastos),0);
    const bySol    = {};
    datos.forEach(a=>{
      const k=a.solicitanteId||'x';
      if(!bySol[k]) bySol[k]={nombre:equipo.find(e=>e.id===k)?.nombre||'Sin asignar',sol:0,gas:0,n:0};
      bySol[k].sol+=Number(a.valorSolicitado||0);
      bySol[k].gas+=totalG(a.gastos);
      bySol[k].n++;
    });
    return {totalSol,totalGas,saldo:totalSol-totalGas,
      nTotal:datos.length,
      nPaz:datos.filter(a=>cierre(a).label==='paz_salvo').length,
      nContra:datos.filter(a=>cierre(a).label==='en_contra').length,
      nFavor:datos.filter(a=>cierre(a).label==='a_favor').length,
      bySol:Object.values(bySol).sort((a,b)=>b.sol-a.sol),
    };
  },[listaFiltrada]);

  // ── Render ────────────────────────────────────────────────────
  return <div className="fade">

    {/* Barra de controles principal */}
    <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:14}}>
      <button className="btn btn-p btn-sm" onClick={openNew}><Ico n="plus" s={14}/>Nueva Solicitud</button>

      {/* Toggle lista / informe */}
      <div style={{display:'flex',background:'#0f1923',borderRadius:8,border:'1px solid #243447',overflow:'hidden'}}>
        {[['lista','☰ Lista'],['informe','📊 Informe']].map(([v,l])=>(
          <button key={v} onClick={()=>setVista(v)}
            style={{padding:'5px 14px',fontSize:12,fontWeight:vista===v?700:400,border:'none',cursor:'pointer',
              background:vista===v?'linear-gradient(135deg,#1E3A5F,#2a5298)':'transparent',
              color:vista===v?'#fff':'#64748b',transition:'all .15s'}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{flex:1}}/>

      {/* Botón informe PDF */}
      <button className="btn btn-g btn-sm" onClick={exportarInforme}>
        <Ico n="pdf" s={13}/>Informe PDF {hayFiltro?'(filtrado)':'completo'}
      </button>
    </div>

    {/* ── Panel de filtros ── */}
    <div className="card-p" style={{marginBottom:14,padding:'12px 14px'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr auto',gap:10,alignItems:'flex-end'}}>
        <div>
          <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:5}}>Desde</label>
          <input type="date" className="inp" style={{padding:'5px 8px',fontSize:12}} value={fIni} onChange={e=>setFIni(e.target.value)}/>
        </div>
        <div>
          <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:5}}>Hasta</label>
          <input type="date" className="inp" style={{padding:'5px 8px',fontSize:12}} value={fFin} onChange={e=>setFFin(e.target.value)}/>
        </div>
        <div>
          <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:5}}>Solicitante</label>
          <select className="inp" style={{padding:'5px 8px',fontSize:12}} value={filSol} onChange={e=>setFilSol(e.target.value)}>
            <option value="">Todos</option>
            {equipo.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:5}}>Cliente</label>
          <select className="inp" style={{padding:'5px 8px',fontSize:12}} value={filCli} onChange={e=>setFilCli(e.target.value)}>
            <option value="">Todos</option>
            {[...clientes].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:5}}>Estado</label>
          <select className="inp" style={{padding:'5px 8px',fontSize:12}} value={filEst} onChange={e=>setFilEst(e.target.value)}>
            <option value="">Todos</option>
            <option value="paz_salvo">✅ Paz y Salvo</option>
            <option value="a_favor">🟢 Saldo a favor</option>
            <option value="en_contra">🔴 Saldo en contra</option>
          </select>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>{setFIni('');setFFin('');setFilSol('');setFilCli('');setFilEst('');}}
          style={{opacity:hayFiltro?1:.3,transition:'opacity .15s'}}>✕ Limpiar</button>
      </div>
      {hayFiltro&&<p style={{fontSize:11,color:'#C9A84C',margin:'8px 0 0'}}>
        Mostrando {listaFiltrada.length} de {anticipos.length} solicitudes
      </p>}
    </div>

    {/* ── VISTA LISTA ── */}
    {vista==='lista'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
      {listaFiltrada.length===0&&<div className="card-p" style={{textAlign:'center',color:'#475569',padding:40}}>
        {hayFiltro?'Sin resultados para este filtro.':'Sin anticipos registrados. Cree la primera solicitud.'}
      </div>}
      {listaFiltrada.map(a=>{
        const c=cierre(a);
        const sol=equipo.find(e=>e.id===a.solicitanteId);
        const cli=clientes.find(x=>x.id===a.clienteId);
        return <div key={a.id} className="card-p">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <div>
              <p className="sy" style={{fontWeight:700,color:'#fff',fontSize:14,margin:0}}>
                {sol?.nombre||'—'} · {a.tipoActividad||'Sin actividad'}
              </p>
              <p style={{fontSize:11,color:'#475569',margin:'2px 0 0'}}>
                Solicitado: {fmt.date(a.fechaSolicitud)}
                {cli&&<span style={{color:'#60a5fa',marginLeft:8}}>📁 {cli.nombre}</span>}
              </p>
            </div>
            <div style={{textAlign:'right'}}>
              <p className="sy" style={{fontWeight:700,color:'#C9A84C',fontSize:18,margin:0}}>
                {fmt.cop(Number(a.valorSolicitado)||0)}
              </p>
              <p style={{fontSize:12,color:c.c,margin:'2px 0 0'}}>{c.ico} {c.txt}</p>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,fontSize:11,color:'#475569',marginBottom:10}}>
            {a.fechaActividad&&<span>Actividad: {fmt.date(a.fechaActividad)}</span>}
            {a.fechaFin&&<span>Fin: {fmt.date(a.fechaFin)}</span>}
            {a.fechaLegal&&<span>Legalización: {fmt.date(a.fechaLegal)}</span>}
            <span>Gastos: {fmt.cop(totalG(a.gastos))}</span>
          </div>
          {(a.gastos||[]).length>0&&<div style={{background:'#0f1923',borderRadius:8,padding:10,marginBottom:10,fontSize:12}}>
            {a.gastos.map(g=><div key={g.id} style={{display:'flex',justifyContent:'space-between',padding:'2px 0',borderBottom:'1px solid #162030'}}>
              <span style={{color:'#94a3b8'}}>{g.concepto}</span>
              <span style={{color:'#fff',fontWeight:600}}>{fmt.cop(Number(g.monto)||0)}</span>
            </div>)}
            <div style={{borderTop:'1px solid #243447',marginTop:4,paddingTop:4,display:'flex',justifyContent:'space-between',fontWeight:700}}>
              <span style={{color:'#94a3b8'}}>Total</span>
              <span style={{color:'#C9A84C'}}>{fmt.cop(totalG(a.gastos))}</span>
            </div>
          </div>}
          <div style={{display:'flex',gap:6}}>
            <button className="btn btn-p btn-sm" onClick={()=>openEdit(a)}><Ico n="edit" s={13}/>Editar</button>
            <button className="btn btn-g btn-sm" onClick={()=>exportarPDF(a)}><Ico n="pdf" s={13}/>PDF</button>
            <button className="btn btn-d btn-sm" onClick={()=>setDel(a.id)}><Ico n="trash" s={13}/></button>
          </div>
        </div>;
      })}
    </div>}

    {/* ── VISTA INFORME (consolidado en pantalla) ── */}
    {vista==='informe'&&<div style={{display:'flex',flexDirection:'column',gap:14}}>

      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
        {[
          {l:'Solicitudes',     v:resumen.nTotal,              c:'#1E3A5F'},
          {l:'Total Solicitado',v:fmt.cop(resumen.totalSol),   c:'#1E3A5F'},
          {l:'Total Gastado',   v:fmt.cop(resumen.totalGas),   c:'#0F766E'},
          {l:'Saldo Neto',      v:fmt.cop(Math.abs(resumen.saldo))+(resumen.saldo>=0?' ↑':' ↓'), c:resumen.saldo>=0?'#4ade80':'#f87171'},
        ].map(({l,v,c})=>(
          <div key={l} className="card-p" style={{padding:'12px 14px'}}>
            <p style={{fontSize:11,color:'#64748b',margin:'0 0 4px',textTransform:'uppercase',letterSpacing:'.4px'}}>{l}</p>
            <p className="sy" style={{fontSize:18,fontWeight:800,color:c,margin:0}}>{v}</p>
          </div>
        ))}
      </div>

      {/* Estado */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {[
          {l:'✅ Paz y Salvo',     v:resumen.nPaz,    c:'rgba(74,222,128,.1)',  b:'rgba(74,222,128,.2)'},
          {l:'🟢 Saldo a favor',   v:resumen.nFavor,  c:'rgba(15,118,110,.1)', b:'rgba(15,118,110,.2)'},
          {l:'🔴 Saldo en contra', v:resumen.nContra, c:'rgba(220,38,38,.1)',  b:'rgba(220,38,38,.2)'},
        ].map(({l,v,c,b})=>(
          <div key={l} style={{padding:'12px 14px',background:c,border:'1px solid',borderColor:b,borderRadius:10,textAlign:'center'}}>
            <p style={{fontSize:24,fontWeight:800,color:'#fff',margin:'0 0 2px'}}>{v}</p>
            <p style={{fontSize:12,color:'#94a3b8',margin:0}}>{l}</p>
          </div>
        ))}
      </div>

      {/* Tabla por solicitante */}
      <div className="card-p">
        <div className="gline"/>
        <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:12}}>Por Solicitante</h3>
        {resumen.bySol.length===0
          ? <p style={{color:'#475569',fontSize:13}}>Sin datos para el período seleccionado.</p>
          : <table className="tbl">
            <thead><tr>
              {['Solicitante','Solicitudes','Total Solicitado','Total Gastado','Saldo','Estado'].map(h=><th key={h}>{h}</th>)}
            </tr></thead>
            <tbody>
              {resumen.bySol.map((s,i)=>{
                const sld=s.sol-s.gas;
                const ico=sld===0?'✅':sld>0?'🟢':'🔴';
                return <tr key={i}>
                  <td style={{fontWeight:600,color:'#fff'}}>{s.nombre}</td>
                  <td style={{color:'#94a3b8',textAlign:'center'}}>{s.n}</td>
                  <td style={{color:'#C9A84C',fontWeight:600}}>{fmt.cop(s.sol)}</td>
                  <td style={{color:'#94a3b8'}}>{fmt.cop(s.gas)}</td>
                  <td style={{fontWeight:700,color:sld>=0?'#4ade80':'#f87171'}}>{fmt.cop(Math.abs(sld))}</td>
                  <td>{ico}</td>
                </tr>;
              })}
            </tbody>
          </table>
        }
      </div>

      <button className="btn btn-g btn-sm" style={{alignSelf:'flex-start'}} onClick={exportarInforme}>
        <Ico n="pdf" s={14}/>Descargar Informe PDF
      </button>
    </div>}

    {/* Modal Nueva/Editar (sin cambios) */}
    <Modal open={open} onClose={()=>setOpen(false)} title={form.id?'Editar Anticipo':'Nueva Solicitud de Anticipo'} wide>
      <div className="grid-2">
        <F label="Solicitante *"><select className="inp" value={form.solicitanteId||''} onChange={upd('solicitanteId')}>
          <option value="">Seleccionar...</option>{equipo.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
        </select></F>
        <F label="Valor Solicitado"><input type="number" className="inp" value={form.valorSolicitado||''} onChange={upd('valorSolicitado')}/></F>
        <div style={{display:'flex',alignItems:'center',gap:8,paddingTop:18}}>
          <input type="checkbox" id="cliChk" checked={!!form.cargaCliente} onChange={e=>setForm(p=>({...p,cargaCliente:e.target.checked}))} style={{accentColor:'#C9A84C'}}/>
          <label htmlFor="cliChk" style={{fontSize:13,color:'#cbd5e1'}}>¿Se carga al cliente?</label>
        </div>
        {form.cargaCliente&&<F label="Cliente"><select className="inp" value={form.clienteId||''} onChange={upd('clienteId')}>
          <option value="">Seleccionar...</option>{[...clientes].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
        </select></F>}
        <F label="Tipo de Actividad"><input className="inp" value={form.tipoActividad||''} onChange={upd('tipoActividad')}/></F>
        <F label="Fecha Solicitud"><input type="date" className="inp" value={form.fechaSolicitud||''} onChange={upd('fechaSolicitud')}/></F>
        <F label="Fecha Actividad"><input type="date" className="inp" value={form.fechaActividad||''} onChange={upd('fechaActividad')}/></F>
        <F label="Fecha Finalización"><input type="date" className="inp" value={form.fechaFin||''} onChange={upd('fechaFin')}/></F>
        <F label="Fecha Legalización"><input type="date" className="inp" value={form.fechaLegal||''} onChange={upd('fechaLegal')}/></F>
        <div style={{gridColumn:'1/-1'}}>
          <label style={{fontSize:11,fontWeight:600,color:'#64748b',marginBottom:6,display:'block',textTransform:'uppercase',letterSpacing:'.4px'}}>Soporte (imagen/PDF)</label>
          <label className="btn btn-ghost btn-sm" style={{cursor:'pointer'}}><Ico n="up" s={13}/>Cargar
            <input type="file" accept="image/*,.pdf" style={{display:'none'}} onChange={loadSoporte}/>
          </label>
          {form.soporteNombre&&<span style={{fontSize:11,color:'#4ade80',marginLeft:10}}>{form.soporteNombre}</span>}
        </div>
        <div style={{gridColumn:'1/-1'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <label style={{fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px'}}>Detalle de Gastos</label>
            <button className="btn btn-ghost btn-sm" onClick={addGasto}><Ico n="plus" s={12}/>Agregar</button>
          </div>
          {(form.gastos||[]).map(g=><div key={g.id} style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
            <input className="inp" style={{flex:1}} placeholder="Concepto" value={g.concepto} onChange={e=>updG(g.id,'concepto',e.target.value)}/>
            <input type="number" className="inp" style={{width:130}} placeholder="Monto" value={g.monto} onChange={e=>updG(g.id,'monto',e.target.value)}/>
            <button onClick={()=>delG(g.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:16}}>✕</button>
          </div>)}
          {(form.gastos||[]).length>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:700,padding:'6px 4px',borderTop:'1px solid #243447'}}>
            <span style={{color:'#94a3b8'}}>Total Gastos</span>
            <span style={{color:'#C9A84C'}}>{fmt.cop(totalG(form.gastos))}</span>
          </div>}
          {form.valorSolicitado&&(form.gastos||[]).length>0&&(()=>{const c=cierre(form);return<div style={{marginTop:6,padding:'6px 10px',background:c.c+'18',border:'1px solid '+c.c+'44',borderRadius:6,fontSize:12,color:c.c,fontWeight:600}}>{c.ico} {c.txt}</div>;})()}
        </div>
      </div>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setOpen(false)}>Cancelar</button>
        <button className="btn btn-g btn-sm" onClick={save}><Ico n="check" s={14}/>Guardar</button>
      </div>
    </Modal>
    {del&&<Confirm msg="¿Eliminar este anticipo?" onOk={()=>remove(del)} onCancel={()=>setDel(null)}/>}
  </div>;
};


// ── WHATSAPP CENTER ──────────────────────────────────────────
const WhatsApp = () => {
  const {clientes,equipo} = useApp();
  const [dest,setDest]=useState('clientes');
  const [selId,setSelId]=useState('');
  const [plantId,setPlantId]=useState('');
  const [obs,setObs]=useState('');
  const [custPlant,setCustPlant]=useState(()=>JSON.parse(localStorage.getItem('ip_waplant')||'[]'));
  const [showNewPlant,setShowNewPlant]=useState(false);
  const [np,setNp]=useState({label:'',txt:''});
  // v2-FIX: Estado de plantilla de Alertas al nivel del componente (cumple Reglas de Hooks)
  const [alertPlantTxt,setAlertPlantTxt]=useState(()=>{
    const saved = JSON.parse(localStorage.getItem('ip_waplant')||'[]').find(p=>p.id==='alerta_default');
    return saved?.txt || '';
  });
  const cfg=JSON.parse(localStorage.getItem('ip_config')||'{}');

  const PLANTS=[
    {id:'venc',label:'Vencimiento',txt:'Estimado(a) {nombre}, le informamos que su factura está próxima a vencer. Le solicitamos gestionar el pago. Gracias — Integra Consultores.'},
    {id:'seg',label:'Seguimiento',txt:'Hola {nombre}, queremos hacer seguimiento a los temas pendientes. ¿Cuándo podríamos coordinar? Quedamos atentos.'},
    {id:'reu',label:'Reunión',txt:'Hola {nombre}, le recordamos nuestra reunión programada. Por favor confirmar asistencia. Gracias.'},
    {id:'cob',label:'Cobro',txt:'Estimado(a) {nombre}, adjunto nuestra cuenta de cobro. Agradecemos su pronta gestión. Cualquier duda estamos disponibles.'},
    {id:'ent',label:'Entrega',txt:'Hola {nombre}, hemos completado la entrega del proyecto/informe solicitado. Quedamos disponibles para sus comentarios.'},
  ];
  const allPlants=[...PLANTS,...custPlant];
  const lista=dest==='clientes'?clientes:equipo;
  const sel=lista.find(x=>x.id===selId);
  const plantTxt=allPlants.find(p=>p.id===plantId)?.txt.replace('{nombre}',sel?.nombre||'Cliente')||'';
  const msgFinal=[plantTxt,obs].filter(Boolean).join('\n\n');

  const openWA=()=>{
    const num=(sel?.telefono||cfg.whatsappAdmin||'').replace(/\D/g,'');
    if(!num) return alert('Sin número de teléfono disponible. Configure el número en Configuración.');
    window.open('https://wa.me/'+num+'?text='+encodeURIComponent(msgFinal),'_blank');
  };

  const addPlant=()=>{
    if(!np.label||!np.txt) return;
    const list=[...custPlant,{id:uid(),...np}];
    setCustPlant(list); localStorage.setItem('ip_waplant',JSON.stringify(list)); setNp({label:'',txt:''}); setShowNewPlant(false);
  };
  const delPlant=id=>{const l=custPlant.filter(x=>x.id!==id);setCustPlant(l);localStorage.setItem('ip_waplant',JSON.stringify(l));};

  return <div className="fade" style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:14}}>
    <div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:14}}>Configuración</h3>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.4px'}}>WhatsApp Admin</label>
        <input className="inp" placeholder="+57 300 000 0000" defaultValue={cfg.whatsappAdmin||''} onBlur={e=>{const c=JSON.parse(localStorage.getItem('ip_config')||'{}');c.whatsappAdmin=e.target.value;localStorage.setItem('ip_config',JSON.stringify(c));}}/>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.4px'}}>Destinatario</label>
        <div style={{display:'flex',gap:6}}>
          {['clientes','equipo'].map(d=><button key={d} onClick={()=>{setDest(d);setSelId('');}} className={clx('btn btn-sm',dest===d?'btn-g':'btn-ghost')} style={{flex:1,justifyContent:'center',textTransform:'capitalize'}}>{d}</button>)}
        </div>
      </div>
      <div>
        <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.4px'}}>Seleccionar {dest==='clientes'?'Cliente':'Miembro'}</label>
        <select className="inp" value={selId} onChange={e=>setSelId(e.target.value)}>
          <option value="">Seleccionar...</option>{lista.map(x=><option key={x.id} value={x.id}>{x.nombre}</option>)}
        </select>
        {sel?.telefono&&<p style={{fontSize:11,color:'#4ade80',marginTop:6,display:'flex',alignItems:'center',gap:4}}><Ico n="check" s={12}/>Tel: {sel.telefono}</p>}
      </div>
    </div>

    <div className="card-p">
      <div className="gline"/>
      <h3 className="sy" style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
        <Ico n="wa" s={16} c="#25D366"/>Composición del Mensaje
      </h3>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.4px'}}>Plantilla</label>
        <select className="inp" value={plantId} onChange={e=>setPlantId(e.target.value)}>
          <option value="">Sin plantilla — mensaje libre</option>
          {PLANTS.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
          {custPlant.map(p=><option key={p.id} value={p.id}>{p.label} ★</option>)}
        </select>
      </div>
      {plantTxt&&<div style={{background:'#0f1923',border:'1px solid #243447',borderRadius:8,padding:12,fontSize:13,color:'#94a3b8',marginBottom:12,lineHeight:1.6}}>{plantTxt}</div>}
      <div style={{marginBottom:12}}>
        <label style={{fontSize:11,color:'#64748b',fontWeight:600,display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.4px'}}>Observación Adicional</label>
        <textarea className="inp" value={obs} onChange={e=>setObs(e.target.value)} placeholder="Escriba su mensaje o detalle adicional..." style={{minHeight:100}}/>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button onClick={openWA} disabled={!selId||!msgFinal} className="btn btn-sm" style={{background:'#25D366',color:'#000',fontWeight:700,flex:1,justifyContent:'center'}}><Ico n="wa" s={15}/>Abrir WhatsApp</button>
        <button onClick={()=>setShowNewPlant(!showNewPlant)} className="btn btn-ghost btn-sm"><Ico n="cog" s={13}/>Plantillas</button>
      </div>
      {showNewPlant&&<div style={{marginTop:14,background:'#0f1923',borderRadius:10,border:'1px solid #243447',padding:14}}>
        <p style={{fontSize:12,fontWeight:600,color:'#fff',marginBottom:10}}>Agregar Plantilla Personalizada</p>
        <input className="inp" style={{marginBottom:8}} placeholder="Nombre de la plantilla" value={np.label} onChange={e=>setNp(p=>({...p,label:e.target.value}))}/>
        <textarea className="inp" style={{marginBottom:8,minHeight:60}} placeholder="Texto del mensaje. Use {nombre} para el destinatario." value={np.txt} onChange={e=>setNp(p=>({...p,txt:e.target.value}))}/>
        <button className="btn btn-g btn-sm" onClick={addPlant}><Ico n="check" s={13}/>Guardar Plantilla</button>
        {/* v2: Plantilla especial para el módulo Alertas */}
        <div style={{marginTop:14,padding:12,background:'rgba(37,211,102,.05)',border:'1px solid rgba(37,211,102,.2)',borderRadius:8}}>
          <p style={{fontSize:11,fontWeight:700,color:'#25D366',margin:'0 0 6px'}}>🔔 Plantilla para Módulo Alertas</p>
          <p style={{fontSize:10,color:'#64748b',margin:'0 0 8px',lineHeight:1.5}}>
            Configure la plantilla usada al enviar alertas por WhatsApp.<br/>
            Variables: <code style={{color:'#C9A84C'}}>{'{nombre}'}</code> <code style={{color:'#C9A84C'}}>{'{tarea}'}</code> <code style={{color:'#C9A84C'}}>{'{fecha}'}</code> <code style={{color:'#C9A84C'}}>{'{empresa}'}</code>
          </p>
          <textarea className="inp" style={{minHeight:80,marginBottom:8,fontSize:12}}
            value={alertPlantTxt}
            onChange={e=>setAlertPlantTxt(e.target.value)}
            placeholder={'🔔 *Alerta — {empresa}*\n\nEstimado/a {nombre},\n\nLe notificamos: *{tarea}*\n📅 Vencimiento: {fecha}\n\nPor favor tome las acciones necesarias.'}/>
          <button className="btn btn-sm" style={{background:'rgba(37,211,102,.15)',color:'#25D366',border:'1px solid rgba(37,211,102,.3)'}}
            onClick={()=>{
              if(!alertPlantTxt.trim()) return;
              const sinAlerta = custPlant.filter(p=>p.id!=='alerta_default');
              const nueva = {id:'alerta_default',label:'Alerta (módulo Alertas)',txt:alertPlantTxt.trim()};
              const list=[...sinAlerta,nueva];
              setCustPlant(list); localStorage.setItem('ip_waplant',JSON.stringify(list));
            }}>
            <Ico n="check" s={12}/>Guardar plantilla Alertas
          </button>
          {custPlant.find(p=>p.id==='alerta_default') && <p style={{fontSize:10,color:'#4ade80',marginTop:6}}>✓ Plantilla activa guardada</p>}
        </div>
        {custPlant.length>0&&<div style={{marginTop:12}}>
          {custPlant.map(p=><div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid #243447',fontSize:12}}>
            <span style={{color:'#cbd5e1'}}>{p.label}{p.id==='alerta_default'?' 🔔':''}</span>
            <button onClick={()=>delPlant(p.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',padding:2}}><Ico n="close" s={13}/></button>
          </div>)}
        </div>}
      </div>}
    </div>
  </div>;
};

// ── EXPORTAR ─────────────────────────────────────────────────
const Exportar = () => {
  const {tareas,clientes,equipo,proyectos,facturas,toast} = useApp();
  const [filCli,setFilCli]       = useState('');
  // EQ-1 FIX: Nuevo estado para filtro de integrante de equipo
  const [filEquipo,setFilEquipo] = useState('');
  // FIX EXP-6: Estado de fechas separado para Excel y PDF.
  const [xlsFIni,setXlsFIni] = useState('');
  const [xlsFFin,setXlsFFin] = useState('');
  const [pdfFIni,setPdfFIni] = useState('');
  const [pdfFFin,setPdfFFin] = useState('');
  const [mod,setMod]       = useState('Resumen');
  // EQ-3 FIX: Añadido tipo 'integrante' al enum
  const [tipo,setTipo]     = useState('ejecutivo'); // ejecutivo | operativo | cliente | integrante
  const [preview,setPreview] = useState(null);

  const filtDate = (arr,k) => arr.filter(x=>(!pdfFIni||x[k]>=pdfFIni)&&(!pdfFFin||x[k]<=pdfFFin));
  const fIni = pdfFIni;
  const fFin = pdfFFin;

  // ── Acceso datos ─────────────────────────────────────────────
  const getAnticipo = () => JSON.parse(localStorage.getItem('ip_anticipos')||'[]');
  const getCfg      = () => JSON.parse(localStorage.getItem('ip_config')||'{}');
  const getPdfPersonalizar = () => {
    // SST: única fuente de verdad para configuración de PDFs
    // Merge con defaults para garantizar compatibilidad con configuraciones antiguas
    const DEFAULTS = {
      mostrarLogo:true, mostrarNIT:true, mostrarTelefono:true, mostrarDireccion:true,
      mostrarEmail:true, mostrarIntroduccion:true, mostrarKPIs:true,
      mostrarSeccionTareas:true, mostrarSeccionCompromisos:true, mostrarSeccionFacturas:true,
      mostrarSeccionEquipo:true, mostrarSeccionAnticipo:true, mostrarResponsablesInforme:true,
      mostrarJustificaciones:true, tamanoFuente:'normal', familiaFuente:'helvetica',
      margen:'normal', espaciadoSecciones:'normal', alineacionTexto:'left',
      colorEncabezado:'navy', colorPersonalizadoHex:'#1E3A5F', colorAcentoHex:'#C9A84C',
      logoAlineacion:'izquierda', tituloDocumento:'INFORME DE GESTION',
      subtituloDocumento:'', piePersonalizado:'', notasAdicionales:'',
      mostrarNumeroPagina:true, mostrarFechaGeneracion:true, mostrarFirmas:false,
      textosSeccion:{ introduccion:'', conclusion:'', observaciones:'' },
      secciones:[
        {id:'kpis',         titulo:'RESUMEN EJECUTIVO',              visible:true,  orden:1},
        {id:'tareas',       titulo:'ACTIVIDADES Y TAREAS',           visible:true,  orden:2},
        {id:'compromisos',  titulo:'COMPROMISOS REGISTRADOS',        visible:true,  orden:3},
        {id:'facturas',     titulo:'FACTURACION Y COBROS',           visible:true,  orden:4},
        {id:'anticipos',    titulo:'ANTICIPOS Y GASTOS',             visible:true,  orden:5},
        {id:'equipo',       titulo:'EQUIPO DE TRABAJO',              visible:true,  orden:6},
        {id:'justificaciones',titulo:'JUSTIFICACIONES',              visible:true,  orden:7},
        {id:'responsables', titulo:'RESPONSABLES DEL INFORME',       visible:true,  orden:8},
      ],
      responsablesPDF:[
        {nombre:'Sara Valencia Hincapie',         cargo:'Especialista SST',       area:'Seguridad y Salud en el Trabajo'},
        {nombre:'Adolfo de Jesus Ibanez Berrio',  cargo:'Consultor de Personal',  area:'Administracion de Personal'},
        {nombre:'Yair Alonso Cardona Lopez',      cargo:'Consultor Juridico',     area:'Consultoria Juridica'},
      ],
    };
    try {
      const stored = JSON.parse(localStorage.getItem('ip_pdf_personalizar')||'null');
      if(!stored) return DEFAULTS;
      return {
        ...DEFAULTS,
        ...stored,
        textosSeccion: { ...DEFAULTS.textosSeccion, ...(stored.textosSeccion||{}) },
        secciones: (stored.secciones && stored.secciones.length) ? stored.secciones : DEFAULTS.secciones,
        responsablesPDF: (stored.responsablesPDF && stored.responsablesPDF.length) ? stored.responsablesPDF : DEFAULTS.responsablesPDF,
      };
    } catch(_) { return DEFAULTS; }
  };

  // ── Excel (sin cambios) ──────────────────────────────────────
  const exportXLSX = () => {
    try {
      const wb = XLSX.utils.book_new();
      const add = (name,data) => XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),name);
      // FIX EXP-6: Excel usa sus propias fechas (xlsFIni/xlsFFin), no las del PDF
      const xlsFiltDate = (arr,k) => arr.filter(x=>(!xlsFIni||x[k]>=xlsFIni)&&(!xlsFFin||x[k]<=xlsFFin));
      if(['Resumen','Tareas'].includes(mod)){
        const tareasData = xlsFiltDate(tareas,'fechaVen').map(t=>{
          // Resolver responsables (multi)
          const rIds = Array.isArray(t.responsablesIds)&&t.responsablesIds.length ? t.responsablesIds : (t.responsableId?[t.responsableId]:[]);
          const responsables = rIds.map(id=>equipo.find(e=>e.id===id)?.nombre).filter(Boolean).join(', ')||'—';
          // Compromisos
          const comps = Array.isArray(t.compromisos) ? t.compromisos : [];
          const compIntegra = comps.filter(c=>c.responsabilidad==='integra').map(c=>`[Integra${c.empleadoId?'/'+equipo.find(e=>e.id===c.empleadoId)?.nombre:''}] ${c.descripcion||''} ${c.fechaCompromiso?'('+c.fechaCompromiso+')':''}`).join(' | ');
          const compCliente = comps.filter(c=>c.responsabilidad==='cliente').map(c=>`[Cliente] ${c.descripcion||''} ${c.fechaCompromiso?'('+c.fechaCompromiso+')':''}`).join(' | ');
          return {
            'Tarea':             t.titulo||'—',
            'Estado':            t.estado||'—',
            'Prioridad':         t.prioridad||'—',
            'F. Asignación':     t.fechaAsignada||'—',
            'F. Vencimiento':    t.fechaVen||'—',
            'Responsable(s)':    responsables,
            'Equipo Integra':    t.equipoIntegra ? 'Sí' : 'No',
            'Cliente':           clientes.find(c=>c.id===t.clienteId)?.nombre||'—',
            'Proyecto':          proyectos.find(p=>p.id===t.proyectoId)?.nombre||'—',
            'Descripción':       t.desc||'—',
            'Actividades':       t.actividadesRealizadas||'—',
            'Compromisos Integra': compIntegra||'—',
            'Compromisos Cliente': compCliente||'—',
            'Soporte Cierre':    Array.isArray(t.soporteCierre)&&t.soporteCierre.length ? `${t.soporteCierre.length} archivo(s)` : 'No',
          };
        });
        add('Tareas', tareasData);
      }
      if(['Resumen','Clientes'].includes(mod))    add('Clientes',clientes.map(c=>({'Nombre':c.nombre,'NIT':c.nit,'Contacto':c.contacto||'—','Email':c.email,'Teléfono':c.telefono||'—','Estado':c.estado||'—','Contrato':c.tipoContrato||'—','Valor Servicio General':Number(c.valorContrato)||0,'Servicios':Array.isArray(c.servicios)?c.servicios.length:0,'Dirección':c.direccion||'—'})));
      // EQ-5 FIX: Excel de equipo ahora incluye actividad real por integrante,
      // no solo directorio. Cada fila = un integrante con métricas de productividad.
      if(['Resumen','Equipo'].includes(mod)){
        const hoyXls = new Date().toISOString().split('T')[0];
        const equipoData = equipo.map(e=>{
          // Incluir tareas donde el integrante es responsableId O está en responsablesIds
          const xlsTareas = xlsFiltDate(tareas.filter(t=>{
            if(t.esAlerta) return false;
            const rIds = Array.isArray(t.responsablesIds)&&t.responsablesIds.length ? t.responsablesIds : (t.responsableId?[t.responsableId]:[]);
            return rIds.includes(e.id);
          }),'fechaVen');
          const totalT    = xlsTareas.length;
          const compT     = xlsTareas.filter(t=>t.estado==='completada').length;
          const cursoT    = xlsTareas.filter(t=>t.estado==='en_curso').length;
          const vencT     = xlsTareas.filter(t=>t.fechaVen&&t.fechaVen<hoyXls&&t.estado!=='completada').length;
          const pct       = totalT>0?Math.round(compT/totalT*100):0;
          const ant       = JSON.parse(localStorage.getItem('ip_anticipos')||'[]')
                              .filter(a=>a.solicitanteId===e.id);
          const totalAnt  = ant.reduce((s,a)=>(a.gastos||[]).reduce((ss,g)=>ss+Number(g.monto||0),0)+s,0);
          // Compromisos asignados a este empleado
          const compAsignados = tareas.flatMap(t=>(Array.isArray(t.compromisos)?t.compromisos:[]).filter(c=>c.empleadoId===e.id)).length;
          return {
            'Nombre':              e.nombre||'—',
            'Cédula':              e.cedula||'—',
            'Cargo':               e.cargo||'—',
            'Email':               e.email||'—',
            'Teléfono':            e.telefono||e.tel||'—',
            'Total Tareas':        totalT,
            'Completadas':         compT,
            'En Curso':            cursoT,
            'Vencidas':            vencT,
            'Cumplimiento %':      pct,
            'Compromisos Asignados': compAsignados,
            'Total Anticipos':     totalAnt,
            'Estado':              e.activo===false?'Inactivo':'Activo',
          };
        });
        add('Equipo', equipoData);
        // Hoja extra: detalle de tareas por integrante (solo cuando mod='Equipo')
        if(mod==='Equipo'){
          const tareasEquipo = equipo.flatMap(e=>{
            const tsFiltradas = xlsFiltDate(tareas.filter(t=>{
              if(t.esAlerta) return false;
              const rIds = Array.isArray(t.responsablesIds)&&t.responsablesIds.length ? t.responsablesIds : (t.responsableId?[t.responsableId]:[]);
              return rIds.includes(e.id);
            }),'fechaVen');
            return tsFiltradas.map(t=>({
              'Integrante':   e.nombre||'—',
              'Cargo':        e.cargo||'—',
              'Tarea':        t.titulo||'—',
              'Cliente':      clientes.find(c=>c.id===t.clienteId)?.nombre||'—',
              'Estado':       t.estado||'—',
              'Prioridad':    t.prioridad||'—',
              'F. Asignación':t.fechaAsignada||'—',
              'F. Vencimiento':t.fechaVen||'—',
              'Descripción':  t.desc||'—',
              'Actividades':  t.actividadesRealizadas||'—',
              'Equipo Integra':t.equipoIntegra?'Sí':'No',
            }));
          });
          if(tareasEquipo.length>0) add('Actividades por Integrante', tareasEquipo);

          // Hoja extra: Compromisos por integrante
          const compData = equipo.flatMap(e=>{
            return tareas.flatMap(t=>
              (Array.isArray(t.compromisos)?t.compromisos:[])
                .filter(c=>c.responsabilidad==='integra'&&c.empleadoId===e.id)
                .map(c=>({
                  'Integrante':   e.nombre||'—',
                  'Cargo':        e.cargo||'—',
                  'Tarea':        t.titulo||'—',
                  'Cliente':      clientes.find(cl=>cl.id===t.clienteId)?.nombre||'—',
                  'Compromiso':   c.descripcion||'—',
                  'Fecha':        c.fechaCompromiso||'—',
                  'Estado Tarea': t.estado||'—',
                }))
            );
          });
          if(compData.length>0) add('Compromisos por Integrante', compData);

          // Hoja extra: Compromisos del Cliente
          const compCli = tareas.flatMap(t=>
            (Array.isArray(t.compromisos)?t.compromisos:[])
              .filter(c=>c.responsabilidad==='cliente')
              .map(c=>({
                'Cliente':      clientes.find(cl=>cl.id===t.clienteId)?.nombre||'—',
                'Tarea':        t.titulo||'—',
                'Compromiso':   c.descripcion||'—',
                'Fecha':        c.fechaCompromiso||'—',
                'Estado Tarea': t.estado||'—',
              }))
          );
          if(compCli.length>0) add('Compromisos del Cliente', compCli);
        }
      }
      if(['Resumen',''].includes(mod))   add('Proyectos',proyectos.map(p=>({'Proyecto':p.nombre,'Estado':p.estado,'Cliente':clientes.find(c=>c.id===p.clienteId)?.nombre||'—','Inicio':p.inicio,'Fin':p.fin,'Avance':(p.avance||0)+'%'})));
      if(['Resumen','Facturación'].includes(mod)) add('Facturación',xlsFiltDate(facturas,'fechaEmision').map(f=>({'#':f.numero,'Cliente':clientes.find(c=>c.id===f.clienteId)?.nombre||'—','Valor':Number(f.valor),'IVA':f.iva?'Sí':'No','Total':Number(f.valor||0)*(f.iva?1.19:1),'Estado':f.estado,'Emisión':f.fechaEmision,'Vencimiento':f.fechaVen})));
      XLSX.writeFile(wb,'INTPLANNER_'+mod+'_'+new Date().toISOString().split('T')[0]+'.xlsx');
      toast('Excel generado','success');
    } catch(e){toast('Error generando Excel: '+e.message,'error');}
  };

  // setQ separado por contexto: 'xls' para Excel, 'pdf' para PDF (FIX EXP-6)
  const setQ = (q,y,ctx='pdf') => {
    const n={'Q1':1,'Q2':2,'Q3':3,'Q4':4}[q];
    const ini = y+'-'+String((n-1)*3+1).padStart(2,'0')+'-01';
    const fin = y+'-'+String(n*3).padStart(2,'0')+'-'+(n===1?'31':n===2?'30':n===3?'30':'31');
    if(ctx==='xls'){ setXlsFIni(ini); setXlsFFin(fin); }
    else           { setPdfFIni(ini); setPdfFFin(fin);  }
  };

  // ── Helpers PDF ──────────────────────────────────────────────
  const C = {
    navy:'#1E3A5F', gold:'#C9A84C', white:'#FFFFFF',
    bg:'#F8FAFC',   line:'#E2E8F0', text:'#1E293B',
    muted:'#64748B',green:'#16A34A',red:'#DC2626',blue:'#2563EB',
    amber:'#D97706', teal:'#0F766E',
    // RGB para jsPDF
    navyR:[30,58,95], goldR:[201,168,76], bgR:[248,250,252],
    lineR:[226,232,240], textR:[30,41,59], mutedR:[100,116,139],
    greenR:[22,163,74], redR:[220,38,38], blueR:[37,99,235],
    amberR:[217,119,6], tealR:[15,118,110], whiteR:[255,255,255],
  };
  // Aplicar color de encabezado personalizado desde la sección Personalizar
  (() => {
    const pc = (() => { try{ return JSON.parse(localStorage.getItem('ip_pdf_personalizar')||'null') || {}; }catch(_){ return {}; } })();
    if(pc.colorEncabezado === 'dark') {
      C.navyR = [17,24,39];
    } else if(pc.colorEncabezado === 'custom' && pc.colorPersonalizadoHex) {
      const hex = pc.colorPersonalizadoHex.replace('#','');
      if(hex.length === 6) C.navyR = [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
    }
  })();

  // C-item13: Numeración consecutiva de Informes de Gestión
  const getNextInformeNum = () => {
    try {
      const n = parseInt(localStorage.getItem('ip_informe_num')||'0') + 1;
      localStorage.setItem('ip_informe_num', String(n));
      return String(n).padStart(5,'0');
    } catch(_){ return '00001'; }
  };

  // C-item12: Introducción personalizable para Informes de Gestión
  const [introInforme, setIntroInforme] = useState(()=>{
    try { return localStorage.getItem('ip_intro_informe')||''; } catch(_){ return ''; }
  });
  const [editingIntro, setEditingIntro] = useState(false);

  // EQ-2 FIX: buildPDF ahora acepta dos parámetros:
  // - clienteId: filtra por cliente (comportamiento original preservado)
  // - responsableId: filtra por integrante del equipo (nuevo)
  // Ambos pueden combinarse o usarse de forma independiente.
  const buildPDF = (clienteId, responsableId=null) => {
    if(!window.jspdf?.jsPDF) { toast('Librería PDF no disponible aún. Intente en 2 segundos.','warning'); return; }

    // Validaciones de datos
    if(clienteId && !clientes.find(c=>c.id===clienteId)){
      toast('El cliente seleccionado no existe. Seleccione otro e intente nuevamente.','error');
      return;
    }
    // EQ-2: Validar que el responsableId corresponde a un miembro real
    if(responsableId && !equipo.find(e=>e.id===responsableId)){
      toast('El integrante seleccionado no existe. Seleccione otro e intente nuevamente.','error');
      return;
    }
    const tieneData = tareas.length>0 || facturas.length>0 || clientes.length>0 || equipo.length>0;
    if(!tieneData){
      toast('No hay datos registrados para exportar. Agregue integrantes, tareas o clientes primero.','warning');
      return;
    }

    try {
      const {jsPDF} = window.jspdf;
      const doc     = new jsPDF({unit:'mm',format:'a4'});
      const cfg     = getCfg();
      const pCfg    = getPdfPersonalizar(); // configuración de personalización
      const ant     = getAnticipo();
      // ── Derivar constantes de diseño desde pCfg (SST) ──────────
      const M_BASE  = pCfg.margen==='estrecho'?10:pCfg.margen==='amplio'?20:14;
      // Escala tipográfica según tamanoFuente
      const FS_SCALE = pCfg.tamanoFuente==='compacto' ? 0.88 : pCfg.tamanoFuente==='grande' ? 1.12 : 1.0;
      const FS = (base) => Math.round(base * FS_SCALE * 10) / 10;
      // Familia tipográfica
      const FF = pCfg.familiaFuente || 'helvetica';
      // Espaciado entre secciones
      const SEC_GAP = pCfg.espaciadoSecciones==='compacto' ? 4 : pCfg.espaciadoSecciones==='amplio' ? 14 : 8;
      // Helper de visibilidad de sección por ID
      const secVisible = (id) => {
        const sec = (pCfg.secciones||[]).find(s=>s.id===id);
        return sec ? sec.visible !== false : true;
      };
      // Helper de título de sección personalizado
      const secTitulo = (id, defaultTitulo) => {
        const sec = (pCfg.secciones||[]).find(s=>s.id===id);
        return (sec && sec.titulo && sec.titulo.trim()) ? sec.titulo.trim() : defaultTitulo;
      };
      // Color de acento personalizado (RGB)
      const _acentoHex = pCfg.colorAcentoHex || '#C9A84C';
      const _aR = parseInt(_acentoHex.slice(1,3),16);
      const _aG = parseInt(_acentoHex.slice(3,5),16);
      const _aB = parseInt(_acentoHex.slice(5,7),16);
      const ACENTO_R = [_aR, _aG, _aB];
      const PW      = 210; const PH = 297; const M = M_BASE;
      const IW      = PW - M*2;
      const cli     = clienteId    ? clientes.find(c=>c.id===clienteId)    : null;
      // EQ-2: Miembro del equipo seleccionado para el informe individual
      const miembro = responsableId? equipo.find(e=>e.id===responsableId)  : null;
      const empresa = cfg.empresa || 'Integra Consultores';
      const hoy     = new Date();

      // EQ-2 FIX: Datos filtrados — soporte para eje cliente Y eje integrante.
      // Ahora soporta multi-responsable (responsablesIds[]) además del campo legacy responsableId.
      const tareasF  = tareas.filter(t=>{
        if(t.esAlerta) return false;
        if(clienteId && t.clienteId !== clienteId) return false;
        if(responsableId){
          const rIds = Array.isArray(t.responsablesIds)&&t.responsablesIds.length ? t.responsablesIds : (t.responsableId?[t.responsableId]:[]);
          if(!rIds.includes(responsableId)) return false;
        }
        if(fIni && t.fechaVen && t.fechaVen<fIni) return false;
        if(fFin && t.fechaVen && t.fechaVen>fFin) return false;
        return true;
      });
      const facF     = facturas.filter(f=>
        (!clienteId    || f.clienteId     === clienteId)    &&
        (!fIni||f.fechaEmision>=fIni) && (!fFin||f.fechaEmision<=fFin)
      );
      const proyF    = proyectos.filter(p=>!clienteId||p.clienteId===clienteId);
      // EQ-6 FIX: Anticipos filtrados por integrante (solicitanteId) O por cliente (cargaCliente)
      const antF     = ant.filter(a=>
        (!clienteId    || a.cargaCliente  === clienteId)    &&
        (!responsableId|| a.solicitanteId === responsableId)
      );

      // KPIs financieros
      const totalFac  = facF.reduce((a,f)=>(a+Number(f.valor||0)*(f.iva?1.19:1)),0);
      const totalCob  = facF.filter(f=>['Pagada','pagada','Paz y Salvo'].includes(f.estado)).reduce((a,f)=>(a+Number(f.valor||0)*(f.iva?1.19:1)),0);
      const porCobrar = totalFac - totalCob;
      const totalAnt  = antF.reduce((a,x)=>{const t=(x.gastos||[]).reduce((s,g)=>s+Number(g.monto||0),0);return a+t;},0);

      // KPIs tareas
      const tPend  = tareasF.filter(t=>t.estado==='pendiente').length;
      const tCurso = tareasF.filter(t=>t.estado==='en_curso').length;
      const tComp  = tareasF.filter(t=>t.estado==='completada').length;
      const tVenc  = tareasF.filter(t=>t.fechaVen&&t.fechaVen<hoy.toISOString().split('T')[0]&&t.estado!=='completada').length;
      const pctComp = tareasF.length>0 ? Math.round(tComp/tareasF.length*100) : 0;

      let y = 0; // cursor vertical actual
      let page = 1;

      // ── UTILIDADES ───────────────────────────────────────────
      const chkPage = (needed=15) => {
        if(y+needed > PH-18) { doc.addPage(); page++; drawFooter(); y = 22; }
      };

      const setColor = (rgb, text=false) => {
        if(text) doc.setTextColor(...rgb);
        else doc.setFillColor(...rgb);
      };

      const txt = (str,x,yy,opts={}) => {
        // C-item10: Sanitizar todos los textos — eliminar caracteres especiales que corrompen el PDF
        const s = String(str??'')
          .replace(/[%|&]/g,'')
          .replace(/[áàâä]/gi,'a').replace(/[éèêë]/gi,'e')
          .replace(/[íìîï]/gi,'i').replace(/[óòôö]/gi,'o')
          .replace(/[úùûü]/gi,'u').replace(/[ñ]/gi,'n')
          .replace(/[ÁÀÂÄ]/g,'A').replace(/[ÉÈÊË]/g,'E')
          .replace(/[ÍÌÎÏ]/g,'I').replace(/[ÓÒÔÖ]/g,'O')
          .replace(/[ÚÙÛÜ]/g,'U').replace(/[Ñ]/g,'N')
          .replace(/[^\x00-\x7E]/g,'');
        doc.text(s,x,yy,opts);
      };

      const hrLine = (yy, color=C.lineR) => {
        doc.setDrawColor(...color);
        doc.setLineWidth(.3);
        doc.line(M,yy,PW-M,yy);
      };

      const drawFooter = () => {
        doc.setFillColor(...C.navyR); doc.rect(0,PH-14,PW,14,'F');
        doc.setFillColor(...C.goldR); doc.rect(0,PH-15,PW,1,'F');
        // C-item24: Centrar todo el contenido del pie de página
        // C-item24: Reemplazar "INTEGRA CONSULTORES" por "INFORME DE GESTIÓN"
        doc.setTextColor(...ACENTO_R); doc.setFont(FF,'bold'); doc.setFontSize(FS(8));
        doc.text(cleanTxt(pCfg.tituloDocumento||'INFORME DE GESTION'), PW/2, PH-9, {align:'center'});
        const fpP4=[cfg.nit?'NIT: '+cfg.nit:null,cfg.telefono?'Tel: '+cfg.telefono:null,cfg.adminEmail||null,cfg.direccion||null].filter(Boolean);
        doc.setTextColor(255,255,255); doc.setFont('helvetica','normal'); doc.setFontSize(6.5);
        if(fpP4.length>0) doc.text(fpP4.join('  -  '), PW/2, PH-4, {align:'center'});
        doc.setTextColor(...C.goldR); doc.setFont('helvetica','bold'); doc.setFontSize(7);
        doc.text('Pag. '+page, PW-M, PH-7, {align:'right'});
        doc.setTextColor(200,200,200); doc.setFont('helvetica','normal'); doc.setFontSize(6);
        doc.text('INTPLANNER PRO', M, PH-3);
      };

      // C-item10+19-21: Helper para limpiar texto de caracteres especiales antes de enviarlo a jsPDF
      const cleanTxt = (s) => String(s||'')
        .replace(/[%|&]/g,'')            // eliminar %, |, &
        .replace(/[áàâä]/gi,'a').replace(/[éèêë]/gi,'e')
        .replace(/[íìîï]/gi,'i').replace(/[óòôö]/gi,'o')
        .replace(/[úùûü]/gi,'u').replace(/[ñ]/gi,'n')
        .replace(/[ÁÀÂÄ]/g,'A').replace(/[ÉÈÊË]/g,'E')
        .replace(/[ÍÌÎÏ]/g,'I').replace(/[ÓÒÔÖ]/g,'O')
        .replace(/[ÚÙÛÜ]/g,'U').replace(/[Ñ]/g,'N')
        .replace(/[^\x00-\x7E]/g,'');   // eliminar cualquier otro no-ASCII

      const sectionHeader = (title, icon='') => {
        chkPage(20);
        // ITEM-6: Margen superior para respirar antes de cada sección
        y += 2;
        setColor(C.navyR); doc.rect(M, y, IW, 11, 'F');
        // Acento gold izquierdo
        setColor(C.goldR); doc.rect(M, y, 3, 11, 'F');
        setColor(ACENTO_R,true); doc.setFont(FF,'bold'); doc.setFontSize(FS(9.5));
        txt(cleanTxt(title), M+7, y+7.5);
        y += 15 + SEC_GAP * 0.3;
        doc.setFont(FF,'normal'); setColor(C.textR,true); doc.setFontSize(FS(8.5));
      };

      const kpiBox = (label,val,unit,x,yy,w,color=C.navyR) => {
        // ITEM-6: kpiBox con mejor jerarquía tipográfica y margen interior
        setColor([248,250,252]); doc.rect(x,yy,w,20,'F');
        doc.setDrawColor(...C.lineR); doc.setLineWidth(.3); doc.rect(x,yy,w,20,'S');
        // Barra de color izquierda más visible
        setColor(color); doc.rect(x,yy,3.5,20,'F');
        setColor(C.mutedR,true); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
        txt(label,x+7,yy+7);
        setColor(C.textR,true); doc.setFontSize(12); doc.setFont('helvetica','bold');
        txt(val,x+7,yy+16);
        if(unit){ doc.setFontSize(6.5); setColor(C.mutedR,true); txt(unit,x+7+doc.getTextWidth(String(val))+2,yy+16); }
      };

      const tableRow = (cols, widths, yy, header=false, alt=false) => {
        const rowH = 8;
        if(header){
          setColor(C.navyR); doc.rect(M,yy,IW,rowH,'F');
          setColor(ACENTO_R,true); doc.setFont(FF,'bold'); doc.setFontSize(FS(7.5));
        } else if(alt){
          setColor([241,245,249]); doc.rect(M,yy,IW,rowH,'F');
          setColor(C.textR,true); doc.setFont(FF,'normal'); doc.setFontSize(FS(8));
        } else {
          setColor(C.textR,true); doc.setFont(FF,'normal'); doc.setFontSize(FS(8));
        }
        let xc = M;
        cols.forEach((c,i)=>{
          const w      = widths[i] || 30;
          const maxW   = w - 6;
          const val    = String(c ?? '');
          const trunc  = doc.splitTextToSize(val, maxW)[0] || '';
          // Centrar en columnas estrechas (≤26mm) o en encabezados
          const center = header || w <= 26;
          if(center){
            doc.text(trunc, xc + w/2, yy+5.5, {align:'center'});
          } else {
            txt(trunc, xc+3, yy+5.5);
          }
          // Separador vertical entre columnas (sutil)
          if(i < cols.length-1){
            doc.setDrawColor(...C.lineR); doc.setLineWidth(.1);
            doc.line(xc+w, yy+1, xc+w, yy+rowH-1);
          }
          xc += w;
        });
        doc.setDrawColor(...C.lineR); doc.setLineWidth(.2);
        doc.line(M, yy+rowH, PW-M, yy+rowH);
        return rowH;
      };

      // ITEM-4: barChart reemplazado por panel de indicadores KPI profesional con porcentajes
      // Diseño: tarjetas horizontales con barra de progreso proporcional y métricas claras
      const barChart = (data, yy, title, colorR=C.navyR) => {
        // Panel de KPI cards con barra de progreso — diseño corporativo consistente
        const total = data.reduce((s,d)=>s+d.val,0) || 1;
        const cardH  = 10;   // altura de cada tarjeta
        const cardGap = 3;   // separación entre tarjetas
        const panelH = data.length*(cardH+cardGap)+18;
        chkPage(panelH+4);

        // Título del panel
        setColor(C.navyR,true); doc.setFont('helvetica','bold'); doc.setFontSize(8);
        txt(title, M, yy+5);
        doc.setDrawColor(...C.lineR); doc.setLineWidth(.25);
        doc.line(M, yy+7, PW-M, yy+7);
        yy += 12;

        // Paleta de colores por estado
        const palette = {
          'Pendiente':   [100,116,139],
          'pendiente':   [100,116,139],
          'En Curso':    [201,168,76],
          'en_curso':    [201,168,76],
          'Completada':  [22,163,74],
          'completada':  [22,163,74],
          'Vencida':     [220,38,38],
          'vencida':     [220,38,38],
          'Cancelada':   [71,85,105],
          'cancelada':   [71,85,105],
          'Paz y Salvo': [16,185,129],
          'Pagada':      [22,163,74],
          'pagada':      [22,163,74],
          'Enviada':     [37,99,235],
          'enviada':     [37,99,235],
        };

        const labelW   = 50;   // ancho columna etiqueta
        const barW     = IW - labelW - 28; // área barra
        const numW     = 18;   // ancho cifra derecha
        const pctW     = 18;   // ancho porcentaje

        data.forEach((d,i) => {
          const rgb   = palette[d.label] || colorR;
          const pct   = Math.round(d.val/total*100);
          const fillW = Math.max(1, Math.round(pct/100*barW));
          const ty    = yy + cardH/2 + 1;  // baseline de texto centrado en tarjeta

          // Fondo alterno de fila
          setColor(i%2===0 ? [248,250,252] : [255,255,255]);
          doc.rect(M, yy, IW, cardH, 'F');

          // Etiqueta estado
          setColor(C.textR,true); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
          txt(cleanTxt(String(d.label)), M+2, ty);

          // Track (fondo de barra)
          setColor([226,232,240]);
          doc.rect(M+labelW, yy+2, barW, cardH-4, 'F');

          // Barra de progreso rellena
          setColor(rgb);
          doc.rect(M+labelW, yy+2, fillW, cardH-4, 'F');

          // Valor absoluto
          setColor(C.textR,true); doc.setFont('helvetica','bold'); doc.setFontSize(8);
          txt(String(d.val), M+labelW+barW+3, ty);

          // Porcentaje
          setColor(C.mutedR,true); doc.setFont('helvetica','normal'); doc.setFontSize(7);
          txt(pct+'%', M+labelW+barW+numW+5, ty);

          yy += cardH+cardGap;
        });

        // Línea de cierre
        doc.setDrawColor(...C.lineR); doc.setLineWidth(.2);
        doc.line(M, yy, PW-M, yy);
        return yy+6;
      };

      // MEJORA-4: Logo con detección automática de formato y soporte de transparencia (PNG, JPEG, WebP, SVG)
      try{
        const getImgFmt = (src) => {
          if(src.startsWith('data:image/png')) return 'PNG';
          if(src.startsWith('data:image/webp')) return 'WEBP';

      const periodoTxt = (() => {
        if(fIni && fFin) return 'Del '+fmt.date(fIni)+'  al  '+fmt.date(fFin);
        // Mes anterior automático
        const hoyD = new Date();
        const mesAnt = new Date(hoyD.getFullYear(), hoyD.getMonth()-1, 1);
