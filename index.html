      doc.text(concLines,14,y);
      doc.text(f.tipoContrato||'—',90,y);
      doc.text(f.formaPago||'—',140,y);
      doc.text(fmt.date(f.fechaVen)||'—',PW-12,y,{align:'right'});
      y+=Math.max(concLines.length*5,9)+3;

      // Notas opcionales
      if(f.notas){
        doc.setFillColor(255,252,235); doc.rect(12,y-4,PW-24,10,'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(120,90,10);
        doc.text('Notas:',14,y+1);
        doc.setFont('helvetica','normal'); doc.setTextColor(60,50,10);
        const notaLines=doc.splitTextToSize(f.notas,PW-50);
        doc.text(notaLines,32,y+1);
        y+=Math.max(notaLines.length*4,10)+4;
      }

      // ── SECCIÓN: LIQUIDACIÓN ──────────────────────────────────────────────
      y+=6;
      doc.setFillColor(30,58,95); doc.rect(12,y-6,PW-24,7,'F');
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
      doc.text('LIQUIDACIÓN',14,y-0.5);
      y+=8;

      // Cuadro de valores
      const xLbl=PW-85; const xVal=PW-12;
      doc.setFillColor(248,249,252); doc.rect(xLbl-5,y-6,88,f.iva?38:28,'F');
      doc.setDrawColor(220,226,238); doc.setLineWidth(0.3);
      doc.rect(xLbl-5,y-6,88,f.iva?38:28,'S');

      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(60,70,90);
      doc.text('Valor base:',xLbl,y); doc.text(fmt.cop(v),xVal,y,{align:'right'}); y+=9;
      if(f.iva){
        doc.text('IVA (19%):',xLbl,y); doc.text(fmt.cop(iva),xVal,y,{align:'right'}); y+=9;
        doc.setDrawColor(201,168,76); doc.setLineWidth(0.4);
        doc.line(xLbl-5,y-3,xVal+1,y-3);
      }
      doc.setFont('helvetica','bold'); doc.setFontSize(11.5); doc.setTextColor(20,40,75);
      doc.text('TOTAL A PAGAR:',xLbl,y+1); doc.text(fmt.cop(total),xVal,y+1,{align:'right'});

      // ── ESTADO DEL DOCUMENTO ─────────────────────────────────────────────
      const estColor={
        'Pendiente':[245,158,11],'Enviada':[59,130,246],
        'Pagada':[34,197,94],'Vencida':[239,68,68],'Paz y Salvo':[16,185,129]
      }[f.estado]||[100,100,100];
      doc.setFillColor(...estColor);
      doc.roundedRect(12,y-5,55,11,2,2,'F');
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(9);
      doc.text('Estado: '+f.estado,39,y+2,{align:'center'});

      // ── FIRMA / ACEPTACIÓN ────────────────────────────────────────────────
      const yFirma=PH-62;
      doc.setDrawColor(180,190,210); doc.setLineWidth(0.3);
      doc.line(14,yFirma+14,80,yFirma+14);
      doc.line(PW-80,yFirma+14,PW-14,yFirma+14);
      doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(100,110,130);
      doc.text('Firma / Sello '+empresa,47,yFirma+19,{align:'center'});
      doc.text('Recibido a Satisfaccion',PW-47,yFirma+19,{align:'center'});
      doc.text('Nombre: ___________________________',14,yFirma+28);
      doc.text('C.C.: _______________________________',PW-90,yFirma+28);

      // ── PIE DE PÁGINA ────────────────────────────────────────────────────
      // ── FOOTER CORPORATIVO FULL-WIDTH ────────────────────────────────────
      doc.setFillColor(30,58,95); doc.rect(0,PH-14,PW,14,'F');
      doc.setFillColor(201,168,76); doc.rect(0,PH-15,PW,1,'F');
      doc.setTextColor(201,168,76); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
      doc.text(empresa, 14, PH-7);
      const fpP1=[nit?'NIT: '+nit:null,tel?'Tel: '+tel:null,email||null,dir||null].filter(Boolean);
      doc.setTextColor(255,255,255); doc.setFont('helvetica','normal'); doc.setFontSize(6.5);
      doc.text(fpP1.join('  ·  '), 14, PH-3);
      doc.setTextColor(201,168,76); doc.setFont('helvetica','bold'); doc.setFontSize(7);
      doc.text('INTPLANNER PRO', PW-14, PH-7, {align:'right'});
      doc.setTextColor(255,255,255); doc.setFont('helvetica','normal'); doc.setFontSize(6);
      doc.text('Generado: '+new Date().toLocaleDateString('es-CO'), PW-14, PH-3, {align:'right'});

      doc.save('CuentaCobro_No'+f.numero+'_'+empresa.replace(/\s+/g,'_')+'.pdf');
      toast('PDF formal generado correctamente','success');
    } catch(e){console.error(e);toast('Error generando PDF: '+e.message,'error');}
  };

  const tots=useMemo(()=>({
    total:facturas.length,
    facturado:facturas.reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0),
    cobrado:facturas.filter(f=>['Pagada','pagada','Paz y Salvo','Paz Y Salvo'].includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0),
    porCobrar:facturas.filter(f=>!['Pagada','pagada','Paz y Salvo','Paz Y Salvo'].includes(f.estado)).reduce((a,f)=>a+(Number(f.valor)||0)*(f.iva?1.19:1),0),
  }),[facturas]);

  return <div className="fade">
    <div className="grid-4" style={{marginBottom:14}}>
      <KPI label="Total Cuentas" val={tots.total} ico="bill" color="blue"/>
      <KPI label="Total Facturado" val={fmt.cop(tots.facturado)} ico="money" color="gold"/>
      <KPI label="Cobrado" val={fmt.cop(tots.cobrado)} ico="check" color="green"/>
      <KPI label="Por Cobrar" val={fmt.cop(tots.porCobrar)} ico="clock" color="red"/>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
      <button className="btn btn-p btn-sm" onClick={openNew}><Ico n="plus" s={14}/>Nueva Cuenta</button>
      {['','Pendiente','Enviada','Pagada','Vencida','Paz y Salvo'].map(s=>(
        <button key={s} className={clx('chip',filtEst===s&&'active')} onClick={()=>setFiltEst(s)}>{s||'Todos'}</button>
      ))}
      {/* Envío masivo: solo pendientes/vencidas */}
      <button className="btn btn-ghost btn-sm" onClick={enviarEmailsMasivo}
        title="Genera PDF y prepara email para todas las facturas Pendientes y Vencidas"
        style={{marginLeft:'auto',color:'#60a5fa',border:'1px solid #243447'}}>
        <Ico n="mail" s={13}/>Enviar Pendientes ({filtered.filter(f=>f.estado==='Pendiente'||f.estado==='Vencida').length})
      </button>
    </div>

    {/* D-item26: Filtros avanzados — año, meses, rango de fechas */}
    <div style={{marginBottom:14,padding:'12px 14px',borderRadius:10,border:'1px solid #243447',background:'rgba(15,25,35,.6)'}}>
      <p style={{fontSize:11,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.4px',margin:'0 0 10px'}}>🔍 Filtros Avanzados de Consolidación</p>
      <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
        {/* Año */}
        <div>
          <p style={{fontSize:10,color:'#64748b',margin:'0 0 4px'}}>Año</p>
          <select className="inp" style={{padding:'4px 10px',fontSize:12,width:90}} value={filtAnio} onChange={e=>setFiltAnio(e.target.value)}>
            <option value="">Todos</option>
            {aniosDisponibles.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </div>
        {/* Rango de fechas */}
        <div>
          <p style={{fontSize:10,color:'#64748b',margin:'0 0 4px'}}>Desde</p>
          <input type="date" className="inp" style={{padding:'4px 8px',fontSize:12,width:130}} value={filtFIni} onChange={e=>setFiltFIni(e.target.value)}/>
        </div>
        <div>
          <p style={{fontSize:10,color:'#64748b',margin:'0 0 4px'}}>Hasta</p>
          <input type="date" className="inp" style={{padding:'4px 8px',fontSize:12,width:130}} value={filtFFin} onChange={e=>setFiltFFin(e.target.value)}/>
        </div>
        {/* Meses múltiples */}
        <div>
          <p style={{fontSize:10,color:'#64748b',margin:'0 0 4px'}}>Meses</p>
          <div style={{display:'flex',gap:3,flexWrap:'wrap',maxWidth:280}}>
            {MESES_LABELS.map((l,i)=>(
              <button key={i+1} type="button" onClick={()=>toggleMes(i+1)}
                style={{padding:'3px 7px',fontSize:10,fontWeight:600,borderRadius:5,cursor:'pointer',border:'1px solid',
                  borderColor:filtMeses.includes(i+1)?'#C9A84C':'#334155',
                  background:filtMeses.includes(i+1)?'rgba(201,168,76,.15)':'transparent',
                  color:filtMeses.includes(i+1)?'#C9A84C':'#64748b'}}>
                {l}
              </button>
            ))}
          </div>
        </div>
        {(filtAnio||filtMeses.length||filtFIni||filtFFin)&&<button type="button" onClick={()=>{setFiltAnio('');setFiltMeses([]);setFiltFIni('');setFiltFFin('');}} style={{fontSize:11,color:'#ef4444',background:'none',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,padding:'4px 10px',cursor:'pointer'}}>✕ Limpiar</button>}
        <div style={{marginLeft:'auto',fontSize:11,color:'#60a5fa',fontWeight:600}}>{filtered.length} resultado{filtered.length!==1?'s':''}</div>
      </div>
    </div>

    {/* V13-BLOQUE4: Sección nueva "Generar Cobros por Cliente" */}
    <div className="card-p" style={{marginBottom:14,border:'1px solid #2f4460',background:'linear-gradient(135deg, rgba(30,58,95,.3), rgba(201,168,76,.05))'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h3 className="sy" style={{color:'#C9A84C',fontWeight:700,fontSize:14,margin:0}}>⚡ Generar Cobros por Cliente</h3>
        <span style={{fontSize:11,color:'#94a3b8'}}>Genera facturas usando valores de Clientes</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))',gap:10}}>
        {clientes.filter(c=>c.estado==='activo'&&c.valorContrato).map(cli=>{
          const cliFacturas = facturas.filter(f=>f.clienteId===cli.id).length;
          const cliPendientes = facturas.filter(f=>f.clienteId===cli.id&&(f.estado==='Pendiente'||f.estado==='Enviada')).length;
          return <div key={cli.id} style={{
            padding:'12px',
            background:'#1e2d42',
            border:'1px solid #2f4460',
            borderRadius:8,
            display:'flex',
            flexDirection:'column',
            gap:8,
            transition:'all .2s',
            cursor:'pointer',
          }} onMouseOver={e=>e.currentTarget.style.borderColor='#C9A84C'} onMouseOut={e=>e.currentTarget.style.borderColor='#2f4460'}>
            <div>
              <p style={{margin:0,fontWeight:600,color:'#fff',fontSize:13}}>{cli.nombre}</p>
              <p style={{margin:'2px 0 0',fontSize:11,color:'#94a3b8'}}>{cli.tipoContrato||'Sin contrato'}</p>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:8}}>
              <span style={{fontSize:12,color:'#C9A84C',fontWeight:700}}>{fmt.cop(Number(cli.valorContrato)||0)}</span>
              <span style={{fontSize:10,color:'#64748b'}}>{cliFacturas} factura{cliFacturas!==1?'s':''} ({cliPendientes} pendiente{cliPendientes!==1?'s':''})</span>
            </div>
            {cli.motivoCobro&&<p style={{margin:0,fontSize:10,color:'#cbd5e1',fontStyle:'italic'}}>"{cli.motivoCobro}"</p>}
            <div style={{display:'flex',gap:6}}>
              <button 
                className="btn btn-sm" 
                style={{background:'linear-gradient(135deg, #1E3A5F, #2a5298)',color:'#fff',flex:1,fontSize:11}}
                onClick={()=>{
                  const newFact = {
                    numero: nextNum(),
                    clienteId: cli.id,
                    tipoContrato: cli.tipoContrato||'',
                    valor: String(cli.valorContrato),
                    iva: false,
                    fechaEmision: new Date().toISOString().split('T')[0],
                    fechaVen: '',
                    estado: 'Pendiente',
                    concepto: cli.motivoCobro || '',
                    notas: '',
                    formaPago: '',
                    fechaPago: ''
                  };
                  setForm(newFact);
                  setOpen(true);
                }}
                title="Crear nueva cuenta con valores de este cliente"
              >
                ➕ Nueva
              </button>
              <button 
                className="btn btn-sm" 
                style={{background:'rgba(201,168,76,.1)',color:'#C9A84C',flex:1,fontSize:11,border:'1px solid rgba(201,168,76,.3)'}}
                onClick={()=>{
                  const newFact = {
                    numero: nextNum(),
                    clienteId: cli.id,
                    tipoContrato: cli.tipoContrato||'',
                    valor: '',
                    iva: false,
                    fechaEmision: new Date().toISOString().split('T')[0],
                    fechaVen: '',
                    estado: 'Pendiente',
                    concepto: cli.motivoCobro || '',
                    notas: '(Valor personalizado)',
                    formaPago: '',
                    fechaPago: ''
                  };
                  setForm(newFact);
                  setOpen(true);
                }}
                title="Crear cuenta permitiendo modificar el valor"
              >
                ✏️ Personalizar
              </button>
            </div>
          </div>;
        })}
      </div>
      {clientes.filter(c=>c.estado==='activo'&&c.valorContrato).length===0&&
        <p style={{textAlign:'center',color:'#475569',fontSize:12,margin:0}}>Sin clientes activos con valor de servicio configurado</p>
      }
    </div>

    <div className="card" style={{overflowX:'auto'}}>
      <table className="tbl">
        <thead><tr>{['No.','Cliente','Valor','IVA','Total','Emisión','Vencimiento','Estado','Forma Pago',''].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>
          {filtered.length===0&&<tr><td colSpan={10} style={{textAlign:'center',padding:40,color:'#475569'}}>Sin facturas registradas.</td></tr>}
          {filtered.map(f=>{
            const v=Number(f.valor)||0; const iva=f.iva?v*.19:0;
            return <tr key={f.id}>
              <td><span style={{fontFamily:'monospace',color:'#C9A84C',fontWeight:700}}>#{f.numero}</span></td>
              <td style={{color:'#fff',fontWeight:500}}>{clientes.find(c=>c.id===f.clienteId)?.nombre||'—'}</td>
              <td style={{color:'#94a3b8'}}>{fmt.cop(v)}</td>
              <td>{f.iva?<span style={{color:'#4ade80',fontSize:11}}>19%</span>:'—'}</td>
              <td style={{color:'#fff',fontWeight:600}}>{fmt.cop(v+iva)}</td>
              <td style={{fontSize:11,color:'#64748b'}}>{fmt.date(f.fechaEmision)}</td>
              <td style={{fontSize:11,color:'#64748b'}}>{fmt.date(f.fechaVen)}</td>
              <td><SBadge s={f.estado}/></td>
              <td style={{fontSize:11,color:'#64748b'}}>{f.formaPago||'—'}</td>
              <td><div style={{display:'flex',gap:4}}>
                <button className="btn btn-ghost btn-sm p-1.5" onClick={()=>openEdit(f)} title="Editar"><Ico n="edit" s={13}/></button>
                <button className="btn btn-ghost btn-sm p-1.5" onClick={()=>exportPDF(f)} title="Descargar PDF"><Ico n="down" s={13}/></button>
                <button className="btn btn-ghost btn-sm p-1.5" onClick={()=>enviarEmail(f)} title="Enviar por email"><Ico n="mail" s={13}/></button>
                <button className="btn btn-ghost btn-sm p-1.5" onClick={()=>setDel(f.id)} title="Eliminar"><Ico n="trash" s={13}/></button>
              </div></td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>

    <Modal open={open} onClose={()=>setOpen(false)} title={form.id?'Editar Cuenta':'Nueva Cuenta de Cobro'} wide>
      <div className="grid-2">
        <F label="No. de Cuenta"><input className="inp" style={{fontFamily:'monospace'}} value={form.numero||''} onChange={upd('numero')}/></F>
        <F label="Cliente *"><select className="inp" value={form.clienteId||''} onChange={onClienteChange}>
          <option value="">Seleccionar cliente...</option>{[...clientes].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
        </select></F>

        {/* F-items30-31: Emisor de la Cuenta de Cobro — no obligatoriamente INTEGRA CONSULTORES */}
        <F label="Tipo de Emisor" col2>
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            {[['persona_natural','Persona Natural'],['persona_juridica','Persona Jurídica'],['empresa','Empresa']].map(([v,l])=>(
              <label key={v} style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer',padding:'4px 12px',borderRadius:99,border:'1px solid',
                borderColor:(form.tipoEmisor||'persona_juridica')===v?'#C9A84C':'#334155',
                background:(form.tipoEmisor||'persona_juridica')===v?'rgba(201,168,76,.12)':'transparent',
                color:(form.tipoEmisor||'persona_juridica')===v?'#C9A84C':'#64748b'}}>
                <input type="radio" name="tipoEmisor" value={v} checked={(form.tipoEmisor||'persona_juridica')===v} onChange={upd('tipoEmisor')} style={{accentColor:'#C9A84C'}}/>{l}
              </label>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div>
              <p style={{fontSize:10,color:'#64748b',margin:'0 0 4px'}}>Nombre del Emisor</p>
              <input className="inp" value={form.nombreEmisor||''} onChange={upd('nombreEmisor')} placeholder="Nombre completo o razón social" style={{fontSize:12}}/>
            </div>
            <div>
              <p style={{fontSize:10,color:'#64748b',margin:'0 0 4px'}}>{(form.tipoEmisor||'persona_juridica')==='persona_natural'?'Número de Cédula':'NIT del Emisor'}</p>
              <input className="inp" value={form.nitEmisor||''} onChange={upd('nitEmisor')} placeholder={(form.tipoEmisor||'persona_juridica')==='persona_natural'?'Cédula':'NIT'} style={{fontSize:12}}/>
            </div>
          </div>
          {!form.nombreEmisor&&<p style={{fontSize:10,color:'#475569',margin:'4px 0 0'}}>Si se deja vacío, se usará la configuración de la empresa.</p>}
        </F>

        <F label="Tipo de Contrato"><select className="inp" value={form.tipoContrato||''} onChange={upd('tipoContrato')}>
          <option value="">—</option>{['Mensualidad','Por Proyecto','Honorarios','Retainer'].map(t=><option key={t} value={t}>{t}</option>)}
        </select></F>
        <F label="Valor *">
          <div style={{position:'relative'}}>
            <input type="number" className="inp" value={form.valor||''} onChange={upd('valor')} placeholder="0" style={{paddingRight:90}}/>
            {form.clienteId && clientes.find(c=>c.id===form.clienteId)?.valorContrato && (
              <span style={{
                position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',
                fontSize:10,color:'#4ade80',fontWeight:700,pointerEvents:'none',
                background:'rgba(26,107,58,.2)',border:'1px solid rgba(74,222,128,.25)',
                padding:'1px 7px',borderRadius:20,
              }}>⚡ Auto</span>
            )}
          </div>
          {form.clienteId && clientes.find(c=>c.id===form.clienteId)?.valorContrato && (
            <p style={{fontSize:10,color:'#4ade80',margin:'3px 0 0',display:'flex',alignItems:'center',gap:4}}>
              <span>⚡</span> Valor cargado automáticamente desde el módulo Clientes
            </p>
          )}
        </F>
        <F label="Fecha Emisión"><input type="date" className="inp" value={form.fechaEmision||''} onChange={upd('fechaEmision')}/></F>
        <F label="Fecha Vencimiento"><input type="date" className="inp" value={form.fechaVen||''} onChange={upd('fechaVen')}/></F>
        <F label="Estado"><select className="inp" value={form.estado||'Pendiente'} onChange={upd('estado')}>
          {['Pendiente','Enviada','Pagada','Vencida','Paz y Salvo'].map(s=><option key={s} value={s}>{s}</option>)}
        </select></F>
        <F label="Forma de Pago"><select className="inp" value={form.formaPago||''} onChange={upd('formaPago')}>
          <option value="">—</option><option value="Efectivo">Efectivo</option><option value="Transferencia">Transferencia</option>
        </select></F>
        <F label="Fecha Real de Pago" col2><input type="date" className="inp" value={form.fechaPago||''} onChange={e=>{
              upd('fechaPago')(e);
              // Sugerencia no invasiva: si hay fecha de pago y el estado no es de pago, informar al usuario
              if(e.target.value){
                const est=form.estado||'Pendiente';
                if(!['Pagada','Paz y Salvo'].includes(est)){
                  toast('Recuerda actualizar el estado a Pagada o Paz y Salvo','info');
                }
              }
            }} placeholder="Fecha de pago efectivo (opcional)"/></F>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <input type="checkbox" id="ivaCheck" checked={!!form.iva} onChange={e=>setForm(p=>({...p,iva:e.target.checked}))} style={{accentColor:'#C9A84C'}}/>
          <label htmlFor="ivaCheck" style={{fontSize:13,color:'#cbd5e1'}}>Aplicar IVA 19%</label>
          {form.iva&&form.valor&&<span style={{color:'#C9A84C',fontWeight:700,fontSize:12,marginLeft:8}}>Total: {fmt.cop(Number(form.valor)*1.19)}</span>}
        </div>
        <F label="Concepto" col2><input className="inp" value={form.concepto||''} onChange={upd('concepto')}/></F>
        <F label="Notas" col2><textarea className="inp" value={form.notas||''} onChange={upd('notas')} style={{minHeight:56}}/></F>
      </div>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setOpen(false)}>Cancelar</button>
        <button className="btn btn-g btn-sm" onClick={save}><Ico n="check" s={14}/>Guardar</button>
      </div>
    </Modal>
    {del&&<Confirm msg="¿Eliminar esta cuenta?" onOk={()=>remove(del)} onCancel={()=>setDel(null)}/>}
  </div>;
};

// ── ANTICIPOS ────────────────────────────────────────────────
const Anticipos = () => {
  const {equipo,clientes,toast} = useApp();
  const [anticipos,setAnticipos] = useState(()=>JSON.parse(localStorage.getItem('ip_anticipos')||'[]'));
  const [open,    setOpen]    = useState(false);
  const [form,    setForm]    = useState({});
  const [del,     setDel]     = useState(null);
  const [vista,   setVista]   = useState('lista');  // 'lista' | 'informe'
  const [fIni,    setFIni]    = useState('');
  const [fFin,    setFFin]    = useState('');
  const [filSol,  setFilSol]  = useState('');
  const [filCli,  setFilCli]  = useState('');
  const [filEst,  setFilEst]  = useState('');

  const upd  = k => e => setForm(p=>({...p,[k]:e.target.value}));
  const persist = list => { localStorage.setItem('ip_anticipos',JSON.stringify(list)); setAnticipos(list); window.AutoBackup?.schedule(); };

  const addGasto = () => setForm(p=>({...p,gastos:[...(p.gastos||[]),{id:uid(),concepto:'',monto:''}]}));
  const updG = (id,k,v) => setForm(p=>({...p,gastos:(p.gastos||[]).map(g=>g.id===id?{...g,[k]:v}:g)}));
  const delG = id => setForm(p=>({...p,gastos:(p.gastos||[]).filter(g=>g.id!==id)}));
  const totalG = g => (g||[]).reduce((a,x)=>a+(Number(x.monto)||0),0);

  const cierre = f => {
    const vs=Number(f.valorSolicitado)||0, tg=totalG(f.gastos);
    if(tg===vs) return {ico:'✅',txt:'Paz y Salvo',c:'#4ade80',label:'paz_salvo'};
    if(tg>vs)   return {ico:'🔴',txt:'Saldo en contra: '+fmt.cop(tg-vs),c:'#f87171',label:'en_contra'};
    return          {ico:'🟢',txt:'Saldo a favor: '+fmt.cop(vs-tg),c:'#4ade80',label:'a_favor'};
  };

  const loadSoporte = e => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>setForm(p=>({...p,soporte:ev.target.result,soporteNombre:f.name}));
    r.readAsDataURL(f);
  };

  const openNew  = () => { setForm({solicitanteId:'',valorSolicitado:'',cargaCliente:false,clienteId:'',tipoActividad:'',fechaSolicitud:new Date().toISOString().split('T')[0],fechaActividad:'',fechaFin:'',fechaLegal:'',gastos:[],soporte:null,soporteNombre:''}); setOpen(true); };
  const openEdit = a => { setForm({...a}); setOpen(true); };
  const save = () => {
    if(!form.solicitanteId) return toast('Seleccione el solicitante','error');
    const r={...form,id:form.id||uid()};
    persist(form.id?anticipos.map(x=>x.id===r.id?r:x):[r,...anticipos]);
    setOpen(false); toast('Anticipo guardado','success');
  };
  const remove = id => { persist(anticipos.filter(x=>x.id!==id)); setDel(null); };

  // ── Filtro de búsqueda ────────────────────────────────────────
  const listaFiltrada = useMemo(()=>anticipos.filter(a=>{
    if(fIni && a.fechaSolicitud && a.fechaSolicitud < fIni) return false;
    if(fFin && a.fechaSolicitud && a.fechaSolicitud > fFin) return false;
    if(filSol && a.solicitanteId !== filSol) return false;
    if(filCli && a.clienteId !== filCli)     return false;
    if(filEst){
      const c = cierre(a);
      if(filEst==='paz_salvo'  && c.label!=='paz_salvo')  return false;
      if(filEst==='en_contra'  && c.label!=='en_contra')  return false;
      if(filEst==='a_favor'    && c.label!=='a_favor')    return false;
    }
    return true;
  }).sort((a,b)=>new Date(b.fechaSolicitud)-new Date(a.fechaSolicitud)),[anticipos,fIni,fFin,filSol,filCli,filEst]);

  const hayFiltro = fIni||fFin||filSol||filCli||filEst;

        const getImgFmtP2 = (src) => { if(src.startsWith('data:image/png')) return 'PNG'; if(src.startsWith('data:image/webp')) return 'WEBP'; if(src.startsWith('data:image/svg')) return 'SVG'; return 'JPEG'; };
        doc.addImage(logoSrcP2, getImgFmtP2(logoSrcP2), M, 4, 25, 25);
      }catch(e){console.warn('Logo P2:',e.message);}
      // Empresa + NIT
      doc.setTextColor(201,168,76); doc.setFont('helvetica','bold'); doc.setFontSize(11);
      doc.text(empresa, M+29, 13);
      if(cfg.nit){doc.setTextColor(255,255,255); doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.text('NIT: '+cfg.nit, M+29, 20);}
      // Título doc + número
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(11);
      doc.text('SOLICITUD DE ANTICIPO', PW-M, 13, {align:'right'});
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(201,168,76);
      doc.text('No. '+(a.id||'—').slice(-8).toUpperCase(), PW-M, 20, {align:'right'});

      // Bloque info principal
      let y = 46;
      const box = (lbl,val,x,yy,w,h=14) => {
        doc.setFillColor(248,250,252); doc.rect(x,yy,w,h,'F');
        doc.setDrawColor(226,232,240); doc.setLineWidth(.3); doc.rect(x,yy,w,h,'S');
        doc.setFillColor(30,58,95); doc.rect(x,yy,3,h,'F');
        doc.setTextColor(100,116,139); doc.setFont('helvetica','normal'); doc.setFontSize(7);
        doc.text(lbl, x+6, yy+5);
        doc.setTextColor(30,41,59); doc.setFont('helvetica','bold'); doc.setFontSize(9);
        doc.text(String(val||'—'), x+6, yy+11);
      };
      const hw = (IW-4)/2;
      box('Solicitante', sol?.nombre||'—', M, y, hw);
      box('Cargo', sol?.cargo||'—', M+hw+4, y, hw);
      y+=18;
      box('Fecha Solicitud', fmt.date(a.fechaSolicitud), M, y, hw);
      box('Fecha Actividad', fmt.date(a.fechaActividad), M+hw+4, y, hw);
      y+=18;
      box('Fecha Finalización', fmt.date(a.fechaFin), M, y, hw);
      box('Fecha Legalización', fmt.date(a.fechaLegal), M+hw+4, y, hw);
      y+=18;
      box('Tipo de Actividad', a.tipoActividad||'—', M, y, IW);
      y+=18;
      if(cli) { box('Cliente', cli.nombre, M, y, IW); y+=18; }

      // Valor solicitado destacado
      doc.setFillColor(30,58,95); doc.rect(M,y,IW,16,'F');
      doc.setTextColor(201,168,76); doc.setFont('helvetica','bold'); doc.setFontSize(10);
      doc.text('VALOR SOLICITADO:', M+4, y+10);
      doc.setFontSize(14);
      doc.text(fmt.cop(vs), PW-M, y+11, {align:'right'});
      y+=24;

      // Tabla de gastos
      if((a.gastos||[]).length>0){
        doc.setFillColor(30,58,95); doc.rect(M,y,IW,9,'F');
        doc.setTextColor(201,168,76); doc.setFont('helvetica','bold'); doc.setFontSize(9);
        doc.text('DETALLE DE GASTOS', M+4, y+6);
        y+=9;
        a.gastos.forEach((g,i)=>{
          if(y>270){doc.addPage();y=20;}
          const alt = i%2===0;
          doc.setFillColor(alt?241:255,alt?245:255,alt?249:255);
          doc.rect(M,y,IW,8,'F');
          doc.setDrawColor(226,232,240); doc.setLineWidth(.2); doc.line(M,y+8,PW-M,y+8);
          doc.setTextColor(30,41,59); doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
          doc.text(String(g.concepto||'—').substring(0,60), M+3, y+5.5);
          doc.setFont('helvetica','bold');
          doc.text(fmt.cop(Number(g.monto)||0), PW-M-2, y+5.5, {align:'right'});
          y+=8;
        });
        // Total gastos
        doc.setFillColor(15,118,110); doc.rect(M,y,IW,10,'F');
        doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(9);
        doc.text('TOTAL GASTOS', M+4, y+7);
        doc.text(fmt.cop(tg), PW-M-2, y+7, {align:'right'});
        y+=18;
      }

      // Resumen cierre
      const saldoColor = saldo>=0 ? [22,163,74] : [220,38,38];
      doc.setFillColor(...saldoColor); doc.rect(M,y,IW,14,'F');
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(10);
      doc.text(c.ico+' '+c.txt, M+6, y+9);
      if(Math.abs(saldo)>0){
        doc.text(fmt.cop(Math.abs(saldo)), PW-M-2, y+9, {align:'right'});
      }
      y+=22;

      // Soporte adjunto
      if(a.soporte && a.soporte.startsWith('data:image')){
        if(y>220){doc.addPage();y=20;}
        doc.setFontSize(8); doc.setTextColor(100,116,139);
        doc.text('SOPORTE ADJUNTO', M, y); y+=4;
        try {
          const imgType = a.soporte.includes('png')?'PNG':'JPEG';
          doc.addImage(a.soporte, imgType, M, y, 80, 60);
          y+=66;
        } catch(e2){}
      }

      // Firmas
      if(y>240){doc.addPage();y=20;}
      y+=6;
      const fw=(IW-8)/2;
      doc.setDrawColor(180,180,180); doc.setLineWidth(.4);
      doc.line(M+4,y+18,M+fw-4,y+18);
      doc.line(M+fw+12,y+18,M+IW-4,y+18);
      doc.setTextColor(100,116,139); doc.setFont('helvetica','normal'); doc.setFontSize(8);
      doc.text('Solicitante: '+(sol?.nombre||'—'), M+4, y+23);
      doc.text('Aprobado por: ___________________', M+fw+12, y+23);

      // ── FOOTER CORPORATIVO ────────────────────────────────────────────
      doc.setFillColor(30,58,95); doc.rect(0,PH-14,PW,14,'F');
      doc.setFillColor(201,168,76); doc.rect(0,PH-15,PW,1,'F');
      doc.setTextColor(201,168,76); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
      doc.text(empresa, M, PH-7);
      const fpP2=[cfg.nit?'NIT: '+cfg.nit:null,cfg.telefono?'Tel: '+cfg.telefono:null,cfg.adminEmail||null,cfg.direccion||null].filter(Boolean);
      doc.setTextColor(255,255,255); doc.setFont('helvetica','normal'); doc.setFontSize(6.5);
      doc.text(fpP2.join('  ·  '), M, PH-3);
      doc.setTextColor(201,168,76); doc.setFont('helvetica','bold'); doc.setFontSize(7);
      doc.text('INTPLANNER PRO', PW-M, PH-7, {align:'right'});
      doc.setTextColor(255,255,255); doc.setFont('helvetica','normal'); doc.setFontSize(6);
      doc.text('Generado: '+new Date().toLocaleDateString('es-CO'), PW-M, PH-3, {align:'right'});

      doc.save('Anticipo_'+(sol?.nombre||'solicitud')+'_'+(a.fechaSolicitud||new Date().toISOString().split('T')[0])+'.pdf');
      toast('PDF generado','success');
    } catch(e){ console.error(e); toast('Error generando PDF: '+e.message,'error'); }
  };
