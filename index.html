// ── EQUIPO — Sub-componente tarjeta de integrante ────────────
// Extrae la lógica de render de cada card para mantener el componente Equipo limpio.
// Recibe todos los contadores pre-calculados desde el componente padre (Equipo),
// que ya usa la normalización dual responsableId/responsablesIds + nombre legacy.
const EquipoMiembroCard = ({
  m, dispon, horasOcup, horasCap, pctCarga, cargaColor,
  mEnCurso, mPendiente, mReprogramada, mVencida, mComp, mTotal, pctCump,
  openEdit, printFicha, setDel, tareasDet, hoyStr
}) => {
  const [verTareas, setVerTareas] = React.useState(false);

  // Colores semánticos para cada estado de tarea
  const EST_COLORS = {
    en_curso:'#60a5fa', pendiente:'#f59e0b', reprogramada:'#c084fc',
    vencida:'#f87171',  completada:'#4ade80'
  };

  // Estadísticas de los 5 estados requeridos
  const stats5 = [
    {l:'En Curso',      v:mEnCurso,      c:EST_COLORS.en_curso,     ic:'▶'},
    {l:'Pendientes',    v:mPendiente,    c:EST_COLORS.pendiente,    ic:'⏳'},
    {l:'Reprogramadas', v:mReprogramada, c:EST_COLORS.reprogramada, ic:'🔄'},
    {l:'Vencidas',      v:mVencida,      c:EST_COLORS.vencida,      ic:'⚠'},
    {l:'Completadas',   v:mComp,         c:EST_COLORS.completada,   ic:'✓'},
  ];

  return <div className="card-p" style={{textAlign:'center',position:'relative'}}>
    {/* Badge disponibilidad */}
    <div style={{position:'absolute',top:10,right:10}}>
      <span style={{fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:10,
        background:dispon?'rgba(74,222,128,.15)':'rgba(248,113,113,.15)',
        color:dispon?'#4ade80':'#f87171',
        border:`1px solid ${dispon?'rgba(74,222,128,.3)':'rgba(248,113,113,.3)'}`}}>
        {dispon?'Disponible':'No disponible'}
      </span>
    </div>

    {/* Avatar */}
    <div style={{width:60,height:60,borderRadius:'50%',margin:'0 auto 10px',overflow:'hidden',
      background:'rgba(30,58,95,.3)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      {m.foto?<img src={m.foto} alt={m.nombre} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
             :<Ico n="user" s={28} c="#C9A84C"/>}
    </div>
    <p className="sy" style={{fontWeight:700,color:'#fff',fontSize:13,margin:'0 0 2px'}}>{m.nombre}</p>
    <p style={{fontSize:11,color:'#C9A84C',margin:'0 0 2px'}}>{m.cargo||'—'}</p>
    {m.especialidad&&<p style={{fontSize:10,color:'#64748b',margin:'0 0 4px'}}>{m.especialidad}</p>}
    <p style={{fontSize:11,color:'#475569',margin:'0 0 8px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.email||'—'}</p>

    {/* ── Panel 5 estados — NUEVO ── */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4,marginBottom:4}}>
      {stats5.slice(0,3).map(s=>(
        <div key={s.l} style={{background:'#0f1923',borderRadius:5,padding:'5px 3px',border:'1px solid #243447',
          borderColor:s.v>0?`${s.c}44`:'#243447'}}>
          <p style={{margin:0,fontSize:13,fontWeight:800,color:s.v>0?s.c:'#334155'}}>{s.v}</p>
          <p style={{margin:0,fontSize:8,color:'#475569',lineHeight:1.2}}>{s.l}</p>
        </div>
      ))}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:8}}>
      {stats5.slice(3).map(s=>(
        <div key={s.l} style={{background:'#0f1923',borderRadius:5,padding:'5px 3px',border:'1px solid #243447',
          borderColor:s.v>0?`${s.c}44`:'#243447'}}>
          <p style={{margin:0,fontSize:13,fontWeight:800,color:s.v>0?s.c:'#334155'}}>{s.v}</p>
          <p style={{margin:0,fontSize:8,color:'#475569',lineHeight:1.2}}>{s.l}</p>
        </div>
      ))}
    </div>

    {/* Barra de cumplimiento */}
    {mTotal>0&&<div style={{background:'#0f1923',borderRadius:5,padding:'5px 8px',marginBottom:8,border:'1px solid #243447',textAlign:'left'}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,marginBottom:3}}>
        <span style={{color:'#64748b'}}>Cumplimiento</span>
        <span style={{color:'#4ade80',fontWeight:700}}>{pctCump}% · {mComp}/{mTotal}</span>
      </div>
      <div style={{height:4,background:'#1e2d42',borderRadius:99,overflow:'hidden'}}>
        <div style={{height:'100%',width:pctCump+'%',background:'linear-gradient(90deg,#4ade80,#22c55e)',borderRadius:99,transition:'width .4s'}}/>
      </div>
    </div>}

    {/* Botón desplegable detalle de tareas */}
    {mTotal>0&&<button onClick={()=>setVerTareas(v=>!v)}
      style={{width:'100%',background:'rgba(30,58,95,.18)',border:'1px solid #243447',borderRadius:6,
        padding:'4px 8px',color:'#60a5fa',fontSize:10,fontWeight:600,cursor:'pointer',
        marginBottom:6,display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
      <span style={{fontSize:9}}>{verTareas?'▲':'▼'}</span>
      {verTareas?'Ocultar tareas':`Ver ${mTotal} tarea${mTotal!==1?'s':''}`}
    </button>}

    {/* Lista desplegable de tareas del integrante */}
    {verTareas&&<div style={{textAlign:'left',maxHeight:200,overflowY:'auto',marginBottom:8,
      border:'1px solid #1e2d42',borderRadius:8,padding:'6px 0'}}>
      {tareasDet.length===0
        ?<p style={{fontSize:11,color:'#475569',margin:0,padding:'0 10px'}}>Sin tareas asignadas.</p>
        :tareasDet.map(t=>{
          const isVenc = t.fechaVen&&t.fechaVen<hoyStr&&t.estado!=='completada'&&t.estado!=='cancelada';
          const estEf  = isVenc?'vencida':t.estado;
          const colEst = EST_COLORS[estEf]||'#64748b';
          return <div key={t.id} style={{display:'flex',alignItems:'flex-start',gap:6,padding:'4px 10px',
            borderBottom:'1px solid #1e2d42'}}>
            <span style={{fontSize:8,marginTop:3,color:colEst,flexShrink:0,fontWeight:800}}>●</span>
            <div style={{minWidth:0,flex:1}}>
              <p style={{margin:0,fontSize:10,fontWeight:600,color:'#e2e8f0',
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
                title={t.titulo}>{t.titulo||'Sin título'}</p>
              <div style={{display:'flex',gap:5,alignItems:'center',marginTop:1}}>
                <span style={{fontSize:8,color:colEst,fontWeight:700,textTransform:'uppercase'}}>{estEf}</span>
                {t.fechaVen&&<span style={{fontSize:8,color:'#475569'}}>{t.fechaVen}</span>}
              </div>
            </div>
          </div>;
        })
      }
    </div>}

    <div style={{display:'flex',gap:6,justifyContent:'center'}}>
      <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(m)} title="Editar"><Ico n="edit" s={13}/></button>
      <button className="btn btn-ghost btn-sm" onClick={()=>printFicha(m)} title="Ficha técnica"><Ico n="down" s={13}/></button>
      <button className="btn btn-d btn-sm" onClick={()=>setDel(m.id)} title="Eliminar"><Ico n="trash" s={13}/></button>
    </div>
  </div>;
};

// ── EQUIPO ───────────────────────────────────────────────────
const Equipo = () => {
  const {equipo,setEquipo,tareas,toast} = useApp();
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState({});
  const [del,setDel]=useState(null);
  const cargos = DB.get('cargos');
  const upd = k => e => setForm(p=>({...p,[k]:e.target.value}));

  const openNew = ()=>{setForm({nombre:'',cedula:'',cargo:'',email:'',telefono:'',direccion:'',fechaNac:'',talla:'',foto:'',activo:true,horasSem:40,disponible:true,especialidad:''});setOpen(true);};
  const openEdit = m=>{setForm({...m});setOpen(true);};

  // FIX INC-1: loadFoto redimensiona a 300×300 px y comprime a JPEG q=0.75
  // Causa raíz: la foto original sin redimensionar podía superar el límite de
  // localStorage (~5 MB/clave), causando que DB.set() fallara y la foto se perdiera.
  const loadFoto = e => {
    const f = e.target.files?.[0]; if(!f) return;
    if(!f.type.startsWith('image/')) return toast('Solo se permiten imágenes','error');
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 300;
        const scale = Math.min(1, Math.max(MAX/img.width, MAX/img.height));
        const w = Math.round(img.width  * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const base64 = canvas.toDataURL('image/jpeg', 0.75);
        // Verificar tamaño estimado (~750KB max para dejar margen en localStorage)
        if(base64.length > 750_000) {
          // Segunda pasada con calidad reducida
          const b64low = canvas.toDataURL('image/jpeg', 0.5);
          setForm(p=>({...p, foto: b64low}));
        } else {
          setForm(p=>({...p, foto: base64}));
        }
        toast('Foto cargada','success');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(f);
  };

  const save = ()=>{
    if(!form.nombre?.trim()) return toast('Nombre requerido','error');
    const mbr={...form,id:form.id||uid(),_ts:Date.now()};
    // FIX INC-1: Envolver en try-catch para detectar cuota de localStorage excedida
    try {
      DB.set('equipo',mbr);
      setEquipo(prev=>form.id?prev.map(x=>x.id===mbr.id?mbr:x):[mbr,...prev]);
      setOpen(false); toast('Miembro guardado','success');
    } catch(storageErr) {
      if(storageErr.name==='QuotaExceededError'||storageErr.code===22) {
        // Reintentar sin la foto para preservar los demás datos
        const mbrSinFoto={...mbr,foto:''};
        try {
          DB.set('equipo',mbrSinFoto);
          setEquipo(prev=>form.id?prev.map(x=>x.id===mbrSinFoto.id?mbrSinFoto:x):[mbrSinFoto,...prev]);
          setOpen(false);
          toast('Miembro guardado (foto omitida por espacio de almacenamiento)','warning');
        } catch(e2){ toast('Error al guardar: '+e2.message,'error'); }
      } else { toast('Error al guardar: '+storageErr.message,'error'); }
    }
  };

  const remove = id=>{
    DB.del('equipo',id); setEquipo(prev=>prev.filter(x=>x.id!==id)); setDel(null);
  };

  const printFicha = m => {
    const w=window.open('','_blank');
    w.document.write(`<html><head><title>Ficha - ${m.nombre}</title><style>body{font-family:Arial,sans-serif;padding:32px;color:#222}h1{color:#1E3A5F;font-size:20px}h2{color:#C9A84C;font-size:16px;margin-top:0}table{width:100%;border-collapse:collapse}td{padding:8px 12px;border:1px solid #ddd;font-size:13px}td:first-child{font-weight:bold;background:#f7f7f7;width:36%}footer{color:#999;font-size:11px;margin-top:24px}</style></head><body>
    <h1>INTPLANNER PRO — Ficha Técnica</h1><h2>${m.nombre}</h2>
    <table>
      <tr><td>Cédula</td><td>${m.cedula||'—'}</td></tr>
      <tr><td>Cargo</td><td>${m.cargo||'—'}</td></tr>
      <tr><td>Email</td><td>${m.email||'—'}</td></tr>
      <tr><td>Teléfono</td><td>${m.telefono||'—'}</td></tr>
      <tr><td>Dirección</td><td>${m.direccion||'—'}</td></tr>
      <tr><td>Fecha de Nacimiento</td><td>${m.fechaNac||'—'}</td></tr>
      <tr><td>Talla Dotación</td><td>${m.talla||'—'}</td></tr>
      <tr><td>Estado</td><td>${m.activo?'Activo':'Inactivo'}</td></tr>
    </table>
    <footer>Generado por INTPLANNER PRO · ${new Date().toLocaleDateString('es-CO')}</footer>
    </body></html>`);
    w.document.close(); setTimeout(()=>w.print(),400);
  };

  return <div className="fade">
    <div style={{marginBottom:14}}><button className="btn btn-p btn-sm" onClick={openNew}><Ico n="plus" s={14}/>Nuevo Miembro</button></div>
    <div className="grid-4">
      {equipo.length===0&&<div className="card-p" style={{gridColumn:'1/-1',textAlign:'center',color:'#475569'}}>Sin miembros de equipo.</div>}
      {equipo.map(m=>{
        // ── FIX EQUIPO-SYNC: Normalización dual responsableId/responsablesIds (ID)
        //    + t.responsable===m.nombre (campo legacy) para retrocompatibilidad total.
        //    Causa raíz del bug: el código anterior filtraba solo por t.responsable===m.nombre
        //    (texto), ignorando el campo canónico responsableId/responsablesIds (UUID)
        //    que usa el módulo Tareas desde la versión multi-responsable.
        const miembroEnTarea = t => {
          if(t.esAlerta) return false;
          const rIds = Array.isArray(t.responsablesIds) && t.responsablesIds.length
            ? t.responsablesIds
            : (t.responsableId ? [t.responsableId] : []);
          return rIds.includes(m.id) || t.responsable === m.nombre;
        };
        const hoyStr = new Date().toISOString().split('T')[0];
        const mAllTareas    = tareas.filter(miembroEnTarea);
        const mEnCurso      = mAllTareas.filter(t=>t.estado==='en_curso').length;
        const mPendiente    = mAllTareas.filter(t=>t.estado==='pendiente').length;
        const mReprogramada = mAllTareas.filter(t=>t.estado==='reprogramada').length;
        const mVencida      = mAllTareas.filter(t=>t.fechaVen&&t.fechaVen<hoyStr&&t.estado!=='completada'&&t.estado!=='cancelada').length;
        const mComp         = mAllTareas.filter(t=>t.estado==='completada').length;
        const mTotal        = mAllTareas.length;
        const pctCump       = mTotal?Math.round(mComp/mTotal*100):0;
        const mActivas      = mAllTareas.filter(t=>t.estado!=='completada'&&t.estado!=='cancelada');
        const horasCap      = Number(m.horasSem)||40;
        const horasOcup     = Math.min(mActivas.length*4, horasCap);
        const pctCarga      = Math.round(horasOcup/horasCap*100);
        const cargaColor    = pctCarga>=90?'#f87171':pctCarga>=70?'#C9A84C':'#4ade80';
        const dispon        = m.disponible!==false;
        return <EquipoMiembroCard key={m.id} m={m} dispon={dispon}
          horasOcup={horasOcup} horasCap={horasCap} pctCarga={pctCarga} cargaColor={cargaColor}
          mEnCurso={mEnCurso} mPendiente={mPendiente} mReprogramada={mReprogramada}
          mVencida={mVencida} mComp={mComp} mTotal={mTotal} pctCump={pctCump}
          openEdit={openEdit} printFicha={printFicha} setDel={setDel}
          tareasDet={mAllTareas} hoyStr={hoyStr}
        />;
      })}
    </div>

    <Modal open={open} onClose={()=>setOpen(false)} title={form.id?'Editar Miembro':'Nuevo Miembro'} wide>
      <div className="grid-2">
        <div style={{gridColumn:'1/-1',display:'flex',alignItems:'center',gap:14,marginBottom:4}}>
          <div style={{width:60,height:60,borderRadius:'50%',overflow:'hidden',background:'rgba(30,58,95,.3)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            {form.foto?<img src={form.foto} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<Ico n="user" s={26} c="#C9A84C"/>}
          </div>
          <label className="btn btn-ghost btn-sm" style={{cursor:'pointer'}}><Ico n="up" s={14}/>Cargar Foto<input type="file" accept="image/*" style={{display:'none'}} onChange={loadFoto}/></label>
        </div>
        <F label="Nombre Completo *"><input className="inp" value={form.nombre||''} onChange={upd('nombre')}/></F>
        <F label="Cédula"><input className="inp" value={form.cedula||''} onChange={upd('cedula')}/></F>
        <F label="Cargo"><select className="inp" value={form.cargo||''} onChange={upd('cargo')}>
          <option value="">Seleccionar...</option>
          {[...cargos.map(c=>c.nombre),'Gerente','Coordinador','Consultor','Asistente','Auxiliar'].filter((v,i,a)=>a.indexOf(v)===i).map(c=><option key={c} value={c}>{c}</option>)}
        </select></F>
        <F label="Email"><input type="email" className="inp" value={form.email||''} onChange={upd('email')}/></F>
        <F label="Teléfono"><input className="inp" value={form.telefono||''} onChange={upd('telefono')}/></F>
        <F label="Fecha Nacimiento"><input type="date" className="inp" value={form.fechaNac||''} onChange={upd('fechaNac')}/></F>
        <F label="Talla Dotación"><select className="inp" value={form.talla||''} onChange={upd('talla')}>
          <option value="">—</option>{['XS','S','M','L','XL','XXL'].map(t=><option key={t} value={t}>{t}</option>)}
        </select></F>
        <F label="Especialidad"><input className="inp" value={form.especialidad||''} onChange={upd('especialidad')} placeholder="Ej: Diseño, Desarrollo, Contabilidad..."/></F>
        <F label="Dirección" col2><input className="inp" value={form.direccion||''} onChange={upd('direccion')}/></F>
        <F label="Horas / semana"><input type="number" className="inp" value={form.horasSem||40} onChange={upd('horasSem')} min={1} max={80} placeholder="40"/></F>
        <F label="Disponibilidad"><select className="inp" value={form.disponible!==false?'si':'no'} onChange={e=>setForm(p=>({...p,disponible:e.target.value==='si'}))}>
          <option value="si">✅ Disponible</option><option value="no">🔴 No disponible</option>
        </select></F>
        <div style={{gridColumn:'1/-1',display:'flex',alignItems:'center',gap:8}}>
          <input type="checkbox" id="mact" checked={form.activo!==false} onChange={e=>setForm(p=>({...p,activo:e.target.checked}))} style={{accentColor:'#C9A84C'}}/>
          <label htmlFor="mact" style={{fontSize:13,color:'#cbd5e1'}}>Miembro activo</label>
        </div>
      </div>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setOpen(false)}>Cancelar</button>
        <button className="btn btn-g btn-sm" onClick={save}><Ico n="check" s={14}/>Guardar</button>
      </div>
    </Modal>
    {del&&<Confirm msg="¿Eliminar este miembro?" onOk={()=>remove(del)} onCancel={()=>setDel(null)}/>}
  </div>;
};

// ── PROYECTOS + GANTT ────────────────────────────────────────
// ── CALENDARIO ───────────────────────────────────────────────
const Calendario = () => {
  const {tareas,setTareas,clientes,equipo,toast} = useApp();
  const [fecha,setFecha]=useState(new Date());
  const [filtEq,setFiltEq]=useState('');
  const [tick,setTick]=useState(0);
  const [openEvento,setOpenEvento]=useState(false);
  const [tipoEvento,setTipoEvento]=useState('reunion'); // 'reunion' | 'capacitacion'
  const [formEvento,setFormEvento]=useState({});
  const [delEvento,setDelEvento]=useState(null);
  const [diaSeleccionado,setDiaSeleccionado]=useState(null); // {dateStr, items[]} — modal agenda
  const y=fecha.getFullYear(),m=fecha.getMonth();
  const primerDia=(new Date(y,m,1).getDay()||7)-1;
  const diasMes=new Date(y,m+1,0).getDate();
  const hoy=new Date();
  const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  useEffect(()=>{
    const handler = () => setTick(p=>p+1);
    window.addEventListener('ip-calendario-updated', handler);
    return () => window.removeEventListener('ip-calendario-updated', handler);
  },[]);

  const tareasF = useMemo(()=>tareas.filter(t=>{
    if(filtEq && t.responsableId!==filtEq) return false;
    if(t.esAlerta && t.tareaVinculadaId) return false;
    return true;
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }),[tareas,filtEq,tick]);

  const getDia=d=>{
    const s=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return tareasF.filter(t=>t.fechaVen===s);
  };

  const hoyStr=`${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(hoy.getDate()).padStart(2,'0')}`;
  const hoyTareas=tareasF.filter(t=>t.fechaVen===hoyStr);

  const chipStyle = t => {
    if(t.esAlerta) return {
      background: t.tipo==='Urgente'?'rgba(153,27,27,.6)':t.tipo==='Reunión'||t.tipo==='reunion'?'rgba(88,28,135,.5)':t.tipo==='Capacitación'||t.tipo==='capacitacion'?'rgba(15,118,110,.5)':'rgba(30,58,95,.6)',
      color: t.tipo==='Urgente'?'#fca5a5':t.tipo==='Reunión'||t.tipo==='reunion'?'#d8b4fe':t.tipo==='Capacitación'||t.tipo==='capacitacion'?'#5eead4':'#7dd3fc',
      borderLeft: '2px solid #C9A84C',
    };
    return {
      background: t.prioridad==='urgente'?'rgba(153,27,27,.5)':t.prioridad==='alta'?'rgba(120,60,0,.5)':t.estado==='completada'?'rgba(26,107,58,.4)':'rgba(30,58,95,.5)',
      color: t.prioridad==='urgente'?'#fca5a5':t.estado==='completada'?'#4ade80':'#93c5fd',
    };
  };

  const tareasMes = useMemo(()=>tareasF.filter(t=>{
    const s=`${y}-${String(m+1).padStart(2,'0')}`;
    return t.fechaVen?.startsWith(s);
  }),[tareasF,y,m]);

  // ── Guardar evento especial (Reunión / Capacitación) ──────
  const saveEvento = () => {
    if(!formEvento.titulo?.trim()) return toast('El título es requerido','error');
    if(!formEvento.fecha) return toast('La fecha es requerida','error');
    const esReunion = tipoEvento==='reunion';
    const evento = {
      id:            formEvento.id || uid(),
      titulo:        formEvento.titulo.trim(),
      tipo:          esReunion ? 'Reunión' : 'Capacitación',
      fechaVen:      formEvento.fecha,
      fechaInicio:   formEvento.fechaInicio || formEvento.fecha,
      horaInicio:    formEvento.horaInicio || '',
      horaFin:       formEvento.horaFin || '',
      lugar:         formEvento.lugar || '',
      desc:          formEvento.desc || '',
      clienteId:     formEvento.clienteId || '',
      responsableId: formEvento.responsableId || '',
      responsablesIds: formEvento.responsablesIds || (formEvento.responsableId?[formEvento.responsableId]:[]),
      estado:        'pendiente',
      prioridad:     formEvento.prioridad || 'media',
      esAlerta:      true,
      tareaVinculadaId: null,
      auto:          false,
      creadoEn:      formEvento.creadoEn || new Date().toISOString(),
      updatedAt:     new Date().toISOString(),
      // Campos específicos por tipo
      ...(esReunion ? {
        modalidad:   formEvento.modalidad || 'presencial', // presencial | virtual | hibrida
        linkVirtual: formEvento.linkVirtual || '',
        agenda:      formEvento.agenda || '',
      } : {
        instructor:  formEvento.instructor || '',
        duracionH:   formEvento.duracionH || '',
        modalidad:   formEvento.modalidad || 'presencial',
        linkVirtual: formEvento.linkVirtual || '',
      }),
    };
    const esNuevo = !formEvento.id;
    DB.set('tareas', evento);
    setTareas(prev => esNuevo ? [evento,...prev] : prev.map(x=>x.id===evento.id?evento:x));
    window.dispatchEvent(new CustomEvent('ip-calendario-updated',{detail:{ts:Date.now()}}));
    setOpenEvento(false);
    toast(esNuevo ? `✅ ${esReunion?'Reunión':'Capacitación'} agendada` : `✅ Evento actualizado`, 'success');
  };

  const removeEvento = id => {
    DB.del('tareas',id);
    setTareas(prev=>prev.filter(x=>x.id!==id));
    setDelEvento(null);
    toast('Evento eliminado','info');
  };

  const openNewEvento = (tipo) => {
    setTipoEvento(tipo);
    setFormEvento({titulo:'',fecha:'',fechaInicio:'',horaInicio:'',horaFin:'',lugar:'',desc:'',clienteId:'',responsableId:'',responsablesIds:[],prioridad:'media',modalidad:'presencial',linkVirtual:'',agenda:'',instructor:'',duracionH:''});
    setOpenEvento(true);
  };

  const updEv = k => e => setFormEvento(p=>({...p,[k]:e.target.value}));

  const esReunion = tipoEvento==='reunion';

  return <div className="fade">
    <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:14}}>
      <button className="btn btn-ghost btn-sm" onClick={()=>setFecha(new Date(y,m-1))}><Ico n="chevL" s={16}/></button>
      <div style={{textAlign:'center',minWidth:200}}>
        <span className="sy" style={{fontWeight:700,color:'#fff',fontSize:16}}>{MESES[m]} {y}</span>
        {tareasMes.length>0&&<span style={{fontSize:11,color:'#C9A84C',marginLeft:8,fontWeight:600}}>{tareasMes.length} evento{tareasMes.length!==1?'s':''}</span>}
      </div>
      <button className="btn btn-ghost btn-sm" onClick={()=>setFecha(new Date(y,m+1))}><Ico n="chevR" s={16}/></button>
      <button className="btn btn-ghost btn-sm" onClick={()=>setFecha(new Date())}>Hoy</button>

      {/* Botones agendar Reunión / Capacitación */}
      <button className="btn btn-sm" onClick={()=>openNewEvento('reunion')}
        style={{background:'linear-gradient(135deg,rgba(88,28,135,.7),rgba(109,40,217,.5))',border:'1px solid rgba(167,139,250,.4)',color:'#d8b4fe',display:'flex',alignItems:'center',gap:6}}>
        <span style={{fontSize:13}}>📅</span> Agendar Reunión
      </button>
      <button className="btn btn-sm" onClick={()=>openNewEvento('capacitacion')}
        style={{background:'linear-gradient(135deg,rgba(15,118,110,.7),rgba(20,184,166,.4))',border:'1px solid rgba(94,234,212,.4)',color:'#5eead4',display:'flex',alignItems:'center',gap:6}}>
        <span style={{fontSize:13}}>🎓</span> Agendar Capacitación
      </button>

      <select className="inp" style={{marginLeft:'auto',width:'auto',padding:'5px 10px',fontSize:12}} value={filtEq} onChange={e=>setFiltEq(e.target.value)}>
        <option value="">Todo el equipo</option>
        {equipo.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
      </select>
    </div>

    {/* Leyenda */}
    <div style={{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap'}}>
      {[
        {color:'#93c5fd',  bg:'rgba(30,58,95,.5)',      label:'Tarea'},
        {color:'#fca5a5',  bg:'rgba(153,27,27,.5)',     label:'Urgente'},
        {color:'#4ade80',  bg:'rgba(26,107,58,.4)',     label:'Completada'},
        {color:'#7dd3fc',  bg:'rgba(30,58,95,.6)',      label:'🔔 Alerta', border:'2px solid #C9A84C'},
        {color:'#d8b4fe',  bg:'rgba(88,28,135,.5)',     label:'📅 Reunión', border:'2px solid #C9A84C'},
        {color:'#5eead4',  bg:'rgba(15,118,110,.5)',    label:'🎓 Capacitación', border:'2px solid #5eead4'},
      ].map(x=>(
        <span key={x.label} style={{fontSize:10,padding:'2px 8px',borderRadius:4,background:x.bg,color:x.color,fontWeight:600,borderLeft:x.border||'none'}}>
          {x.label}
        </span>
      ))}
    </div>

    <div className="card-p" style={{marginBottom:14}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:8}}>
        {['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=><div key={d} className="cal-header" style={{textAlign:'center',fontSize:11,fontWeight:600,color:'#475569',padding:'4px 0'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
        {[...Array(primerDia)].map((_,i)=><div key={'p'+i}/>)}
        {[...Array(diasMes)].map((_,i)=>{
          const d=i+1;
          const isHoy=hoy.getFullYear()===y&&hoy.getMonth()===m&&hoy.getDate()===d;
          const ts=getDia(d);
          const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          return <div key={d} className="cal-cel" onClick={()=>ts.length>0&&setDiaSeleccionado({dateStr,items:ts})}
            style={{borderRadius:8,padding:'6px 4px',minHeight:64,border:'1px solid',
              borderColor:isHoy?'#C9A84C':'#243447',
              background:isHoy?'rgba(201,168,76,.08)':'#0f1923',
              cursor:ts.length>0?'pointer':'default',
              transition:'background .15s',
            }}
            onMouseEnter={e=>{if(ts.length>0) e.currentTarget.style.background=isHoy?'rgba(201,168,76,.14)':'rgba(30,58,95,.18)';}}
            onMouseLeave={e=>{e.currentTarget.style.background=isHoy?'rgba(201,168,76,.08)':'#0f1923';}}>
            <div className="cal-dia" style={{fontSize:12,fontWeight:isHoy?700:400,color:isHoy?'#C9A84C':'#64748b',marginBottom:3,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>
              {d}
              {ts.length>0&&<span style={{fontSize:9,background:'rgba(201,168,76,.25)',color:'#C9A84C',borderRadius:99,padding:'0 4px',fontWeight:700,lineHeight:'14px'}}>{ts.length}</span>}
            </div>
            {ts.slice(0,3).map(t=>(
              <div key={t.id} title={t.titulo+(t.esAlerta?' ['+t.tipo+']':'')} style={{
                fontSize:10,padding:'1px 4px',borderRadius:3,marginBottom:2,
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                ...chipStyle(t)
              }}>
                {t.tipo==='Reunión'?'📅 ':t.tipo==='Capacitación'?'🎓 ':t.esAlerta?'🔔 ':''}{t.titulo}
              </div>
            ))}
            {ts.length>3&&<div style={{fontSize:10,color:'#C9A84C',textAlign:'center',fontWeight:600}}>+{ts.length-3} más</div>}
          </div>;
        })}
      </div>
    </div>

    {/* Agenda de Hoy */}
    <div className="card-p" style={{marginBottom:14}}>
      <h4 className="sy" style={{color:'#fff',fontWeight:700,fontSize:13,marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
        <Ico n="clock" s={14} c="#C9A84C"/> Agenda de Hoy — {hoy.toLocaleDateString('es-CO')}
        <span style={{marginLeft:'auto',fontSize:11,fontWeight:400,color:'#475569'}}>{hoyTareas.length} evento{hoyTareas.length!==1?'s':''}</span>
      </h4>
      {hoyTareas.length===0&&<p style={{color:'#475569',fontSize:13}}>Sin tareas ni alertas para hoy ✓</p>}
      {hoyTareas.map(t=>(
        <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid rgba(36,52,71,.5)'}}>
          <div style={{flex:1,minWidth:0}}>
            <p style={{color:'#fff',fontSize:13,margin:0,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {t.tipo==='Reunión'?'📅 ':t.tipo==='Capacitación'?'🎓 ':t.esAlerta?'🔔 ':''}{t.titulo}
            </p>
            <p style={{color:'#475569',fontSize:11,margin:0}}>
              {equipo.find(e=>e.id===t.responsableId)?.nombre||'Sin asignar'}
              {t.esAlerta&&t.tipo&&<span style={{color:'#64748b'}}> · {t.tipo}</span>}
              {t.horaInicio&&<span style={{color:'#C9A84C',marginLeft:6}}>⏰ {t.horaInicio}{t.horaFin?' - '+t.horaFin:''}</span>}
              {t.lugar&&<span style={{color:'#64748b',marginLeft:6}}>📍 {t.lugar}</span>}
            </p>
          </div>
          <div style={{display:'flex',gap:4,flexShrink:0,marginLeft:8}}>
            <SBadge s={t.estado}/>
            {(t.tipo==='Reunión'||t.tipo==='Capacitación')&&(
              <button onClick={()=>{setTipoEvento(t.tipo==='Reunión'?'reunion':'capacitacion');setFormEvento({...t,fecha:t.fechaVen});setOpenEvento(true);}}
                style={{background:'none',border:'1px solid #243447',borderRadius:5,padding:'2px 6px',cursor:'pointer',color:'#475569',fontSize:10}}>✏️</button>
            )}
            {(t.tipo==='Reunión'||t.tipo==='Capacitación')&&(
              <button onClick={()=>setDelEvento(t.id)}
                style={{background:'none',border:'1px solid rgba(248,113,113,.3)',borderRadius:5,padding:'2px 6px',cursor:'pointer',color:'#f87171',fontSize:10}}>🗑️</button>
            )}
          </div>
        </div>
      ))}
    </div>

    {/* Lista eventos especiales del mes */}
    {(()=>{
      const eventos = tareasF.filter(t=>t.esAlerta&&(t.tipo==='Reunión'||t.tipo==='Capacitación')&&t.fechaVen?.startsWith(`${y}-${String(m+1).padStart(2,'0')}`));
      if(!eventos.length) return null;
      return <div className="card-p" style={{marginBottom:14}}>
        <h4 className="sy" style={{color:'#fff',fontWeight:700,fontSize:13,marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
          Eventos del Mes
          <span style={{marginLeft:'auto',fontSize:11,fontWeight:400,color:'#475569'}}>{eventos.length} evento{eventos.length!==1?'s':''}</span>
        </h4>
        {eventos.sort((a,b)=>(a.fechaVen||'').localeCompare(b.fechaVen||'')).map(t=>(
          <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid rgba(36,52,71,.4)'}}>
            <div style={{flex:1,minWidth:0}}>
              <p style={{color:'#fff',fontSize:13,margin:0,fontWeight:500}}>
                {t.tipo==='Reunión'?'📅':'🎓'} {t.titulo}
              </p>
              <p style={{color:'#475569',fontSize:11,margin:'2px 0 0'}}>
                {t.fechaVen}
                {t.horaInicio&&<span style={{marginLeft:8,color:'#C9A84C'}}>⏰ {t.horaInicio}{t.horaFin?' - '+t.horaFin:''}</span>}
                {t.lugar&&<span style={{marginLeft:8}}>📍 {t.lugar}</span>}
                {t.clienteId&&<span style={{marginLeft:8,color:'#60a5fa'}}>📁 {clientes?.find(c=>c.id===t.clienteId)?.nombre||'—'}</span>}
              </p>
            </div>
            <div style={{display:'flex',gap:4,flexShrink:0,marginLeft:8}}>
              <button onClick={()=>{setTipoEvento(t.tipo==='Reunión'?'reunion':'capacitacion');setFormEvento({...t,fecha:t.fechaVen});setOpenEvento(true);}}
                style={{background:'none',border:'1px solid #243447',borderRadius:5,padding:'3px 8px',cursor:'pointer',color:'#475569',fontSize:11}}>✏️</button>
              <button onClick={()=>setDelEvento(t.id)}
                style={{background:'none',border:'1px solid rgba(248,113,113,.3)',borderRadius:5,padding:'3px 8px',cursor:'pointer',color:'#f87171',fontSize:11}}>🗑️</button>
            </div>
          </div>
        ))}
      </div>;
    })()}

    {/* Tareas sin fecha */}
    {(()=>{
      const sinFecha = tareasF.filter(t=>!t.esAlerta&&!t.fechaVen);
      if(!sinFecha.length) return null;
      return <div className="card-p">
        <h4 className="sy" style={{color:'#fff',fontWeight:700,fontSize:13,marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
          <Ico n="clock" s={14} c="#64748b"/> Sin Fecha Asignada
          <span style={{marginLeft:'auto',fontSize:11,fontWeight:400,color:'#475569'}}>{sinFecha.length} tarea{sinFecha.length!==1?'s':''}</span>
        </h4>
        {sinFecha.map(t=>(
          <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid rgba(36,52,71,.4)'}}>
            <div style={{flex:1,minWidth:0}}>
              <p style={{color:'#94a3b8',fontSize:12,margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.titulo}</p>
              <p style={{color:'#475569',fontSize:11,margin:0}}>{equipo.find(e=>e.id===t.responsableId)?.nombre||'Sin asignar'}</p>
            </div>
            <div style={{display:'flex',gap:6,flexShrink:0,marginLeft:8}}><SBadge s={t.estado}/><SBadge s={t.prioridad}/></div>
          </div>
        ))}
      </div>;
    })()}

    {/* ── MODAL AGENDAR REUNIÓN / CAPACITACIÓN ── */}
    <Modal open={openEvento} onClose={()=>setOpenEvento(false)}
      title={(esReunion?'📅':'🎓')+' '+(formEvento.id?'Editar':'Agendar')+' '+(esReunion?'Reunión':'Capacitación')} wide>
      <div className="grid-2">

        <F label="Título *" col2>
          <input className="inp" value={formEvento.titulo||''} onChange={updEv('titulo')} placeholder={esReunion?'Ej: Revisión de avance Q2':'Ej: Capacitación en SST'}/>
        </F>

        <F label="Fecha *">
          <input type="date" className="inp" value={formEvento.fecha||''} onChange={updEv('fecha')}/>
        </F>

        <F label="Prioridad">
          <select className="inp" value={formEvento.prioridad||'media'} onChange={updEv('prioridad')}>
            <option value="baja">Baja</option>
            <option value="media">Media</option>
            <option value="alta">Alta</option>
            <option value="urgente">Urgente</option>
          </select>
        </F>

        <F label="Hora de Inicio">
          <input type="time" className="inp" value={formEvento.horaInicio||''} onChange={updEv('horaInicio')}/>
        </F>

        <F label="Hora de Fin">
          <input type="time" className="inp" value={formEvento.horaFin||''} onChange={updEv('horaFin')}/>
        </F>

        <F label="Modalidad">
          <select className="inp" value={formEvento.modalidad||'presencial'} onChange={updEv('modalidad')}>
            <option value="presencial">Presencial</option>
            <option value="virtual">Virtual</option>
            <option value="hibrida">Híbrida</option>
          </select>
        </F>

        {(formEvento.modalidad==='virtual'||formEvento.modalidad==='hibrida')&&(
          <F label="Enlace Virtual" col2>
            <input className="inp" value={formEvento.linkVirtual||''} onChange={updEv('linkVirtual')} placeholder="https://meet.google.com/..."/>
          </F>
        )}

        <F label="Lugar / Sala">
          <input className="inp" value={formEvento.lugar||''} onChange={updEv('lugar')} placeholder={esReunion?'Sala de juntas':'Salón de capacitaciones'}/>
        </F>

        <F label="Cliente">
          <select className="inp" value={formEvento.clienteId||''} onChange={updEv('clienteId')}>
            <option value="">Sin cliente</option>
            {[...(clientes||[])].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
          </select>
        </F>

        <F label="Responsable">
          <select className="inp" value={formEvento.responsableId||''} onChange={updEv('responsableId')}>
            <option value="">Sin asignar</option>
            {equipo.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
          </select>
        </F>

        {!esReunion&&(
          <F label="Instructor">
            <input className="inp" value={formEvento.instructor||''} onChange={updEv('instructor')} placeholder="Nombre del instructor"/>
          </F>
        )}

        {!esReunion&&(
          <F label="Duración (horas)">
            <input type="number" className="inp" value={formEvento.duracionH||''} onChange={updEv('duracionH')} placeholder="8" min="0.5" step="0.5"/>
          </F>
        )}

        {esReunion&&(
          <F label="Agenda / Temas" col2>
            <textarea className="inp" value={formEvento.agenda||''} onChange={updEv('agenda')} rows={3} placeholder="1. Revisión de avances&#10;2. Próximas actividades&#10;3. Compromisos"/>
          </F>
        )}

        <F label="Descripción / Notas" col2>
          <textarea className="inp" value={formEvento.desc||''} onChange={updEv('desc')} rows={2} placeholder="Observaciones adicionales..."/>
        </F>

      </div>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setOpenEvento(false)}>Cancelar</button>
        <button className="btn btn-g btn-sm" onClick={saveEvento}>
          <Ico n="check" s={14}/>{formEvento.id?'Actualizar':'Agendar'} {esReunion?'Reunión':'Capacitación'}
        </button>
      </div>
    </Modal>

    {/* ── MODAL AGENDA DEL DÍA ── */}
    {diaSeleccionado&&(()=>{
      const {dateStr, items} = diaSeleccionado;
      // Formatear fecha legible
      const [yy,mm,dd] = dateStr.split('-');
      const MESES_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      const DIAS_FULL  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
      const dateObj    = new Date(Number(yy), Number(mm)-1, Number(dd));
      const diaNombre  = DIAS_FULL[dateObj.getDay()];
      const mesNombre  = MESES_FULL[Number(mm)-1];
      const fechaLeg   = `${diaNombre.charAt(0).toUpperCase()+diaNombre.slice(1)}, ${Number(dd)} de ${mesNombre} de ${yy}`;

      // Separar por tipo
      const reuniones     = items.filter(t=>t.tipo==='Reunión'||t.tipo==='reunion');
      const capacitaciones= items.filter(t=>t.tipo==='Capacitación'||t.tipo==='capacitacion');
      const tareasList    = items.filter(t=>!t.esAlerta&&t.tipo!=='Reunión'&&t.tipo!=='Capacitación');
      const alertas       = items.filter(t=>t.esAlerta&&t.tipo!=='Reunión'&&t.tipo!=='Capacitación');

      const TIPO_CHIP = {
        'Reunión':     {bg:'rgba(88,28,135,.5)',  color:'#d8b4fe', icon:'📅'},
        'Capacitación':{bg:'rgba(15,118,110,.5)', color:'#5eead4', icon:'🎓'},
        'alerta':      {bg:'rgba(30,58,95,.6)',   color:'#7dd3fc', icon:'🔔'},
        'tarea':       {bg:'rgba(30,58,95,.5)',   color:'#93c5fd', icon:'📋'},
      };

      const ItemRow = ({t, tipoKey}) => {
        const chip = TIPO_CHIP[tipoKey] || TIPO_CHIP['tarea'];
        const resp = equipo.find(e=>e.id===t.responsableId)?.nombre||'';
        const cli  = clientes?.find(c=>c.id===t.clienteId)?.nombre||'';
        return <div style={{
          padding:'10px 14px', borderRadius:8, marginBottom:6,
          background: t.prioridad==='urgente'?'rgba(153,27,27,.15)':t.estado==='completada'?'rgba(26,107,58,.1)':'rgba(15,25,40,.6)',
          border:'1px solid rgba(36,52,71,.8)'
        }}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:resp||cli||t.horaInicio?4:0}}>
            <span style={{fontSize:13,flexShrink:0}}>{chip.icon}</span>
            <p style={{margin:0,fontSize:13,fontWeight:600,color:'#e2e8f0',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.titulo}</p>
            {(t.tipo==='Reunión'||t.tipo==='Capacitación')&&(
              <span style={{fontSize:10,fontWeight:700,padding:'1px 7px',borderRadius:99,flexShrink:0,
                background:chip.bg, color:chip.color}}>{t.tipo}</span>
            )}
            {!t.esAlerta&&<SBadge s={t.prioridad==='urgente'?'urgente':t.estado}/>}
          </div>
          {(resp||cli||t.horaInicio||t.lugar)&&(
            <div style={{display:'flex',flexWrap:'wrap',gap:10,paddingLeft:21,fontSize:11,color:'#64748b'}}>
              {t.horaInicio&&<span style={{color:'#C9A84C'}}>⏰ {t.horaInicio}{t.horaFin?' – '+t.horaFin:''}</span>}
              {resp&&<span>👤 {resp}</span>}
              {cli&&<span>🏢 {cli}</span>}
              {t.lugar&&<span>📍 {t.lugar}</span>}
              {t.modalidad&&t.modalidad!=='presencial'&&<span style={{textTransform:'capitalize',color:'#60a5fa'}}>🌐 {t.modalidad}</span>}
            </div>
          )}
          {t.desc&&<p style={{margin:'4px 0 0 21px',fontSize:11,color:'#475569',lineHeight:1.5}}>{t.desc.substring(0,120)}{t.desc.length>120?'…':''}</p>}
        </div>;
      };

      const Section = ({title, color, items:sItems}) => {
        if(!sItems.length) return null;
        const tKey = title.startsWith('📅')?'Reunión':title.startsWith('🎓')?'Capacitación':title.startsWith('🔔')?'alerta':'tarea';
        return <div style={{marginBottom:16}}>
          <p style={{fontSize:11,fontWeight:700,color,textTransform:'uppercase',letterSpacing:'.5px',margin:'0 0 8px',
            display:'flex',alignItems:'center',gap:6}}>
            {title} <span style={{fontWeight:400,color:'#475569'}}>({sItems.length})</span>
          </p>
          {sItems.map(t=><ItemRow key={t.id} t={t} tipoKey={tKey}/>)}
        </div>;
      };

      return <Modal open={true} onClose={()=>setDiaSeleccionado(null)} title={`📆 ${fechaLeg}`} wide>
        <div style={{maxHeight:'65vh',overflowY:'auto',paddingRight:4}}>
          {items.length===0&&<p style={{color:'#475569',textAlign:'center',padding:20}}>Sin eventos para este día.</p>}
          <Section title="📅 Reuniones"     color="#d8b4fe" items={reuniones}/>
          <Section title="🎓 Capacitaciones" color="#5eead4" items={capacitaciones}/>
          <Section title="📋 Tareas"         color="#93c5fd" items={tareasList}/>
          <Section title="🔔 Alertas"        color="#C9A84C" items={alertas}/>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'space-between',alignItems:'center',marginTop:16,paddingTop:12,borderTop:'1px solid #243447'}}>
          <p style={{margin:0,fontSize:11,color:'#475569'}}>{items.length} evento{items.length!==1?'s':''} · Haz clic en Agendar para añadir más</p>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>{
              setDiaSeleccionado(null);
              openNewEvento('reunion');
              setFormEvento(p=>({...p, fecha:dateStr}));
            }}>📅 Agendar Reunión</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>{
              setDiaSeleccionado(null);
              openNewEvento('capacitacion');
              setFormEvento(p=>({...p, fecha:dateStr}));
            }}>🎓 Capacitación</button>
            <button className="btn btn-p btn-sm" onClick={()=>setDiaSeleccionado(null)}>Cerrar</button>
          </div>
        </div>
      </Modal>;
    })()}

    {delEvento&&<Confirm msg="¿Eliminar este evento del calendario?" onOk={()=>removeEvento(delEvento)} onCancel={()=>setDelEvento(null)}/>}
  </div>;
};

// ── COMP TAREA FORM ─────────────────────────────────────────────
// Definido FUERA de VisitaCliente para evitar que React lo trate
// como un tipo nuevo en cada render (causa: pérdida de foco en inputs).
// FIX: React sólo desmonta/remonta un componente cuando su *tipo* cambia.
// Al definirlo fuera, el tipo es estable entre renders del padre.
const CompTareaForm = ({comp, idx, equipo, clientes, proyectos, toast, onUpdate, onDelete}) => {
  const esEquipo = !!comp.equipoIntegra;

  const updField = (k,v) => onUpdate(idx, {[k]:v});

  const toggleEI = () => {
    if(!esEquipo){
      onUpdate(idx,{equipoIntegra:true, responsablesIds:equipo.map(m=>m.id), responsableId:equipo[0]?.id||''});
    } else {
      onUpdate(idx,{equipoIntegra:false, responsablesIds:[], responsableId:''});
    }
  };

  const toggleMiembro = (mid) => {
    const prev = Array.isArray(comp.responsablesIds)?comp.responsablesIds:[];
    const next = prev.includes(mid) ? prev.filter(x=>x!==mid) : [...prev,mid];
    onUpdate(idx,{responsablesIds:next, responsableId:next[0]||'', equipoIntegra:next.length===equipo.length});
  };

  const addSubComp = () => onUpdate(idx,{
    compromisos:[...(comp.compromisos||[]),
      {id:uid(),descripcion:'',responsabilidad:'integra',empleadoId:'',fechaCompromiso:''}]
  });

  const updSubComp = (si,k,v) => {
    const arr=[...(comp.compromisos||[])]; arr[si]={...arr[si],[k]:v};
    onUpdate(idx,{compromisos:arr});
  };

  const delSubComp = si => onUpdate(idx,{
    compromisos:(comp.compromisos||[]).filter((_,i)=>i!==si)
  });

  const onAddFile = e => {
    const files = Array.from(e.target.files||[]).slice(0,4-(comp.soporteCierre||[]).length);
    files.forEach(file=>{
      if(!['image/jpeg','image/jpg','image/png','application/pdf'].includes(file.type))
        return toast('Solo JPG, PNG o PDF','error');
      if(file.size>8*1024*1024) return toast(`"${file.name}" excede 8 MB`,'error');
      const reader=new FileReader();
      reader.onload=ev2=>onUpdate(idx,{soporteCierre:[...(comp.soporteCierre||[]),
        {data:ev2.target.result,nombre:file.name,tipo:file.type,kb:Math.round(file.size/1024)}]});
      reader.readAsDataURL(file);
    });
    e.target.value='';
  };

  const AREA_LABEL_CF = {
    administracion_personal:'Adm. Personal',gestion_sst:'Gestión SST',
    consultoria_juridica:'Cons. Jurídica',gestion_operativa:'Gestión Operativa',
    gestion_calidad:'Gestión Calidad',ambiental:'Ambiental',i_d:'I+D'
  };

  return (
      <div style={{marginBottom:16,border:'1px solid rgba(201,168,76,.2)',borderRadius:12,
        background:'rgba(15,25,40,.6)',overflow:'hidden'}}>

        {/* Cabecera del compromiso */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
          padding:'10px 14px',background:'rgba(30,58,95,.25)',borderBottom:'1px solid rgba(201,168,76,.15)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <select style={{background:'transparent',border:'none',color: comp.responsable==='integra'?'#93c5fd':'#C9A84C',
              fontWeight:700,fontSize:12,cursor:'pointer'}}
              value={comp.responsable||'integra'}
              onChange={e=>updField('responsable',e.target.value)}>
              <option value="integra">👤 Integra Consultores</option>
              <option value="cliente">🏢 Cliente</option>
            </select>
            <input type="checkbox" checked={!!comp.cumplido} style={{accentColor:'#4ade80'}}
              onChange={e=>updField('cumplido',e.target.checked)}/>
            <span style={{fontSize:10,color:'#475569'}}>Cumplido</span>
          </div>
          <button onClick={()=>onDelete(idx)}
            style={{background:'rgba(153,27,27,.35)',border:'1px solid rgba(248,113,113,.3)',
              borderRadius:6,color:'#fca5a5',fontSize:11,fontWeight:700,cursor:'pointer',padding:'2px 9px'}}>
            ✕
          </button>
        </div>

        <div style={{padding:'12px 14px'}}>
          <div className="grid-2">

            {/* Título de la tarea */}
            <F label="Título / Descripción *" col2>
              <input className="inp" value={comp.titulo||comp.descripcion||''} placeholder="Título de la tarea o compromiso..."
                onChange={e=>onUpdate(idx,{titulo:e.target.value,descripcion:e.target.value})}/>
            </F>

            {/* Cliente */}
            <F label="Cliente">
              <select className="inp" value={comp.clienteId||''} onChange={e=>updField('clienteId',e.target.value)}>
                <option value="">Sin cliente</option>
                {[...clientes].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'))
                  .map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
              </select>
            </F>

            {/* Estado */}
            <F label="Estado">
              <select className="inp" value={comp.estado||'pendiente'} onChange={e=>{
                const s=e.target.value;
                onUpdate(idx,{estado:s, showCierre:s==='completada'?(comp.showCierre||false):comp.showCierre});
              }}>
                <option value="pendiente">Pendiente</option>
                <option value="en_curso">En Curso</option>
                <option value="revision">En Revisión</option>
                <option value="completada">Completada</option>
                <option value="reprogramada">Reprogramada</option>
                <option value="cancelada">Cancelada</option>
              </select>
            </F>

            {/* Prioridad */}
            <F label="Prioridad">
              <select className="inp" value={comp.prioridad||'media'} onChange={e=>updField('prioridad',e.target.value)}>
                <option value="baja">Baja</option>
                <option value="media">Media</option>
                <option value="alta">Alta</option>
                <option value="urgente">Urgente</option>
              </select>
            </F>

            {/* Fecha Asignación */}
            <F label="Fecha de Asignación">
              <div style={{position:'relative'}}>
                <input type="date" className="inp" value={comp.fechaAsignada||''}
                  style={{paddingLeft:34}} onChange={e=>updField('fechaAsignada',e.target.value)}/>
                <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',
                  fontSize:13,pointerEvents:'none',opacity:.7}}>📅</span>
              </div>
            </F>

            {/* Fecha Vencimiento */}
            <F label="Fecha de Vencimiento">
              <input type="date" className="inp" value={comp.fechaVen||''}
                onChange={e=>updField('fechaVen',e.target.value)}/>
            </F>

            {/* Fecha Ejecución */}
            <F label="Fecha de Ejecución">
              <div style={{position:'relative'}}>
                <input type="date" className="inp" value={comp.fechaEjecucion||''}
                  style={{paddingLeft:34}} onChange={e=>updField('fechaEjecucion',e.target.value)}/>
                <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',
                  fontSize:13,pointerEvents:'none',opacity:.7}}>🗓️</span>
              </div>
            </F>

            {/* Proyecto */}
            <F label="Proyecto">
              <select className="inp" value={comp.proyectoId||''} onChange={e=>updField('proyectoId',e.target.value)}>
                <option value="">Sin proyecto</option>
                {(proyectos||[]).map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
              </select>
            </F>

            {/* Descripción */}
            <F label="Descripción / Notas" col2>
              <textarea className="inp" value={comp.desc||''} rows={2}
                onChange={e=>updField('desc',e.target.value)}/>
            </F>

            {/* Actividades Realizadas — solo si completada */}
            {comp.estado==='completada'&&(
              <F label={<span style={{display:'flex',alignItems:'center',gap:6}}>
                <span>✅</span>Actividades Realizadas
                <span style={{fontSize:9,fontWeight:600,padding:'1px 6px',borderRadius:99,
                  background:'rgba(74,222,128,.14)',border:'1px solid rgba(74,222,128,.3)',color:'#4ade80'}}>
                  requerido para informe
                </span>
              </span>} col2>
                <textarea className="inp" value={comp.actividadesRealizadas||''} rows={3}
                  placeholder="Describa las actividades ejecutadas..."
                  style={{border:'1px solid rgba(74,222,128,.35)',minHeight:80}}
                  onChange={e=>updField('actividadesRealizadas',e.target.value)}/>
              </F>
            )}

            {/* Reporte Informe — solo si completada */}
            {comp.estado==='completada'&&(
              <F label={<span style={{display:'flex',alignItems:'center',gap:6}}>
                <span>📋</span>Reporte Informe de Gestión
              </span>} col2>
                <textarea className="inp" value={comp.reporteInforme||''} rows={2}
                  placeholder="Texto para el informe mensual..."
                  onChange={e=>updField('reporteInforme',e.target.value)}/>
              </F>
            )}

            {/* Responsable(s) — idéntico al módulo Tareas */}
            <F label="Responsable(s)" col2>
              {equipo.length===0
                ? <p style={{fontSize:12,color:'#475569',margin:0}}>Sin integrantes en el equipo.</p>
                : <>
                    {/* Equipo Integra */}
                    <label onClick={toggleEI} style={{display:'flex',alignItems:'center',gap:10,
                      padding:'8px 12px',cursor:'pointer',userSelect:'none',marginBottom:6,borderRadius:9,
                      background:esEquipo?'rgba(30,58,95,.25)':'rgba(201,168,76,.05)',
                      border:`2px solid ${esEquipo?'rgba(30,58,95,.8)':'rgba(201,168,76,.35)'}`,transition:'all .15s'}}>
                      <div style={{width:20,height:20,borderRadius:4,flexShrink:0,border:'2px solid',
                        borderColor:esEquipo?'#60a5fa':'#C9A84C',background:esEquipo?'#1E3A5F':'transparent',
                        display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {esEquipo&&<span style={{fontSize:10,color:'#60a5fa',fontWeight:900}}>✓</span>}
                      </div>
                      <span style={{fontSize:16}}>👥</span>
                      <div style={{flex:1}}>
                        <p style={{fontSize:12,fontWeight:700,margin:0,color:esEquipo?'#93c5fd':'#C9A84C'}}>Equipo Integra</p>
                        <p style={{fontSize:10,color:'#475569',margin:0}}>Todo el equipo</p>
                      </div>
                      {esEquipo&&<span style={{fontSize:9,fontWeight:700,color:'#93c5fd',
                        background:'rgba(30,58,95,.4)',border:'1px solid rgba(147,197,253,.3)',
                        borderRadius:99,padding:'1px 7px'}}>{equipo.length} integrantes</span>}
                    </label>
                    <div style={{fontSize:10,color:'#334155',fontWeight:600,textTransform:'uppercase',
                      letterSpacing:'.4px',marginBottom:4,paddingLeft:2}}>O individualmente:</div>
                    <div style={{border:'1px solid #243447',borderRadius:8,background:'#0f1923',maxHeight:140,overflowY:'auto'}}>
                      {equipo.map(mm=>{
                        const selArr = Array.isArray(comp.responsablesIds)?comp.responsablesIds:[];
                        const selM   = selArr.includes(mm.id);
                        return (
                          <label key={mm.id} onClick={()=>toggleMiembro(mm.id)} style={{
                            display:'flex',alignItems:'center',gap:8,padding:'7px 12px',
                            cursor:'pointer',userSelect:'none',transition:'background .12s',
                            background:selM?'rgba(201,168,76,.09)':'transparent',
                            borderBottom:'1px solid #1a2840'}}>
                            <div style={{width:15,height:15,borderRadius:3,flexShrink:0,border:'2px solid',
                              borderColor:selM?'#C9A84C':'#334155',background:selM?'#C9A84C':'transparent',
                              display:'flex',alignItems:'center',justifyContent:'center'}}>
                              {selM&&<span style={{fontSize:9,color:'#0f1923',fontWeight:900}}>✓</span>}
                            </div>
                            <div style={{width:24,height:24,borderRadius:'50%',flexShrink:0,
                              background:'linear-gradient(135deg,#1E3A5F,#2a5298)',
                              display:'flex',alignItems:'center',justifyContent:'center',
                              fontSize:11,fontWeight:700,color:'#fff'}}>{mm.nombre.charAt(0)}</div>
                            <div style={{flex:1,minWidth:0}}>
                              <p style={{fontSize:12,fontWeight:selM?700:400,
                                color:selM?'#e8c96a':'#e2e8f0',margin:0,overflow:'hidden',
                                textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{mm.nombre}</p>
                              {mm.cargo&&<p style={{fontSize:10,color:'#475569',margin:0}}>{mm.cargo}</p>}
                            </div>
                            {selM&&<span style={{fontSize:9,fontWeight:700,color:'#C9A84C',flexShrink:0,
                              background:'rgba(201,168,76,.12)',border:'1px solid rgba(201,168,76,.28)',
                              borderRadius:99,padding:'1px 7px'}}>asignado</span>}
                          </label>
                        );
                      })}
                    </div>
                    {/* Chips */}
                    {(()=>{
                      const sel=(Array.isArray(comp.responsablesIds)?comp.responsablesIds:[])
                        .map(id=>equipo.find(e=>e.id===id)?.nombre).filter(Boolean);
                      return sel.length>0
                        ? <div style={{marginTop:6,display:'flex',flexWrap:'wrap',gap:4}}>
                            {comp.equipoIntegra&&<span style={{fontSize:11,color:'#93c5fd',
                              background:'rgba(30,58,95,.3)',border:'1px solid rgba(147,197,253,.25)',
                              borderRadius:99,padding:'2px 10px'}}>👥 Equipo Integra</span>}
                            {!comp.equipoIntegra&&sel.map((n,i)=>(
                              <span key={i} style={{fontSize:11,color:'#C9A84C',
                                background:'rgba(201,168,76,.1)',border:'1px solid rgba(201,168,76,.25)',
                                borderRadius:99,padding:'2px 10px'}}>{n}</span>
                            ))}
                          </div>
                        : <p style={{fontSize:11,color:'#334155',margin:'5px 0 0'}}>Sin responsable</p>;
                    })()}
                  </>
              }
            </F>

          </div>

          {/* Área de Especialidad */}
          <div style={{marginTop:12,padding:'10px 14px',borderRadius:9,
            border:'1px solid rgba(100,116,139,.3)',background:'rgba(51,65,85,.12)'}}>
            <p style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',
              letterSpacing:'.5px',margin:'0 0 8px'}}>Área de Especialidad</p>
            <select className="inp" value={comp.areaEspecialidad||''} onChange={e=>updField('areaEspecialidad',e.target.value)}>
              <option value="">— Sin clasificar —</option>
              <option value="administracion_personal">Administración de Personal</option>
              <option value="gestion_sst">Gestión SST</option>
              <option value="consultoria_juridica">Consultoría Jurídica</option>
              <option value="gestion_operativa">Gestión Operativa</option>
              <option value="gestion_calidad">Gestión de Calidad</option>
              <option value="ambiental">Ambiental</option>
              <option value="i_d">I+D</option>
            </select>
            {comp.areaEspecialidad&&<p style={{fontSize:10,color:'#60a5fa',margin:'4px 0 0'}}>
              ✓ {AREA_LABEL_CF[comp.areaEspecialidad]} — se incluirá en reportes
            </p>}
          </div>

          {/* Botón Cierre */}
          <div style={{marginTop:10}}>
            <button type="button" onClick={()=>updField('showCierre',!comp.showCierre)}
              style={{display:'inline-flex',alignItems:'center',gap:8,padding:'7px 14px',
                borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer',transition:'all .18s',border:'2px solid',
                borderColor:comp.showCierre?'rgba(74,222,128,.55)':'rgba(201,168,76,.5)',
                background:comp.showCierre?'rgba(26,107,58,.14)':'rgba(120,80,10,.12)',
                color:comp.showCierre?'#4ade80':'#C9A84C'}}>
              <span style={{fontSize:15}}>{comp.showCierre?'🔒':'📋'}</span>
              {comp.showCierre?'Cierre activo':'Cierre (Fase final)'}
            </button>
          </div>

          {/* Panel Cierre */}
          {comp.showCierre&&(()=>{
            const ev=(comp.soporteCierre||[]).filter(Boolean);
            const libre=4-ev.length;
            return (
              <div style={{marginTop:10,padding:'12px',borderRadius:9,border:'2px solid',
                borderColor:ev.length>0?'rgba(74,222,128,.4)':'rgba(248,113,113,.4)',
                background:ev.length>0?'rgba(26,107,58,.07)':'rgba(153,27,27,.07)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <span style={{fontSize:20}}>{ev.length>0?'✅':'📎'}</span>
                  <div>
                    <p style={{fontSize:12,fontWeight:700,margin:0,color:ev.length>0?'#4ade80':'#94a3b8'}}>
                      Soporte de Cierre — {ev.length}/4 (Opcional)
                    </p>
                    <p style={{fontSize:10,color:'#64748b',margin:0}}>JPG · PNG · PDF · máx. 8 MB</p>
                  </div>
                </div>
                {ev.length>0&&(
                  <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:8}}>
                    {ev.map((item,fi)=>(
                      <div key={fi} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',
                        background:'#0f1923',border:'1px solid #243447',borderRadius:7}}>
                        {item.tipo==='application/pdf'
                          ? <span style={{fontSize:18}}>📄</span>
                          : <img src={item.data} alt={item.nombre} style={{width:32,height:32,objectFit:'cover',borderRadius:5}}/>}
                        <div style={{flex:1,minWidth:0}}>
                          <p style={{fontSize:11,color:'#e2e8f0',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.nombre}</p>
                          <p style={{fontSize:10,color:'#475569',margin:0}}>{item.kb} KB</p>
                        </div>
                        <button type="button" onClick={()=>onUpdate(idx,{soporteCierre:ev.filter((_,i)=>i!==fi)})}
                          style={{background:'rgba(153,27,27,.32)',border:'1px solid rgba(248,113,113,.3)',
                            borderRadius:5,color:'#fca5a5',fontSize:11,cursor:'pointer',padding:'2px 7px'}}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
                {libre>0&&(
                  <label style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',borderRadius:8,
                    border:'2px dashed',cursor:'pointer',userSelect:'none',
                    borderColor:ev.length===0?'rgba(248,113,113,.5)':'rgba(74,222,128,.35)',
                    background:ev.length===0?'rgba(153,27,27,.05)':'rgba(26,107,58,.04)'}}>
                    <input type="file" accept=".jpg,.jpeg,.png,.pdf" multiple style={{display:'none'}} onChange={onAddFile}/>
                    <span style={{fontSize:18}}>📁</span>
                    <p style={{fontSize:11,fontWeight:700,margin:0,color:ev.length===0?'#94a3b8':'#4ade80'}}>
                      {ev.length===0?'Adjuntar soporte (opcional)':'Agregar más'} · {libre} disponible{libre!==1?'s':''}
                    </p>
                  </label>
                )}
              </div>
            );
          })()}

          {/* Botón Compromisos */}
          <div style={{marginTop:10}}>
            <button type="button" onClick={()=>updField('showCompromisos',!comp.showCompromisos)}
              style={{display:'inline-flex',alignItems:'center',gap:8,padding:'7px 14px',
                borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer',transition:'all .18s',border:'2px solid',
                borderColor:comp.showCompromisos?'rgba(96,165,250,.55)':'rgba(100,116,139,.4)',
                background:comp.showCompromisos?'rgba(30,58,95,.18)':'rgba(51,65,85,.1)',
                color:comp.showCompromisos?'#93c5fd':'#94a3b8'}}>
              <span style={{fontSize:15}}>🤝</span>
              {comp.showCompromisos?`Compromisos (${(comp.compromisos||[]).length})`:'Compromisos'}
            </button>
          </div>

          {/* Panel Compromisos */}
          {comp.showCompromisos&&(
            <div style={{marginTop:10,padding:'12px',borderRadius:9,
              border:'2px solid rgba(96,165,250,.35)',background:'rgba(30,58,95,.08)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <p style={{fontSize:12,fontWeight:700,margin:0,color:'#93c5fd'}}>🤝 Compromisos derivados</p>
                <button type="button" onClick={addSubComp}
                  style={{fontSize:11,fontWeight:700,cursor:'pointer',padding:'4px 12px',borderRadius:6,
                    background:'rgba(96,165,250,.18)',border:'1px solid rgba(96,165,250,.38)',color:'#93c5fd'}}>
                  + Agregar
                </button>
              </div>
              {(comp.compromisos||[]).length===0&&(
                <p style={{fontSize:11,color:'#475569',textAlign:'center',padding:'8px 0',margin:0}}>
                  Sin compromisos. Haga clic en "+ Agregar".
                </p>
              )}
              {(comp.compromisos||[]).map((sub,si)=>(
                <div key={sub.id||si} style={{marginBottom:8,padding:'10px',background:'#0f1923',
                  border:'1px solid #243447',borderRadius:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:10,fontWeight:600,color:'#64748b',textTransform:'uppercase'}}>
                      Compromiso #{si+1}
                    </span>
                    <button type="button" onClick={()=>delSubComp(si)}
                      style={{background:'rgba(153,27,27,.3)',border:'1px solid rgba(248,113,113,.25)',
                        borderRadius:4,color:'#fca5a5',fontSize:10,cursor:'pointer',padding:'1px 7px'}}>✕</button>
                  </div>
                  <textarea className="inp" value={sub.descripcion||''} rows={2}
                    placeholder="Descripción del compromiso..." style={{marginBottom:6,minHeight:44}}
                    onChange={e=>updSubComp(si,'descripcion',e.target.value)}/>
                  <div className="grid-2">
                    <div>
                      <label style={{fontSize:10,color:'#64748b',fontWeight:600,display:'block',marginBottom:3}}>Responsabilidad</label>
                      <select className="inp" value={sub.responsabilidad||'integra'}
                        onChange={e=>updSubComp(si,'responsabilidad',e.target.value)}>
                        <option value="integra">Integra Consultores</option>
                        <option value="cliente">Cliente</option>
                      </select>
                    </div>
                    <div>
                      <label style={{fontSize:10,color:'#64748b',fontWeight:600,display:'block',marginBottom:3}}>Fecha</label>
                      <input type="date" className="inp" value={sub.fechaCompromiso||''}
                        onChange={e=>updSubComp(si,'fechaCompromiso',e.target.value)}/>
                    </div>
                    {sub.responsabilidad==='integra'&&(
                      <div style={{gridColumn:'1/-1'}}>
                        <label style={{fontSize:10,color:'#64748b',fontWeight:600,display:'block',marginBottom:3}}>Responsable</label>
                        <select className="inp" value={sub.empleadoId||''}
                          onChange={e=>updSubComp(si,'empleadoId',e.target.value)}>
                          <option value="">— Seleccionar —</option>
                          {equipo.map(mm=><option key={mm.id} value={mm.id}>{mm.nombre}{mm.cargo?` · ${mm.cargo}`:''}</option>)}
                        </select>
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
};

// ── VISITA CLIENTE ───────────────────────────────────────────
